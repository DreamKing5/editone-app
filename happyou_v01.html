<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>EDIT ONE — 発表 v0.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:#f4f6f9;color:#1f2430;-webkit-text-size-adjust:100%}
header{position:sticky;top:0;z-index:50;background:#1f2937;color:#fff;display:flex;align-items:center;gap:8px;padding:10px 14px;flex-wrap:wrap}
header h1{font-size:16px;font-weight:700}
.sp{flex:1}
button{font:inherit;cursor:pointer}
.btn{background:#374151;color:#fff;border:1px solid #4b5563;border-radius:8px;padding:7px 12px;font-size:13px}
.btn.acc{background:#2563eb;border-color:#2563eb}
.btn.warn{background:#dc2626;border-color:#dc2626}
main{max-width:1400px;margin:0 auto;padding:12px}
.edit-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.edit-wrap{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #e2e6ee;border-radius:12px;padding:12px}
.card h2{font-size:14px;margin-bottom:8px;color:#374151}
#edT{width:100%;height:420px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;line-height:1.7;border:1px solid #cdd5e1;border-radius:8px;padding:10px;resize:vertical}
.frm{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
select,input[type=number],input[type=text]{font:inherit;font-size:13px;padding:6px 8px;border:1px solid #cdd5e1;border-radius:8px;background:#fff}
.rowbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.hint{font-size:12px;color:#667085;margin-top:6px;line-height:1.7}
/* スライドリスト */
#slideList{display:flex;gap:8px;overflow-x:auto;padding:6px 2px;margin-bottom:10px}
.sthumb{flex:0 0 90px;height:60px;border:2px solid #e2e6ee;border-radius:6px;cursor:pointer;font-size:10px;padding:4px;background:#fff;overflow:hidden;line-height:1.4;text-overflow:ellipsis}
.sthumb.active{border-color:#2563eb}
/* プレビュー */
#prevWrap{position:relative;background:#fff;border:1px solid #e2e6ee;border-radius:10px;overflow:hidden;aspect-ratio:16/9}
.slide-inner{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:6% 8%;gap:16px;transition:background .3s}
.slide-inner.th-default{background:#fff;color:#1f2430}
.slide-inner.th-dark{background:#0f172a;color:#e2e8f0}
.slide-inner.th-academic{background:#1e3a5f;color:#f0f4f8}
.slide-inner.th-green{background:#064e3b;color:#ecfdf5}
.slide-title{font-size:clamp(18px,3.5vw,36px);font-weight:700;line-height:1.3}
.slide-body{font-size:clamp(13px,2vw,22px);line-height:1.8}
.slide-body ul{padding-left:1.4em}
.slide-body li{margin-bottom:.4em}
.slide-body code{background:rgba(0,0,0,.12);border-radius:4px;padding:1px 6px;font-family:ui-monospace,monospace;font-size:.85em}
.slide-body strong{font-weight:700}
.slide-body em{font-style:italic}
.slide-num{position:absolute;bottom:10px;right:14px;font-size:11px;opacity:.5}
/* フルスクリーン */
#fs{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column;justify-content:center;align-items:center;touch-action:none}
#fs.on{display:flex}
#fsSlide{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:6% 8%;gap:24px}
.fs-title{font-size:clamp(24px,5vw,64px);font-weight:700;line-height:1.3}
.fs-body{font-size:clamp(16px,3vw,40px);line-height:1.8}
.fs-body ul{padding-left:1.4em}
.fs-body li{margin-bottom:.5em}
.fs-body code{background:rgba(255,255,255,.15);border-radius:4px;padding:2px 8px;font-family:ui-monospace,monospace;font-size:.85em}
#fsNav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:rgba(0,0,0,.45);color:#fff;font-size:14px}
#fsNote{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,.7);color:#a5f3fc;font-size:13px;padding:6px 16px;line-height:1.6;max-height:30vh;overflow:auto;display:none}
#fsTimer{font-size:18px;font-weight:700;color:#fbbf24}
.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:300;align-items:center;justify-content:center;padding:16px}
.modal.on{display:flex}
.mbox{background:#fff;border-radius:14px;max-width:520px;width:100%;padding:18px}
.mbox h3{font-size:15px;margin-bottom:10px}
.mrow{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:400;max-width:90vw}
#toast.on{opacity:1}
</style>
</head>
<body>
<header>
	<h1>🖥 発表 v0.1</h1>
	<span class="sp"></span>
	<button class="btn" id="expBtn">💾 書き出し</button>
	<button class="btn" id="impBtn">📂 読み込み</button>
	<button class="btn" id="printBtn">🖨 印刷PDF</button>
	<button class="btn acc" id="fsBtn">📺 プレゼン</button>
</header>
<main>
<div class="frm">
	<input type="text" id="project" placeholder="タイトル（例：睡眠と成績の関係）" style="flex:1;min-width:160px">
	<label>テーマ <select id="themeSel">
		<option value="th-default">プレーン（白）</option>
		<option value="th-dark">ダーク</option>
		<option value="th-academic">アカデミック（山唸色）</option>
		<option value="th-green">グリーン</option>
	</select></label>
	<label>発表時間 <input type="number" id="timerMin" value="5" min="1" max="99" style="width:60px"> 分</label>
	<button class="btn" id="sampleBtn">🧪 サンプル</button>
</div>
<div id="slideList"></div>
<div class="edit-wrap">
<div class="card">
	<h2>✍ エディタ（Markdownで記述 ・ `---` でスライド分割）</h2>
	<textarea id="edT" placeholder="# タイトルスライド
発表者名／日付
---
## 発表の構成
- 第1章：問題設定
- 第2章：方法
- 第3章：結果・考察
---
## 研究動機
$E = mc^2$のように数式も書けます。"></textarea>
	<div class="rowbar" style="margin-top:8px">
		<button class="btn" id="addSlideBtn">➕ スライド追加</button>
		<button class="btn" id="noteBtn">📝 ノート表示</button>
	</div>
	<div class="hint">`---` の単獨行でスライド分割。`#`で見出し、`##`でサブ見出し、`-`で箇条、`$数式$`で数式。</div>
</div>
<div class="card">
	<h2>📄 プレビュー（現在のスライド）</h2>
	<div id="prevWrap"><div id="prevSlide" class="slide-inner th-default"></div><span class="slide-num" id="prevNum"></span></div>
	<div class="rowbar" style="margin-top:8px">
		<button class="btn" id="prevBtn">◄</button>
		<button class="btn" id="nextBtn">►</button>
		<span id="slideInfo" style="font-size:13px;color:#667085"></span>
	</div>
	<div class="card" id="noteCard" style="margin-top:10px;display:none">
		<h2>📝 ノート（発表者メモ — フルスクリーン時は非表示）</h2>
		<textarea id="noteT" style="width:100%;min-height:80px;font:inherit;font-size:13px;border:1px solid #cdd5e1;border-radius:8px;padding:8px" placeholder="このスライドの発表メモをここに記入"></textarea>
	</div>
</div>
</div>
</main>
<!-- フルスクリーン -->
<div id="fs">
	<div id="fsSlide" class="th-default"></div>
	<div id="fsNote"></div>
	<div id="fsNav">
		<button class="btn" id="fsPrev">◄</button>
		<span id="fsNum" style="color:#fff"></span>
		<div style="display:flex;gap:12px;align-items:center">
			<span id="fsTimer">00:00</span>
			<button class="btn" id="fsNoteToggle">📝</button>
			<button class="btn warn" id="fsExit">ESC</button>
		</div>
		<button class="btn" id="fsNext">►</button>
	</div>
</div>
<div class="modal" id="timerM"><div class="mbox">
	<h3>⏰ 時間警告</h3>
	<p style="font-size:14px">5分前と終了時にアラートします。発表時間を変更する場合はヘッダーの「発表時間」を変更してください。</p>
	<div class="mrow"><button class="btn acc" id="timerOk">了解</button></div>
</div></div>
<input type="file" id="impFile" accept=".json,application/json" style="display:none">
<div id="toast"></div>
<script>
const LS="editone_happyou_v01";
const $=function(id){return document.getElementById(id);};
let st=load();
let cur=0,slides=[],timerSec=0,timerH=null,fsIdx=0;
let swX=null;
function load(){try{const d=JSON.parse(localStorage.getItem(LS));if(d)return d;}catch(e){}return{project:"",md:getSample(),theme:"th-default",timerMin:5,notes:{},guided:false};}
function persist(){try{localStorage.setItem(LS,JSON.stringify(st));}catch(e){}}
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("on");clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove("on");},2400);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function getSample(){
	const L=[];
	L.push("# 睡眠時間と学習成績の関係");
	L.push("発表者：サンプル太郎・○○高校 3年\n2026年 7月");
	L.push("---");
	L.push("## 発表の構成");
	L.push("- **第1章**：研究の背景・問題設定");
	L.push("- **第2章**：調査方法");
	L.push("- **第3章**：結果と考察");
	L.push("- **結論**：まとめ・今後の課題");
	L.push("---");
	L.push("## 研究の背景");
	L.push("高校生の平均睡眠時間は *6時間未満* といわれる");
	L.push("");
	L.push("睡眠不足と学業成績の関係はデータが少なく、未路の問題である");
	L.push("---");
	L.push("## 調査方法");
	L.push("- 対象：同校 1年生〜3年生 100名");
	L.push("- 方法：アンケート（睡眠時間・部活動・テスト点）");
	L.push("- 分析：ピアソン相関、独立標本 t 検定");
	L.push("");
	L.push("假説： $r < -0.3$ で有意な負の相関がある");
	L.push("---");
	L.push("## 結果");
	L.push("| 変数 | r | p |");
	L.push("|---|---|---|");
	L.push("| 睡眠 vs 国語 | -0.42 | .003 |");
	L.push("| 睡眠 vs 数学 | -0.38 | .011 |");
	L.push("| 部活動 vs 成績 | +0.29 | .041 |");
	L.push("");
	L.push("假説支持：睡眠時間と主要科目に有意な負の相関");
	L.push("---");
	L.push("## 考察・まとめ");
	L.push("- 7時間以上睡眠する生徒はテスト平均が **+8.2 点** 高い");
	L.push("- 限界：自己申告・横断面調査の因果関係は不明");
	L.push("- 今後：縦断データで因果関係を検討する");
	return L.join("\n");
}

/* ── Markdown→HTML ── */
function renderMath(s){
	return s.replace(/\$([^$]+)\$/g,function(_,m){
		const clean=esc(m);
		return '<span style="font-family:Georgia,\'Times New Roman\',serif;font-style:italic;letter-spacing:.03em">'+clean+'</span>';
	});
}
function mdToHtml(md){
	const lines=md.split("\n");
	let html="",inUl=false;
	function closeUl(){if(inUl){html+="</ul>";inUl=false;}}
	lines.forEach(function(line){
		line=line.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
		line=line.replace(/\*([^*]+)\*/g,"<em>$1</em>");
		line=line.replace(/`([^`]+)`/g,"<code>$1</code>");<br>		line=renderMath(line);<br>		if(/^#\s/.test(line)){closeUl();html+='<div class="slide-title">'+line.replace(/^#\s/,"")+"</div>";return;}<br>		if(/^##\s/.test(line)){closeUl();html+='<div class="slide-title" style="font-size:clamp(16px,2.8vw,30px)">'+line.replace(/^##\s/,"")+"</div>";return;}<br>		if(/^-\s/.test(line)){if(!inUl){html+='<ul class="slide-body">';inUl=true;}html+="<li>"+line.replace(/^-\s/,"")+"</li>";return;}<br>		closeUl();<br>		const trimmed=line.trim();<br>		if(trimmed){html+='<p class="slide-body" style="margin-bottom:4px">'+trimmed+"</p>";}<br>	});<br>	closeUl();<br>	return html;<br>}<br>function mdToFsHtml(md){<br>	const lines=md.split("\n");<br>	let html="",inUl=false;<br>	function closeUl(){if(inUl){html+="</ul>";inUl=false;}}<br>	lines.forEach(function(line){<br>		line=line.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");<br>		line=line.replace(/\*([^*]+)\*/g,"<em>$1</em>");<br>		line=line.replace(/`([^`]+)`/g,"<code>$1</code>");
		line=renderMath(line);
		if(/^#\s/.test(line)){closeUl();html+='<div class="fs-title">'+line.replace(/^#\s/,"")+"</div>";return;}
		if(/^##\s/.test(line)){closeUl();html+='<div class="fs-title" style="font-size:clamp(20px,4vw,52px)">'+line.replace(/^##\s/,"")+"</div>";return;}
		if(/^-\s/.test(line)){if(!inUl){html+='<ul class="fs-body">';inUl=true;}html+="<li>"+line.replace(/^-\s/,"")+"</li>";return;}
		closeUl();
		const trimmed=line.trim();
		if(trimmed){html+='<p class="fs-body" style="margin-bottom:6px">'+trimmed+"</p>";}
	});
	closeUl();
	return html;
}

/* ── スライド分割 ── */
function parseSlides(md){
	const raw=md.split(/^---$/m);
	return raw.map(function(s){return s.trim();}).filter(function(s){return s.length>0;});
}

/* ── プレビュー描画 ── */
function renderPreview(){
	slides=parseSlides($("edT").value);
	if(!slides.length){slides=["(スライドがありません)"];}
	if(cur>=slides.length)cur=slides.length-1;
	if(cur<0)cur=0;
	const th=st.theme||"th-default";
	const el=$("prevSlide");
	el.className="slide-inner "+th;
	el.innerHTML=mdToHtml(slides[cur]);
	$("prevNum").textContent=(cur+1)+" / "+slides.length;
	$("slideInfo").textContent="スライド "+(cur+1)+" / "+slides.length;
	renderThumbs();
	updateNoteField();
}
function renderThumbs(){
	let h="";
	slides.forEach(function(s,i){
		const th=st.theme||"th-default";
		h+='<div class="sthumb'+(i===cur?" active":"")+' '+th+'" onclick="jumpTo('+i+')">'+esc(s.replace(/[#*`$]/g,"").slice(0,40))+'</div>';
	});
	$("slideList").innerHTML=h;
}
function jumpTo(i){cur=i;renderPreview();}
function updateNoteField(){
	$("noteT").value=st.notes[cur]||"";
}

/* ── フルスクリーン ── */
function fsDraw(){
	const th=st.theme||"th-default";
	const fs=$("fsSlide");
	fs.className=th;
	fs.style.width="100%";
	fs.style.height="100%";
	fs.style.display="flex";
	fs.style.flexDirection="column";
	fs.style.justifyContent="center";
	fs.style.padding="6% 8%";
	fs.style.gap="24px";
	fs.innerHTML=mdToFsHtml(slides[fsIdx]||"(スライドなし)");
	$("fsNum").textContent=(fsIdx+1)+" / "+slides.length;
	const note=st.notes[fsIdx]||"";
	$("fsNote").textContent=note;
}
function fsOpen(){
	slides=parseSlides($("edT").value);
	if(!slides.length){toast("スライドがありません。エディタに内容を入れてください");return;}
	fsIdx=cur;
	$("fs").classList.add("on");
	fsDraw();
	startTimer();
	if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(function(){});
}
function fsClose(){
	$("fs").classList.remove("on");
	stopTimer();
	if(document.exitFullscreen)document.exitFullscreen().catch(function(){});
}
function fsGo(d){
	fsIdx=Math.max(0,Math.min(slides.length-1,fsIdx+d));
	fsDraw();
}

/* ── タイマー ── */
function startTimer(){
	timerSec=0;
	stopTimer();
	timerH=setInterval(function(){
		timerSec++;
		const m=Math.floor(timerSec/60);
		const s=timerSec%60;
		$("fsTimer").textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
		const limit=(parseInt($("timerMin").value,10)||5)*60;
		const warn=limit-300;
		if(timerSec===warn&&warn>0)toast("‼️ あと5分で発表時間終了です！");
		if(timerSec===limit)toast("⏰ 発表時間になりました！");
	},1000);
}
function stopTimer(){
	if(timerH){clearInterval(timerH);timerH=null;}
}

/* ── 印刷PDF ── */
$("printBtn").onclick=function(){
	slides=parseSlides($("edT").value);
	if(!slides.length){toast("スライドがありません");return;}
	const th=st.theme||"th-default";
	const bgMap={"th-default":"#fff","th-dark":"#0f172a","th-academic":"#1e3a5f","th-green":"#064e3b"};
	const fgMap={"th-default":"#1f2430","th-dark":"#e2e8f0","th-academic":"#f0f4f8","th-green":"#ecfdf5"};
	const bg=bgMap[th]||"#fff",fg=fgMap[th]||"#1f2430";
	let body="";
	slides.forEach(function(s,i){
		body+='<div class="page">'+mdToHtml(s)+'<div class="pnum">'+(i+1)+' / '+slides.length+'</div></div>';
	});
	const w=window.open("","_blank");
	if(!w){toast("ポップアップがブロックされました。許可してからもう一度押してください");return;}
	w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#eee}@media print{body{background:#fff}}.page{width:267mm;height:150mm;background:'+bg+';color:'+fg+';display:flex;flex-direction:column;justify-content:center;padding:10mm 14mm;gap:10px;page-break-after:always;overflow:hidden}.page:last-child{page-break-after:auto}.slide-title{font-size:22pt;font-weight:700;line-height:1.3}.slide-body{font-size:14pt;line-height:1.8}.slide-body ul{padding-left:1.4em}.slide-body li{margin-bottom:3px}.slide-body strong{font-weight:700}.slide-body em{font-style:italic}.slide-body code{background:rgba(0,0,0,.12);border-radius:3px;padding:1px 4px;font-size:.85em}.pnum{position:absolute;bottom:6mm;right:10mm;font-size:9pt;opacity:.5}<\/style></head><body>'+body+'<script>setTimeout(function(){window.print();},400);<\/script></body></html>');
	w.document.close();
	toast("印刷画面で「PDFとして保存」を選んでください");
};

/* ── 書き出し/読み込み ── */
$("expBtn").onclick=function(){
	st.md=$("edT").value;
	st.project=$("project").value;
	persist();
	try{
		const bl=new Blob([JSON.stringify(st,null,1)],{type:"application/json"});
		const a=document.createElement("a");a.href=URL.createObjectURL(bl);
		a.download=(st.project||"happyou")+"_happyou.json";
		document.body.appendChild(a);a.click();
		setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},500);
		toast("書き出しました");
	}catch(e){toast("保存に失敗しました");}
};
$("impBtn").onclick=function(){$("impFile").click();};
$("impFile").onchange=function(e){
	const f=e.target.files[0];if(!f)return;
	const rd=new FileReader();
	rd.onload=function(){
		try{
			const d=JSON.parse(rd.result);
			if(!d||typeof d.md!=="string")throw 0;
			if(!confirm("今の内容を置き換えて読み込みますか？"))return;
			st=d;if(!st.notes)st.notes={};persist();initFields();renderPreview();toast("読み込みました");
		}catch(err){toast("読み込めませんでした");}
	};
	rd.readAsText(f);e.target.value="";
};
$("sampleBtn").onclick=function(){
	if($("edT").value.trim()&&!confirm("現在の内容をサンプルに置き換えますか？"))return;
	$("edT").value=getSample();
	st.md=getSample();persist();renderPreview();toast("サンプルを読み込みました");
};
$("addSlideBtn").onclick=function(){
	const t=$("edT");const v=t.value;
	const append="\n---\n## 新しいスライド\n- 内容をここに入れてください";
	t.value=v.trimEnd()+append;
	st.md=t.value;persist();renderPreview();
	cur=slides.length-1;renderPreview();
	toast("スライドを追加しました");
};
$("noteBtn").onclick=function(){
	const c=$("noteCard");
	c.style.display=c.style.display==="none"?"block":"none";
	$("noteBtn").textContent=c.style.display==="none"?"📝 ノート表示":"📝 ノート隐表示";
};
$("noteT").oninput=function(e){
	st.notes[cur]=e.target.value;persist();
};
$("project").oninput=function(e){st.project=e.target.value;persist();};
$("themeSel").onchange=function(e){st.theme=e.target.value;persist();renderPreview();};
$("timerMin").onchange=function(e){st.timerMin=parseInt(e.target.value,10)||5;persist();};
$("prevBtn").onclick=function(){if(cur>0){cur--;renderPreview();}};  
$("nextBtn").onclick=function(){if(cur<slides.length-1){cur++;renderPreview();}};
$("edT").oninput=function(e){st.md=e.target.value;persist();renderPreview();};
/* フルスクリーン操作 */
$("fsBtn").onclick=fsOpen;
$("fsExit").onclick=fsClose;
$("fsPrev").onclick=function(){fsGo(-1);};
$("fsNext").onclick=function(){fsGo(1);};
$("fsNoteToggle").onclick=function(){
	const n=$("fsNote");
	n.style.display=n.style.display==="none"?"block":"none";
};
$("timerOk").onclick=function(){$("timerM").classList.remove("on");};
/* キーボード */
document.addEventListener("keydown",function(e){
	const fsOn=$("fs").classList.contains("on");
	if(fsOn){
		if(e.key==="ArrowRight"||e.key==="ArrowDown"||e.key===" "){e.preventDefault();fsGo(1);}
		if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();fsGo(-1);}
		if(e.key==="Escape"){fsClose();}
	}
});
/* スワイプ */
$("fs").addEventListener("touchstart",function(e){swX=e.touches[0].clientX;},{passive:true});
$("fs").addEventListener("touchend",function(e){
	if(swX===null)return;
	const dx=e.changedTouches[0].clientX-swX;
	if(Math.abs(dx)>50){fsGo(dx<0?1:-1);}
	swX=null;
},{passive:true});
function initFields(){
	$("edT").value=st.md||getSample();
	$("project").value=st.project||"";
	$("themeSel").value=st.theme||"th-default";
	$("timerMin").value=st.timerMin||5;
}
initFields();
renderPreview();
</script>
</body>
</html>
