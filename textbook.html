  { id: "lt4-2", unit: "l4", source: "textbook", num: "問4.3", difficulty: 2,
    q: String.raw`次の積を計算せよ．$$\text{(i)}\ \begin{bmatrix}3&1\\0&4\end{bmatrix}\begin{bmatrix}2&-1\\5&3\end{bmatrix}\qquad\text{(ii)}\ \begin{bmatrix}-10&5&-6\\-7&2&8\end{bmatrix}\begin{bmatrix}-1\\2\\1\end{bmatrix}\qquad\text{(iii)}\ [5\ \ {-4}\ \ 10]\begin{bmatrix}7&0\\-7&1\\2&-3\end{bmatrix}$$`,
    answerKey: [], answerDisplay: String.raw`(i) $\begin{bmatrix}11&0\\20&12\end{bmatrix}$ (ii) $\begin{bmatrix}14\\19\end{bmatrix}$ (iii) $[83\ \ {-34}]$`,
    hint: String.raw`$(i,j)$ 成分＝左の第 $i$ 行と右の第 $j$ 列の内積．サイズは (i) $2\times 2$，(ii) $2\times 1$，(iii) $1\times 2$．`,
    approach: String.raw`まず積のサイズを確定させ，各成分を内積で埋める．`,
    solution: String.raw`(i) $(1,1)$ 成分は $3\cdot 2+1\cdot 5=11$，$(1,2)$ は $3\cdot(-1)+1\cdot 3=0$，$(2,1)$ は $0\cdot 2+4\cdot 5=20$，$(2,2)$ は $0\cdot(-1)+4\cdot 3=12$．よって $\begin{bmatrix}11&0\\20&12\end{bmatrix}$．(ii) 第 1 成分：$(-10)(-1)+5\cdot 2+(-6)\cdot 1=14$，第 2 成分：$(-7)(-1)+2\cdot 2+8\cdot 1=19$．よって $\begin{bmatrix}14\\19\end{bmatrix}$．(iii) 第 1 成分：$5\cdot 7+(-4)(-7)+10\cdot 2=35+28+20=83$，第 2 成分：$5\cdot 0+(-4)\cdot 1+10\cdot(-3)=-34$．よって $[83\ \ {-34}]$．`,
    essence: String.raw`積の計算は「行×列の内積」の反復．先にサイズを書いてから埋めるとミスが減る．`,
    checklist: ["積のサイズを先に確認した", "各成分の内積計算が正しい", "符号の処理が正しい"] },
  { id: "lt4-3", unit: "l4", source: "textbook", num: "問4.8", difficulty: 3,
    q: String.raw`$A=\begin{bmatrix}-1&8\\6&1\end{bmatrix},\ B=\begin{bmatrix}5&-9\\4&3\end{bmatrix}$ に対して，$$AB,\quad BA,\quad {}^t\!A\,{}^t\!B,\quad {}^t\!B\,{}^t\!A$$ を計算せよ．`,
    answerKey: [], answerDisplay: String.raw`$AB=\begin{bmatrix}27&33\\34&-51\end{bmatrix},\ BA=\begin{bmatrix}-59&31\\14&35\end{bmatrix},\ {}^t\!A\,{}^t\!B=\begin{bmatrix}-59&14\\31&35\end{bmatrix},\ {}^t\!B\,{}^t\!A=\begin{bmatrix}27&34\\33&-51\end{bmatrix}$`,
    hint: String.raw`4 つ全部を真面目に計算してもよいが，$\,{}^t(AB)={}^t\!B\,{}^t\!A$ を使えば後半 2 つは転置するだけ．`,
    approach: String.raw`$AB,\ BA$ を計算し，$\,{}^t\!B\,{}^t\!A={}^t(AB)$，$\,{}^t\!A\,{}^t\!B={}^t(BA)$ で検算する．`,
    solution: String.raw`$AB=\begin{bmatrix}(-1)5+8\cdot 4&(-1)(-9)+8\cdot 3\\6\cdot 5+1\cdot 4&6(-9)+1\cdot 3\end{bmatrix}=\begin{bmatrix}27&33\\34&-51\end{bmatrix}$．$BA=\begin{bmatrix}5(-1)+(-9)6&5\cdot 8+(-9)1\\4(-1)+3\cdot 6&4\cdot 8+3\cdot 1\end{bmatrix}=\begin{bmatrix}-59&31\\14&35\end{bmatrix}$．$\,{}^t\!A=\begin{bmatrix}-1&6\\8&1\end{bmatrix},\ {}^t\!B=\begin{bmatrix}5&4\\-9&3\end{bmatrix}$ より $\,{}^t\!A\,{}^t\!B=\begin{bmatrix}-59&14\\31&35\end{bmatrix}$，$\,{}^t\!B\,{}^t\!A=\begin{bmatrix}27&34\\33&-51\end{bmatrix}$．確かに $\,{}^t\!B\,{}^t\!A={}^t(AB)$，$\,{}^t\!A\,{}^t\!B={}^t(BA)$ が成り立っている．また $AB\neq BA$ である．`,
    essence: String.raw`$\,{}^t(AB)={}^t\!B\,{}^t\!A$（順序反転）を数値で体験する問題．同時に非可換性 $AB\neq BA$ も確認できる．`,
    checklist: ["AB, BA の計算が正しい", "転置の取り方が正しい", "t(AB)=tB tA の関係を確認した"] },
  { id: "lt4-4", unit: "l4", source: "textbook", num: "問4.9", difficulty: 4,
    q: String.raw`2 次正方行列 $A=\begin{bmatrix}a&b\\c&d\end{bmatrix}$ が正則になるための必要十分条件は $ad-bc\neq 0$ であることを示せ．また，これがみたされるとき，$A$ の逆行列は $$A^{-1}=\frac{1}{ad-bc}\begin{bmatrix}d&-b\\-c&a\end{bmatrix}$$ で与えられることを示せ．`,
    answerKey: [], answerDisplay: String.raw`（証明問題）$C=\begin{bmatrix}d&-b\\-c&a\end{bmatrix}$ とおくと $AC=CA=(ad-bc)E_2$ が鍵`,
    hint: String.raw`$C=\begin{bmatrix}d&-b\\-c&a\end{bmatrix}$ とおいて $AC$ と $CA$ を計算してみよ．どちらも $(ad-bc)E_2$ になる．`,
    approach: String.raw`（十分性）$ad-bc\neq 0$ なら $\frac{1}{ad-bc}C$ が逆行列の定義をみたすことを直接確かめる．（必要性）$ad-bc=0$ のとき $AC=O$ を利用して矛盾を導く．`,
    solution: String.raw`$C=\begin{bmatrix}d&-b\\-c&a\end{bmatrix}$ とおくと，直接計算により $$AC=\begin{bmatrix}ad-bc&0\\0&ad-bc\end{bmatrix}=(ad-bc)E_2,\qquad CA=(ad-bc)E_2.$$ 【十分性】$ad-bc\neq 0$ のとき $B=\frac{1}{ad-bc}C$ とおけば $AB=BA=E_2$ となり，$A$ は正則で $A^{-1}=\frac{1}{ad-bc}\begin{bmatrix}d&-b\\-c&a\end{bmatrix}$．【必要性】$ad-bc=0$ とすると $AC=O$．もし $A$ が正則なら，左から $A^{-1}$ を掛けて $C=O$，すなわち $a=b=c=d=0$，つまり $A=O$ となる．しかし $O$ は $OB=O\neq E_2$ より正則でないので矛盾．よって $ad-bc=0$ のとき $A$ は正則でない．`,
    essence: String.raw`$ad-bc$（行列式の先取り）が逆行列の存在を支配する．公式「対角入れ替え，反対角符号反転，$ad-bc$ で割る」は即答できるように．`,
    checklist: ["AC=CA=(ad−bc)E を計算で確認した", "十分性と必要性の両方を論じた", "必要性の議論で矛盾を明示した"] },
  { id: "lt4-5", unit: "l4", source: "textbook", num: "問4.12", difficulty: 3,
    q: String.raw`自然数 $n$ に対して次の行列の $n$ 乗を計算せよ．$$A=\begin{bmatrix}1&0&0\\0&2&0\\0&0&3\end{bmatrix},\quad B=\begin{bmatrix}0&1&3\\0&0&2\\0&0&0\end{bmatrix},\quad C=\begin{bmatrix}0&0&0\\1&0&0\\3&2&0\end{bmatrix}$$ また $A^{-n}$ を計算せよ．`,
    answerKey: [], answerDisplay: String.raw`$A^{n}=\begin{bmatrix}1&0&0\\0&2^{n}&0\\0&0&3^{n}\end{bmatrix}$，$B^{2}=\begin{bmatrix}0&0&2\\0&0&0\\0&0&0\end{bmatrix}$，$B^{n}=O\ (n\geq 3)$，$C^{2}=\begin{bmatrix}0&0&0\\0&0&0\\2&0&0\end{bmatrix}$，$C^{n}=O\ (n\geq 3)$，$A^{-n}=\begin{bmatrix}1&0&0\\0&2^{-n}&0\\0&0&3^{-n}\end{bmatrix}$`,
    hint: String.raw`対角行列の積は対角成分どうしの積．$B,C$ は 2 乗，3 乗を実際に計算してみよ．`,
    approach: String.raw`$A$ は対角行列なので対角成分を $n$ 乗するだけ．$B,C$ は掛けるたびに非零成分が対角から離れていき，3 乗で消える．`,
    solution: String.raw`対角行列どうしの積は対角成分ごとの積になるので $A^{n}=\mathrm{diag}(1,2^{n},3^{n})$．$B$ は $$B^{2}=\begin{bmatrix}0&0&2\\0&0&0\\0&0&0\end{bmatrix},\qquad B^{3}=B^{2}B=O$$ となるので，$n\geq 3$ で $B^{n}=O$．同様に $$C^{2}=\begin{bmatrix}0&0&0\\0&0&0\\2&0&0\end{bmatrix},\qquad C^{3}=O$$ となり $n\geq 3$ で $C^{n}=O$．また $A$ は対角成分がすべて $0$ でないので正則で $A^{-1}=\mathrm{diag}(1,\tfrac{1}{2},\tfrac{1}{3})$．よって $A^{-n}=\mathrm{diag}(1,2^{-n},3^{-n})$．`,
    essence: String.raw`対角行列のべき乗は成分ごと．狭義の上（下）三角行列はべき零（掛けるたびに帯が対角から離れる）．どちらも後の固有値論で効いてくる感覚．`,
    checklist: ["対角行列の n 乗を成分ごとに処理した", "B², B³（C², C³）を実際に計算した", "A⁻¹ の対角成分が逆数になっている"] },
  { id: "lt4-6", unit: "l4", source: "textbook", num: "演習II.4", difficulty: 2,
    q: String.raw`$A={}^t\!A$ をみたす行列を対称行列という．$$\begin{bmatrix}1&a&2\\2b-1&0&c\\b&a+2&0\end{bmatrix}$$ が対称行列になるように $a,b,c$ を決めよ．`,
    answerKey: ["a=3, b=2, c=5", "a=3,b=2,c=5"], answerDisplay: String.raw`$a=3,\ b=2,\ c=5$`,
    hint: String.raw`対称行列は $(i,j)$ 成分と $(j,i)$ 成分が等しい．対角をはさんで向かい合う成分を比べる．`,
    approach: String.raw`$(1,2)=(2,1),\ (1,3)=(3,1),\ (2,3)=(3,2)$ の 3 本の方程式を立てる．`,
    solution: String.raw`対称性の条件は $$a=2b-1,\qquad 2=b,\qquad c=a+2.$$ 2 番目の式から $b=2$．これを 1 番目に代入して $a=3$．さらに $c=a+2=5$．`,
    verify: true,
    essence: String.raw`対称行列の定義を「成分の言葉」$(a_{ij}=a_{ji})$ で使う基本練習．対角成分は条件に現れない．`,
    checklist: ["対称条件を成分で書けた", "3 組の成分をすべて比較した", "連立して解く順序が適切"] },
  { id: "lt4-7", unit: "l4", source: "textbook", num: "演習II.5", difficulty: 3,
    q: String.raw`$$\begin{bmatrix}0&4\\1&4\\3&3\end{bmatrix}A=\begin{bmatrix}4&44\\9&57\\18&72\end{bmatrix}$$ をみたす行列 $A$ を求めよ．`,
    answerKey: [], answerDisplay: String.raw`$A=\begin{bmatrix}5&13\\1&11\end{bmatrix}$`,
    hint: String.raw`サイズの鎖から $A$ は $2\times 2$．$A=\begin{bmatrix}a&b\\c&d\end{bmatrix}$ とおいて成分を比較．`,
    approach: String.raw`第 1 行の比較から $c,d$ が即座に求まる（$0\cdot a+4c=4$ など）．次に第 2 行で $a,b$．第 3 行で検算．`,
    solution: String.raw`$(3\times 2)(2\times 2)=3\times 2$ より $A=\begin{bmatrix}a&b\\c&d\end{bmatrix}$ とおける．積の第 1 行は $[4c\ \ 4d]=[4\ \ 44]$ だから $c=1,\ d=11$．第 2 行は $[a+4c\ \ b+4d]=[9\ \ 57]$ だから $a=5,\ b=13$．第 3 行で検算：$[3a+3c\ \ 3b+3d]=[3\cdot 5+3\cdot 1\ \ 3\cdot 13+3\cdot 11]=[18\ \ 72]$ で一致．よって $A=\begin{bmatrix}5&13\\1&11\end{bmatrix}$．`,
    verify: true,
    essence: String.raw`未知行列は「サイズを確定→文字でおく→成分比較」．使わなかった行での検算を忘れない．`,
    checklist: ["A のサイズを正しく決定した", "成分比較の方程式が正しい", "余った行で検算した"] },
  { id: "lt4-8", unit: "l4", source: "textbook", num: "演習II.8", difficulty: 3,
    q: String.raw`任意の正方行列 $A$ に対して $A+{}^t\!A$ は対称行列であることを示せ．また，$A\,{}^t\!A$ が対称行列であることを示せ．`,
    answerKey: [], answerDisplay: String.raw`（証明問題）命題 4.2 と $\,{}^t({}^t\!A)=A$ を用いる`,
    hint: String.raw`対称行列の定義は $X={}^t\!X$．転置をとって元に戻ることを確かめればよい．`,
    approach: String.raw`$\,{}^t(A+{}^t\!A)$ と $\,{}^t(A\,{}^t\!A)$ を命題 4.2（和・積の転置）で展開する．`,
    solution: String.raw`命題 4.2 と $\,{}^t({}^t\!A)=A$ より $$\,{}^t(A+{}^t\!A)={}^t\!A+{}^t({}^t\!A)={}^t\!A+A=A+{}^t\!A$$ となり，$A+{}^t\!A$ は対称行列である．また $$\,{}^t(A\,{}^t\!A)={}^t({}^t\!A)\,{}^t\!A=A\,{}^t\!A$$ となり（積の転置で順序が逆転することに注意），$A\,{}^t\!A$ も対称行列である．`,
    essence: String.raw`「対称性の証明＝転置して元に戻ることの確認」．$\,{}^t(AB)={}^t\!B\,{}^t\!A$ の順序反転がちょうどうまく働く型．`,
    checklist: ["対称の定義（X=tX）を明示した", "和・積の転置公式を正しく使った", "t(tA)=A を使った"] },
  { id: "lt5-1", unit: "l5", source: "textbook", num: "問5.1", difficulty: 3,
    q: String.raw`積が定義できるように分割されているとして，次の計算をせよ．$$\text{(i)}\ \begin{bmatrix}A&O\\O&B\end{bmatrix}\begin{bmatrix}C&O\\O&D\end{bmatrix}\qquad\text{(ii)}\ \begin{bmatrix}A&B\\O&C\end{bmatrix}\begin{bmatrix}S&T\\U&V\end{bmatrix}\qquad\text{(iii)}\ \begin{bmatrix}O&E\\E&O\end{bmatrix}\begin{bmatrix}A&B\\C&D\end{bmatrix}$$`,
    answerKey: [], answerDisplay: String.raw`(i) $\begin{bmatrix}AC&O\\O&BD\end{bmatrix}$ (ii) $\begin{bmatrix}AS+BU&AT+BV\\CU&CV\end{bmatrix}$ (iii) $\begin{bmatrix}C&D\\A&B\end{bmatrix}$`,
    hint: String.raw`ブロックを数のように思って積の公式を適用．ただし掛ける順序は保つ．`,
    approach: String.raw`$O$ との積は $O$，$E$ との積はそのまま，を使って消える項を先に見極める．`,
    solution: String.raw`ブロック積の公式に従って計算する．(i) $\begin{bmatrix}AC+O&O\\O&O+BD\end{bmatrix}=\begin{bmatrix}AC&O\\O&BD\end{bmatrix}$．(ii) $\begin{bmatrix}AS+BU&AT+BV\\OS+CU&OT+CV\end{bmatrix}=\begin{bmatrix}AS+BU&AT+BV\\CU&CV\end{bmatrix}$．(iii) $\begin{bmatrix}OA+EC&OB+ED\\EA+OC&EB+OD\end{bmatrix}=\begin{bmatrix}C&D\\A&B\end{bmatrix}$．左から $\begin{bmatrix}O&E\\E&O\end{bmatrix}$ を掛けるとブロックの行が入れ替わる．`,
    essence: String.raw`$O$・$E$ 入りのブロック積はほとんどの項が消える．(iii) は「行の交換を行列の積で表せる」ことの頲証で，後の基本変形につながる．`,
    checklist: ["ブロック積の公式を正しく適用した", "掛ける順序を保った", "O・E の性質で項を正しく消した"] },
  { id: "lt5-2", unit: "l5", source: "textbook", num: "演習II.9", difficulty: 4,
    q: String.raw`2 つの上三角行列の積はまた上三角行列であることを示せ．`,
    answerKey: [], answerDisplay: String.raw`（証明問題）$i>j$ のとき $(AB)_{ij}=\sum_k a_{ik}b_{kj}=0$ を示す`,
    hint: String.raw`上三角の条件を成分で書くと「$i>k$ なら $a_{ik}=0$」．$i>j$ のとき和の各項が消えることを示せ．`,
    approach: String.raw`$(AB)_{ij}=\sum_{k=1}^{n}a_{ik}b_{kj}$ で $i>j$ とする．各 $k$ について $k<i$ か $k\geq i>j$ のいずれかであることに注目．`,
    solution: String.raw`$A=[a_{ij}],\ B=[b_{ij}]$ を $n$ 次上三角行列とする．すなわち $i>k$ のとき $a_{ik}=0$，$k>j$ のとき $b_{kj}=0$．$i>j$ をみたす $(i,j)$ について $$(AB)_{ij}=\sum_{k=1}^{n}a_{ik}b_{kj}$$ を考える．各 $k$ に対して，もし $k<i$ なら $a_{ik}=0$．もし $k\geq i$ なら $k\geq i>j$ より $b_{kj}=0$．いずれの場合も積 $a_{ik}b_{kj}=0$ となるので $(AB)_{ij}=0$．よって $AB$ は対角より下の成分がすべて $0$，すなわち上三角行列である．`,
    essence: String.raw`「形の保存」の証明は成分計算 $+$ 添字の場合分け．$k$ を境目 $i$ で 2 分する論法は頻出．`,
    checklist: ["上三角の条件を成分の言葉で書けた", "k の場合分けが過不足ない", "結論（i>j で成分 0）を明示した"] },
  { id: "lb3-1", unit: "l3", source: "bank", num: "追加演習1", difficulty: 1,
    q: String.raw`$A=\begin{bmatrix}3&-1&4\\2&0&5\end{bmatrix}$ について，(i) $A$ のサイズ，(ii) $(2,3)$ 成分と $(1,2)$ 成分，(iii) 転置行列 $\,{}^t\!A$ を答えよ．`,

    hint: String.raw`行→列の順．転置は行と列の入れ替え．`,
    approach: String.raw`定義の確認問題．サイズと成分の読み方，転置の作り方をそのまま適用する．`,
    solution: String.raw`(i) 行が 2 つ，列が 3 つなので $2\times 3$ 行列．(ii) 第 2 行第 3 列の成分は $5$，第 1 行第 2 列の成分は $-1$．(iii) 行と列を入れ替えて $\,{}^t\!A=\begin{bmatrix}3&2\\-1&0\\4&5\end{bmatrix}$（$3\times 2$ 行列）．`,
    essence: String.raw`サイズ・成分・転置の 3 点セットを一問で確認．`,
    checklist: ["サイズの順序が正しい", "成分の位置を正しく読めた", "転置のサイズが 3×2 になった"] },
  { id: "lb3-2", unit: "l3", source: "bank", num: "追加演習2", difficulty: 2,
    q: String.raw`$\begin{bmatrix}2&x-1&5\\2&0&y\\5&4&1\end{bmatrix}$ が対称行列（$A={}^t\!A$）になるように $x,y$ を定めよ．`,
    answerKey: ["x=3, y=4", "x=3,y=4"], answerDisplay: String.raw`$x=3,\ y=4$`,
    hint: String.raw`$(1,2)$ 成分と $(2,1)$ 成分，$(2,3)$ 成分と $(3,2)$ 成分を等しくする．`,
    approach: String.raw`対角をはさんで向かい合う成分の組をすべて比較する．`,
    solution: String.raw`対称性の条件は $x-1=2$，$y=4$，$5=5$（$(1,3)$ と $(3,1)$ はすでに一致）．よって $x=3,\ y=4$．`,
    essence: String.raw`対称条件 $a_{ij}=a_{ji}$ を成分ごとに書き下すだけ．確認漏れ（全ペアのチェック）に注意．`,
    checklist: ["向かい合う成分をすべて比較した", "方程式を正しく解いた"] },
  { id: "lb4-1", unit: "l4", source: "bank", num: "追加演習3", difficulty: 1,
    q: String.raw`次を計算せよ．$$2\begin{bmatrix}1&-2\\0&3\end{bmatrix}-3\begin{bmatrix}2&1\\-1&0\end{bmatrix}$$`,
    answerKey: [], answerDisplay: String.raw`$\begin{bmatrix}-4&-7\\3&6\end{bmatrix}$`,
    hint: String.raw`スカラー倍を先に実行してから引く．`,
    approach: String.raw`成分ごとに $2a_{ij}-3b_{ij}$ を計算する．`,
    solution: String.raw`$2\begin{bmatrix}1&-2\\0&3\end{bmatrix}=\begin{bmatrix}2&-4\\0&6\end{bmatrix}$，$3\begin{bmatrix}2&1\\-1&0\end{bmatrix}=\begin{bmatrix}6&3\\-3&0\end{bmatrix}$．差をとって $\begin{bmatrix}2-6&-4-3\\0+3&6-0\end{bmatrix}=\begin{bmatrix}-4&-7\\3&6\end{bmatrix}$．`,
    essence: String.raw`線形演算（スカラー倍と和）の基本ドリル．`,

  { id: "lb4-2", unit: "l4", source: "bank", num: "追加演習4", difficulty: 2,
    q: String.raw`$A=\begin{bmatrix}1&2\\3&4\end{bmatrix},\ B=\begin{bmatrix}0&1\\1&0\end{bmatrix}$ に対して $AB$ と $BA$ を計算し，$AB=BA$ が成り立つか判定せよ．`,
    answerKey: [], answerDisplay: String.raw`$AB=\begin{bmatrix}2&1\\4&3\end{bmatrix},\quad BA=\begin{bmatrix}3&4\\1&2\end{bmatrix}$．$AB\neq BA$（非可換）`,
    hint: String.raw`$B$ を右から掛けると列の交換，左から掛けると行の交換が起こる．`,

    solution: String.raw`$AB=\begin{bmatrix}1\cdot 0+2\cdot 1&1\cdot 1+2\cdot 0\\3\cdot 0+4\cdot 1&3\cdot 1+4\cdot 0\end{bmatrix}=\begin{bmatrix}2&1\\4&3\end{bmatrix}$（$A$ の列が入れ替わる）．$BA=\begin{bmatrix}3&4\\1&2\end{bmatrix}$（$A$ の行が入れ替わる）．よって $AB\neq BA$．`,

  { id: "lb4-3", unit: "l4", source: "bank", num: "追加演習5", difficulty: 1,
    q: String.raw`$A$ を $2\times 3$ 行列，$B$ を $3\times 4$ 行列，$C$ を $2\times 2$ 行列とする．次のうち定義できるものをすべて選び，そのサイズを答えよ．$$AB,\quad BA,\quad CA,\quad AC,\quad C^2$$`,
    answerKey: [], answerDisplay: String.raw`定義できる：$AB$（$2\times 4$），$CA$（$2\times 3$），$C^2$（$2\times 2$）．$BA,\ AC$ は定義できない`,
    hint: String.raw`$(m\times n)(n\times\ell)$ の形，すなわち「内側のサイズが一致」のときだけ積が定義される．`,
    approach: String.raw`各積について「左の列数＝右の行数」を確認する．`,
    solution: String.raw`$AB$：$(2\times 3)(3\times 4)$ で内側が 3 で一致するので定義でき，サイズは $2\times 4$．$BA$：$(3\times 4)(2\times 3)$ は $4\neq 2$ で定義できない．$CA$：$(2\times 2)(2\times 3)$ で定義でき，$2\times 3$．$AC$：$(2\times 3)(2\times 2)$ は $3\neq 2$ で定義できない．$C^2$：$(2\times 2)(2\times 2)$ で定義でき，$2\times 2$．`,

  { id: "lb4-4", unit: "l4", source: "bank", num: "追加演習6", difficulty: 2,
    q: String.raw`$A=\begin{bmatrix}1&1\\1&1\end{bmatrix},\ B=\begin{bmatrix}1&-1\\-1&1\end{bmatrix}$ に対して $AB$ を計算せよ．この結果は数の世界と比べて何が特異か述べよ．`,
    answerKey: [], answerDisplay: String.raw`$AB=O$．$A\neq O,\ B\neq O$ なのに積が零行列（零因子の存在）`,
    hint: String.raw`各成分を計算するとすべて打ち消し合う．`,
    approach: String.raw`定義通り計算し，数の性質「$xy=0\Rightarrow x=0$ または $y=0$」と対比する．`,
    solution: String.raw`$AB=\begin{bmatrix}1\cdot 1+1\cdot(-1)&1\cdot(-1)+1\cdot 1\\1\cdot 1+1\cdot(-1)&1\cdot(-1)+1\cdot 1\end{bmatrix}=\begin{bmatrix}0&0\\0&0\end{bmatrix}=O.$$ 数では $xy=0$ なら $x=0$ か $y=0$ だが，行列では $A\neq O$ かつ $B\neq O$ でも $AB=O$ となりうる．このような行列を零因子という．したがって行列の等式では「両辺を $A$ で割る」操作は一般にできない．`,
    essence: String.raw`零因子の存在は行列の世界の大きな特徴．簡約（割る操作）は正則行列でしかできない．`,
    checklist: ["AB=O を正しく計算した", "零因子の意味を説明した"] },
  { id: "lb4-5", unit: "l4", source: "bank", num: "追加演習7", difficulty: 2,
    q: String.raw`$A=\begin{bmatrix}2&5\\1&3\end{bmatrix}$ の逆行列を求め，$AA^{-1}=E$ を確かめよ．`,
    answerKey: [], answerDisplay: String.raw`$A^{-1}=\begin{bmatrix}3&-5\\-1&2\end{bmatrix}$`,
    hint: String.raw`$ad-bc=2\cdot 3-5\cdot 1=1$．2 次の逆行列の公式を使う．`,
    approach: String.raw`公式 $A^{-1}=\frac{1}{ad-bc}\begin{bmatrix}d&-b\\-c&a\end{bmatrix}$ に当てはめる．`,
    solution: String.raw`$ad-bc=6-5=1\neq 0$ より $A$ は正則で $$A^{-1}=\frac{1}{1}\begin{bmatrix}3&-5\\-1&2\end{bmatrix}=\begin{bmatrix}3&-5\\-1&2\end{bmatrix}.$$ 検算：$AA^{-1}=\begin{bmatrix}2\cdot 3+5(-1)&2(-5)+5\cdot 2\\1\cdot 3+3(-1)&1(-5)+3\cdot 2\end{bmatrix}=\begin{bmatrix}1&0\\0&1\end{bmatrix}=E$．`,
    essence: String.raw`2 次の逆行列公式の運用．$ad-bc=1$ のときは割る手間がなく検算も楽．`,
    checklist: ["ad−bc を先に計算した", "公式の符号・配置が正しい", "AA⁻¹=E を検算した"] },
  { id: "lb4-6", unit: "l4", source: "bank", num: "追加演習8", difficulty: 3,
    q: String.raw`正則行列 $A,B$ の逆行列が $A^{-1}=\begin{bmatrix}1&1\\0&1\end{bmatrix},\ B^{-1}=\begin{bmatrix}2&0\\1&1\end{bmatrix}$ であるとき，$(AB)^{-1}$ を求めよ．`,
    answerKey: [], answerDisplay: String.raw`$(AB)^{-1}=B^{-1}A^{-1}=\begin{bmatrix}2&2\\1&2\end{bmatrix}$`,
    hint: String.raw`命題 4.5：$(AB)^{-1}=B^{-1}A^{-1}$（順序が逆転）．`,
    approach: String.raw`$A$ や $B$ を復元する必要はない．公式に従い $B^{-1}A^{-1}$ を計算するだけ．`,
    solution: String.raw`$(AB)^{-1}=B^{-1}A^{-1}=\begin{bmatrix}2&0\\1&1\end{bmatrix}\begin{bmatrix}1&1\\0&1\end{bmatrix}=\begin{bmatrix}2\cdot 1+0\cdot 0&2\cdot 1+0\cdot 1\\1\cdot 1+1\cdot 0&1\cdot 1+1\cdot 1\end{bmatrix}=\begin{bmatrix}2&2\\1&2\end{bmatrix}.$$ 順序を間違えて $A^{-1}B^{-1}=\begin{bmatrix}3&1\\1&1\end{bmatrix}$ としないこと．`,
    essence: String.raw`「靴下と靴の法則」：先に履いたものを後に脱ぐ．$(AB)^{-1}=B^{-1}A^{-1}$ の順序反転は転置と同じパターン．`,
    checklist: ["順序を逆転させて B⁻¹A⁻¹ を計算した", "積の計算が正しい"] },
  { id: "lb4-7", unit: "l4", source: "bank", num: "追加演習9", difficulty: 3,
    q: String.raw`$A=\begin{bmatrix}1&1\\0&1\end{bmatrix}$ に対して $A^{n}$（$n$ は自然数）を推測し，数学的帰納法で証明せよ．`,
    answerKey: [], answerDisplay: String.raw`$A^{n}=\begin{bmatrix}1&n\\0&1\end{bmatrix}$`,
    hint: String.raw`$A^{2},A^{3}$ を計算すると $(1,2)$ 成分だけが $2,3,\ldots$ と増えていく．`,
    approach: String.raw`実験（$n=2,3$）→推測→帰納法（$A^{k+1}=A^{k}A$ を計算）の 3 ステップ．`,
    solution: String.raw`$A^{2}=\begin{bmatrix}1&2\\0&1\end{bmatrix}$，$A^{3}=\begin{bmatrix}1&3\\0&1\end{bmatrix}$ より $A^{n}=\begin{bmatrix}1&n\\0&1\end{bmatrix}$ と推測する．【証明】$n=1$ は明らか．$n=k$ で成立すると仮定すると $$A^{k+1}=A^{k}A=\begin{bmatrix}1&k\\0&1\end{bmatrix}\begin{bmatrix}1&1\\0&1\end{bmatrix}=\begin{bmatrix}1&k+1\\0&1\end{bmatrix}$$ となり $n=k+1$ でも成立．よってすべての自然数 $n$ で $A^{n}=\begin{bmatrix}1&n\\0&1\end{bmatrix}$．`,
    essence: String.raw`べき乗の問題は「小さく実験→推測→帰納法」が鉄板．この形の行列は定期試験でも頻出．`,
    checklist: ["小さい n で実験して推測した", "帰納法の 2 ステップを明示した", "行列の積の計算が正しい"] },
  { id: "lb5-1", unit: "l5", source: "bank", num: "追加演習10", difficulty: 2,
    q: String.raw`$A=\begin{bmatrix}1&0&2\\0&1&1\end{bmatrix}$ の列ベクトル分割を $A=[\boldsymbol{a}_1\ \boldsymbol{a}_2\ \boldsymbol{a}_3]$ とする．$\boldsymbol{x}=\begin{bmatrix}2\\-1\\3\end{bmatrix}$ に対して $A\boldsymbol{x}$ を列ベクトルの 1 次結合で表し，その値を計算せよ．`,
    answerKey: [], answerDisplay: String.raw`$A\boldsymbol{x}=2\boldsymbol{a}_1-\boldsymbol{a}_2+3\boldsymbol{a}_3=\begin{bmatrix}8\\2\end{bmatrix}$`,
    hint: String.raw`$A\boldsymbol{x}=x_1\boldsymbol{a}_1+x_2\boldsymbol{a}_2+x_3\boldsymbol{a}_3$．係数は $\boldsymbol{x}$ の成分．`,
    approach: String.raw`各列ベクトルを書き出し，成分を係数とする 1 次結合を作る．`,
    solution: String.raw`$\boldsymbol{a}_1=\begin{bmatrix}1\\0\end{bmatrix},\ \boldsymbol{a}_2=\begin{bmatrix}0\\1\end{bmatrix},\ \boldsymbol{a}_3=\begin{bmatrix}2\\1\end{bmatrix}$ より $$A\boldsymbol{x}=2\boldsymbol{a}_1+(-1)\boldsymbol{a}_2+3\boldsymbol{a}_3=2\begin{bmatrix}1\\0\end{bmatrix}-\begin{bmatrix}0\\1\end{bmatrix}+3\begin{bmatrix}2\\1\end{bmatrix}=\begin{bmatrix}2-0+6\\0-1+3\end{bmatrix}=\begin{bmatrix}8\\2\end{bmatrix}.$$ 普通の積の計算ともちろん一致する．`,
    essence: String.raw`$A\boldsymbol{x}$＝「列の 1 次結合」の見方を手を動かして確認．連立 1 次方程式論の土台になる．`,
    checklist: ["列ベクトルを正しく取り出した", "係数と列の対応が正しい", "普通の積と一致することを確認した"] },
  { id: "lb5-2", unit: "l5", source: "bank", num: "追加演習11", difficulty: 3,
    q: String.raw`$E$ を $n$ 次単位行列，$A,B$ を $n$ 次正方行列とする．ブロック積を用いて $$\begin{bmatrix}E&A\\O&E\end{bmatrix}\begin{bmatrix}E&B\\O&E\end{bmatrix}$$ を計算せよ．またこの結果から $\begin{bmatrix}E&A\\O&E\end{bmatrix}$ の逆行列を推定せよ．`,
    answerKey: [], answerDisplay: String.raw`$\begin{bmatrix}E&A+B\\O&E\end{bmatrix}$．逆行列は $B=-A$ として $\begin{bmatrix}E&-A\\O&E\end{bmatrix}$`,
    hint: String.raw`ブロック積の公式で $O$ と $E$ の性質を使う．積が $E_{2n}$ になる $B$ を探せ．`,
    approach: String.raw`ブロックごとに計算すると $(1,2)$ ブロックだけが $A+B$ になる．`,
    solution: String.raw`ブロック積の公式より $$\begin{bmatrix}E\cdot E+A\cdot O&E\cdot B+A\cdot E\\O\cdot E+E\cdot O&O\cdot B+E\cdot E\end{bmatrix}=\begin{bmatrix}E&A+B\\O&E\end{bmatrix}.$$ 特に $B=-A$ とすれば積は $\begin{bmatrix}E&O\\O&E\end{bmatrix}=E_{2n}$ となり，逆の順序の積も同様に $E_{2n}$．よって $$\begin{bmatrix}E&A\\O&E\end{bmatrix}^{-1}=\begin{bmatrix}E&-A\\O&E\end{bmatrix}.$$`,
    essence: String.raw`ブロック計算で逆行列が「見える」例．成分計算では $2n$ 次の逆行列など手が出ないが，ブロックなら一瞬．`,
    checklist: ["ブロック積の 4 ブロックをすべて計算した", "B=−A の置き換えに気づいた", "両側からの積が E になることを確認した"] },
  { id: "ladv-1", unit: "l4", source: "advanced", num: "発展1（演習II.13）", difficulty: 5,
    q: String.raw`$n$ 次正方行列 $A=[a_{ij}]$ の対角成分の和 $\mathrm{tr}\,A=a_{11}+a_{22}+\cdots+a_{nn}$ を $A$ のトレースという．(1) $\mathrm{tr}(cA)=c\,\mathrm{tr}\,A$（$c$ は数），$\mathrm{tr}(A+B)=\mathrm{tr}\,A+\mathrm{tr}\,B$ を示せ．(2) $\mathrm{tr}(AB)=\mathrm{tr}(BA)$ を示せ．(3) $AB-BA=E_n$ をみたす $n$ 次正方行列 $A,B$ は存在しないことを示せ．`,
    answerKey: [], answerDisplay: String.raw`（証明問題）(2) は両辺とも $\sum_i\sum_k a_{ik}b_{ki}$．(3) は両辺のトレースを比較（$0\neq n$）`,
    hint: String.raw`(2) $(AB)_{ii}=\sum_k a_{ik}b_{ki}$ を $i$ について足し，和の順序を交換せよ．(3) トレースは線形で $\mathrm{tr}(AB)=\mathrm{tr}(BA)$ を使うと左辺のトレースは？`,
    approach: String.raw`(1) は成分の定義から直接．(2) は二重和の順序交換．(3) は「両辺にトレースを取る」という一手で矛盾を導く．`,
    solution: String.raw`(1) $cA$ の対角成分は $ca_{ii}$ なので $\mathrm{tr}(cA)=\sum_i ca_{ii}=c\,\mathrm{tr}\,A$．$A+B$ の対角成分は $a_{ii}+b_{ii}$ なので $\mathrm{tr}(A+B)=\mathrm{tr}\,A+\mathrm{tr}\,B$．(2) $$\mathrm{tr}(AB)=\sum_{i=1}^{n}(AB)_{ii}=\sum_{i=1}^{n}\sum_{k=1}^{n}a_{ik}b_{ki}=\sum_{k=1}^{n}\sum_{i=1}^{n}b_{ki}a_{ik}=\sum_{k=1}^{n}(BA)_{kk}=\mathrm{tr}(BA).$$ (3) もし $AB-BA=E_n$ をみたす $A,B$ が存在するとする．両辺のトレースを取ると，(1)(2) より左辺は $$\mathrm{tr}(AB-BA)=\mathrm{tr}(AB)-\mathrm{tr}(BA)=0$$ である一方，右辺は $\mathrm{tr}\,E_n=n\geq 1$．$0\neq n$ で矛盾．よってそのような $A,B$ は存在しない．`,
    essence: String.raw`トレースは「非可換性の度合いを測る不変量」．不変量を両辺に適用して矛盾を導くのは大学数学の典型手法．量子力学の正準交換関係が有限次元で実現不可能な理由でもある．`,
    checklist: ["トレースの線形性を成分で示した", "二重和の交換を正しく行った", "(3) で両辺のトレースを比較し矛盾を明示した"] },
  { id: "ladv-2", unit: "l4", source: "advanced", num: "発展2（演習II.14）", difficulty: 5,
    q: String.raw`すべての 2 次正方行列と可換な 2 次正方行列 $A$ は，スカラー行列 $cE_2$（$c$ は数）に限ることを示せ．`,
    answerKey: [], answerDisplay: String.raw`（証明問題）$E_{12}=\begin{bmatrix}0&1\\0&0\end{bmatrix},\ E_{21}=\begin{bmatrix}0&0\\1&0\end{bmatrix}$ との可換性から成分を絞る`,
    hint: String.raw`すべてと可換なら，特に選んだ行列とも可換．成分の少ない $E_{12},E_{21}$ で試せ．`,
    approach: String.raw`$A=\begin{bmatrix}a&b\\c&d\end{bmatrix}$ とおき，$AE_{12}=E_{12}A$ と $AE_{21}=E_{21}A$ を成分比較する．`,
    solution: String.raw`$A=\begin{bmatrix}a&b\\c&d\end{bmatrix}$ とおく．$E_{12}=\begin{bmatrix}0&1\\0&0\end{bmatrix}$ との積は $$AE_{12}=\begin{bmatrix}0&a\\0&c\end{bmatrix},\qquad E_{12}A=\begin{bmatrix}c&d\\0&0\end{bmatrix}.$$ 可換性から $c=0,\ a=d$．同様に $E_{21}=\begin{bmatrix}0&0\\1&0\end{bmatrix}$ との可換性から $$AE_{21}=\begin{bmatrix}b&0\\d&0\end{bmatrix}=E_{21}A=\begin{bmatrix}0&0\\a&b\end{bmatrix}$$ より $b=0,\ d=a$．よって $A=\begin{bmatrix}a&0\\0&a\end{bmatrix}=aE_2$．逆にスカラー行列 $cE_2$ は任意の $X$ に対し $(cE)X=cX=X(cE)$ となり可換．したがって求める行列はスカラー行列に限る．`,
    essence: String.raw`「全部と可換⇒特別なものと可換」と弱めて情報を引き出す手法．行列単位 $E_{ij}$ はこの種の議論の定番のテスター．結果は「中心（center）はスカラー」という代数学の重要事実．`,
    checklist: ["テスト行列を自分で選んだ", "成分比較で a=d, b=c=0 を導いた", "逆向き（スカラー行列は可換）も確認した"] },
  { id: "ladv-3", unit: "l4", source: "advanced", num: "発展3（演習II.15）", difficulty: 5,
    q: String.raw`$n$ 次正方行列 $A$ がある自然数 $m$ に対して $A^{m}=O$ をみたすとき，$A$ をべき零行列という．(1) $A$ がべき零行列ならば $A$ は正則でないことを示せ．(2) $A$ がべき零行列のとき，$E-A$ および $E+A$ は正則であることを示し，それぞれの逆行列を求めよ．`,
    answerKey: [], answerDisplay: String.raw`(2) $(E-A)^{-1}=E+A+A^{2}+\cdots+A^{m-1}$，$(E+A)^{-1}=E-A+A^{2}-\cdots+(-1)^{m-1}A^{m-1}$`,
    hint: String.raw`(1) 正則と仮定して $A^{m}=O$ の両辺に $(A^{-1})^{m}$ を掛けよ．(2) 等比数列の和の公式 $1/(1-x)=1+x+x^{2}+\cdots$ を思い出せ．$A^{m}=O$ なら和は有限で打ち切れる．`,
    approach: String.raw`(2) $(E-A)(E+A+\cdots+A^{m-1})$ を展開すると途中の項がすべて打ち消し合い（望遠鏡和），$E-A^{m}=E$ が残る．`,
    solution: String.raw`(1) $A$ が正則と仮定する．$A^{m}=O$ の両辺に左から $(A^{-1})^{m}$ を掛けると $E=(A^{-1})^{m}O=O$ となり矛盾（$E\neq O$）．よって $A$ は正則でない．(2) $B=E+A+A^{2}+\cdots+A^{m-1}$ とおく．$$(E-A)B=(E+A+\cdots+A^{m-1})-(A+A^{2}+\cdots+A^{m})=E-A^{m}=E.$$ 同様に $B(E-A)=E$．よって $E-A$ は正則で $(E-A)^{-1}=E+A+A^{2}+\cdots+A^{m-1}$．また $-A$ も $(-A)^{m}=(-1)^{m}A^{m}=O$ よりべき零なので，上の結果の $A$ を $-A$ に換えて $$(E+A)^{-1}=E-A+A^{2}-\cdots+(-1)^{m-1}A^{m-1}.$$`,
    essence: String.raw`幾何級数 $\frac{1}{1-x}=1+x+x^{2}+\cdots$ の行列版．べき零性のおかげで無限和が有限和で打ち切れる．「数の公式を行列に輸入する」発想は今後（指数関数 $e^{A}$ など）も繰り返し登場する．`,
    checklist: ["(1) で背理法の構造を明示した", "望遠鏡和の打ち消しを正しく書いた", "両側からの積が E になることに触れた", "E+A への応用（A→−A）ができた"] },
  { id: "ladv-4", unit: "l5", source: "advanced", num: "発展4（演習II.10）", difficulty: 4,
    q: String.raw`$E_m,\ E_n$ をそれぞれ $m$ 次，$n$ 次の単位行列，$A$ を $m\times n$ 行列とする．自然数 $k$ に対して $$\begin{bmatrix}E_m&A\\O&E_n\end{bmatrix}^{k}$$ を求めよ．`,
    answerKey: [], answerDisplay: String.raw`$\begin{bmatrix}E_m&kA\\O&E_n\end{bmatrix}$`,
    hint: String.raw`$k=2,3$ をブロック積で計算して規則を見つけ，帰納法で仕上げよ．`,
    approach: String.raw`ブロック積で 2 乗を計算すると $(1,2)$ ブロックが $2A$ になる．以下同様に $kA$ と推測し，帰納法で確認．`,
    solution: String.raw`$P=\begin{bmatrix}E_m&A\\O&E_n\end{bmatrix}$ とおく．ブロック積で $$P^{2}=\begin{bmatrix}E_m E_m+AO&E_m A+AE_n\\OE_m+E_n O&OA+E_n E_n\end{bmatrix}=\begin{bmatrix}E_m&2A\\O&E_n\end{bmatrix}.$$ そこで $P^{k}=\begin{bmatrix}E_m&kA\\O&E_n\end{bmatrix}$ と推測する．【帰納法】$k=1$ は明らか．$k$ で成立するなら $$P^{k+1}=P^{k}P=\begin{bmatrix}E_m&kA\\O&E_n\end{bmatrix}\begin{bmatrix}E_m&A\\O&E_n\end{bmatrix}=\begin{bmatrix}E_m&A+kA\\O&E_n\end{bmatrix}=\begin{bmatrix}E_m&(k+1)A\\O&E_n\end{bmatrix}$$ となり $k+1$ でも成立．よってすべての自然数 $k$ に対し $P^{k}=\begin{bmatrix}E_m&kA\\O&E_n\end{bmatrix}$．`,
    essence: String.raw`lb4-7（$2\times 2$ の場合）のブロック版．「ブロックを数のように扱って実験→推測→帰納法」という定石の流れがそのまま通用する．`,
    checklist: ["ブロック積で 2 乗を正しく計算した", "推測を帰納法で証明した", "サイズ（E_m, E_n, A の形）を意識した"] }
]);

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;"); }
function el(tag, cls, html){ var e=document.createElement(tag); if(cls) e.className=cls; if(html!=null) e.innerHTML=html; return e; }
function math(node){ if(window.renderMathInElement){ try{ renderMathInElement(node,{delimiters:[{left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}],throwOnError:false}); }catch(e){} } }
function unitById(id){ return D.units.filter(function(u){return u.id===id;})[0]; }
function probsOf(unitId, source){ return D.problems.filter(function(p){ return (!unitId||p.unit===unitId) && (!source||p.source===source); }); }
function stars(n){ var s=""; for(var i=1;i<=5;i++) s += (i<=n ? "★" : "☆"); return s; }
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
​
function normAns(s){
  s = String(s||"");
  try{ s = s.normalize("NFKC"); }catch(e){}
  s = s.toLowerCase();
  s = s.replace(/\s+/g,"");
  s = s.replace(/，/g,",").replace(/[．。]/g,".");
  s = s.replace(/pi/g,"π");
  s = s.replace(/sqrt\(/g,"√(");
  s = s.replace(/[×*]/g,"");
  s = s.replace(/\+c$/,"");
  return s;
}
function judge(p, input){
  if(!p.answerKey || !p.answerKey.length) return null;
  var n = normAns(input);
  if(!n) return false;
  for(var i=0;i<p.answerKey.length;i++){ if(normAns(p.answerKey[i])===n) return true; }
  return false;
}
var SRC_LABEL = {textbook:"教科書 章末問題", bank:"AI問題バンク", advanced:"発展演習", pastexam:"過去問"};
var BLK = {def:"定義", thm:"定理", ex:"例", note:"補足", proof:"証明", point:"ポイント", warn:"よくあるミス", table:"公式表", fig:"図"};

function renderBlocks(blocks){
  var wrap = el("div");
  (blocks||[]).forEach(function(b){
    if(b.t==="h"){ wrap.appendChild(el("h3",null,esc(b.body))); return; }
    if(b.t==="p"){ wrap.appendChild(el("p",null,b.body)); return; }
    var box = el("div","blk-box blk-"+b.t);
    var label = (BLK[b.t]||b.t) + (b.n? "　"+b.n : "") + (b.title? "："+b.title : "");
    box.appendChild(el("div","blk-label", esc(label) + (b.verify? ' <span class="verifybadge">⚠ OCR要確認</span>' : "")));
    box.appendChild(el("div",null,b.body));
    if(b.sol){
      var d = el("details","blk-sol");
      d.innerHTML = "<summary>【解】を表示</summary><div></div>";
      d.lastChild.innerHTML = b.sol;
      d.addEventListener("toggle",function(){ if(d.open) math(d); });
      box.appendChild(d);
    }
    wrap.appendChild(box);
  });
  return wrap;
}

function problemCard(p){
  var card = el("div","card");
  var marks = [["o","○ できた"],["tri","△ あやしい"],["x","× できなかった"]];
  var mkChar = {o:"○",tri:"△",x:"×"};
  var head = el("div","row");
  head.innerHTML = '<span class="badge">'+esc(SRC_LABEL[p.source]||p.source)+'</span>'
    + '<span class="muted">'+esc(p.num||p.id)+'</span>'
    + '<span class="diff">'+stars(p.difficulty)+'</span>'
    + (p.verify? '<span class="verifybadge">⚠ OCR要確認</span>' : "")
    + '<span class="grow"></span>'
    + '<span class="mark-state">'+(mkChar[store.marks[p.id]]||"")+'</span>';
  card.appendChild(head);
  card.appendChild(el("div","prob-q", p.q));
  var ans = el("div","answer-row row");
  if(p.answerKey && p.answerKey.length){
    var inp = document.createElement("input"); inp.type="text"; inp.placeholder="答えを入力（例：1/3，π/4，log|x| など）"; inp.className="grow";
    var jbtn = el("button","btn small","判定");
    var res = el("span","judge","");
    jbtn.onclick = function(){ var ok = judge(p, inp.value); res.className = "judge "+(ok?"ok":"ng"); res.textContent = ok? "⭕ 正解！" : "❌ 不正解"; };
    inp.addEventListener("keydown",function(ev){ if(ev.key==="Enter") jbtn.onclick(); });
    ans.appendChild(inp); ans.appendChild(jbtn); ans.appendChild(res);
  } else {
    ans.appendChild(el("span","muted","✍️ 記述式：紙に解答を書いてから，解答・解説とチェックリストで自己採点しよう"));
  }
  card.appendChild(ans);
  var stages = [["💡 ヒント",p.hint],["🧭 方針",p.approach],["📖 解答・解説",(p.answerDisplay? "<div>答："+p.answerDisplay+"</div><hr class='sep'>" : "")+(p.solution||"")],["✨ 本質",p.essence]];
  var btnRow = el("div","row stage-btns");
  var stageWrap = el("div");
  stages.forEach(function(st){
    if(!st[1]) return;
    var b = el("button","btn small",st[0]);
    var dv = el("div","stage"); dv.style.display="none"; dv.innerHTML = st[1];
    b.onclick = function(){ var vis = dv.style.display!=="none"; dv.style.display = vis? "none" : "block"; if(!vis) math(dv); };
    btnRow.appendChild(b); stageWrap.appendChild(dv);
  });
  card.appendChild(btnRow); card.appendChild(stageWrap);
  if(p.checklist && p.checklist.length){
    var d = el("details","checklist");
    d.innerHTML = '<summary>☑ 記述自己採点チェックリスト</summary><div>'+p.checklist.map(function(c){ return '<label><input type="checkbox"> '+esc(c)+'</label>'; }).join("")+'</div>';
    card.appendChild(d);
  }
  var sm = el("div","selfmark row");
  sm.appendChild(el("span","muted","自己評価："));
  marks.forEach(function(m){
    var b = el("button","btn small"+(store.marks[p.id]===m[0]? " primary" : ""), m[1]);
    b.onclick = function(){
      store.marks[p.id] = m[0]; save();
      var bs = sm.querySelectorAll("button");
      for(var i=0;i<bs.length;i++){ bs[i].className = "btn small"+(marks[i][0]===m[0]? " primary" : ""); }
      head.querySelector(".mark-state").textContent = mkChar[m[0]];
    };
    sm.appendChild(b);
  });
  card.appendChild(sm);
  math(card);
  return card;
}

function genTest(unitIds, n){
  var pool = D.problems.filter(function(p){ return unitIds.indexOf(p.unit)>=0 && (p.source==="textbook"||p.source==="bank"); });
  var basic = shuffle(pool.filter(function(p){ return p.difficulty<=2; }));
  var std = shuffle(pool.filter(function(p){ return p.difficulty===3; }));
  var adv = shuffle(pool.filter(function(p){ return p.difficulty>=4; }));
  var nb = Math.round(n*0.3), ns = Math.round(n*0.4);
  var na = n - nb - ns;
  var picked = basic.slice(0,nb).concat(std.slice(0,ns), adv.slice(0,na));
  if(picked.length<n){
    var rest = shuffle(pool.filter(function(p){ return picked.indexOf(p)<0; }));
    picked = picked.concat(rest.slice(0, n-picked.length));
  }
  return picked.sort(function(a,b){ return a.difficulty-b.difficulty; });
}

function computeScore(){
  var T = state.test, sc = 0;
  T.problems.forEach(function(p){
    if(p.answerKey && p.answerKey.length){ if(judge(p, T.inputs[p.id]||"")) sc++; }
    else if(T.manual[p.id]) sc++;
  });
  return sc;
}

function renderTestRun(app){
  var T = state.test;
  var head = el("div","card");
  head.innerHTML = '<h3 style="margin-top:0">📝 擬似定期テスト（全 '+T.problems.length+' 問）</h3><div class="muted">解き終えたら一番下の「採点する」を押そう．記述式は採点後に解答を見て自己採点でチェック．</div>';
  var quit = el("button","btn small","テストを終了して戻る");
  quit.onclick = function(){ state.test = null; render(); };
  head.appendChild(quit);
  app.appendChild(head);
  if(T.done){
    var sc = computeScore(), max = T.problems.length;
    var pct = Math.round(sc/max*100);
    var verdict = pct>=80? "🎉 合格レベル！この調子！" : pct>=60? "🙂 あと一歩！間違えた問題を復習モードで潰そう．" : "📚 要復習．教科書タブのAI再編テキストに戻ろう．";
    var scCard = el("div","card");
    scCard.innerHTML = '<div class="score-big">'+sc+' / '+max+'</div><div style="text-align:center">'+verdict+'</div>';
    app.appendChild(scCard);
  }
  T.problems.forEach(function(p, i){
    var card = el("div","card");
    card.innerHTML = '<div class="row"><span class="badge">第'+(i+1)+'問</span><span class="diff">'+stars(p.difficulty)+'</span><span class="muted">'+esc(SRC_LABEL[p.source]||"")+'</span>'+(p.verify? '<span class="verifybadge">⚠ OCR要確認</span>':'')+'</div><div class="prob-q">'+p.q+'</div>';
    if(p.answerKey && p.answerKey.length){
      var inp = document.createElement("input"); inp.type="text"; inp.placeholder="答えを入力"; inp.className="grow";
      inp.value = T.inputs[p.id]||"";
      inp.oninput = function(){ T.inputs[p.id] = inp.value; };
      var arow = el("div","answer-row row"); arow.appendChild(inp); card.appendChild(arow);
      if(T.done){
        var ok = judge(p, T.inputs[p.id]||"");
        card.appendChild(el("div","judge "+(ok? "ok":"ng"), ok? "⭕ 正解" : "❌ 不正解"));
      }
    } else {
      card.appendChild(el("div","muted","✍️ 記述式：紙に解答を書こう"));
      if(T.done){
        var lb = el("label",null,'<input type="checkbox"'+(T.manual[p.id]? " checked":"")+'> 解答と照らして正解できた（自己採点）');
        lb.querySelector("input").onchange = function(ev){
          T.manual[p.id] = ev.target.checked;
          if(T.recIndex>=0){ store.tests[T.recIndex].score = computeScore(); save(); }
          render();
        };
        card.appendChild(lb);
      }
    }
    if(T.done){
      var d = el("details");
      d.innerHTML = '<summary class="clickable" style="color:var(--blue)">📖 解答・解説を見る</summary>';
      var dv = el("div","stage", (p.answerDisplay? "<div>答："+p.answerDisplay+"</div><hr class='sep'>":"")+(p.solution||""));
      d.appendChild(dv);
      d.addEventListener("toggle",function(){ if(d.open) math(d); });
      card.appendChild(d);
      if(p.checklist && p.checklist.length){
        var cd = el("details","checklist");
        cd.innerHTML = '<summary>☑ 記述自己採点チェックリスト</summary><div>'+p.checklist.map(function(c){ return '<label><input type="checkbox"> '+esc(c)+'</label>'; }).join("")+'</div>';
        card.appendChild(cd);
      }
    }
    math(card);
    app.appendChild(card);
  });
  var foot = el("div","card");
  if(!T.done){
    var gr = el("button","btn primary","採点する ✅");
    gr.onclick = function(){
      T.done = true;
      var sc = computeScore();
      var unitNos = state.testUnits.map(function(uid){ var u=unitById(uid); return u? u.no : uid; }).join("・");
      store.tests.push({ date: new Date().toLocaleDateString("ja-JP"), units: unitNos, score: sc, max: T.problems.length });
      T.recIndex = store.tests.length-1;
      save();
      render();
      window.scrollTo(0,0);
    };
    foot.appendChild(gr);
  } else {
    var again = el("button","btn primary","もう一度新しいテストを生成 🎲");
    again.onclick = function(){ state.test = null; render(); };
    foot.appendChild(again);
  }
  app.appendChild(foot);
}

      c.innerHTML = '<h3 style="margin-top:0">'+esc(e.year)+'年度　'+esc(e.professor)+'</h3><div class="muted">'+esc(e.format)+'</div>';
      (e.problems||[]).forEach(function(pid){
        var p = D.problems.filter(function(q){ return q.id===pid; })[0];
        if(p) c.appendChild(problemCard(p));
      });
      app.appendChild(c);
    });
  }
}

// ---------- ルーター ----------
var SCREENS = { home:screenHome, textbook:screenTextbook, practice:screenPractice, test:screenTest, advanced:screenAdvanced, pastexam:screenPastexam };
function go(s){ state.screen = s; render(); window.scrollTo(0,0); }
function render(){
  var app = document.getElementById("app");
  app.innerHTML = "";
  var btns = document.querySelectorAll("#nav button");
  for(var i=0;i<btns.length;i++){ btns[i].classList.toggle("active", btns[i].getAttribute("data-screen")===state.screen); }
  (SCREENS[state.screen]||screenHome)(app);
  math(app);
}
function updateHeader(){ document.getElementById("hd-sub").textContent = D.subject.name+"｜"+D.subject.textbook+"｜"+D.subject.range; }
function boot(){
  updateHeader();
  var btns = document.querySelectorAll("#nav button");
  for(var i=0;i<btns.length;i++){ (function(b){ b.onclick = function(){ go(b.getAttribute("data-screen")); }; })(btns[i]); }
  render();
  var tries = 0;
  var iv = setInterval(function(){
    tries++;
    if(window.renderMathInElement){ math(document.getElementById("app")); clearInterval(iv); }
    else if(tries>40) clearInterval(iv);
  }, 250);
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot); else boot();
})();
</script>
