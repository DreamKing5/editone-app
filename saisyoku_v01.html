<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>EDIT ONE 彩色 v0.1</title>
<style>
:root{--bg:#0f0f14;--panel:#17171f;--panel2:#1f1f2a;--line:#2b2b38;--text:#e9e9f0;--sub:#9a9aab;--accent:#4c8dff;--accent2:#845ef7;--ok:#2f9e44;--warn:#f59f00;--danger:#e5484d;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:"Hiragino Sans","Yu Gothic UI",system-ui,sans-serif;font-size:14px;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
h1{font-size:15px;margin-right:4px}
input[type=text]{background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:6px 8px;font-size:13px}
button{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
button:active{transform:scale(.97)}
button.on{background:var(--accent);border-color:var(--accent)}
.primary{background:var(--accent);border-color:var(--accent)}
.mini{padding:4px 8px;font-size:12px}
.sub{color:var(--sub);font-size:12px}
.spacer2{flex:1}
main{flex:1;display:flex;min-height:0}
#side{width:250px;background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;touch-action:pan-y}
.panel{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:10px;display:flex;flex-direction:column;gap:8px}
.panel h2{font-size:12px;color:var(--sub)}
.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.lrow{display:flex;justify-content:space-between;align-items:center;gap:6px}
#stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0a0a0e}
#wrap{position:relative;touch-action:none;background:repeating-conic-gradient(#23232e 0 25%,#1b1b24 0 50%) 0 0/24px 24px;box-shadow:0 0 0 1px var(--line)}
#wrap canvas{position:absolute;left:0;top:0;width:100%;height:100%}
#cLine,#cOver{pointer-events:none}
.pal{display:flex;flex-direction:column;gap:4px}
.palRow{display:flex;align-items:center;gap:6px;padding:4px;border-radius:8px;border:1px solid transparent}
.palRow.sel{border-color:var(--accent)}
.sw{width:26px;height:26px;border-radius:6px;border:1px solid var(--line);cursor:pointer;flex:none}
.sw.cur{outline:2px solid var(--accent)}
.palName{flex:1;font-size:12px;background:none;border:none;color:var(--text)}
.cellItem{display:flex;align-items:center;gap:8px;padding:4px;border:1px solid var(--line);border-radius:8px;cursor:pointer}
.cellItem img{width:56px;height:32px;object-fit:contain;background:#fff2;border-radius:4px}
input[type=range]{width:100%}
#toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:70;max-width:90%}
#guide{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:60}
.gcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;max-width:420px;width:90%;display:flex;flex-direction:column;gap:10px}
.grow{display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<header>
 <h1>🎨 彩色</h1>
 <input type="text" id="projName" placeholder="プロジェクト名" style="width:130px">
 <button class="mini" id="tBucket">🪣 バケツ</button>
 <button class="mini" id="tBrush">🖌 筆</button>
 <button class="mini" id="tEraser">🧽 消し</button>
 <button class="mini" id="tSpoit">💧 スポイト</button>
 <button class="mini" id="btnUndo">↩ 戻す</button>
 <button class="mini" id="btnCheck">🔍 塗り残し</button>
 <span class="spacer2"></span>
 <button class="mini" id="btnPng">🖼 PNG</button>
 <button class="primary mini" id="btnSend">📤 撮影へ送る</button>
</header>
<main>
 <div id="side">
  <div class="panel">
   <h2>線画</h2>
   <button class="mini" id="btnCells">📥 作画からセルを取り込み</button>
   <input type="file" id="fileLine" accept="image/*" style="font-size:11px">
   <div id="cellList" class="pal"></div>
   <div class="sub" id="curCell">線画:未読み込み</div>
  </div>
  <div class="panel">
   <h2>色パレット(ノーマル/影)</h2>
   <div id="palList" class="pal"></div>
   <div class="row">
    <button class="mini" id="btnAddPal">+ 色を追加</button>
    <button class="mini" id="btnDelPal">− 削除</button>
   </div>
   <div class="sub">左=ノーマル 右=影。タップで選択、ダブルタップで色変更</div>
  </div>
  <div class="panel">
   <h2>バケツ設定</h2>
   <div class="lrow"><span class="sub">許容差</span><span class="sub" id="tolV">32</span></div>
   <input type="range" id="tol" min="0" max="120" value="32">
   <div class="lrow"><span class="sub">隙間閉じ(px)</span><span class="sub" id="gapV">1</span></div>
   <input type="range" id="gap" min="0" max="3" value="1">
   <label class="sub"><input type="checkbox" id="underLine" checked> 線の下まで塗る(白フチ防止)</label>
  </div>
  <div class="panel">
   <h2>筆設定</h2>
   <div class="lrow"><span class="sub">サイズ</span><span class="sub" id="sizeV">12</span></div>
   <input type="range" id="size" min="1" max="80" value="12">
  </div>
 </div>
 <div id="stage"><div id="wrap">
  <canvas id="cPaint"></canvas>
  <canvas id="cLine"></canvas>
  <canvas id="cOver"></canvas>
 </div></div>
</main>
<div id="toast"></div>
<div id="guide"><div class="gcard"><h2 id="gTitle"></h2><p id="gBody" class="sub"></p><div class="grow"><span id="gStep" class="sub"></span><span class="spacer2"></span><button class="mini" id="gSkip">スキップ</button><button class="primary mini" id="gNext">次へ</button></div></div></div>
<script>
"use strict";
const KEY="editone_saishoku_v01",CELL="editone_cell_v01";
const $=id=>document.getElementById(id);
const W=1280,H=720;
const cP=$("cPaint"),cL=$("cLine"),cO=$("cOver");
[cP,cL,cO].forEach(c=>{c.width=W;c.height=H});
const px=cP.getContext("2d",{willReadFrequently:true}),lx=cL.getContext("2d",{willReadFrequently:true}),ox=cO.getContext("2d");
let cfg={v:1,project:"",palettes:[
 {name:"肌",n:"#f2cdaa",s:"#d69f77"},
 {name:"髪",n:"#5a4a6f",s:"#3c3050"},
 {name:"服",n:"#4c8dff",s:"#2f5fb3"},
 {name:"白目",n:"#ffffff",s:"#cfd6e4"}
]};
let tool="bucket",palSel=0,palSide="n",cellName="",undoStack=[];
try{const s=JSON.parse(localStorage.getItem(KEY)||"null");if(s&&s.v===1)cfg=s;}catch(e){}
$("projName").value=cfg.project||"";
function fit(){const st=$("stage"),s=Math.min((st.clientWidth-20)/W,(st.clientHeight-20)/H);const w=$("wrap");w.style.width=W*s+"px";w.style.height=H*s+"px"}
addEventListener("resize",fit);
function toast(m){const t=$("toast");t.textContent=m;t.style.opacity=1;clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity=0,2400)}
function store(){cfg.project=$("projName").value;try{localStorage.setItem(KEY,JSON.stringify(cfg))}catch(e){}}
function storeImg(){try{localStorage.setItem(KEY+"_img",JSON.stringify({p:cP.toDataURL(),l:cL.toDataURL(),cell:cellName}))}catch(e){}}
function restoreImg(){try{const s=JSON.parse(localStorage.getItem(KEY+"_img")||"null");if(!s)return;const a=new Image(),b=new Image();a.onload=()=>px.drawImage(a,0,0);b.onload=()=>lx.drawImage(b,0,0);a.src=s.p;b.src=s.l;cellName=s.cell||"";if(cellName)$("curCell").textContent="線画:"+cellName}catch(e){}}
[["tol","tolV"],["gap","gapV"],["size","sizeV"]].forEach(([a,b])=>{$(a).addEventListener("input",()=>$(b).textContent=$(a).value)});
function setTool(t){tool=t;[["bucket","tBucket"],["brush","tBrush"],["eraser","tEraser"],["spoit","tSpoit"]].forEach(([k,id])=>$(id).classList.toggle("on",k===t))}
$("tBucket").onclick=()=>setTool("bucket");
$("tBrush").onclick=()=>setTool("brush");
$("tEraser").onclick=()=>setTool("eraser");
$("tSpoit").onclick=()=>setTool("spoit");
function curColor(){const p=cfg.palettes[palSel];return palSide==="n"?p.n:p.s}
function renderPal(){const el=$("palList");el.innerHTML="";cfg.palettes.forEach((p,i)=>{
 const row=document.createElement("div");row.className="palRow"+(i===palSel?" sel":"");
 const sn=document.createElement("div");sn.className="sw"+(i===palSel&&palSide==="n"?" cur":"");sn.style.background=p.n;
 const ss=document.createElement("div");ss.className="sw"+(i===palSel&&palSide==="s"?" cur":"");ss.style.background=p.s;
 const nm=document.createElement("input");nm.className="palName";nm.value=p.name;nm.onchange=()=>{p.name=nm.value;store()};
 sn.onclick=()=>{palSel=i;palSide="n";renderPal()};
 ss.onclick=()=>{palSel=i;palSide="s";renderPal()};
 sn.ondblclick=()=>pick(p,"n");ss.ondblclick=()=>pick(p,"s");
 row.append(sn,ss,nm);el.appendChild(row)})}
function pick(p,side){const inp=document.createElement("input");inp.type="color";inp.value=side==="n"?p.n:p.s;inp.oninput=()=>{if(side==="n")p.n=inp.value;else p.s=inp.value;renderPal();store()};inp.click()}
$("btnAddPal").onclick=()=>{cfg.palettes.push({name:"色"+(cfg.palettes.length+1),n:"#cccccc",s:"#8a8a99"});palSel=cfg.palettes.length-1;renderPal();store()};
$("btnDelPal").onclick=()=>{if(cfg.palettes.length<=1)return;cfg.palettes.splice(palSel,1);palSel=0;renderPal();store()};
function snap(){undoStack.push(px.getImageData(0,0,W,H));if(undoStack.length>15)undoStack.shift()}
$("btnUndo").onclick=()=>{const s=undoStack.pop();if(!s){toast("これ以上戻せません");return}px.putImageData(s,0,0);storeImg()};
function pos(e){const r=$("wrap").getBoundingClientRect();return{x:Math.floor((e.clientX-r.left)/r.width*W),y:Math.floor((e.clientY-r.top)/r.height*H)}}
let drawing=false,last=null;
$("wrap").addEventListener("pointerdown",e=>{e.preventDefault();const p=pos(e);
 if(tool==="bucket"){snap();fill(p.x,p.y,curColor());storeImg();return}
 if(tool==="spoit"){spoit(p);return}
 snap();drawing=true;last=p;dot(p)});
addEventListener("pointermove",e=>{if(!drawing)return;const p=pos(e);line(last,p);last=p});
addEventListener("pointerup",()=>{if(drawing){drawing=false;storeImg()}});
function dot(p){px.save();if(tool==="eraser")px.globalCompositeOperation="destination-out";px.fillStyle=curColor();px.beginPath();px.arc(p.x,p.y,+$("size").value/2,0,7);px.fill();px.restore()}
function line(a,b){const d=Math.hypot(b.x-a.x,b.y-a.y),n=Math.ceil(d/2)+1;for(let i=0;i<=n;i++)dot({x:a.x+(b.x-a.x)*i/n,y:a.y+(b.y-a.y)*i/n})}
function spoit(p){if(p.x<0||p.y<0||p.x>=W||p.y>=H)return;const d=px.getImageData(p.x,p.y,1,1).data;if(d[3]===0){toast("透明です");return}const hex="#"+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,"0")).join("");const pal=cfg.palettes[palSel];if(palSide==="n")pal.n=hex;else pal.s=hex;renderPal();store();toast("色を取得:"+hex)}
function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function fill(sx,sy,hex){
 if(sx<0||sy<0||sx>=W||sy>=H)return;
 const pd=px.getImageData(0,0,W,H),p=pd.data;
 const ld=lx.getImageData(0,0,W,H),l=ld.data;
 const tol=+$("tol").value,gap=+$("gap").value,N=W*H;
 let bar=new Uint8Array(N);
 for(let i=0;i<N;i++)if(l[i*4+3]>40)bar[i]=1;
 for(let g=0;g<gap;g++){const nb=new Uint8Array(bar);for(let y=0;y<H;y++)for(let x=0;x<W;x++){const i=y*W+x;if(bar[i]){if(x>0)nb[i-1]=1;if(x<W-1)nb[i+1]=1;if(y>0)nb[i-W]=1;if(y<H-1)nb[i+W]=1}}bar=nb}
 const si=sy*W+sx;
 if(bar[si]){toast("線の上です。少しずらしてタップしてください");return}
 const sr=p[si*4],sg=p[si*4+1],sb=p[si*4+2],sa=p[si*4+3];
 const rgb=hex2rgb(hex),fr=rgb[0],fg=rgb[1],fb=rgb[2];
 const match=i=>{const j=i*4,a=p[j+3];if(sa<10)return a<10;if(a<10)return false;return Math.abs(p[j]-sr)+Math.abs(p[j+1]-sg)+Math.abs(p[j+2]-sb)<=tol*3};
 const filled=new Uint8Array(N),q=new Int32Array(N);let qh=0,qt=0;
 q[qt++]=si;filled[si]=1;
 while(qh<qt){const i=q[qh++],j=i*4;p[j]=fr;p[j+1]=fg;p[j+2]=fb;p[j+3]=255;
  const x=i%W;
  if(x>0&&!filled[i-1]&&!bar[i-1]&&match(i-1)){filled[i-1]=1;q[qt++]=i-1}
  if(x<W-1&&!filled[i+1]&&!bar[i+1]&&match(i+1)){filled[i+1]=1;q[qt++]=i+1}
  if(i>=W&&!filled[i-W]&&!bar[i-W]&&match(i-W)){filled[i-W]=1;q[qt++]=i-W}
  if(i<N-W&&!filled[i+W]&&!bar[i+W]&&match(i+W)){filled[i+W]=1;q[qt++]=i+W}
 }
 if($("underLine").checked){
  const edge=filled;
  for(let g=0;g<gap+2;g++){const ne=new Uint8Array(N);let any=false;
   for(let y=0;y<H;y++)for(let x=0;x<W;x++){const i=y*W+x;if(edge[i]||!bar[i])continue;
    if((x>0&&edge[i-1])||(x<W-1&&edge[i+1])||(y>0&&edge[i-W])||(y<H-1&&edge[i+W])){ne[i]=1;const j=i*4;p[j]=fr;p[j+1]=fg;p[j+2]=fb;p[j+3]=255;any=true}}
   for(let i=0;i<N;i++)if(ne[i])edge[i]=1;
   if(!any)break}
 }
 px.putImageData(pd,0,0);
}
$("btnCheck").onclick=()=>{
 const pd=px.getImageData(0,0,W,H),p=pd.data;
 const ld=lx.getImageData(0,0,W,H),l=ld.data;
 const N=W*H,bar=new Uint8Array(N);
 for(let i=0;i<N;i++)if(l[i*4+3]>40)bar[i]=1;
 const out=new Uint8Array(N),q=new Int32Array(N);let qh=0,qt=0;
 const tp=i=>{if(!out[i]&&!bar[i]&&p[i*4+3]<10){out[i]=1;q[qt++]=i}};
 for(let x=0;x<W;x++){tp(x);tp((H-1)*W+x)}
 for(let y=0;y<H;y++){tp(y*W);tp(y*W+W-1)}
 while(qh<qt){const i=q[qh++],x=i%W;if(x>0)tp(i-1);if(x<W-1)tp(i+1);if(i>=W)tp(i-W);if(i<N-W)tp(i+W)}
 const od=ox.createImageData(W,H),o=od.data;let cnt=0;
 for(let i=0;i<N;i++)if(!bar[i]&&!out[i]&&p[i*4+3]<10){o[i*4]=255;o[i*4+2]=255;o[i*4+3]=180;cnt++}
 ox.putImageData(od,0,0);
 toast(cnt?"塗り残し候補をピンクで表示("+cnt+"px)":"塗り残しなし!");
 setTimeout(()=>ox.clearRect(0,0,W,H),2500)};
$("btnCells").onclick=()=>{let pl=null;try{pl=JSON.parse(localStorage.getItem(CELL)||"null")}catch(e){}
 if(!pl||!pl.cells||!pl.cells.length){toast("セルが見つかりません。作画アプリで「撮影へ送る」を実行してください");return}
 const el=$("cellList");el.innerHTML="";
 pl.cells.forEach(c=>{const it=document.createElement("div");it.className="cellItem";
  const im=document.createElement("img");im.src=c.png;const sp=document.createElement("span");sp.textContent=c.name;sp.className="sub";
  it.append(im,sp);it.onclick=()=>loadLine(c);el.appendChild(it)});
 toast(pl.cells.length+"枚のセルが見つかりました")};
function loadLine(c){const im=new Image();im.onload=()=>{snap();lx.clearRect(0,0,W,H);const s=Math.min(W/im.width,H/im.height);lx.drawImage(im,(W-im.width*s)/2,(H-im.height*s)/2,im.width*s,im.height*s);cellName=c.name;$("curCell").textContent="線画:"+c.name;storeImg();toast("線画を読み込みました:"+c.name)};im.src=c.png}
$("fileLine").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>loadLine({name:f.name.replace(/\.[^.]+$/,""),png:r.result});r.readAsDataURL(f)};
function composite(){const t=document.createElement("canvas");t.width=W;t.height=H;const tx=t.getContext("2d");tx.drawImage(cP,0,0);tx.drawImage(cL,0,0);return t}
$("btnPng").onclick=()=>{const a=document.createElement("a");a.download=($("projName").value||"saishoku")+"_"+(cellName||"cell")+".png";a.href=composite().toDataURL("image/png");a.click()};
$("btnSend").onclick=()=>{let pl=null;try{pl=JSON.parse(localStorage.getItem(CELL)||"null")}catch(e){}
 if(!pl||!pl.cells)pl={from:"sakuga",ts:0,project:$("projName").value,cells:[]};
 const name=(cellName||"cell")+"_彩色";
 const png=composite().toDataURL("image/png");
 const i=pl.cells.findIndex(c=>c.name===name);
 if(i>=0)pl.cells[i]={name:name,png:png};else pl.cells.push({name:name,png:png});
 pl.ts=Date.now();pl.via="saishoku";
 try{localStorage.setItem(CELL,JSON.stringify(pl));toast("撮影へ送りました:"+name)}catch(e){toast("容量オーバーで送れません。PNG書き出しをご利用ください")}};
const GSTEPS=[["ようこそ 🎨","彩色アプリは、作画した線画に色を塗る専用アプリです。バケツでタップするだけで、線からはみ出さずに塗れます。"],["線画を取り込む","左の「📥 作画からセルを取り込み」で、作画アプリから送ったセルを読み込みます。PNGファイルの読み込みもできます。"],["パレットで色指定","キャラの色は左のパレットに登録。左がノーマル色、右が影色。ダブルタップで色を変更できます。"],["バケツで塗る","塗りたい場所をタップ。線に隙間があってはみ出すときは「隙間閉じ」を上げてください。「🔍 塗り残し」で未着色を検出できます。"],["撮影へ送る","塗り終わったら「📤 撮影へ送る」。撮影アプリのセル取り込みにそのまま並びます。"]];
let gi=0;
function gShow(){$("guide").style.display="flex";const st=GSTEPS[gi];$("gTitle").textContent=st[0];$("gBody").textContent=st[1];$("gStep").textContent=(gi+1)+" / "+GSTEPS.length;$("gNext").textContent=gi===GSTEPS.length-1?"はじめる":"次へ"}
function gEnd(){$("guide").style.display="none";localStorage.setItem(KEY+"_guided","1")}
$("gNext").onclick=()=>{gi++;if(gi>=GSTEPS.length)gEnd();else gShow()};
$("gSkip").onclick=gEnd;
$("projName").addEventListener("input",store);
setTool("bucket");renderPal();fit();restoreImg();
if(!localStorage.getItem(KEY+"_guided"))gShow();
</script>
</body>
</html>
