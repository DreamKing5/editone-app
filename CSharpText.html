/strong>しまいます。<\/p><p id=\"ch04_5-b5\">でも本当は、<\/p><blockquote id=\"ch04_5-b6\">エラーが起きても、ゲームを止めずに立て直したい<\/blockquote><p id=\"ch04_5-b7\">ですよね。そのための仕組みが <strong>例外処理（try-catch）<\/strong> です。<\/p><hr id=\"ch04_5-b8\"><h3 id=\"ch04_5-b9\" class=\"sec\">try-catch ―― 危険な処理を盾で囲む<\/h3><pre id=\"ch04_5-b10\" data-lang=\"plain text\"><code>try\n{\n    // 危険かもしれない処理\n    enemies[spawnCount] = \"ゴブリンD\";\n}\ncatch (IndexOutOfRangeException)\n{\n    // エラーが起きたときだけ実行される\n    Debug.Log(\"配列が満杯！スポーンを中止します\");\n}<\/code><\/pre><p id=\"ch04_5-b11\">図解：<\/p><pre id=\"ch04_5-b12\" data-lang=\"plain text\"><code>try の中で処理を実行\n    │\n    ├── 成功 → そのまま次へ\n    │\n    └── 例外発生 → catch が受け止める\n                     ↓\n              ゲームは止まらない！<\/code><\/pre><hr id=\"ch04_5-b13\"><h3 id=\"ch04_5-b14\" class=\"sec\">実践：安全なゴブリンスポーン<\/h3><pre id=\"ch04_5-b15\" data-lang=\"plain text\"><code>string[] waveEnemies = new string[3];\nint spawnCount = 0;\n\nvoid SpawnGoblin(string name)\n{\n    try\n    {\n        waveEnemies[spawnCount] = name;\n        Debug.Log(\"スポーン成功: \" + name);\n        spawnCount++;\n    }\n    catch (IndexOutOfRangeException)\n    {\n        Debug.Log(\"スポーン失敗: \" + name + \" → 配列が満杯！\");\n    }\n}<\/code><\/pre><p id=\"ch04_5-b16\">5体スポーンさせようとしても、4体目からは「失敗ログ」が出るだけでゲームは続行します。<\/p><hr id=\"ch04_5-b17\"><h3 id=\"ch04_5-b18\" class=\"sec\">finally ―― 成功でも失敗でも必ず実行<\/h3><pre id=\"ch04_5-b19\" data-lang=\"plain text\"><code>try     { /* 危険な処理 */ }\ncatch   { /* エラー時の処理 */ }\nfinally { /* どちらでも必ず実行（後片付けなど） */ }<\/code><\/pre><hr id=\"ch04_5-b20\"><h3 id=\"ch04_5-b21\" class=\"sec\">大事な心構え：例外は「最後の盾」<\/h3><p id=\"ch04_5-b22\">try-catchは万能ではありません。<\/p><blockquote id=\"ch04_5-b23\"><strong>まず if で防げるエラーは if で防ぐ。防ぎきれない事故に備えるのが try-catch。<\/strong><\/blockquote><h3 id=\"ch04_5-b24\" class=\"sec\">❌ 悪い例：ifで防げるのにtry-catchに頼る<\/h3><pre id=\"ch04_5-b25\" data-lang=\"plain text\"><code>// 配列の範囲は自分でチェックできる。これはtry-catchの出番ではない！\ntry\n{\n    waveEnemies[spawnCount] = name;\n}\ncatch (IndexOutOfRangeException)\n{\n    // エラーを握りつぶしているだけ……\n}<\/code><\/pre><h3 id=\"ch04_5-b26\" class=\"sec\">✅ 良い例：予測できる失敗はifで防ぐ<\/h3><pre id=\"ch04_5-b27\" data-lang=\"plain text\"><code>if (spawnCount &lt; waveEnemies.Length)\n{\n    waveEnemies[spawnCount] = name;\n    spawnCount++;\n}\nelse\n{\n    Debug.Log(\"満杯なのでスポーンしない\");\n}<\/code><\/pre><p id=\"ch04_5-b28\"><code class=\"ic\">IndexOutOfRangeException<\/code> のように<strong>事前チェックで防げる例外は、ifで防ぐのが正解<\/strong>です。try-catchの本当の出番は、ファイルの読み込み失敗や通信エラーなど「実行してみるまで分からない事故」に備えるときです。<\/p><p id=\"ch04_5-b29\">例外処理を「エラー隠し」に使うと、バグの原因が見えなくなります。<strong>catchの中を空にする（握りつぶす）のは厳禁<\/strong>です。最低でもログを出しましょう。<\/p><hr id=\"ch04_5-b30\"><h3 id=\"ch04_5-b31\" class=\"sec\">例外オブジェクト ―― エラーの詳細を受け取る<\/h3><p id=\"ch04_5-b32\">catchでは、エラーの詳細情報を変数として受け取れます。<\/p><pre id=\"ch04_5-b33\" data-lang=\"plain text\"><code>using System;  // ← Exception系の型を使うときはファイル先頭にこれが必要\n\ntry\n{\n    waveEnemies[spawnCount] = name;\n}\ncatch (IndexOutOfRangeException e)\n{\n    Debug.Log(\"範囲外エラー: \" + e.Message);  // エラーメッセージを表示\n}\ncatch (Exception e)\n{\n    // その他のあらゆる例外の受け皿（Exceptionは全例外の親玉）\n    Debug.Log(\"予期しないエラー: \" + e.Message);\n}<\/code><\/pre><ul id=\"ch04_5-b34\"><li><code class=\"ic\">e.Message<\/code> ……エラーの説明文<\/li><li>catchは<strong>複数並べられる<\/strong>。上から順に「型が一致するもの」が選ばれる<\/li><li><code class=\"ic\">Exception<\/code> はすべての例外の親（継承の考え方はChapter 8で学びます）<\/li><\/ul><hr id=\"ch04_5-b35\"><h3 id=\"ch04_5-b36\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch04_5-b37\"><strong>Q1.<\/strong> tryの中で例外が起きたとき、実行されるのは？<\/p><p id=\"ch04_5-b38\">A. finallyだけ　B. catchブロック　C. 何も実行されない<\/p><p id=\"ch04_5-b39\"><strong>Q2.<\/strong> try-catchを使う前に、まず考えるべきことは？<\/p><p id=\"ch04_5-b40\">A. ifで防げないか　B. とにかく全部tryで囲む　C. エラーを無視する設定を探す<\/p><p id=\"ch04_5-b41\"><strong>Q3.<\/strong> <code class=\"ic\">finally<\/code> はいつ実行される？<\/p><p id=\"ch04_5-b42\">A. 成功時のみ　B. 失敗時のみ　C. 成功でも失敗でも必ず<\/p><p id=\"ch04_5-b43\"><strong>解答<\/strong>　Q1 → B　Q2 → A　Q3 → C<\/p><hr id=\"ch04_5-b44\"><h3 id=\"ch04_5-b45\" class=\"sec\">次章へのフック<\/h3><p id=\"ch04_5-b46\">盾の使い方を覚えたあなたに、教官が言います。<\/p><pre id=\"ch04_5-b47\" data-lang=\"plain text\"><code>「次は武器庫だ。冒険者なら剣の扱いも覚えねばならん。」<\/code><\/pre><p id=\"ch04_5-b48\"><strong>Chapter 5<\/strong>では、同じ処理に名前を付ける「メソッド」を学びます。<\/p>"}, {"id": "ch05", "num": "5", "name": "武器庫：3本の伝説の剣を切り替えろ！", "title": "Chapter 5 武器庫：3本の伝説の剣を切り替えろ！", "html": "<blockquote id=\"ch05-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者） | <strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂） <strong>技術要素<\/strong>: メソッド定義・引数・戻り値・void・return<\/blockquote><hr id=\"ch05-b1\"><h3 id=\"ch05-b2\" class=\"sec\">衝撃！訓練所の武器庫<\/h3><p id=\"ch05-b3\">訓練所の武器庫には、<strong>3本の伝説級の訓練用武器<\/strong>が保管されています。<\/p><pre id=\"ch05-b4\" data-lang=\"plain text\"><code>炎の剣\n氷の剣\n雷の剣<\/code><\/pre><p id=\"ch05-b5\">冒険者は状況に応じて武器を持ち替えなければなりません。<\/p><p id=\"ch05-b6\">ところが、武器ごとに似たようなコードを書いていると、管理がどんどん大変になります。<\/p><p id=\"ch05-b7\">今回は、「<strong>同じ処理に名前を付ける<\/strong>」という強力な技術を学びます。<\/p><hr id=\"ch05-b8\"><h3 id=\"ch05-b9\" class=\"sec\">メソッド――処理に名前を付ける<\/h3><p id=\"ch05-b10\">同じコードが3箇所にあるという問題は、「メソッド」で解決できます。<\/p><pre id=\"ch05-b11\" data-lang=\"plain text\"><code>void AttackWithSword(string swordName)\n{\n    Debug.Log(swordName + \"で攻撃！\");\n}<\/code><\/pre><p id=\"ch05-b12\">呼び出すときは：<\/p><pre id=\"ch05-b13\" data-lang=\"plain text\"><code>AttackWithSword(\"炎の剣\");\nAttackWithSword(\"氷の剣\");\nAttackWithSword(\"雷の剣\");<\/code><\/pre><p id=\"ch05-b14\">「剣の種類が増えても、調整は1箇所だけ」という状態になります。<\/p><hr id=\"ch05-b15\"><h3 id=\"ch05-b16\" class=\"sec\">メソッドの解剖図<\/h3><pre id=\"ch05-b17\" data-lang=\"plain text\"><code>void AttackWithSword(string swordName)\n─┬── ─────┬───────── ──────┬─────────\n │        │                │\n 戻り値の型  メソッド名        引数（入力）\n{\n    // 処理本体\n}<\/code><\/pre><ul id=\"ch05-b18\"><li><strong>戻り値の型<\/strong>……このメソッドが返す値の型。返さないなら <code class=\"ic\">void<\/code><\/li><li><strong>メソッド名<\/strong>……動詞で始めるのが慣習（<code class=\"ic\">Attack<\/code>, <code class=\"ic\">GetPower<\/code>, <code class=\"ic\">ShowStatus<\/code>...）<\/li><li><strong>引数<\/strong>……メソッドへの入力。「型 + 名前」で書き、複数ならカンマで並べる<\/li><\/ul><h3 id=\"ch05-b19\" class=\"sec\">どこに書くの？ ―― 定義場所のルール<\/h3><p id=\"ch05-b20\">メソッドは「<strong>クラスの中、他のメソッドの外<\/strong>」に書きます。<\/p><pre id=\"ch05-b21\" data-lang=\"plain text\"><code>public class WeaponMaster : MonoBehaviour\n{\n    void Start()\n    {\n        AttackWithSword(\"炎の剣\");   // ← 呼び出しはメソッドの中\n    }\n\n    // ← 定義はクラスの中・Startの外！\n    void AttackWithSword(string swordName)\n    {\n        Debug.Log(swordName + \"で攻撃！\");\n    }\n\n    // void Update() { ... } ← StartやUpdateも実は同じ「メソッド」\n}<\/code><\/pre><ul id=\"ch05-b22\"><li>定義を書く<strong>順番は自由<\/strong>です（呼び出しより下に定義があってもOK）<\/li><li><code class=\"ic\">Start()<\/code> や <code class=\"ic\">Update()<\/code> も、Unityが自動で呼んでくれる「メソッド」です<\/li><\/ul><hr id=\"ch05-b23\"><h3 id=\"ch05-b24\" class=\"sec\">引数と戻り値<\/h3><p id=\"ch05-b25\">メソッドには<strong>引数<\/strong>（入力）と<strong>戻り値<\/strong>（出力）を持たせることができます。<\/p><pre id=\"ch05-b26\" data-lang=\"plain text\"><code>// 戻り値ありの例：剣の攻撃力を返す\n int GetAttackPower(string swordName)\n{\n    if (swordName == \"炎の剣\") return 50;\n    if (swordName == \"氷の剣\") return 40;\n    if (swordName == \"雷の剣\") return 60;\n    return 0;\n}<\/code><\/pre><p id=\"ch05-b27\"><code class=\"ic\">void<\/code> は「戻り値なし」、<code class=\"ic\">int<\/code> などの型を書くと戻り値が必要になります。<\/p><p id=\"ch05-b28\">使うときは、戻り値を変数で受け取ります。<\/p><pre id=\"ch05-b29\" data-lang=\"plain text\"><code>int power = GetAttackPower(\"炎の剣\");\nDebug.Log(\"攻撃力は\" + power);   // → 攻撃力は50<\/code><\/pre><hr id=\"ch05-b30\"><h3 id=\"ch05-b31\" class=\"sec\">returnの2つの役割<\/h3><p id=\"ch05-b32\"><code class=\"ic\">return<\/code> には役割が<strong>2つ<\/strong>あります。<\/p><ol id=\"ch05-b33\"><li><strong>値を返す<\/strong>……呼び出し元へ結果を渡す<\/li><li><strong>メソッドをその場で終了する<\/strong>……return以降の行は実行されない<\/li><\/ol><pre id=\"ch05-b34\" data-lang=\"plain text\"><code>int GetAttackPower(string swordName)\n{\n    if (swordName == \"炎の剣\") return 50;   // ← ここで即終了！下へは進まない\n    if (swordName == \"氷の剣\") return 40;\n    if (swordName == \"雷の剣\") return 60;\n    return 0;   // どれにも当てはまらなかったときの保険\n}<\/code><\/pre><p id=\"ch05-b35\">だからChapter 2の完成コードにあった <code class=\"ic\">if (isGameOver) { return; }<\/code> は「ゲームオーバー中はUpdateをその場で打ち切る」という意味だったのです（<code class=\"ic\">void<\/code> メソッドでは値なしの <code class=\"ic\">return;<\/code> が使えます）。<\/p><hr id=\"ch05-b36\"><h3 id=\"ch05-b37\" class=\"sec\">メソッドの中の変数 ―― ローカル変数<\/h3><p id=\"ch05-b38\">メソッドの中で作った変数（ローカル変数）は、<strong>そのメソッドの中だけ<\/strong>で有効です。<\/p><pre id=\"ch05-b39\" data-lang=\"plain text\"><code>void AttackWithSword(string swordName)\n{\n    int damage = 50;   // ← ローカル変数\n}\n\nvoid ShowDamage()\n{\n    // Debug.Log(damage);  ← エラー！damageはここからは見えない\n}<\/code><\/pre><p id=\"ch05-b40\">複数のメソッドで共有したい値は、クラス直下の<strong>フィールド<\/strong>にします（Chapter 1の文法整理を復習！）。<\/p><hr id=\"ch05-b41\"><h3 id=\"ch05-b42\" class=\"sec\">コラム：同じ名前のメソッドを複数作れる ―― オーバーロード<\/h3><p id=\"ch05-b43\">C#では「<strong>引数の型や数が違えば<\/strong>」同じ名前のメソッドを複数定義できます。<\/p><pre id=\"ch05-b44\" data-lang=\"plain text\"><code>void Attack()                  { Debug.Log(\"素手で攻撃！\"); }\nvoid Attack(string swordName)  { Debug.Log(swordName + \"で攻撃！\"); }\nvoid Attack(string swordName, int count)  { /* count回攻撃 */ }<\/code><\/pre><p id=\"ch05-b45\">呼び出し時の引数に合わせて、C#が自動で正しいほうを選んでくれます。これを<strong>オーバーロード<\/strong>と呼びます。<code class=\"ic\">Debug.Log<\/code> が数値でも文字列でも受け取れるのも、オーバーロードのおかげです。<\/p><hr id=\"ch05-b46\"><h3 id=\"ch05-b47\" class=\"sec\">完成コード<\/h3><h3 id=\"ch05-b48\" class=\"sec\">この章で作るファイル<\/h3><ul id=\"ch05-b49\"><li><code class=\"ic\">WeaponMaster.cs<\/code>（新規作成）――空のGameObjectか既存のCubeにアタッチ<\/li><\/ul><pre id=\"ch05-b50\" data-lang=\"plain text\"><code>using UnityEngine;\n\npublic class WeaponMaster : MonoBehaviour\n{\n    void Start()\n    {\n        // 3本の剣で順番に攻撃してみる\n        AttackWithSword(\"炎の剣\");\n        AttackWithSword(\"氷の剣\");\n        AttackWithSword(\"雷の剣\");\n\n        // 攻撃力を調べて表示する\n        int power = GetAttackPower(\"雷の剣\");\n        Debug.Log(\"雷の剣の攻撃力: \" + power);\n    }\n\n    // 剣で攻撃する（戻り値なし）\n    void AttackWithSword(string swordName)\n    {\n        int power = GetAttackPower(swordName);\n        Debug.Log(swordName + \"で攻撃！ ダメージ: \" + power);\n    }\n\n    // 剣の攻撃力を返す（戻り値あり）\n    int GetAttackPower(string swordName)\n    {\n        if (swordName == \"炎の剣\") return 50;\n        if (swordName == \"氷の剣\") return 40;\n        if (swordName == \"雷の剣\") return 60;\n        return 0;\n    }\n}<\/code><\/pre><h3 id=\"ch05-b51\" class=\"sec\">実行確認の手順<\/h3><ol id=\"ch05-b52\"><li>Playボタンを押す<\/li><li>Consoleに「炎の剣で攻撃！ ダメージ: 50」など4行のログが出れば成功<\/li><\/ol><hr id=\"ch05-b53\"><h3 id=\"ch05-b54\" class=\"sec\">改造セッション 🔧<\/h3><ol id=\"ch05-b55\"><li>4本目の剣「風の剣」（攻撃力45）を追加してみよう。変更箇所は何箇所で済むでしょうか？<\/li><li><code class=\"ic\">GetAttackPower<\/code> に存在しない剣の名前を渡すとどうなるか確認しよう（<code class=\"ic\">return 0<\/code> の意味が分かります）<\/li><li>攻撃回数を引数で受け取る <code class=\"ic\">AttackManyTimes(string swordName, int count)<\/code> を作ってみよう（forループの復習です）<\/li><\/ol><hr id=\"ch05-b56\"><h3 id=\"ch05-b57\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch05-b58\"><strong>Q1.<\/strong> 戻り値がないメソッドの型は？<\/p><p id=\"ch05-b59\">A. <code class=\"ic\">int<\/code>　B. <code class=\"ic\">void<\/code>　C. <code class=\"ic\">string<\/code><\/p><p id=\"ch05-b60\"><strong>Q2.<\/strong> <code class=\"ic\">GetAttackPower(\"氷の剣\")<\/code> の戻り値は？<\/p><p id=\"ch05-b61\">A. 40　B. 50　C. 0<\/p><p id=\"ch05-b62\"><strong>Q3.<\/strong> 同じ処理を3箇所にコピペする代わりにメソッドを使う最大の利点は？<\/p><p id=\"ch05-b63\">A. 実行速度が上がる　B. 修正が1箇所で済む　C. 文字数が減る<\/p><p id=\"ch05-b64\"><strong>解答<\/strong>　Q1 → B　Q2 → A　Q3 → B<\/p><hr id=\"ch05-b65\"><h3 id=\"ch05-b66\" class=\"sec\">エラー対応ガイド 🐛<\/h3><div id=\"ch05-b67\" class=\"tblwrap\"><table><tr><th><strong>症状<\/strong><\/th><th><strong>原因<\/strong><\/th><th><strong>対処<\/strong><\/th><\/tr><tr><td><code class=\"ic\">not all code paths return a value<\/code><\/td><td>戻り値ありのメソッドに <code class=\"ic\">return<\/code> の抜け道がある<\/td><td>最後に必ず <code class=\"ic\">return<\/code> を書く（例：<code class=\"ic\">return 0;<\/code>）<\/td><\/tr><tr><td>メソッドを呼んでも何も起きない<\/td><td>定義しただけで呼び出していない<\/td><td><code class=\"ic\">AttackWithSword(\"炎の剣\");<\/code> のように呼び出す<\/td><\/tr><tr><td>引数の型が合わないエラー<\/td><td><code class=\"ic\">int<\/code> のところに文字列を渡した等<\/td><td>定義側の引数の型と呼び出し側を一致させる<\/td><\/tr><\/table><\/div><hr id=\"ch05-b68\"><h3 id=\"ch05-b69\" class=\"sec\">章末――遠征の準備へ<\/h3><p id=\"ch05-b70\">武器の扱いを覚えたあなたに、教官は大きな袋を渡しました。<\/p><pre id=\"ch05-b71\" data-lang=\"plain text\"><code>「遠征に出るなら荷物管理も覚えろ。」<\/code><\/pre><p id=\"ch05-b72\">しかしその袋には、まだ誰も知らない秘密が隠されていました。<\/p>"}, {"id": "ch06", "num": "6", "name": "遠征準備：魔法の袋（List）にアイテムを詰め込め！", "title": "Chapter 6 遠征準備：魔法の袋（List）にアイテムを詰め込め！", "html": "<blockquote id=\"ch06-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者） | <strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂） <strong>技術要素<\/strong>: List&lt;T&gt;・Add・Remove・Count・foreach<\/blockquote><hr id=\"ch06-b1\"><h3 id=\"ch06-b2\" class=\"sec\">衝撃！遠征前夜<\/h3><p id=\"ch06-b3\">いよいよ初遠征の日が近づいてきました。<\/p><pre id=\"ch06-b4\" data-lang=\"plain text\"><code>ポーション。\n巻物。\n食料。\n予備武器。<\/code><\/pre><p id=\"ch06-b5\">冒険者は大量の荷物を持ち歩きます。<\/p><p id=\"ch06-b6\">ところがChapter 5まで使っていた配列には、大きな弱点がありました。<\/p><pre id=\"ch06-b7\" data-lang=\"plain text\"><code>「袋が満員になったら、それ以上入らない」<\/code><\/pre><p id=\"ch06-b8\">遠征でそんなことになったら大変です。<\/p><p id=\"ch06-b9\">そこで登場するのが、<strong>List<\/strong>という魔法の袋です。<\/p><hr id=\"ch06-b10\"><h3 id=\"ch06-b11\" class=\"sec\">List――魔法の袋<\/h3><p id=\"ch06-b12\"><code class=\"ic\">List<\/code> は配列と違い、<strong>大きさを自由に変えられる<\/strong>データ構造です。<\/p><pre id=\"ch06-b13\" data-lang=\"plain text\"><code>using System.Collections.Generic;\n\nList&lt;string&gt; items = new List&lt;string&gt;();\n\nitems.Add(\"ポーション\");\nitems.Add(\"巻物\");\nitems.Add(\"食料\");\n\nDebug.Log(\"荷物の数: \" + items.Count);\n\nforeach (string item in items)\n{\n    Debug.Log(item);\n}\n\nitems.Remove(\"巻物\");  // 使ったら削除<\/code><\/pre><p id=\"ch06-b14\"><strong><code class=\"ic\">List&lt;T&gt;<\/code><\/strong><strong> の <\/strong><strong><code class=\"ic\">&lt;T&gt;<\/code><\/strong><strong> って何？<\/strong><\/p><p id=\"ch06-b15\"><code class=\"ic\">List&lt;string&gt;<\/code> の <code class=\"ic\">&lt;string&gt;<\/code> の部分は<strong>型パラメータ<\/strong>と呼ばれます。「この袋には何型を入れるか」の指定です。<\/p><pre id=\"ch06-b16\" data-lang=\"plain text\"><code>List&lt;string&gt;  → 文字列を入れる袋\nList&lt;int&gt;     → 整数を入れる袋\nList&lt;float&gt;   → 小数を入れる袋<\/code><\/pre><p id=\"ch06-b17\"><code class=\"ic\">T<\/code> の部分には<strong>どんな型でも<\/strong>入れられます。Chapter 7でクラス（自分で作る型）を学ぶと、<code class=\"ic\">List&lt;Weapon&gt;<\/code> のように「自作の型の袋」も作れるようになります。<\/p><p id=\"ch06-b18\"><strong><code class=\"ic\">Remove<\/code><\/strong><strong> の細かい挙動<\/strong><\/p><ul id=\"ch06-b19\"><li>指定した要素が<strong>見つからない場合<\/strong>……何も起きません（エラーにはならず、<code class=\"ic\">false<\/code> が返ります）<\/li><li><strong>同じ要素が複数ある場合<\/strong>……「<strong>最初に見つかった1個だけ<\/strong>」が削除されます<\/li><\/ul><hr id=\"ch06-b20\"><h3 id=\"ch06-b21\" class=\"sec\">foreachという新しい仲間<\/h3><p id=\"ch06-b22\">上のコードにしれっと登場した <code class=\"ic\">foreach<\/code> は、この章からの新顔です。<\/p><pre id=\"ch06-b23\" data-lang=\"plain text\"><code>foreach (string item in items)\n{\n    Debug.Log(item);\n}<\/code><\/pre><p id=\"ch06-b24\">読み方は「itemsの中身を、1個ずつ <code class=\"ic\">item<\/code> という名前で取り出して処理する」。<\/p><p id=\"ch06-b25\"><code class=\"ic\">for<\/code> と違って番号（インデックス）を自分で管理しなくてよいのが強みです。<\/p><pre id=\"ch06-b26\" data-lang=\"plain text\"><code>for     → 番号で回す（i = 0, 1, 2, ...）\nforeach → 中身を直接1個ずつ受け取る<\/code><\/pre><p id=\"ch06-b27\">「全部に同じことをしたい」だけなら <code class=\"ic\">foreach<\/code> が読みやすく、番号が必要なときは <code class=\"ic\">for<\/code> を使い分けましょう。<\/p><blockquote id=\"ch06-b28\">⚠️ <strong>重要な予告<\/strong>：<code class=\"ic\">foreach<\/code> でListを回している<strong>最中<\/strong>に、そのListへ <code class=\"ic\">Add<\/code> や <code class=\"ic\">Remove<\/code> をしてはいけません（エラーでゲームが止まります）。理由と対策はChapter 9の「スライム分裂事件」で体験します。<\/blockquote><hr id=\"ch06-b29\"><h3 id=\"ch06-b30\" class=\"sec\">配列とListの比較<\/h3><div id=\"ch06-b31\" class=\"tblwrap\"><table><tr><th><strong>項目<\/strong><\/th><th><strong>配列<\/strong><\/th><th><strong>List<\/strong><\/th><\/tr><tr><td>大きさ<\/td><td>固定<\/td><td>自由に変更可能<\/td><\/tr><tr><td>要素の追加<\/td><td>不可<\/td><td>Add()でいつでも<\/td><\/tr><tr><td>要素の削除<\/td><td>不可<\/td><td>Remove()でいつでも<\/td><\/tr><tr><td>要素数<\/td><td>.Length<\/td><td>.Count<\/td><\/tr><\/table><\/div><hr id=\"ch06-b32\"><h3 id=\"ch06-b33\" class=\"sec\">完成コード<\/h3><h3 id=\"ch06-b34\" class=\"sec\">この章で作るファイル<\/h3><ul id=\"ch06-b35\"><li><code class=\"ic\">ItemBag.cs<\/code>（新規作成）――空のGameObjectにアタッチ<\/li><\/ul><pre id=\"ch06-b36\" data-lang=\"plain text\"><code>using System.Collections.Generic;  // Listを使うための必須のusing\nusing UnityEngine;\n\npublic class ItemBag : MonoBehaviour\n{\n    void Start()\n    {\n        // 魔法の袋を作る\n        List&lt;string&gt; items = new List&lt;string&gt;();\n\n        // 遠征の荷物を詰める\n        items.Add(\"ポーション\");\n        items.Add(\"巻物\");\n        items.Add(\"食料\");\n        items.Add(\"予備武器\");\n\n        Debug.Log(\"荷物の数: \" + items.Count);  // → 4\n\n        // 巻物を使ったので袋から出す\n        items.Remove(\"巻物\");\n        Debug.Log(\"使用後の数: \" + items.Count);  // → 3\n\n        // 残りの中身を全部確認\n        foreach (string item in items)\n        {\n            Debug.Log(\"持ち物: \" + item);\n        }\n    }\n}<\/code><\/pre><h3 id=\"ch06-b37\" class=\"sec\">実行確認の手順<\/h3><ol id=\"ch06-b38\"><li>Playボタンを押す<\/li><li>Consoleに「荷物の数: 4」「使用後の数: 3」と残り3つの持ち物が表示されれば成功<\/li><\/ol><hr id=\"ch06-b39\"><h3 id=\"ch06-b40\" class=\"sec\">改造セッション 🔧<\/h3><ol id=\"ch06-b41\"><li>アイテムを10個 <code class=\"ic\">Add<\/code> してから3個 <code class=\"ic\">Remove<\/code> し、<code class=\"ic\">Count<\/code> の変化を確認しよう<\/li><li><code class=\"ic\">items.Contains(\"ポーション\")<\/code> で持ち物チェックを作ってみよう<\/li><li><code class=\"ic\">List&lt;int&gt;<\/code> で「ダメージ履歴」を記録し、foreachで合計ダメージを計算してみよう<\/li><\/ol><hr id=\"ch06-b42\"><h3 id=\"ch06-b43\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch06-b44\"><strong>Q1.<\/strong> Listの要素数を調べるのは？<\/p><p id=\"ch06-b45\">A. <code class=\"ic\">.Length<\/code>　B. <code class=\"ic\">.Count<\/code>　C. <code class=\"ic\">.Size<\/code><\/p><p id=\"ch06-b46\"><strong>Q2.<\/strong> Listに要素を追加するメソッドは？<\/p><p id=\"ch06-b47\">A. <code class=\"ic\">Add()<\/code>　B. <code class=\"ic\">Push()<\/code>　C. <code class=\"ic\">Append()<\/code><\/p><p id=\"ch06-b48\"><strong>Q3.<\/strong> 配列とListの一番大きな違いは？<\/p><p id=\"ch06-b49\">A. Listは小数を入れられる　B. Listは大きさを後から変えられる　C. 配列のほうが新しい機能<\/p><p id=\"ch06-b50\"><strong>解答<\/strong>　Q1 → B　Q2 → A　Q3 → B<\/p><hr id=\"ch06-b51\"><h3 id=\"ch06-b52\" class=\"sec\">エラー対応ガイド 🐛<\/h3><div id=\"ch06-b53\" class=\"tblwrap\"><table><tr><th><strong>症状<\/strong><\/th><th><strong>原因<\/strong><\/th><th><strong>対処<\/strong><\/th><\/tr><tr><td><code class=\"ic\">List&lt;string&gt;<\/code> が見つからないエラー<\/td><td><code class=\"ic\">using System.Collections.Generic;<\/code> の書き忘れ<\/td><td>ファイル先頭にusing文を追加<\/td><\/tr><tr><td><code class=\"ic\">.Length<\/code> でエラー<\/td><td>Listの要素数は <code class=\"ic\">.Count<\/code><\/td><td>配列＝<code class=\"ic\">.Length<\/code>／List＝<code class=\"ic\">.Count<\/code> と覚える<\/td><\/tr><tr><td><code class=\"ic\">Remove<\/code> したのに残っている<\/td><td>名前が完全一致していない<\/td><td>全角/半角・スペースまで一致しているか確認<\/td><\/tr><\/table><\/div><hr id=\"ch06-b54\"><h3 id=\"ch06-b55\" class=\"sec\">章末――本番ダンジョンへ<\/h3><p id=\"ch06-b56\">遠征準備は完了しました。荷物も整理できました。<\/p><p id=\"ch06-b57\">しかし教官は最後に、ひとつの武器の欠片を見せます。<\/p><pre id=\"ch06-b58\" data-lang=\"plain text\"><code>WeaponShard_Sword_01<\/code><\/pre><pre id=\"ch06-b59\" data-lang=\"plain text\"><code>「本物の冒険者は、ただ物を持つだけではない。」\n「物そのものを設計できる。」<\/code><\/pre><p id=\"ch06-b60\">この後の<strong>Chapter 6.5<\/strong>で袋の中身を整理する道具（enum・switch・Dictionary）を覚えたら、いよいよアイテムや武器を本格的に表現するための技術――<\/p><h3 id=\"ch06-b61\" class=\"sec\">クラス<\/h3><p id=\"ch06-b62\">を学びます。<\/p>"}, {"id": "ch06_5", "num": "6.5", "name": "アイテム図鑑：enum・switch・Dictionaryで整理せよ！", "title": "Chapter 6.5 アイテム図鑑：enum・switch・Dictionaryで整理せよ！", "html": "<blockquote id=\"ch06_5-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 新規追加章（v1.1）<\/blockquote><hr id=\"ch06_5-b1\"><div id=\"ch06_5-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>遠征２日目<\/strong>：魔法の袋（List）は便利ですが、中身が増えるほど「これは何のアイテムだっけ？」が増えてきました。今日は袋の中身を「図鑑」で整理します。<\/p><\/div><\/div><h3 id=\"ch06_5-b3\" class=\"sec\">この章で学ぶこと<\/h3><ul id=\"ch06_5-b4\"><li><strong>enum<\/strong> ―― 「決まった選択肢」に名前を付ける<\/li><li><strong>switch文<\/strong> ―― 選択肢ごとの分岐をきれいに書く<\/li><li><strong>Dictionary<\/strong> ―― 「名前→データ」の対応表を作る<\/li><\/ul><hr id=\"ch06_5-b5\"><h3 id=\"ch06_5-b6\" class=\"sec\">enum ―― 種類に名前を付ける<\/h3><p id=\"ch06_5-b7\">アイテムの種類を文字列で管理すると、タイプミスが事故になります。<\/p><pre id=\"ch06_5-b8\" data-lang=\"plain text\"><code>if (itemType == \"ポーシヨン\")  // ← 「ヨ」が大きい！気づけますか？<\/code><\/pre><p id=\"ch06_5-b9\">そこで <strong>enum（列挙型）<\/strong> です。<\/p><pre id=\"ch06_5-b10\" data-lang=\"plain text\"><code>public enum ItemType\n{\n    Potion,   // 回復薬\n    Scroll,   // 巻物\n    Food,     // 食料\n    Weapon    // 武器\n}<\/code><\/pre><pre id=\"ch06_5-b11\" data-lang=\"plain text\"><code>ItemType type = ItemType.Potion;<\/code><\/pre><p id=\"ch06_5-b12\">選択肢が<strong>この4つしかない<\/strong>ことをコンパイラが保証してくれます。タイプミスは即エラーで気づけます。<\/p><hr id=\"ch06_5-b13\"><h3 id=\"ch06_5-b14\" class=\"sec\">switch文 ―― 選択肢の数だけ分岐する<\/h3><p id=\"ch06_5-b15\">if-else の連打よりも、選択肢の分岐は <code class=\"ic\">switch<\/code> が読みやすくなります。<\/p><pre id=\"ch06_5-b16\" data-lang=\"plain text\"><code>switch (type)\n{\n    case ItemType.Potion:\n        Debug.Log(\"HPが50回復した！\");\n        break;\n\n    case ItemType.Scroll:\n        Debug.Log(\"魔法を発動した！\");\n        break;\n\n    case ItemType.Food:\n        Debug.Log(\"満腹になった！\");\n        break;\n\n    default:\n        Debug.Log(\"使えないアイテムだ\");\n        break;\n}<\/code><\/pre><blockquote id=\"ch06_5-b17\">❗ 各caseの最後の <code class=\"ic\">break<\/code> を忘れるとコンパイルエラーになります。「この選択肢はここまで」の合図です。<\/blockquote><h3 id=\"ch06_5-b18\" class=\"sec\">switchの文法整理 📚<\/h3><pre id=\"ch06_5-b19\" data-lang=\"plain text\"><code>switch (調べたい値)\n{\n    case 値A:      // 値Aと一致したらここから実行\n        処理;\n        break;     // switchを抜ける（必須！）\n\n    case 値B:\n        処理;\n        break;\n\n    default:       // どのcaseにも一致しなかったときの受け皿\n        処理;\n        break;\n}<\/code><\/pre><ul id=\"ch06_5-b20\"><li><code class=\"ic\">case<\/code> に書けるのは「定数」（enumの値・数値・文字列など）<\/li><li><code class=\"ic\">default<\/code> はif文の <code class=\"ic\">else<\/code> に相当します（省略も可能）<\/li><li><strong>switchとenumは最高の相棒<\/strong>です。「選択肢の一覧（enum）」×「選択肢ごとの分岐（switch）」で、選択肢の管理が完璧になります。Chapter 12のゲーム状態管理はこのコンビが主役です。<\/li><\/ul><hr id=\"ch06_5-b21\"><h3 id=\"ch06_5-b22\" class=\"sec\">Dictionary ―― 名前からデータを引く対応表<\/h3><p id=\"ch06_5-b23\">「アイテム名→価格」のような対応は <strong>Dictionary<\/strong> で管理します。<\/p><pre id=\"ch06_5-b24\" data-lang=\"plain text\"><code>using System.Collections.Generic;\n\nDictionary&lt;string, int&gt; priceTable = new Dictionary&lt;string, int&gt;();\n\npriceTable[\"ポーション\"] = 50;\npriceTable[\"巻物\"] = 120;\npriceTable[\"食料\"] = 30;\n\nDebug.Log(priceTable[\"巻物\"]);  // → 120<\/code><\/pre><p id=\"ch06_5-b25\">図解：<\/p><pre id=\"ch06_5-b26\" data-lang=\"plain text\"><code>キー（名前）        値（価格）\n\"ポーション\"   →    50\n\"巻物\"        →   120\n\"食料\"        →    30<\/code><\/pre><p id=\"ch06_5-b27\"><code class=\"ic\">Dictionary&lt;string, int&gt;<\/code> の <code class=\"ic\">&lt;string, int&gt;<\/code> は「<strong>キーの型がstring、値の型がint<\/strong>」という意味です（Listの <code class=\"ic\">&lt;T&gt;<\/code> と同じ型パラメータが2つある形です）。<\/p><p id=\"ch06_5-b28\">存在しないキーを引くと <code class=\"ic\">KeyNotFoundException<\/code> というエラーになるため、事前チェックが安全です。<\/p><pre id=\"ch06_5-b29\" data-lang=\"plain text\"><code>if (priceTable.ContainsKey(\"巻物\"))\n{\n    Debug.Log(priceTable[\"巻物\"]);\n}<\/code><\/pre><p id=\"ch06_5-b30\">「チェック＋取り出し」を一度にやってくれる <code class=\"ic\">TryGetValue<\/code> も便利です。<\/p><pre id=\"ch06_5-b31\" data-lang=\"plain text\"><code>int price;\nif (priceTable.TryGetValue(\"巻物\", out price))\n{\n    Debug.Log(\"価格: \" + price);   // 見つかったときだけ実行される\n}<\/code><\/pre><hr id=\"ch06_5-b32\"><h3 id=\"ch06_5-b33\" class=\"sec\">List・Dictionary・enumの使い分け<\/h3><div id=\"ch06_5-b34\" class=\"tblwrap\"><table><tr><th><strong>道具<\/strong><\/th><th><strong>向いている場面<\/strong><\/th><th><strong>例<\/strong><\/th><\/tr><tr><td>List<\/td><td>順番に並んだ「たくさんの同じもの」<\/td><td>持ち物一覧、敵の群れ<\/td><\/tr><tr><td>Dictionary<\/td><td>「名前→データ」の検索<\/td><td>価格表、アイテム図鑑<\/td><\/tr><tr><td>enum<\/td><td>決まった選択肢の管理<\/td><td>アイテム種別、ゲーム状態<\/td><\/tr><\/table><\/div><hr id=\"ch06_5-b35\"><h3 id=\"ch06_5-b36\" class=\"sec\">改造セッション 🔧<\/h3><ol id=\"ch06_5-b37\"><li><code class=\"ic\">ItemType<\/code> に <code class=\"ic\">Key<\/code>（鍵）を追加し、switchに対応するcaseを書いてみよう<\/li><li><code class=\"ic\">priceTable<\/code> に自分の好きなアイテムを3つ追加してみよう<\/li><li><code class=\"ic\">Dictionary&lt;ItemType, int&gt;<\/code> で「アイテム種別→所持数」の対応表を作ってみよう（enumはキーにも使えます！）<\/li><\/ol><hr id=\"ch06_5-b38\"><h3 id=\"ch06_5-b39\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch06_5-b40\"><strong>Q1.<\/strong> enumを使う最大の利点は？<\/p><p id=\"ch06_5-b41\">A. 実行が速くなる　B. 選択肢のタイプミスをコンパイル時に発見できる　C. 文字数が減る<\/p><p id=\"ch06_5-b42\"><strong>Q2.<\/strong> switch文の各caseの最後に必要なのは？<\/p><p id=\"ch06_5-b43\">A. <code class=\"ic\">return<\/code>　B. <code class=\"ic\">break<\/code>　C. <code class=\"ic\">continue<\/code><\/p><p id=\"ch06_5-b44\"><strong>Q3.<\/strong> 「アイテム名から価格を調べる」のに最適なのは？<\/p><p id=\"ch06_5-b45\">A. List　B. 配列　C. Dictionary<\/p><p id=\"ch06_5-b46\"><strong>解答<\/strong>　Q1 → B　Q2 → B　Q3 → C<\/p><hr id=\"ch06_5-b47\"><h3 id=\"ch06_5-b48\" class=\"sec\">次章へのフック<\/h3><p id=\"ch06_5-b49\">図鑑は完成しました。しかし教官は首を振ります。<\/p><pre id=\"ch06_5-b50\" data-lang=\"plain text\"><code>「名前と価格だけか？ 本物の武器には攻撃力も耐久値もある。」\n「物そのものを設計する技術が要る。」<\/code><\/pre><p id=\"ch06_5-b51\">次章（<strong>Chapter 7<\/strong>）では、いよいよ<strong>クラス<\/strong>を学びます。ここで覚えたenumとswitchは、<strong>Chapter 12<\/strong>のゲーム状態管理でも大活躍します。<\/p>"}, {"id": "ch07", "num": "7", "name": "クラスとオブジェクト指向", "title": "Chapter 7 クラスとオブジェクト指向", "html": "<blockquote id=\"ch07-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><hr id=\"ch07-b1\"><h3 id=\"ch07-b2\" class=\"sec\">この章で作るもの<\/h3><p id=\"ch07-b3\">今回は「鍛冶屋システム」を作ります。プレイヤーは武器を入手して管理できるようになります。<\/p><ul id=\"ch07-b4\"><li>木の剣<\/li><li>鉄の剣<\/li><li>炎の剣<\/li><\/ul><h3 id=\"ch07-b5\" class=\"sec\">完成イメージ<\/h3><pre id=\"ch07-b6\" data-lang=\"plain text\"><code>＝＝＝＝＝＝＝＝＝＝\n鍛冶屋の設計図\n＝＝＝＝＝＝＝＝＝＝\n\n木の剣\n攻撃力：10\n\n鉄の剣\n攻撃力：20<\/code><\/pre><p id=\"ch07-b7\">この章のテーマは、<\/p><blockquote id=\"ch07-b8\"><strong>「データをひとまとまりにする」<\/strong><\/blockquote><p id=\"ch07-b9\">です。<\/p><hr id=\"ch07-b10\"><h3 id=\"ch07-b11\" class=\"sec\">Chapter 6の限界<\/h3><p id=\"ch07-b12\">前章ではアイテムを文字列で管理しました。<\/p><pre id=\"ch07-b13\" data-lang=\"plain text\"><code>// アイテム名だけを保存する\nList&lt;string&gt; inventory = new List&lt;string&gt;();<\/code><\/pre><p id=\"ch07-b14\">しかし武器には、<\/p><ul id=\"ch07-b15\"><li>名前<\/li><li>攻撃力<\/li><li>価格<\/li><li>耐久値<\/li><\/ul><p id=\"ch07-b16\">があります。文字列だけでは足りません。<\/p><hr id=\"ch07-b17\"><h3 id=\"ch07-b18\" class=\"sec\">🔥 平行リスト地獄<\/h3><p id=\"ch07-b19\">初心者がよくやりがちな方法があります。<\/p><pre id=\"ch07-b20\" data-lang=\"plain text\"><code>// 武器名一覧\nList&lt;string&gt; weaponNames  = new List&lt;string&gt;();\n\n// 攻撃力一覧\nList&lt;int&gt; weaponPowers = new List&lt;int&gt;();\n\n// 価格一覧\nList&lt;int&gt; weaponPrices = new List&lt;int&gt;();<\/code><\/pre><p id=\"ch07-b21\">見た目は問題なさそうです。しかしこれは、<\/p><pre id=\"ch07-b22\" data-lang=\"plain text\"><code>weaponNames[0]  = \"木の剣\"\nweaponPowers[0] = 10\nweaponPrices[0] = 100<\/code><\/pre><p id=\"ch07-b23\">という対応関係を<strong>人間が管理し続けなければならない<\/strong>、ということです。<\/p><p id=\"ch07-b24\">【図解：平行リスト地獄】<\/p><pre id=\"ch07-b25\" data-lang=\"plain text\"><code>名前        攻撃力      価格\n\n木の剣  →  10     →  100\n鉄の剣  →  20     →  200\n炎の剣  →  50     →  500\n\n↓ 1箇所だけ削除すると...\n\n名前        攻撃力      価格\n\n木の剣  →  20     →  100   ← ズレた！\n炎の剣  →  50     →  500<\/code><\/pre><p id=\"ch07-b26\">大事故です。そこで登場するのが<\/p><blockquote id=\"ch07-b27\"><strong>クラス<\/strong><\/blockquote><p id=\"ch07-b28\">です。<\/p><hr id=\"ch07-b29\"><h3 id=\"ch07-b30\" class=\"sec\">クラスとは何か？<\/h3><p id=\"ch07-b31\">難しく考えないでください。クラスとは、<\/p><blockquote id=\"ch07-b32\"><strong>設計図<\/strong><\/blockquote><p id=\"ch07-b33\">です。<\/p><p id=\"ch07-b34\">家を建てる前には設計図があります。武器を作る前にも設計図が必要です。<\/p><p id=\"ch07-b35\">【図解：クラス＝設計図】<\/p><pre id=\"ch07-b36\" data-lang=\"plain text\"><code>┌───────────────┐\n│ 武器設計図        │\n├───────────────┤\n│ 名前：＿＿＿＿＿   │\n│ 攻撃力：＿＿    │\n│ 価格：＿＿＿＿    │\n└───────────────┘\n\nまだ何も入っていません。\nこれは武器そのものではなく、\n「武器の作り方」です。<\/code><\/pre><hr id=\"ch07-b37\"><h3 id=\"ch07-b38\" class=\"sec\">Step 1 ― Weaponクラスを作る<\/h3><p id=\"ch07-b39\">まず設計図だけ作ります。<\/p><pre id=\"ch07-b40\" data-lang=\"plain text\"><code>// 武器の設計図\npublic class Weapon\n{\n    // 武器名\n    public string weaponName;\n\n    // 攻撃力\n    public int attackPower;\n\n    // 価格\n    public int price;\n}<\/code><\/pre><p id=\"ch07-b41\"><code class=\"ic\">class Weapon<\/code> は「<strong>Weaponという新しい型を作る<\/strong>」という意味です。<\/p><h3 id=\"ch07-b42\" class=\"sec\">どこに書くの？<\/h3><p id=\"ch07-b43\">Projectウィンドウで新しく <code class=\"ic\">Weapon.cs<\/code> を作り、そこに書きます。ポイントは2つ。<\/p><ol id=\"ch07-b44\"><li><code class=\"ic\">Weapon<\/code> は <code class=\"ic\">: MonoBehaviour<\/code> を<strong>付けない<\/strong>「普通のC#クラス」です。ゲームオブジェクトにアタッチせず、データの設計図として使います<\/li><li>普通のC#クラスでも <code class=\"ic\">Debug.Log<\/code> を使うなら、ファイル先頭に <code class=\"ic\">using UnityEngine;<\/code> が必要です<\/li><\/ol><pre id=\"ch07-b45\" data-lang=\"plain text\"><code>// Weapon.cs（アタッチ不要のデータ設計図）\nusing UnityEngine;\n\npublic class Weapon\n{\n    ...\n}<\/code><\/pre><blockquote id=\"ch07-b46\">💡 <strong>2種類のクラスを区別しよう<\/strong>：<code class=\"ic\">: MonoBehaviour<\/code> 付きのクラスは「Unityの部品（アタッチして使う）」、付いていないクラスは「純粋なC#の設計図（newして使う）」。この区別はChapter 8でさらに詳しく扱います。<\/blockquote><p id=\"ch07-b47\">今まで使ってきた型を思い出してください。<\/p><p id=\"ch07-b48\">【図解：型の仲間】<\/p><pre id=\"ch07-b49\" data-lang=\"plain text\"><code>int\nfloat\nstring\nbool\n↓\nWeapon（自分で作った型）<\/code><\/pre><blockquote id=\"ch07-b50\"><code class=\"ic\">string<\/code> や <code class=\"ic\">int<\/code> と同じように、自分で「新しい型」を作ることができます。それがクラスです。<br>📝 <strong><code class=\"ic\">public<\/code><\/strong><strong> について<\/strong>：フィールドに付けた <code class=\"ic\">public<\/code> は「クラスの外から読み書きしてよい」という<strong>アクセス修飾子<\/strong>です。本章では簡単のため全部 <code class=\"ic\">public<\/code> にしますが、外から自由に書き換えられるのは危険でもあります。<strong>Chapter 7.5<\/strong>で「安全な守り方（private＋プロパティ）」を学びます。<\/blockquote><h3 id=\"ch07-b51\" class=\"sec\">アクセス修飾子のミニ表<\/h3><div id=\"ch07-b52\" class=\"tblwrap\"><table><tr><th><strong>アクセス修飾子<\/strong><\/th><th><strong>意味<\/strong><\/th><\/tr><tr><td><code class=\"ic\">public<\/code><\/td><td>どこからでも使える<\/td><\/tr><tr><td><code class=\"ic\">private<\/code><\/td><td>そのクラスの中でだけ使える（何も書かないとこれになる）<\/td><\/tr><tr><td><code class=\"ic\">protected<\/code><\/td><td>そのクラスと子クラスで使える（Chapter 8で登場）<\/td><\/tr><\/table><\/div><hr id=\"ch07-b53\"><h3 id=\"ch07-b54\" class=\"sec\">Step 2 ― 武器を作る<\/h3><p id=\"ch07-b55\">設計図だけでは武器は存在しません。実際に作るために使うのが <code class=\"ic\">new<\/code> です。<\/p><pre id=\"ch07-b56\" data-lang=\"plain text\"><code>// 木の剣を作る\nWeapon sword1 = new Weapon();\n\n// 武器名を設定する\nsword1.weaponName = \"木の剣\";\n\n// 攻撃力を設定する\nsword1.attackPower = 10;\n\n// 価格を設定する\nsword1.price = 100;<\/code><\/pre><p id=\"ch07-b57\">同じ設計図からもう一本作れます。<\/p><pre id=\"ch07-b58\" data-lang=\"plain text\"><code>// 鉄の剣を作る\nWeapon sword2 = new Weapon();\n\n// 武器名を設定する\nsword2.weaponName = \"鉄の剣\";\n\n// 攻撃力を設定する\nsword2.attackPower = 20;\n\n// 価格を設定する\nsword2.price = 200;<\/code><\/pre><p id=\"ch07-b59\">【図解：new Weapon()】<\/p><pre id=\"ch07-b60\" data-lang=\"plain text\"><code>設計図 Weapon\n↓ new\n木の剣（実体）\n\n設計図 Weapon\n↓ new\n鉄の剣（実体）\n\n「同じ設計図から、別々の剣が生まれる」<\/code><\/pre><p id=\"ch07-b61\">設計図から実物が生まれました。これを「<strong>インスタンス生成<\/strong>」と呼びます。<\/p><p id=\"ch07-b62\">今は「設計図から実物を作ること」と覚えておけば十分です。<\/p><hr id=\"ch07-b63\"><h3 id=\"ch07-b64\" class=\"sec\">Step 3 ― クラスにメソッドを追加する<\/h3><p id=\"ch07-b65\">武器自身が情報を表示できたら便利です。クラスにメソッドを追加します。<\/p><pre id=\"ch07-b66\" data-lang=\"plain text\"><code>// 武器の設計図\npublic class Weapon\n{\n    // 武器名\n    public string weaponName;\n\n    // 攻撃力\n    public int attackPower;\n\n    // ステータス表示\n    public void ShowStatus()\n    {\n        // 武器情報を表示する\n        Debug.Log(\n            weaponName +\n            \" 攻撃力:\" +\n            attackPower);\n    }\n}<\/code><\/pre><p id=\"ch07-b67\">使うときは、<\/p><pre id=\"ch07-b68\" data-lang=\"plain text\"><code>// 武器情報を表示する\nsword1.ShowStatus();<\/code><\/pre><p id=\"ch07-b69\">結果<\/p><pre id=\"ch07-b70\" data-lang=\"plain text\"><code>木の剣 攻撃力:10<\/code><\/pre><p id=\"ch07-b71\">データと処理がまとまりました。<strong>これがクラスの強みです。<\/strong><\/p><hr id=\"ch07-b72\"><h3 id=\"ch07-b73\" class=\"sec\">🎨 鍛冶屋の設計図UI<\/h3><p id=\"ch07-b74\">設計図を画面にも表示してみましょう。<\/p><p id=\"ch07-b75\">【図解：UI階層】<\/p><pre id=\"ch07-b76\" data-lang=\"plain text\"><code>Canvas\n└─ Panel（Image：背景）\n     └─ TextMeshProUGUI（設計図の説明文）<\/code><\/pre><h3 id=\"ch07-b77\" class=\"sec\">作り方<\/h3><ol id=\"ch07-b78\"><li><code class=\"ic\">Canvas<\/code> を作る<\/li><li><code class=\"ic\">Panel<\/code>（Image）を追加する<\/li><li><code class=\"ic\">TextMeshProUGUI<\/code> をPanelの子に追加する<\/li><li>Imageに羊皮紙風の背景画像を設定する<\/li><\/ol><p id=\"ch07-b79\">【図解：羊皮紙UI】<\/p><pre id=\"ch07-b80\" data-lang=\"plain text\"><code>┌────────────────────┐\n│ 鍛冶屋の設計図        │\n│                   │\n│ 名前：木の剣        │\n│ 攻撃力：10          │\n└────────────────────┘<\/code><\/pre><p id=\"ch07-b81\">Ch7で新たに覚えるUI操作は「<strong>Imageの追加<\/strong>」のみです。<\/p><hr id=\"ch07-b82\"><h3 id=\"ch07-b83\" class=\"sec\">Step 4 ― List<\/h3><p id=\"ch07-b84\">武器が増えてきました。リストでまとめましょう。<\/p><pre id=\"ch07-b85\" data-lang=\"plain text\"><code>// 武器リストを作る\nList&lt;Weapon&gt; weapons = new List&lt;Weapon&gt;();<\/code><\/pre><p id=\"ch07-b86\">注目してください。今までは <code class=\"ic\">List&lt;string&gt;<\/code> でした。今回は <code class=\"ic\">Weapon<\/code> 型を入れています。<\/p><blockquote id=\"ch07-b87\"><strong>クラスは自分で作る型だったのです。<\/strong> だから <code class=\"ic\">List&lt;Weapon&gt;<\/code> は「Weapon 型のデータを入れるリスト」という意味になります。<\/blockquote><p id=\"ch07-b88\">【図解：List】<\/p><pre id=\"ch07-b89\" data-lang=\"plain text\"><code>weapons\n↓\n[木の剣（Weapon型）]\n[鉄の剣（Weapon型）]\n[炎の剣（Weapon型）]<\/code><\/pre><p id=\"ch07-b90\">追加します。<\/p><pre id=\"ch07-b91\" data-lang=\"plain text\"><code>// 木の剣を追加する\nweapons.Add(sword1);\n\n// 鉄の剣を追加する\nweapons.Add(sword2);<\/code><\/pre><p id=\"ch07-b92\">一覧表示します。<\/p><pre id=\"ch07-b93\" data-lang=\"plain text\"><code>foreach (Weapon weapon in weapons)\n{\n    // 武器情報を表示する\n    weapon.ShowStatus();\n}<\/code><\/pre><p id=\"ch07-b94\">結果<\/p><pre id=\"ch07-b95\" data-lang=\"plain text\"><code>木の剣 攻撃力:10\n鉄の剣 攻撃力:20<\/code><\/pre><hr id=\"ch07-b96\"><h3 id=\"ch07-b97\" class=\"sec\">🎉 おまじないの正体<\/h3><p id=\"ch07-b98\">ここで気づきませんか？ Chapter 1から、私たちは毎回これを書いていました。<\/p><pre id=\"ch07-b99\" data-lang=\"plain text\"><code>public class PlayerController : MonoBehaviour\n{\n}<\/code><\/pre><p id=\"ch07-b100\">ずっとおまじないだと思っていましたね。<\/p><p id=\"ch07-b101\">【図解：おまじないの正体】<\/p><pre id=\"ch07-b102\" data-lang=\"plain text\"><code>今まで\n\nPlayerController\n↓\n謎のおまじない…\n\n↓\n\n今日\n\nPlayerController\n↓\nクラスだった！<\/code><\/pre><p id=\"ch07-b103\">実は <code class=\"ic\">class<\/code> は今日学んだクラスそのものでした。<\/p><p id=\"ch07-b104\">Chapter 0からずっとクラスを書き続けていたのです。<\/p><p id=\"ch07-b105\">そして、<\/p><pre id=\"ch07-b106\" data-lang=\"plain text\"><code>: MonoBehaviour<\/code><\/pre><p id=\"ch07-b107\">にも意味があります。<\/p><blockquote id=\"ch07-b108\"><code class=\"ic\">MonoBehaviour<\/code> はUnityが用意した「特別なクラス」です。<\/blockquote><p id=\"ch07-b109\"><code class=\"ic\">: MonoBehaviour<\/code> と書くことで、Unityがこのクラスをゲームオブジェクトとして扱えるようになります。<\/p><p id=\"ch07-b110\">「なぜこう書くのか」は <strong>Chapter 8 の継承<\/strong>で詳しく説明します。<\/p><hr id=\"ch07-b111\"><h3 id=\"ch07-b112\" class=\"sec\">振り返りクイズ<\/h3><h3 id=\"ch07-b113\" class=\"sec\">問1<\/h3><p id=\"ch07-b114\">次のコードで作られるものは？<\/p><pre id=\"ch07-b115\" data-lang=\"plain text\"><code>Weapon sword = new Weapon();<\/code><\/pre><ul id=\"ch07-b116\"><li>A. 設計図<\/li><li><strong>B. 実際の武器<\/strong> ✅<\/li><li>C. List<\/li><\/ul><h3 id=\"ch07-b117\" class=\"sec\">問2<\/h3><p id=\"ch07-b118\"><code class=\"ic\">List&lt;Weapon&gt;<\/code> は何を表していますか？<\/p><ul id=\"ch07-b119\"><li><strong>A. Weaponを入れるList<\/strong> ✅<\/li><li>B. Weaponを削除する命令<\/li><li>C. Weaponを表示する命令<\/li><\/ul><h3 id=\"ch07-b120\" class=\"sec\">問3<\/h3><p id=\"ch07-b121\">次のコードの出力は？<\/p><pre id=\"ch07-b122\" data-lang=\"plain text\"><code>Weapon sword = new Weapon();\nsword.weaponName = \"木の剣\";\nDebug.Log(sword.weaponName);<\/code><\/pre><ul id=\"ch07-b123\"><li>A. <code class=\"ic\">Weapon<\/code><\/li><li><strong>B. <\/strong><strong><code class=\"ic\">木の剣<\/code><\/strong> ✅<\/li><li>C. <code class=\"ic\">null<\/code><\/li><\/ul><hr id=\"ch07-b124\"><h3 id=\"ch07-b125\" class=\"sec\">次章予告<\/h3><p id=\"ch07-b126\">今日、私たちは <code class=\"ic\">class Weapon<\/code> を作りました。ここで、<code class=\"ic\">: MonoBehaviour<\/code> という謎の記号が、実はクラスと関係していることが分かりました。<\/p><p id=\"ch07-b127\">この後の<strong>Chapter 7.5<\/strong>では、武器づくりを一気に楽にする「コンストラクタ」と「プロパティ」を学びます。そして次の<strong>Chapter 8<\/strong>では、Unityが持っているクラスを引き継ぐ仕組み、<\/p><blockquote id=\"ch07-b128\"><strong>継承（Inheritance）<\/strong><\/blockquote><p id=\"ch07-b129\">を学びます。プレイヤーと敵の共通部分をまとめながら、本格的なゲーム開発の設計へ進んでいきましょう。<\/p>"}, {"id": "ch07_5", "num": "7.5", "name": "武器の鋳造式：コンストラクタとプロパティ", "title": "Chapter 7.5 武器の鋳造式：コンストラクタとプロパティ", "html": "<blockquote id=\"ch07_5-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 新規追加章（v1.1）<\/blockquote><hr id=\"ch07_5-b1\"><div id=\"ch07_5-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>鍛冶屋にて<\/strong>：親方が言いました。「武器を作るたびに名前・攻撃力・価格を1個ずつ手で刻むのか？ うちには“鋳造式”がある」<\/p><\/div><\/div><h3 id=\"ch07_5-b3\" class=\"sec\">この章で学ぶこと<\/h3><p id=\"ch07_5-b4\">Chapter 7では武器を1つ作るのに4行かかりました。<\/p><pre id=\"ch07_5-b5\" data-lang=\"plain text\"><code>Weapon sword1 = new Weapon();\nsword1.weaponName = \"木の剣\";\nsword1.attackPower = 10;\nsword1.price = 100;<\/code><\/pre><p id=\"ch07_5-b6\">これを1行にする<strong>コンストラクタ<\/strong>と、データを安全に守る<strong>プロパティ<\/strong>を学びます。<\/p><hr id=\"ch07_5-b7\"><h3 id=\"ch07_5-b8\" class=\"sec\">コンストラクタ ―― newの瞬間に初期化する<\/h3><p id=\"ch07_5-b9\">コンストラクタは「<strong>newされた瞬間に自動で呼ばれる特別なメソッド<\/strong>」です。書き方のルールは2つだけ。<\/p><ol id=\"ch07_5-b10\"><li>名前は<strong>クラス名と完全に同じ<\/strong>にする<\/li><li>戻り値の型は<strong>何も書かない<\/strong>（<code class=\"ic\">void<\/code> すら書きません。ここが普通のメソッドとの見分けポイント！）<\/li><\/ol><pre id=\"ch07_5-b11\" data-lang=\"plain text\"><code>public class Weapon\n{\n    public string weaponName;\n    public int attackPower;\n    public int price;\n\n    // コンストラクタ（クラス名と同じ名前！）\n    public Weapon(string name, int power, int priceValue)\n    {\n        weaponName = name;\n        attackPower = power;\n        price = priceValue;\n    }\n}<\/code><\/pre><p id=\"ch07_5-b12\">使うときは――<\/p><pre id=\"ch07_5-b13\" data-lang=\"plain text\"><code>Weapon sword1 = new Weapon(\"木の剣\", 10, 100);\nWeapon sword2 = new Weapon(\"鉄の剣\", 20, 200);<\/code><\/pre><p id=\"ch07_5-b14\">4行が1行になりました。しかも「名前を設定し忘れた武器」が存在できなくなります。<\/p><hr id=\"ch07_5-b15\"><h3 id=\"ch07_5-b16\" class=\"sec\">this ―― 「自分自身の」という意味<\/h3><p id=\"ch07_5-b17\">引数とフィールドが同じ名前のときは <code class=\"ic\">this<\/code> で区別します。<\/p><pre id=\"ch07_5-b18\" data-lang=\"plain text\"><code>public Weapon(string weaponName, int attackPower, int price)\n{\n    this.weaponName = weaponName;   // this.○○ ＝ フィールド側\n    this.attackPower = attackPower;\n    this.price = price;\n}<\/code><\/pre><hr id=\"ch07_5-b19\"><h3 id=\"ch07_5-b20\" class=\"sec\">プロパティ ―― 読み書きにルールを付ける<\/h3><p id=\"ch07_5-b21\">フィールドを <code class=\"ic\">public<\/code> のままにすると、誰でもめちゃくちゃな値を入れられます。<\/p><pre id=\"ch07_5-b22\" data-lang=\"plain text\"><code>sword1.attackPower = -9999;  // ← 攻撃力がマイナス！？<\/code><\/pre><p id=\"ch07_5-b23\">そこで、フィールドを <code class=\"ic\">private<\/code> にして<strong>プロパティ<\/strong>経由で読み書きさせます。<\/p><pre id=\"ch07_5-b24\" data-lang=\"plain text\"><code>public class Weapon\n{\n    private int attackPower;  // 外から直接触れない\n\n    public int AttackPower\n    {\n        get { return attackPower; }\n        set\n        {\n            // マイナスは0に補正するルール\n            attackPower = Mathf.Max(0, value);\n        }\n    }\n}<\/code><\/pre><pre id=\"ch07_5-b25\" data-lang=\"plain text\"><code>sword1.AttackPower = -9999;\nDebug.Log(sword1.AttackPower);  // → 0（ルールが守ってくれた！）<\/code><\/pre><p id=\"ch07_5-b26\">このように「データを <code class=\"ic\">private<\/code> で隠し、決められた窓口（プロパティやメソッド）からだけ触らせる」設計を<strong>カプセル化<\/strong>と呼びます。オブジェクト指向の基本原則のひとつです。<\/p><blockquote id=\"ch07_5-b27\">⚠️ <strong><code class=\"ic\">Mathf.Max<\/code><\/strong><strong> はUnity専用<\/strong>：<code class=\"ic\">Mathf<\/code> は <code class=\"ic\">UnityEngine<\/code> の機能なので、<code class=\"ic\">using UnityEngine;<\/code> が必要です。Unity以外のC#では標準の <code class=\"ic\">System.Math.Max(0, value)<\/code> を使います。<\/blockquote><p id=\"ch07_5-b28\">特にルールが不要なら、省略形の<strong>自動プロパティ<\/strong>が使えます。<\/p><pre id=\"ch07_5-b29\" data-lang=\"plain text\"><code>public string WeaponName { get; set; }\npublic int Price { get; private set; }  // 読むのは自由、変更はクラス内だけ<\/code><\/pre><h3 id=\"ch07_5-b30\" class=\"sec\">使い分けの目安<\/h3><ul id=\"ch07_5-b31\"><li>補正や検査など<strong>ルールが必要<\/strong> → 手書きプロパティ（<code class=\"ic\">get { ... } set { ... }<\/code>）<\/li><li>ルール不要でそのまま読み書き → 自動プロパティ（<code class=\"ic\">{ get; set; }<\/code>）<\/li><li><strong>外から書き換えられたくない<\/strong> → <code class=\"ic\">{ get; private set; }<\/code><\/li><\/ul><p id=\"ch07_5-b32\"><strong><code class=\"ic\">private set<\/code><\/strong><strong> の実践例：HPと所持金<\/strong><\/p><pre id=\"ch07_5-b33\" data-lang=\"plain text\"><code>public class PlayerStatus\n{\n    public int Hp { get; private set; } = 100;\n    public int Gold { get; private set; } = 0;\n\n    // HPを減らせるのはこのメソッドだけ（外から hp = 9999 できない！）\n    public void TakeDamage(int amount)\n    {\n        Hp = System.Math.Max(0, Hp - amount);\n    }\n\n    public void EarnGold(int amount)\n    {\n        Gold += amount;\n    }\n}<\/code><\/pre><p id=\"ch07_5-b34\">「HPはダメージ処理からしか減らない」「所持金は入手処理からしか増えない」――データの変更ルートを絞ることで、バグの入り口を塞げます。<\/p><hr id=\"ch07_5-b35\"><h3 id=\"ch07_5-b36\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch07_5-b37\"><strong>Q1.<\/strong> コンストラクタが呼ばれるのはいつ？<\/p><p id=\"ch07_5-b38\">A. <code class=\"ic\">new<\/code> された瞬間　B. Updateのたび　C. ゲーム終了時<\/p><p id=\"ch07_5-b39\"><strong>Q2.<\/strong> コンストラクタの名前のルールは？<\/p><p id=\"ch07_5-b40\">A. 自由に決められる　B. クラス名と同じ　C. 必ずStart<\/p><p id=\"ch07_5-b41\"><strong>Q3.<\/strong> <code class=\"ic\">public int Price { get; private set; }<\/code> の意味は？<\/p><p id=\"ch07_5-b42\">A. 読み書き自由　B. 読むのは自由、変更はクラス内のみ　C. 読み書き禁止<\/p><p id=\"ch07_5-b43\"><strong>解答<\/strong>　Q1 → A　Q2 → B　Q3 → B<\/p><hr id=\"ch07_5-b44\"><h3 id=\"ch07_5-b45\" class=\"sec\">次章へのフック<\/h3><p id=\"ch07_5-b46\">武器は量産できるようになりました。次はいよいよ、プレイヤーと敵の共通部分をまとめる<strong>継承<\/strong>（<strong>Chapter 8<\/strong>）へ進みます。<\/p>"}, {"id": "ch08", "num": "8", "name": "継承 〜ダンジョンの生態系〜", "title": "Chapter 8 継承 〜ダンジョンの生態系〜", "html": "<blockquote id=\"ch08-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><hr id=\"ch08-b1\"><h3 id=\"ch08-b2\" class=\"sec\">この章で作るもの<\/h3><p id=\"ch08-b3\">この章では、継承（inheritance）を学びながら、3種類のキャラクターを作ります。<\/p><ul id=\"ch08-b4\"><li>🔴 <strong>ChaserEnemy<\/strong>（追跡する敵）<\/li><li>🔵 <strong>CowardEnemy<\/strong>（逃げる敵）<\/li><li>🟡 <strong>Player<\/strong>（プレイヤー）<\/li><\/ul><p id=\"ch08-b5\">クリア条件：青いゴースト（CowardEnemy）を全滅させよう！<\/p><hr id=\"ch08-b6\"><h3 id=\"ch08-b7\" class=\"sec\">コピペの苦痛<\/h3><p id=\"ch08-b8\">Player と Enemy を作ろうとすると、同じコードが何度も登場してしまいます。<\/p><pre id=\"ch08-b9\" data-lang=\"plain text\"><code>// Player クラス\npublic class Player\n{\n    public int hp = 100;\n    public bool isPoisoned = false;\n\n    public void TakeDamage(int amount) { hp -= amount; }\n    public bool IsAlive() { return hp &gt; 0; }\n}\n\n// Enemy クラス（ほぼ同じ！）\npublic class Enemy\n{\n    public int hp = 50;\n    public bool isPoisoned = false;\n\n    public void TakeDamage(int amount) { hp -= amount; }\n    public bool IsAlive() { return hp &gt; 0; }\n}<\/code><\/pre><blockquote id=\"ch08-b10\"><strong>「同じコードが2か所…これは管理が大変になりそう！」<\/strong><\/blockquote><p id=\"ch08-b11\">これが継承を使いたくなる動機です。<\/p><hr id=\"ch08-b12\"><h3 id=\"ch08-b13\" class=\"sec\">継承とは何か？<\/h3><p id=\"ch08-b14\">継承とは、「共通部分をまとめて使い回す仕組み」です。<\/p><p id=\"ch08-b15\">例えるなら：<\/p><ul id=\"ch08-b16\"><li><strong>基本モデル（親）<\/strong>：共通の設計図（hp・TakeDamage・IsAlive）<\/li><li><strong>カスタム機（子）<\/strong>：基本モデルに手を加えた特別仕様<\/li><\/ul><pre id=\"ch08-b17\" data-lang=\"plain text\"><code>【基本モデル】Character\n  └── hp, isPoisoned\n  └── TakeDamage()\n  └── IsAlive()\n  └── GetStatusText()\n\n【カスタム機】\n  ├── Player    : Character（矢印キーで移動）\n  ├── ChaserEnemy : Character（プレイヤーに向かって追尾）\n  └── CowardEnemy : Character（プレイヤーから逃げる）<\/code><\/pre><hr id=\"ch08-b18\"><h3 id=\"ch08-b19\" class=\"sec\">Step 1 — 親クラス「Character」を作る<\/h3><pre id=\"ch08-b20\" data-lang=\"plain text\"><code>public class Character\n{\n    public float x = 0f;\n    public float y = 0f;\n    public int hp = 100;\n    public bool isPoisoned = false;\n\n    public void TakeDamage(int amount)\n    {\n        hp -= amount;\n    }\n\n    public bool IsAlive()\n    {\n        return hp &gt; 0;\n    }\n\n    public string GetStatusText()\n    {\n        string status = isPoisoned ? \"【毒】\" : \"\";\n        return $\"HP:{hp} {status}\";\n    }\n\n    // virtual = 子クラスが上書きしていいよ！\n    public virtual void OnUpdate() { }\n}<\/code><\/pre><hr id=\"ch08-b21\"><h3 id=\"ch08-b22\" class=\"sec\">コラム：しれっと登場した3つの新記法<\/h3><p id=\"ch08-b23\">上のコードには、初登場の書き方が3つあります。<\/p><ol id=\"ch08-b24\"><li><strong><code class=\"ic\">$\"HP:{hp}\"<\/code><\/strong><strong>（文字列補間）<\/strong> … 文字列の前に <code class=\"ic\">$<\/code> を付けると、<code class=\"ic\">{}<\/code> の中に変数を直接埋め込めます。<code class=\"ic\">\"HP:\" + hp<\/code> と同じ意味で、こちらのほうが読みやすい書き方です。<\/li><li><strong><code class=\"ic\">isPoisoned ? \"【毒】\" : \"\"<\/code><\/strong><strong>（三項演算子）<\/strong> … <code class=\"ic\">条件 ? 真のとき : 偽のとき<\/code> を1行で書けるif文の省略形です。<\/li><li><strong><code class=\"ic\">Time.deltaTime<\/code><\/strong> … 「前のフレームから何秒経ったか」です。移動量に掛けると、パソコンの性能（フレームレート）が違っても同じ速さで動くようになります。Chapter 1〜2では省略していましたが、実際のゲームでは必須のテクニックです。<\/li><\/ol><hr id=\"ch08-b25\"><h3 id=\"ch08-b26\" class=\"sec\">Step 2 — Player クラス（継承）<\/h3><pre id=\"ch08-b27\" data-lang=\"plain text\"><code>// `: Character` が継承の構文！\npublic class Player : Character\n{\n    public float speed = 5f;\n\n    // override = 親の OnUpdate() を上書きする\n    public override void OnUpdate()\n    {\n        // 矢印キーで移動\n        x += Input.GetAxisRaw(\"Horizontal\") * speed * Time.deltaTime;\n        y += Input.GetAxisRaw(\"Vertical\") * speed * Time.deltaTime;\n    }\n}<\/code><\/pre><blockquote id=\"ch08-b28\"><strong>「<\/strong><strong><code class=\"ic\">: Character<\/code><\/strong><strong>」がついた瞬間、hp・TakeDamage・IsAliveがすべて使えるようになる！<\/strong><\/blockquote><hr id=\"ch08-b29\"><h3 id=\"ch08-b30\" class=\"sec\">Step 3 — ChaserEnemy（追尾する敵）<\/h3><pre id=\"ch08-b31\" data-lang=\"plain text\"><code>public class ChaserEnemy : Character\n{\n    public float speed = 3f;\n    public Player target;  // 追跡対象のプレイヤー\n\n    public override void OnUpdate()\n    {\n        // プレイヤーとの差分ベクトルで追尾\n        float dx = target.x - x;\n        float dy = target.y - y;\n        float dist = Mathf.Sqrt(dx * dx + dy * dy);\n\n        if (dist &gt; 0.1f)\n        {\n            x += (dx / dist) * speed * Time.deltaTime;\n            y += (dy / dist) * speed * Time.deltaTime;\n        }\n\n        // 接触時にダメージ\n        if (dist &lt; 1f)\n        {\n            target.TakeDamage(10);\n        }\n    }\n}<\/code><\/pre><hr id=\"ch08-b32\"><h3 id=\"ch08-b33\" class=\"sec\">Step 4 — CowardEnemy（逃げる敵）<\/h3><pre id=\"ch08-b34\" data-lang=\"plain text\"><code>public class CowardEnemy : Character\n{\n    public float speed = 4f;\n    public Player target;\n\n    public override void OnUpdate()\n    {\n        float dx = target.x - x;\n        float dy = target.y - y;\n        float dist = Mathf.Sqrt(dx * dx + dy * dy);\n\n        if (dist &gt; 0.1f)\n        {\n            // ★ ChaserEnemy と符号が逆なだけ！（近づく→逃げる）\n            x -= (dx / dist) * speed * Time.deltaTime;\n            y -= (dy / dist) * speed * Time.deltaTime;\n        }\n    }\n}<\/code><\/pre><pre id=\"ch08-b35\" data-lang=\"plain text\"><code>【図解】ChaserEnemy vs CowardEnemy\n\nChaserEnemy:  プレイヤー方向へ  +dx, +dy  → 近づく\nCowardEnemy:  プレイヤー方向の逆 -dx, -dy  → 逃げる\n\n差は「符号だけ」！<\/code><\/pre><hr id=\"ch08-b36\"><h3 id=\"ch08-b37\" class=\"sec\">virtual と override とは？<\/h3><div id=\"ch08-b38\" class=\"tblwrap\"><table><tr><th><strong>キーワード<\/strong><\/th><th><strong>意味<\/strong><\/th><th><strong>例え<\/strong><\/th><\/tr><tr><td><code class=\"ic\">virtual<\/code><\/td><td>「子クラスが上書きしていいよ」という宣言<\/td><td>「ここは自由に改造OK」<\/td><\/tr><tr><td><code class=\"ic\">override<\/code><\/td><td>「親の処理を私の処理に作り直す」という宣言<\/td><td>「独自仕様に変更！」<\/td><\/tr><\/table><\/div><hr id=\"ch08-b39\"><h3 id=\"ch08-b40\" class=\"sec\">CharacterComponent（Unity との橋渡し）<\/h3><p id=\"ch08-b41\">純粋C#のCharacterクラスをUnityで動かすための「翻訳者」パターン：<\/p><pre id=\"ch08-b42\" data-lang=\"plain text\"><code>// MonoBehaviour を継承して Unity の世界と繋ぐ\npublic class CharacterComponent : MonoBehaviour\n{\n    private Character character;\n\n    void Start()\n    {\n        // ここで実体を作るのを忘れると character は null のまま！\n        character = new Player();\n    }\n\n    void Update()\n    {\n        character.OnUpdate();\n        // C# のデータを Unity の Transform に反映\n        transform.position = new Vector3(character.x, character.y, 0);\n    }\n}<\/code><\/pre><blockquote id=\"ch08-b43\">⚠️ <code class=\"ic\">Start()<\/code> での <code class=\"ic\">character = new Player();<\/code> を忘れると、<code class=\"ic\">character<\/code> が <code class=\"ic\">null<\/code> のまま <code class=\"ic\">Update()<\/code> が走り <code class=\"ic\">NullReferenceException<\/code> になります（nullの正体は <strong>Chapter 8.5<\/strong> で詳しく）。<\/blockquote><h3 id=\"ch08-b44\" class=\"sec\">役割分担の整理<\/h3><ul id=\"ch08-b45\"><li><code class=\"ic\">Character<\/code> / <code class=\"ic\">Player<\/code> など……<code class=\"ic\">: MonoBehaviour<\/code> の付かない<strong>純粋なC#クラス<\/strong>（ロジック担当。<code class=\"ic\">new<\/code> で作る）<\/li><li><code class=\"ic\">CharacterComponent<\/code>……<strong>MonoBehaviourを継承したクラス<\/strong>（Unityとの橋渡し担当。GameObjectにアタッチ）<\/li><\/ul><hr id=\"ch08-b46\"><h3 id=\"ch08-b47\" class=\"sec\">演出① ：1行追加・全員変化<\/h3><p id=\"ch08-b48\"><code class=\"ic\">isPoisoned<\/code> フィールドを Character に1箇所追加するだけで、Player・ChaserEnemy・CowardEnemy の全員に毒状態が伝わります。<\/p><pre id=\"ch08-b49\" data-lang=\"plain text\"><code>// Character クラスに1行追加\npublic bool isPoisoned = false;\n\n// GetStatusText() で確認\npublic string GetStatusText()\n{\n    string status = isPoisoned ? \"【毒】\" : \"\";\n    return $\"HP:{hp} {status}\";\n}<\/code><\/pre><blockquote id=\"ch08-b50\"><strong>「1行書いたら全員に影響が！」<\/strong> → これが継承の強さ。<\/blockquote><hr id=\"ch08-b51\"><h3 id=\"ch08-b52\" class=\"sec\">演出② ：MonoBehaviour の大公開<\/h3><h3 id=\"ch08-b53\" class=\"sec\">この教材最大の伏線回収！<\/h3><p id=\"ch08-b54\">Chapter 0 から <code class=\"ic\">: MonoBehaviour<\/code> と書いてきましたが……<\/p><pre id=\"ch08-b55\" data-lang=\"plain text\"><code>public class PlayerController : MonoBehaviour  // ← これ、ずっと継承していた！<\/code><\/pre><blockquote id=\"ch08-b56\"><strong>「MonoBehaviour を継承することで、Update()・Start() などの Unity の機能が使えていたんだ！」<\/strong><\/blockquote><hr id=\"ch08-b57\"><h3 id=\"ch08-b58\" class=\"sec\">同じ命令で違う動き ―― 次章への橋渡し<\/h3><pre id=\"ch08-b59\" data-lang=\"plain text\"><code>// 「動物のリスト」で試してみよう\nList&lt;Character&gt; characters = new List&lt;Character&gt;();\ncharacters.Add(new Player());\ncharacters.Add(new ChaserEnemy());\ncharacters.Add(new CowardEnemy());\n\nforeach (Character c in characters)\n{\n    c.OnUpdate(); // ← 同じ命令なのに、キャラごとに違う動きをする？\n}<\/code><\/pre><p id=\"ch08-b60\">実行すると、Player は入力移動、ChaserEnemy は追尾、CowardEnemy は逃走――<strong>それぞれの子クラスの <\/strong><strong><code class=\"ic\">OnUpdate()<\/code><\/strong> がちゃんと呼ばれます。親クラスに <code class=\"ic\">virtual<\/code>、子クラスに <code class=\"ic\">override<\/code> を付けておいたおかげです。<\/p><p id=\"ch08-b61\">この「<strong>同じ命令（<\/strong><strong><code class=\"ic\">c.OnUpdate()<\/code><\/strong><strong>）なのに、中身の実体に応じて違う動きをする<\/strong>」性質こそが、次章の主役 <strong>ポリモーフィズム（多態性）<\/strong> です。<\/p><blockquote id=\"ch08-b62\">💡 逆に言うと、もし <code class=\"ic\">virtual<\/code> / <code class=\"ic\">override<\/code> を書き忘れると、<code class=\"ic\">List&lt;Character&gt;<\/code> 経由では全員「親クラスの OnUpdate()（何もしない）」が呼ばれてしまいます。次章ではこの「書き忘れた世界」の悲惨さから体験します。<\/blockquote><hr id=\"ch08-b63\"><h3 id=\"ch08-b64\" class=\"sec\">振り返りクイズ<\/h3><p id=\"ch08-b65\"><strong>問1：<\/strong> 継承とは何をする仕組みですか？<\/p><p id=\"ch08-b66\">A. コードを削除する<\/p><p id=\"ch08-b67\">B. 共通部分をまとめて使い回す<\/p><p id=\"ch08-b68\">C. コードを高速化する<\/p><p id=\"ch08-b69\"><strong>問2：<\/strong> <code class=\"ic\">isPoisoned<\/code> を Character クラスに追加したとき、Player・ChaserEnemy・CowardEnemy の全員に影響しますか？<\/p><p id=\"ch08-b70\">A. しない（自分だけ）<\/p><p id=\"ch08-b71\">B. する（全員に伝わる）<\/p><p id=\"ch08-b72\">C. コンパイルエラーになる<\/p><p id=\"ch08-b73\"><strong>問3：<\/strong> 親に <code class=\"ic\">virtual<\/code>、子に <code class=\"ic\">override<\/code> を付けた <code class=\"ic\">OnUpdate()<\/code> を、<code class=\"ic\">List&lt;Character&gt;<\/code> に入れた Player や Enemy に foreach で呼ぶと何が起きますか？<\/p><p id=\"ch08-b74\">A. 全員が親クラスの OnUpdate()（何もしない）を呼ぶ<\/p><p id=\"ch08-b75\">B. それぞれの子クラスの OnUpdate() が呼ばれる<\/p><p id=\"ch08-b76\">C. エラーになる<\/p><p id=\"ch08-b77\"><strong>解答：<\/strong> 問1：B ・ 問2：B ・ 問3：B<\/p><hr id=\"ch08-b78\"><h3 id=\"ch08-b79\" class=\"sec\">次章予告<\/h3><p id=\"ch08-b80\">継承によって共通部分をまとめ、<code class=\"ic\">virtual<\/code> / <code class=\"ic\">override<\/code> で「同じ命令・違う動き」も一足先に体験しました。<\/p><p id=\"ch08-b81\">次章では、この仕組みに <strong>ポリモーフィズム（多態性）<\/strong> という名前を付けて深掘りします。「もし virtual / override がなかったら？」――型判定だらけの地獄のコードから出発して、その真価を確かめましょう！<\/p><p id=\"ch08-b82\">その前に、<strong>Chapter 8.5<\/strong>でクラスを扱う上で絶対に知っておくべき「値型と参照型」の違いを固めます。<\/p>"}, {"id": "ch08_5", "num": "8.5", "name": "分身の罠：値型と参照型・null", "title": "Chapter 8.5 分身の罠：値型と参照型・null", "html": "<blockquote id=\"ch08_5-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 新規追加章（v1.1）<\/blockquote><hr id=\"ch08_5-b1\"><div id=\"ch08_5-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>ダンジョンの怪談<\/strong>：「武器をコピーしたはずなのに、片方を強化したらもう片方まで強くなった……」――これは呪いではありません。C#の<strong>仕様<\/strong>です。<\/p><\/div><\/div><h3 id=\"ch08_5-b3\" class=\"sec\">この章で学ぶこと<\/h3><p id=\"ch08_5-b4\">クラスを使い始めた今こそ知るべき、C#最重要の仕組み――<strong>値型と参照型<\/strong>の違いです。<\/p><hr id=\"ch08_5-b5\"><h3 id=\"ch08_5-b6\" class=\"sec\">まずは実験：intのコピー<\/h3><pre id=\"ch08_5-b7\" data-lang=\"plain text\"><code>int a = 10;\nint b = a;   // コピー\nb = 999;\n\nDebug.Log(a);  // → 10（変わらない）<\/code><\/pre><p id=\"ch08_5-b8\"><code class=\"ic\">int<\/code> は<strong>値型<\/strong>。コピーすると<strong>中身そのもの<\/strong>が複製されます。<\/p><hr id=\"ch08_5-b9\"><h3 id=\"ch08_5-b10\" class=\"sec\">次の実験：Weaponのコピー<\/h3><pre id=\"ch08_5-b11\" data-lang=\"plain text\"><code>Weapon sword1 = new Weapon(\"木の剣\", 10, 100);\nWeapon sword2 = sword1;   // コピー……のつもり\nsword2.attackPower = 999;\n\nDebug.Log(sword1.attackPower);  // → 999！？<\/code><\/pre><p id=\"ch08_5-b12\">sword1まで強化されてしまいました。<\/p><p id=\"ch08_5-b13\"><strong>クラスは参照型<\/strong>。変数に入っているのは実体ではなく「<strong>実体の場所を指す矢印<\/strong>」なのです。<\/p><p id=\"ch08_5-b14\">図解：<\/p><pre id=\"ch08_5-b15\" data-lang=\"plain text\"><code>値型（int）\na [ 10 ]      b [ 10 ] ← 中身ごと複製\n\n参照型（Weapon）\nsword1 ──┐\n          ├──→ [ 木の剣の実体 ]  ← 実体は1つだけ！\nsword2 ──┘<\/code><\/pre><p id=\"ch08_5-b16\">本当に複製したいなら、<code class=\"ic\">new<\/code> でもう1本作る必要があります。<\/p><pre id=\"ch08_5-b17\" data-lang=\"plain text\"><code>Weapon sword2 = new Weapon(sword1.weaponName, sword1.attackPower, sword1.price);<\/code><\/pre><blockquote id=\"ch08_5-b18\">📝 Chapter 7.5のプロパティ版Weapon（<code class=\"ic\">WeaponName<\/code> / <code class=\"ic\">AttackPower<\/code> / <code class=\"ic\">Price<\/code>）を使っている場合は、<code class=\"ic\">new Weapon(sword1.WeaponName, sword1.AttackPower, sword1.Price)<\/code> と読み替えてください。<\/blockquote><h3 id=\"ch08_5-b19\" class=\"sec\">コラム：浅いコピーと深いコピー<\/h3><ul id=\"ch08_5-b20\"><li>矢印だけコピーする（<code class=\"ic\">sword2 = sword1;<\/code>）……<strong>浅いコピー<\/strong>。実体は共有される<\/li><li><code class=\"ic\">new<\/code> で実体ごと複製する……<strong>深いコピー<\/strong>。完全な別物になる<\/li><\/ul><p id=\"ch08_5-b21\">「コピーしたつもりが共有だった」は参照型バグの定番です。迷ったら図の矢印を思い出しましょう。<\/p><hr id=\"ch08_5-b22\"><h3 id=\"ch08_5-b23\" class=\"sec\">null ―― 矢印がどこも指していない状態<\/h3><p id=\"ch08_5-b24\">参照型の変数は「まだ何も指していない」状態になれます。それが <code class=\"ic\">null<\/code> です。<\/p><pre id=\"ch08_5-b25\" data-lang=\"plain text\"><code>Weapon sword = null;\nsword.ShowStatus();  // ← NullReferenceException！<\/code><\/pre><p id=\"ch08_5-b26\"><code class=\"ic\">NullReferenceException<\/code> は <strong>Unity開発で最も遭遇するエラー<\/strong>です。意味は「何も指していない矢印の先を触ろうとした」。<\/p><p id=\"ch08_5-b27\">対策は2つ。<\/p><pre id=\"ch08_5-b28\" data-lang=\"plain text\"><code>// ① ifでチェック\nif (sword != null)\n{\n    sword.ShowStatus();\n}\n\n// ② ?. 演算子（Chapter 11でも登場します）\nsword?.ShowStatus();  // nullなら何もしない<\/code><\/pre><hr id=\"ch08_5-b29\"><h3 id=\"ch08_5-b30\" class=\"sec\">Unityで最も多いnullの正体 ―― Inspector設定忘れ<\/h3><pre id=\"ch08_5-b31\" data-lang=\"plain text\"><code>public class CameraFollow : MonoBehaviour\n{\n    public GameObject player;   // ← Inspectorで設定するつもりの枠\n\n    void Update()\n    {\n        transform.position = player.transform.position;  // 未設定だとここで爆発！\n    }\n}<\/code><\/pre><p id=\"ch08_5-b32\"><code class=\"ic\">public<\/code> なフィールドはInspectorに設定枠が表示されますが、<strong>ドラッグ＆ドロップし忘れると中身は <\/strong><strong><code class=\"ic\">null<\/code><\/strong><strong> のまま<\/strong>です。Chapter 2のエラー対応ガイドで見た <code class=\"ic\">NullReferenceException<\/code> の正体は、たいていこれです。<\/p><blockquote id=\"ch08_5-b33\">🛡️ <strong>鉄則<\/strong>：<code class=\"ic\">NullReferenceException<\/code> が出たら、まずエラー行で使っている変数を確認→Inspectorの設定漏れを疑う。<\/blockquote><hr id=\"ch08_5-b34\"><h3 id=\"ch08_5-b35\" class=\"sec\">structという値型の仲間（紹介だけ）<\/h3><p id=\"ch08_5-b36\">実はUnityの <code class=\"ic\">Vector3<\/code> や <code class=\"ic\">Vector2<\/code> はクラスではなく <strong>struct（構造体）<\/strong>＝値型です。だからコピーしても安全に別物になります。「小さなデータはstruct、ゲームの登場人物はclass」くらいの理解で今はOKです。<\/p><hr id=\"ch08_5-b37\"><h3 id=\"ch08_5-b38\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch08_5-b39\"><strong>Q1.<\/strong> <code class=\"ic\">Weapon b = a;<\/code> としてbを変更するとaは？<\/p><p id=\"ch08_5-b40\">A. 変わらない　B. 一緒に変わる（同じ実体を指しているから）　C. エラーになる<\/p><p id=\"ch08_5-b41\"><strong>Q2.<\/strong> <code class=\"ic\">NullReferenceException<\/code> の意味は？<\/p><p id=\"ch08_5-b42\">A. 配列の範囲外　B. 何も指していない変数の中身を使おうとした　C. 型が違う<\/p><p id=\"ch08_5-b43\"><strong>Q3.<\/strong> <code class=\"ic\">Vector3<\/code> は？<\/p><p id=\"ch08_5-b44\">A. 参照型（class）　B. 値型（struct）　C. enum<\/p><p id=\"ch08_5-b45\"><strong>解答<\/strong>　Q1 → B　Q2 → B　Q3 → B<\/p><hr id=\"ch08_5-b46\"><h3 id=\"ch08_5-b47\" class=\"sec\">次章へのフック<\/h3><p id=\"ch08_5-b48\">「同じ実体を複数の変数が指せる」――実はこの性質こそ、次章の<strong>ポリモーフィズム<\/strong>（<strong>Chapter 9<\/strong>）で <code class=\"ic\">List&lt;Character&gt;<\/code> に色々な子クラスを入れられる理由でもあります。<\/p>"}, {"id": "ch09", "num": "9", "name": "ポリモーフィズム（多態性）〜スライムたちの大脱走〜", "title": "Chapter 9 ポリモーフィズム（多態性）〜スライムたちの大脱走〜", "html": "<blockquote id=\"ch09-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><hr id=\"ch09-b1\"><h3 id=\"ch09-b2\" class=\"sec\">この章で作るもの<\/h3><p id=\"ch09-b3\">前章では継承を学び、Character という親クラスから Player・ChaserEnemy・CowardEnemy を作りましたね。<\/p><p id=\"ch09-b4\">今回の舞台は魔法研究所。同じ継承のテクニックで、Slime という親クラスから SlimeJr・SlimeNormal・SlimeKing・SlimeMetal の4種類のスライムが作られています（作り方は Ch8 とまったく同じです）。すべてを Slime として扱えます。 しかし、新しい問題が発生します。<\/p><p id=\"ch09-b5\">研究所から脱走したスライムたちが……全員同じ動きしかしないのです。<\/p><blockquote id=\"ch09-b6\">のそのそ…・のそのそ…・のそのそ…・のそのそ…<\/blockquote><p id=\"ch09-b7\">メタルスライムも、キングスライムも、Jrスライムも、全員同じ。なんだか面白くありません。 今回は、「同じ命令なのに、キャラクターごとに違う行動をする仕組み」を学びます。これが <strong>ポリモーフィズム（多態性）<\/strong> です。<\/p><hr id=\"ch09-b8\"><h3 id=\"ch09-b9\" class=\"sec\">1. 絶望：全員「のそのそ歩き」になる問題<\/h3><p id=\"ch09-b10\">この章の出発点では、子クラスたちは<strong>まだ <\/strong><strong><code class=\"ic\">Move()<\/code><\/strong><strong> を override していない<\/strong>状態だとします。つまり全員が「親クラスの Move()（のそのそ歩き）」しか持っていません。そのため、Move() を呼ぶと全員が同じ動きになってしまいます。<\/p><blockquote id=\"ch09-b11\">💡 Chapter 8の最後で <code class=\"ic\">virtual<\/code> / <code class=\"ic\">override<\/code> は一足先に体験済みですね。この章では「もしそれがなかったらどうなるか」を<strong>あえて体験する<\/strong>ところから出発します。遠回りに見えて、これがポリモーフィズムのありがたみを一番実感できる道です。<\/blockquote><pre id=\"ch09-b12\" data-lang=\"plain text\"><code>List&lt;Slime&gt; slimes = new List&lt;Slime&gt;();\n// 4種類のスライムを追加済み\n\nforeach (Slime slime in slimes)\n{\n    slime.Move(playerX); // 全員同じ Move()\n}<\/code><\/pre><hr id=\"ch09-b13\"><h3 id=\"ch09-b14\" class=\"sec\">2. アンチパターン：if 文による型判定地獄<\/h3><p id=\"ch09-b15\">違う動きをさせたい！と思うと、if 文で型を判定してしまいます。 しかし、これが悪魔の始まりです…<\/p><pre id=\"ch09-b16\" data-lang=\"plain text\"><code>foreach (Slime slime in slimes)\n{\n    if (slime is SlimeJr)\n    {\n        ((SlimeJr)slime).JrMove(playerX);\n    }\n    else if (slime is SlimeNormal)\n    {\n        ((SlimeNormal)slime).NormalMove(playerX);\n    }\n    else if (slime is SlimeKing)\n    {\n        ((SlimeKing)slime).KingMove(playerX);\n    }\n    else if (slime is SlimeMetal)\n    {\n        ((SlimeMetal)slime).MetalMove(playerX);\n    }\n}<\/code><\/pre><p id=\"ch09-b17\"><strong>ここで登場：<\/strong><strong><code class=\"ic\">is<\/code><\/strong><strong> キーワードとは？<\/strong><\/p><blockquote id=\"ch09-b18\"><code class=\"ic\">is<\/code> は「この子は○○ですか？」と質問するためのキーワードです。 <code class=\"ic\">if (slime is SlimeJr)<\/code> → 「このスライムはSlimeJrですか？」と質問しています。<\/blockquote><pre id=\"ch09-b19\" data-lang=\"plain text\"><code>【図解①】is の型チェック\n\n      slime\n        │\n        ▼\n   SlimeJr？\n        │\n    YES → true\n    NO  → false<\/code><\/pre><h3 id=\"ch09-b20\" class=\"sec\">問題点：<\/h3><ul id=\"ch09-b21\"><li>型が増えるたびに追加・修正が必要<\/li><li>肥大化して読みにくい<\/li><li>間違いやすい<\/li><li>メンテナンス地獄の始まり<\/li><\/ul><hr id=\"ch09-b22\"><h3 id=\"ch09-b23\" class=\"sec\">3. 新種「クイーンスライム」登場でさらに絶望<\/h3><p id=\"ch09-b24\">新しいスライム「クイーンスライム（QueenSlime）」が登場！<\/p><ul id=\"ch09-b25\"><li>QueenSlime クラスを作成<\/li><li>初期化コードも追加<\/li><li>if 文の else if ブロックも追加<\/li><li>→ すべての管理コードを触る必要がある！<\/li><\/ul><blockquote id=\"ch09-b26\"><strong>「また if 文を1つ追加！しかも、全体のテストもやり直し…これは大手術です！」<\/strong><\/blockquote><p id=\"ch09-b27\">解決の光は、<code class=\"ic\">virtual<\/code> と <code class=\"ic\">override<\/code> です。<\/p><hr id=\"ch09-b28\"><h3 id=\"ch09-b29\" class=\"sec\">4. 解決の鍵：virtual と override（2点セット）<\/h3><p id=\"ch09-b30\"><strong>virtual（上書き歓迎ボタン）<\/strong> 「ここは後で変えていいよ〜」と、基本モデル（Slime）が親切に許可してくれる。<\/p><pre id=\"ch09-b31\" data-lang=\"plain text\"><code>// 親クラス\npublic class Slime\n{\n    // virtual = 子クラスが上書きしていいよ！の宣言\n    public virtual void Move(float playerX)\n    {\n        // のそのそ歩く（基本の動き）\n        x += Mathf.Sign(playerX - x) * speed;\n    }\n}<\/code><\/pre><p id=\"ch09-b32\"><strong>override（作り直し宣言）<\/strong> 「私の動きはこれだ！」と、子クラスが自分の動きを上書きする。<\/p><pre id=\"ch09-b33\" data-lang=\"plain text\"><code>// 子クラス（SlimeJr）\npublic class SlimeJr : Slime\n{\n    // override = 親の Move() を完全に入れ替える\n    public override void Move(float playerX)\n    {\n        // Jr だけの速い動き！\n        x += Mathf.Sign(playerX - x) * 1.5f;\n    }\n}<\/code><\/pre><h3 id=\"ch09-b34\" class=\"sec\">結果：管理コード（foreach 部）は1文字も変えず、それぞれのスライムが自分の動きをする！<\/h3><pre id=\"ch09-b35\" data-lang=\"plain text\"><code>foreach (Slime slime in slimes)\n{\n    slime.Move(playerX); // ← この1行は最初から最後まで一切変更されない！\n}<\/code><\/pre><h3 id=\"ch09-b36\" class=\"sec\">コラム：base ―― 親の動きも使いたいとき<\/h3><p id=\"ch09-b37\"><code class=\"ic\">override<\/code> は親の処理を完全に入れ替えますが、「親の動き＋追加の動き」にしたいときは <code class=\"ic\">base<\/code> を使います。<\/p><pre id=\"ch09-b38\" data-lang=\"plain text\"><code>public override void Move(float playerX)\n{\n    base.Move(playerX);   // まず親のMove()を実行\n    // ここに追加の動きを書く\n}<\/code><\/pre><p id=\"ch09-b39\"><code class=\"ic\">this<\/code> が「自分自身」なら、<code class=\"ic\">base<\/code> は「親クラス」を指すキーワードです。<\/p><p id=\"ch09-b40\"><strong>コラム：<\/strong><strong><code class=\"ic\">((SlimeJr)slime)<\/code><\/strong><strong> のカッコの正体 ―― キャスト<\/strong><\/p><p id=\"ch09-b41\">型判定地獄のコードに登場した <code class=\"ic\">((SlimeJr)slime)<\/code> は<strong>キャスト（型変換）<\/strong>です。Chapter 1の <code class=\"ic\">(int)3.5f<\/code> の仲間で、「このSlimeをSlimeJrとして扱え」という強制変換です。ただし実体がSlimeJrでなければ<strong>実行時エラー<\/strong>になる危険な操作でもあります。ポリモーフィズムを使えば、そもそもキャスト自体が不要になります。<\/p><hr id=\"ch09-b42\"><h3 id=\"ch09-b43\" class=\"sec\">5. SlimeMetal の方向転換ロジック（0.2秒タイマー）<\/h3><p id=\"ch09-b44\">メタルスライムはすばしっこく、0.2秒ごとにランダムに方向を変えます。<\/p><pre id=\"ch09-b45\" data-lang=\"plain text\"><code>public class SlimeMetal : Slime\n{\n    private float changeTimer = 0f;\n    private float direction = 1;\n\n    public override void Move(float playerX)\n    {\n        // 0.2秒ごとに向きをランダムに変える\n        changeTimer -= Time.deltaTime;\n        if (changeTimer &lt;= 0f)\n        {\n            direction = Random.value &lt; 0.5f ? -1 : 1;\n            changeTimer = 0.2f;\n        }\n\n        // 今の向きに基づいて高速移動（プレイヤーには見向きもしない！）\n        x += direction * speed * Time.deltaTime;\n    }\n}<\/code><\/pre><pre id=\"ch09-b46\" data-lang=\"plain text\"><code>【図解②】MetalSlime の方向転換タイマー\n\n0.0秒  → → →  (右向き)\n0.2秒  ← ← ←  (左向きに変える)\n0.4秒  → → →  (また右向き)\n0.6秒  ← ← ←  (また左向き)\n  ...<\/code><\/pre><hr id=\"ch09-b47\"><h3 id=\"ch09-b48\" class=\"sec\">6. 演出①：「全員静止 → カウントダウン → 一斉解放！」<\/h3><p id=\"ch09-b49\">全員の動きを止め、カウントダウンを表示し、一斉に解放する演出を作ります。<\/p><pre id=\"ch09-b50\" data-lang=\"plain text\"><code>countText.gameObject.SetActive(true);  // ① カウント表示 ON\ncountText.text = count.ToString();     // ② 数字をテキストに\ncount--;                               // ③ カウントを1つ減らす<\/code><\/pre><blockquote id=\"ch09-b51\">シンプルなのに、めちゃくちゃ盛り上がる！<\/blockquote><hr id=\"ch09-b52\"><h3 id=\"ch09-b53\" class=\"sec\">7. 演出②：色変化で「Move() を呼ばれた証」を残す<\/h3><p id=\"ch09-b54\">Move() を呼ばれたスライムは、一瞬黄色く光ります！<\/p><pre id=\"ch09-b55\" data-lang=\"plain text\"><code>public Renderer spriteRenderer;\n\npublic virtual void Move(float playerX)\n{\n    // いつもの移動...\n\n    // ★ たった1行で瞬間的に黄色！\n    spriteRenderer.color = Color.yellow;\n    // Update() で 0.1秒後に元の色に戻すとさらにきれい\n}<\/code><\/pre><hr id=\"ch09-b56\"><h3 id=\"ch09-b57\" class=\"sec\">8. 演出③：foreach 進行状況の数字表示 UI<\/h3><p id=\"ch09-b58\">どのスライムを処理中かを画面に出してみましょう。<\/p><pre id=\"ch09-b59\" data-lang=\"plain text\"><code>int index = 0;\nforeach (Slime slime in slimes)\n{\n    currentText.text = $\"{index + 1}/{slimes.Count}\"; // ① 「2/4」のように表示\n    slime.Move(playerX);                               // ② 動かす！\n    index++;\n}<\/code><\/pre><pre id=\"ch09-b60\" data-lang=\"plain text\"><code>【図解③】foreach 処理順番の表示\n\n1/4 → 2/4 → 3/4 → 4/4\n数字が順番に進む！<\/code><\/pre><hr id=\"ch09-b61\"><h3 id=\"ch09-b62\" class=\"sec\">9. サプライズイベント：SlimeJr 分裂クラッシュ！<\/h3><p id=\"ch09-b63\">JrスライムはHPが0になると2匹に分裂する能力を持っているとします。<\/p><pre id=\"ch09-b64\" data-lang=\"plain text\"><code>// ❌ 失敗例（バグの原因）\npublic override void Move(float playerX)\n{\n    base.Move(playerX);\n\n    // ★ foreach 中にリストに直接追加しようとしたら……\n    if (shouldSplit)\n    {\n        slimes.Add(new SlimeJr()); // ← ここでクラッシュ！\n    }\n}<\/code><\/pre><p id=\"ch09-b65\"><strong>結果：クラッシュ！<\/strong> foreach 中にリストを変更すると、エラーが発生してゲームが止まります！<\/p><h3 id=\"ch09-b66\" class=\"sec\">解決：分裂予約リストパターン<\/h3><pre id=\"ch09-b67\" data-lang=\"plain text\"><code>List&lt;Slime&gt; pendingAdd = new List&lt;Slime&gt;(); // ① 予約リスト\n\n// Move() の中ではリストに追加しない！予約するだけ\npendingAdd.Add(new SlimeJr());\npendingAdd.Add(new SlimeJr());\n\n// foreach が終わってからまとめて追加\nslimes.AddRange(pendingAdd); // ② 終了後にまとめて追加\npendingAdd.Clear();<\/code><\/pre><blockquote id=\"ch09-b68\">これで安全！<\/blockquote><hr id=\"ch09-b69\"><h3 id=\"ch09-b70\" class=\"sec\">完成コード（文法部分の全体像）<\/h3><p id=\"ch09-b71\">演出を除いた「ポリモーフィズムの骨格」だけを動く形でまとめます。<\/p><h3 id=\"ch09-b72\" class=\"sec\">この章で作るファイル<\/h3><ul id=\"ch09-b73\"><li><code class=\"ic\">Slime.cs<\/code>（純粋C#クラス群。アタッチ不要）<\/li><li><code class=\"ic\">SlimeManager.cs<\/code>（空のGameObjectにアタッチ）<\/li><\/ul><pre id=\"ch09-b74\" data-lang=\"plain text\"><code>// Slime.cs\nusing UnityEngine;\n\npublic class Slime\n{\n    public float x = 0f;\n    public float speed = 1f;\n\n    public virtual void Move(float playerX)\n    {\n        // 基本の動き：プレイヤーにのそのそ近づく\n        x += Mathf.Sign(playerX - x) * speed * Time.deltaTime;\n    }\n}\n\npublic class SlimeJr : Slime\n{\n    public override void Move(float playerX)\n    {\n        // Jrはすばやい！\n        x += Mathf.Sign(playerX - x) * 3f * Time.deltaTime;\n    }\n}\n\npublic class SlimeMetal : Slime\n{\n    public override void Move(float playerX)\n    {\n        // メタルはプレイヤーから逃げる！\n        x -= Mathf.Sign(playerX - x) * 5f * Time.deltaTime;\n    }\n}<\/code><\/pre><pre id=\"ch09-b75\" data-lang=\"plain text\"><code>// SlimeManager.cs\nusing System.Collections.Generic;\nusing UnityEngine;\n\npublic class SlimeManager : MonoBehaviour\n{\n    private List&lt;Slime&gt; slimes = new List&lt;Slime&gt;();\n    private float playerX = 0f;   // プレイヤーは原点にいるとする\n\n    void Start()\n    {\n        slimes.Add(new Slime());       // x = 0 からスタートしたいなら x を変えてもOK\n        slimes.Add(new SlimeJr());\n        slimes.Add(new SlimeMetal());\n\n        slimes[0].x = 5f;\n        slimes[1].x = 5f;\n        slimes[2].x = 5f;\n    }\n\n    void Update()\n    {\n        foreach (Slime slime in slimes)\n        {\n            slime.Move(playerX);  // 同じ命令、違う動き！\n            Debug.Log(slime.GetType().Name + \" x: \" + slime.x);\n        }\n    }\n}<\/code><\/pre><h3 id=\"ch09-b76\" class=\"sec\">実行確認の手順<\/h3><ol id=\"ch09-b77\"><li>Playボタンを押す<\/li><li>Consoleで、<code class=\"ic\">Slime<\/code> と <code class=\"ic\">SlimeJr<\/code> の x が 0 に近づき（Jrのほうが速い）、<code class=\"ic\">SlimeMetal<\/code> の x がどんどん大きくなれば成功<\/li><\/ol><blockquote id=\"ch09-b78\">💡 <code class=\"ic\">GetType().Name<\/code> は「この実体の本当のクラス名」を返します。変数の型は <code class=\"ic\">Slime<\/code> でも、中身はちゃんと <code class=\"ic\">SlimeJr<\/code> であることが確認できます。<\/blockquote><hr id=\"ch09-b79\"><h3 id=\"ch09-b80\" class=\"sec\">10. まとめ：ポリモーフィズムの真価<\/h3><h3 id=\"ch09-b81\" class=\"sec\">管理コードは1文字も変わらない！<\/h3><p id=\"ch09-b82\">新しいスライムを追加しても、foreach のコードは完成形から一切変更されない。それぞれのスライムが自分の動きを「化けて」見せてくれる。<\/p><div id=\"ch09-b83\" class=\"tblwrap\"><table><tr><th><strong>概念<\/strong><\/th><th><strong>大和言葉<\/strong><\/th><th><strong>一言説明<\/strong><\/th><\/tr><tr><td>継承（inheritance）<\/td><td>「引き継ぐ」<\/td><td>Slime の共通部分を、全ての子に渡す設計の仕組み<\/td><\/tr><tr><td>ポリモーフィズム（多態性）<\/td><td>「化ける」<\/td><td>Slime として呼んでも、それぞれのスライムが自分の動きを見せる現象<\/td><\/tr><\/table><\/div><hr id=\"ch09-b84\"><h3 id=\"ch09-b85\" class=\"sec\">振り返りクイズ<\/h3><p id=\"ch09-b86\"><strong>問1：<\/strong> <code class=\"ic\">virtual<\/code> の役割は？<\/p><p id=\"ch09-b87\">A. 削除する<\/p><p id=\"ch09-b88\">B. 後で変更できるよう予約する<\/p><p id=\"ch09-b89\">C. 高速化する<\/p><p id=\"ch09-b90\"><strong>問2：<\/strong> <code class=\"ic\">override<\/code> の役割は？<\/p><p id=\"ch09-b91\">A. 中身を書き換える<\/p><p id=\"ch09-b92\">B. リストを作る<\/p><p id=\"ch09-b93\">C. 継承を禁止する<\/p><p id=\"ch09-b94\"><strong>問3：<\/strong> ポリモーフィズムの最大の利点は？<\/p><p id=\"ch09-b95\">A. 型判定が増える<\/p><p id=\"ch09-b96\">B. 管理コードが巨大になる<\/p><p id=\"ch09-b97\">C. 管理コードを変えずに新種を追加できる<\/p><p id=\"ch09-b98\"><strong>解答：<\/strong> 問1：B ・ 問2：A ・ 問3：C<\/p><hr id=\"ch09-b99\"><h3 id=\"ch09-b100\" class=\"sec\">次章予告<\/h3><p id=\"ch09-b101\">ここまでで「継承」「ポリモーフィズム」を手に入れました。 しかしまだ問題があります。<\/p><ul id=\"ch09-b102\"><li>攻撃できる敵<\/li><li>話しかけられる NPC<\/li><li>開く宝箱<\/li><\/ul><p id=\"ch09-b103\">は全部「異なる種類のもの」ですが、「共通の約束だけ決める」もっと柔軟な仕組みが必要です。<\/p><p id=\"ch09-b104\">次章では、C# オブジェクト指向の最後の大きな武器、<strong>インターフェース<\/strong>の世界へ進みます！<\/p>"}, {"id": "ch10a", "num": "10A", "name": "インターフェース 〜研究所の調査隊〜", "title": "Chapter 10 Part A インターフェース 〜研究所の調査隊〜", "html": "<blockquote id=\"ch10a-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><hr id=\"ch10a-b1\"><h3 id=\"ch10a-b2\" class=\"sec\">この章で作るもの<\/h3><p id=\"ch10a-b3\">これまでの章では、<\/p><ul id=\"ch10a-b4\"><li>敵を倒す<\/li><li>アイテムを拾う<\/li><li>スライムを動かす<\/li><\/ul><p id=\"ch10a-b5\">といったゲームの基本機能を作ってきました。<\/p><p id=\"ch10a-b6\">今回は少し違います。<\/p><blockquote id=\"ch10a-b7\">プレイヤーが世界を「<strong>調べられる<\/strong>」ようにします。<\/blockquote><p id=\"ch10a-b8\">例えば……<\/p><ul id=\"ch10a-b9\"><li>📦 宝箱<\/li><li>🙂 村人<\/li><li>😴 眠るスライム<\/li><\/ul><p id=\"ch10a-b10\">があります。<\/p><p id=\"ch10a-b11\">プレイヤーが近づいて <strong>Eキー<\/strong>を押すと……<\/p><pre id=\"ch10a-b12\" data-lang=\"plain text\"><code>宝箱なら『ポーションを手に入れた！』\n村人なら『研究所の地下に気をつけろ』\nスライムなら『Zzz...』<\/code><\/pre><p id=\"ch10a-b13\">それぞれ違う反応をします。<\/p><hr id=\"ch10a-b14\"><h3 id=\"ch10a-b15\" class=\"sec\">最初に発生する問題<\/h3><p id=\"ch10a-b16\">宝箱も。村人も。スライムも。<\/p><p id=\"ch10a-b17\">全部別クラスです。<\/p><p id=\"ch10a-b18\">すると管理側はこんなコードを書きたくなります。<\/p><pre id=\"ch10a-b19\" data-lang=\"plain text\"><code>if (target is TreasureBox)\n{\n}\n\nif (target is Npc)\n{\n}\n\nif (target is SleepingSlime)\n{\n}<\/code><\/pre><p id=\"ch10a-b20\">どこかで見た光景ですね。<\/p><p id=\"ch10a-b21\">そうです。<\/p><p id=\"ch10a-b22\">Chapter 9 の <strong>「型判定地獄」<\/strong> です。<\/p><p id=\"ch10a-b23\">新しい調査対象が増えるたびに管理コードを書き換える必要があります。<\/p><p id=\"ch10a-b24\">例えば「本棚、石碑、ドア、魔法陣」が追加されたら？<\/p><p id=\"ch10a-b25\">管理コードはどんどん巨大になります。<\/p><h3 id=\"ch10a-b26\" class=\"sec\">これは良くありません。<\/h3><hr id=\"ch10a-b27\"><h3 id=\"ch10a-b28\" class=\"sec\">発想を変えよう<\/h3><p id=\"ch10a-b29\">今回は<\/p><blockquote id=\"ch10a-b30\">「<strong>何者か<\/strong>」ではなく「<strong>何ができるか<\/strong>」で考えます。<\/blockquote><pre id=\"ch10a-b31\" data-lang=\"plain text\"><code>宝箱        → 調べられる\n村人        → 調べられる\n眠るスライム  → 調べられる<\/code><\/pre><p id=\"ch10a-b32\">種類は違います。<\/p><p id=\"ch10a-b33\">でも <strong>「調べられる」<\/strong> という共通点があります。<\/p><p id=\"ch10a-b34\">ならば、その共通点だけを「約束」にしてしまえば良いのです。<\/p><hr id=\"ch10a-b35\"><h3 id=\"ch10a-b36\" class=\"sec\">インターフェースとは？<\/h3><p id=\"ch10a-b37\">インターフェースは <strong>契約書<\/strong> です。<\/p><h3 id=\"ch10a-b38\" class=\"sec\">【図解：インターフェース＝契約書】<\/h3><pre id=\"ch10a-b39\" data-lang=\"plain text\"><code>┌────────────────┐\n│  IInteractable  │\n├────────────────┤\n│  Interact()     │\n└────────────────┘\n\n         ▲\n\nこの契約を結んだクラスは\n\n必ず\n\n  Interact()\n\nを持たなければならない<\/code><\/pre><p id=\"ch10a-b40\">インターフェースは <strong>機能の約束だけ<\/strong> を書きます。<\/p><h3 id=\"ch10a-b41\" class=\"sec\">インターフェースの文法ルール<\/h3><ol id=\"ch10a-b42\"><li>中に書けるのはメソッドなどの<strong>「約束」だけ<\/strong>。フィールド（変数）は持てません<\/li><li>契約したクラスは、約束したメソッドを<strong>必ず全部実装<\/strong>しないとコンパイルエラー<\/li><li>クラスの継承は<strong>1つだけ<\/strong>ですが、インターフェースは<strong>いくつでも同時に契約<\/strong>できます<\/li><li>名前は <code class=\"ic\">I<\/code> で始めるのがC#の慣習です（<code class=\"ic\">IInteractable<\/code>, <code class=\"ic\">IDamageable<\/code>...）<\/li><\/ol><pre id=\"ch10a-b43\" data-lang=\"plain text\"><code>// 継承1つ＋インターフェース2つ、の合わせ技もOK\npublic class TreasureBox : MonoBehaviour, IInteractable, IDamageable<\/code><\/pre><hr id=\"ch10a-b44\"><h3 id=\"ch10a-b45\" class=\"sec\">IInteractableを作ろう<\/h3><p id=\"ch10a-b46\">まず契約書です。<\/p><pre id=\"ch10a-b47\" data-lang=\"plain text\"><code>public interface IInteractable\n{\n    void Interact();\n}<\/code><\/pre><p id=\"ch10a-b48\">これだけです。<\/p><p id=\"ch10a-b49\">読むと、<\/p><blockquote id=\"ch10a-b50\"><code class=\"ic\">Interact()<\/code> を持ってね<\/blockquote><p id=\"ch10a-b51\">という約束が書かれています。<\/p><hr id=\"ch10a-b52\"><h3 id=\"ch10a-b53\" class=\"sec\">宝箱が契約を結ぶ<\/h3><pre id=\"ch10a-b54\" data-lang=\"plain text\"><code>public class TreasureBox\n    : MonoBehaviour,\n      IInteractable\n{\n    public void Interact()\n    {\n        Debug.Log(\n            \"ポーションを手に入れた！\");\n    }\n}<\/code><\/pre><p id=\"ch10a-b55\">宝箱は契約書にサインしました。<\/p><p id=\"ch10a-b56\">そのため <code class=\"ic\">Interact()<\/code> を必ず持ちます。<\/p><blockquote id=\"ch10a-b57\">❗ インターフェースを実装するメソッドには<strong>必ず <\/strong><strong><code class=\"ic\">public<\/code><\/strong><strong> を付けます<\/strong>。付け忘れると「約束を果たしていない」と判定されてコンパイルエラーになります。<\/blockquote><hr id=\"ch10a-b58\"><h3 id=\"ch10a-b59\" class=\"sec\">NPCが契約を結ぶ<\/h3><pre id=\"ch10a-b60\" data-lang=\"plain text\"><code>public class Npc\n    : MonoBehaviour,\n      IInteractable\n{\n    public void Interact()\n    {\n        Debug.Log(\n            \"研究所の地下に気をつけろ\");\n    }\n}<\/code><\/pre><p id=\"ch10a-b61\">同じ契約書です。<\/p><p id=\"ch10a-b62\">でも反応は違います。<\/p><hr id=\"ch10a-b63\"><h3 id=\"ch10a-b64\" class=\"sec\">眠るスライムも契約を結ぶ<\/h3><pre id=\"ch10a-b65\" data-lang=\"plain text\"><code>public class SleepingSlime\n    : MonoBehaviour,\n      IInteractable\n{\n    public void Interact()\n    {\n        Debug.Log(\n            \"Zzz...\");\n    }\n}<\/code><\/pre><p id=\"ch10a-b66\">これで3種類のオブジェクトが同じ契約書を持ちました。<\/p><hr id=\"ch10a-b67\"><h3 id=\"ch10a-b68\" class=\"sec\">なぜ便利なの？<\/h3><p id=\"ch10a-b69\">ここが重要です。<\/p><p id=\"ch10a-b70\">管理側はもう<\/p><pre id=\"ch10a-b71\" data-lang=\"plain text\"><code>宝箱？ NPC？ スライム？<\/code><\/pre><p id=\"ch10a-b72\">を知る必要がありません。<\/p><p id=\"ch10a-b73\">知りたいのはただ一つ。<\/p><blockquote id=\"ch10a-b74\"><strong>調べられる？<\/strong><\/blockquote><p id=\"ch10a-b75\">だけです。<\/p><p id=\"ch10a-b76\">つまり、<strong>種類ではなく約束を見る<\/strong>ようになります。<\/p><p id=\"ch10a-b77\">これは Chapter 9 で学んだポリモーフィズムの考え方をさらに発展させたものです。<\/p><hr id=\"ch10a-b78\"><h3 id=\"ch10a-b79\" class=\"sec\">小さな実験<\/h3><p id=\"ch10a-b80\">試しに<strong>本棚<\/strong>を追加してみましょう。<\/p><pre id=\"ch10a-b81\" data-lang=\"plain text\"><code>public class BookShelf\n    : MonoBehaviour,\n      IInteractable\n{\n    public void Interact()\n    {\n        Debug.Log(\n            \"古い研究日誌がある\");\n    }\n}<\/code><\/pre><h3 id=\"ch10a-b82\" class=\"sec\">管理コードは変更なしです。<\/h3><p id=\"ch10a-b83\">新しい種類なのに、既存システムがそのまま使えます。<\/p><p id=\"ch10a-b84\">これがインターフェースの気持ちよさです。<\/p><hr id=\"ch10a-b85\"><h3 id=\"ch10a-b86\" class=\"sec\">ここまでの整理<\/h3><div id=\"ch10a-b87\" class=\"tblwrap\"><table><tr><th><strong>章<\/strong><\/th><th><strong>学んだこと<\/strong><\/th><th><strong>考え方<\/strong><\/th><\/tr><tr><td>Ch8<\/td><td>継承<\/td><td>同じ仲間だから共通部分を引き継ぐ<\/td><\/tr><tr><td>Ch9<\/td><td>ポリモーフィズム<\/td><td>同じ命令で違う動きをする<\/td><\/tr><tr><td><strong>Ch10<\/strong><\/td><td><strong>インターフェース<\/strong><\/td><td><strong>同じ約束を守る<\/strong><\/td><\/tr><\/table><\/div><hr id=\"ch10a-b88\"><h3 id=\"ch10a-b89\" class=\"sec\">次のセクションでは<\/h3><p id=\"ch10a-b90\">プレイヤーが近づいたときに<\/p><p id=\"ch10a-b91\">自動で調べられる仕組み<\/p><blockquote id=\"ch10a-b92\"><strong>「InteractZone」<\/strong><\/blockquote><p id=\"ch10a-b93\">を作ります。<\/p>"}, {"id": "ch10b", "num": "10B", "name": "InteractZone実装・演出・振り返り", "title": "Chapter 10 Part B InteractZone実装・演出・振り返り", "html": "<blockquote id=\"ch10b-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><hr id=\"ch10b-b1\"><h3 id=\"ch10b-b2\" class=\"sec\">InteractZoneで「調べる」を実装しよう<\/h3><p id=\"ch10b-b3\">ここまでで、宝箱・NPC・眠るスライムが <code class=\"ic\">IInteractable<\/code> という契約書を持つようになりました。<\/p><p id=\"ch10b-b4\">次は、<\/p><pre id=\"ch10b-b5\" data-lang=\"plain text\"><code>プレイヤーが近づく\n  ↓\nEキーを押す\n  ↓\nInteract()実行<\/code><\/pre><p id=\"ch10b-b6\">の仕組みを作ります。<\/p><hr id=\"ch10b-b7\"><h3 id=\"ch10b-b8\" class=\"sec\">InteractZoneとは？<\/h3><p id=\"ch10b-b9\">プレイヤーの周囲に「<strong>調査範囲<\/strong>」を作ります。<\/p><h3 id=\"ch10b-b10\" class=\"sec\">【図解：InteractZoneの親子構造】<\/h3><pre id=\"ch10b-b11\" data-lang=\"plain text\"><code>Player（親）\n├─ CapsuleCollider（非-Trigger）\n└─ InteractZone（子）\n        └─ SphereCollider（Trigger）<\/code><\/pre><p id=\"ch10b-b12\">プレイヤー本体は <strong>ぶつかる用<\/strong> です。<\/p><p id=\"ch10b-b13\">InteractZoneは <strong>調べる用<\/strong> です。<\/p><p id=\"ch10b-b14\">役割を分けています。<\/p><hr id=\"ch10b-b15\"><h3 id=\"ch10b-b16\" class=\"sec\">なぜ自己検知しないの？<\/h3><p id=\"ch10b-b17\">「Triggerが自分自身を見つけてしまわない？」<\/p><p id=\"ch10b-b18\">実は大丈夫です。<\/p><pre id=\"ch10b-b19\" data-lang=\"plain text\"><code>Player\n│\n├─ CapsuleCollider\n│\n└─ InteractZone\n        │\n        └─ SphereCollider（Trigger）<\/code><\/pre><p id=\"ch10b-b20\">ポイントは、Player自身が <code class=\"ic\">IInteractable<\/code> を
