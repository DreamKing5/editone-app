<strong>実装していない<\/strong>ことです。たとえTriggerがPlayerのColliderを検知しても、後述の <code class=\"ic\">GetComponent&lt;IInteractable&gt;()<\/code> が <code class=\"ic\">null<\/code> になり、無視されます。<strong>「契約書チェック」が二重の安全弁<\/strong>になっているのです。<\/p><blockquote id=\"ch10b-b21\">⚠️ シーンの構成によっては、Triggerが自分側のColliderを検知すること自体はありえます。挙動が怪しいときは <code class=\"ic\">Debug.Log(other.name)<\/code> で「誰を検知したか」を確認しましょう。<\/blockquote><p id=\"ch10b-b22\">そのため今回の教材では<strong>レイヤー設定は不要<\/strong>です。<\/p><h3 id=\"ch10b-b23\" class=\"sec\">Triggerが動くための3つの条件<\/h3><ol id=\"ch10b-b24\"><li>検知する側のColliderの <strong>Is Trigger<\/strong> にチェックが入っている<\/li><li><strong>相手側にもCollider<\/strong>が付いている<\/li><li><strong>どちらか一方にRigidbody<\/strong>が付いている（物理で動かさないなら Is Kinematic に✓）<\/li><\/ol><p id=\"ch10b-b25\">「OnTriggerEnterが呼ばれない！」ときは、まずこの3つを確認します。<\/p><hr id=\"ch10b-b26\"><h3 id=\"ch10b-b27\" class=\"sec\">InteractZoneスクリプト<\/h3><p id=\"ch10b-b28\">まずは対象を記憶する変数を作ります。<\/p><pre id=\"ch10b-b29\" data-lang=\"plain text\"><code>public class InteractZone : MonoBehaviour\n{\n    IInteractable target;\n\n    void Update()\n    {\n        if (Input.GetKeyDown(KeyCode.E))\n        {\n            if (target != null)\n            {\n                target.Interact();\n            }\n        }\n    }\n}<\/code><\/pre><p id=\"ch10b-b30\">Eキーを押したとき、契約書を持っている相手なら <code class=\"ic\">Interact()<\/code> を呼びます。<\/p><hr id=\"ch10b-b31\"><h3 id=\"ch10b-b32\" class=\"sec\">対象を見つける<\/h3><p id=\"ch10b-b33\">Triggerに入った相手を記録します。<\/p><p id=\"ch10b-b34\">「GetComponent＋nullチェック」で契約の有無を確認します。<\/p><pre id=\"ch10b-b35\" data-lang=\"plain text\"><code>void OnTriggerEnter(Collider other)\n{\n    // as IInteractable → 契約書を持っていれば参照が入る、なければnull\n    IInteractable interactable =\n        other.GetComponent&lt;IInteractable&gt;();\n\n    if (interactable != null)\n    {\n        target = interactable;\n    }\n}<\/code><\/pre><p id=\"ch10b-b36\"><strong><code class=\"ic\">GetComponent&lt;IInteractable&gt;()<\/code><\/strong><strong> のイメージ：<\/strong><\/p><pre id=\"ch10b-b37\" data-lang=\"plain text\"><code>相手のGameObjectに契約書付きの部品がある？\n  ↓ 契約書あり   → targetに保存する\n  ↓ 契約書なし → null（無視）<\/code><\/pre><p id=\"ch10b-b38\"><strong>コラム：<\/strong><strong><code class=\"ic\">as<\/code><\/strong><strong> キャストとの違い<\/strong><\/p><p id=\"ch10b-b39\">似た道具に <code class=\"ic\">as<\/code> キャスト（<code class=\"ic\">other as IInteractable<\/code>）があります。<code class=\"ic\">as<\/code> は「<strong>その変数自身<\/strong>を別の型として見られるか」を試す道具です（ダメならnull）。今回の <code class=\"ic\">other<\/code> は <strong>Collider型<\/strong>なので、同じGameObjectに付いた<strong>別のコンポーネント<\/strong>から契約書を探せる <code class=\"ic\">GetComponent<\/code> が正解です。<\/p><hr id=\"ch10b-b40\"><h3 id=\"ch10b-b41\" class=\"sec\">Triggerから出たら解除<\/h3><pre id=\"ch10b-b42\" data-lang=\"plain text\"><code>void OnTriggerExit(Collider other)\n{\n    IInteractable interactable =\n        other.GetComponent&lt;IInteractable&gt;();\n\n    // 「今記憶している相手」が出ていったときだけ解除\n    if (interactable != null &amp;&amp; interactable == target)\n    {\n        target = null;\n    }\n}<\/code><\/pre><p id=\"ch10b-b43\">これで離れた相手には反応しなくなります。<\/p><blockquote id=\"ch10b-b44\">⚠️ 単純に <code class=\"ic\">target = null;<\/code> とだけ書くと、宝箱とNPCが<strong>同時に範囲内<\/strong>にいるとき、片方が出ただけでもう片方まで解除されてしまいます。「出ていったのが記憶中の相手か」を確認するのがポイントです。<\/blockquote><hr id=\"ch10b-b45\"><h3 id=\"ch10b-b46\" class=\"sec\">宝箱を調べる<\/h3><pre id=\"ch10b-b47\" data-lang=\"plain text\"><code>public void Interact()\n{\n    Debug.Log(\n        \"ポーションを手に入れた！\");\n}<\/code><\/pre><p id=\"ch10b-b48\">画面表示例<\/p><pre id=\"ch10b-b49\" data-lang=\"plain text\"><code>📦 宝箱\n\nポーションを手に入れた！<\/code><\/pre><hr id=\"ch10b-b50\"><h3 id=\"ch10b-b51\" class=\"sec\">NPCを調べる<\/h3><pre id=\"ch10b-b52\" data-lang=\"plain text\"><code>public void Interact()\n{\n    Debug.Log(\n        \"研究所の地下に気をつけろ\");\n}<\/code><\/pre><p id=\"ch10b-b53\">画面表示例<\/p><pre id=\"ch10b-b54\" data-lang=\"plain text\"><code>🙂 村人\n\n研究所の地下に気をつけろ<\/code><\/pre><hr id=\"ch10b-b55\"><h3 id=\"ch10b-b56\" class=\"sec\">眠るスライムを調べる<\/h3><pre id=\"ch10b-b57\" data-lang=\"plain text\"><code>public void Interact()\n{\n    Debug.Log(\"Zzz...\");\n}<\/code><\/pre><p id=\"ch10b-b58\">画面表示例<\/p><pre id=\"ch10b-b59\" data-lang=\"plain text\"><code>😴 眠るスライム\n\nZzz...<\/code><\/pre><p id=\"ch10b-b60\">同じEキーなのに、相手ごとに違う反応になります。<\/p><p id=\"ch10b-b61\">これが<\/p><blockquote id=\"ch10b-b62\"><strong>契約は同じ、中身は自由<\/strong><\/blockquote><p id=\"ch10b-b63\">というインターフェースの力です。<\/p><hr id=\"ch10b-b64\"><h3 id=\"ch10b-b65\" class=\"sec\">🪵 木箱サプライズ事件<\/h3><p id=\"ch10b-b66\">ここで実験です。<strong>木箱<\/strong>を置いてみましょう。<\/p><pre id=\"ch10b-b67\" data-lang=\"plain text\"><code>public class WoodenCrate\n    : MonoBehaviour\n{\n    // IInteractableは実装していない\n}<\/code><\/pre><p id=\"ch10b-b68\">注意してください。<\/p><p id=\"ch10b-b69\">木箱は <code class=\"ic\">IInteractable<\/code> を実装していません。<\/p><p id=\"ch10b-b70\">つまり「<strong>契約書にサインしていない<\/strong>」。<\/p><p id=\"ch10b-b71\">ゲームを実行して、木箱の前でEキーを押します。<\/p><pre id=\"ch10b-b72\" data-lang=\"plain text\"><code>……\n\n何も起きません。<\/code><\/pre><p id=\"ch10b-b73\">「あれ？」と思いましたか？<\/p><h3 id=\"ch10b-b74\" class=\"sec\">実は正常です。<\/h3><h3 id=\"ch10b-b75\" class=\"sec\">【図解：契約書チェック】<\/h3><pre id=\"ch10b-b76\" data-lang=\"plain text\"><code>宝箱\n  ↓\nIInteractableあり\n  ↓\nInteract()できる\n\n木箱\n  ↓\nIInteractableなし\n  ↓\nInteract()できない<\/code><\/pre><p id=\"ch10b-b77\">つまり、木箱は調査対象として認識されていません。<\/p><blockquote id=\"ch10b-b78\"><strong>契約書にサインしていないと、システムに参加できない。<\/strong><\/blockquote><p id=\"ch10b-b79\">これが分かりました。<\/p><hr id=\"ch10b-b80\"><h3 id=\"ch10b-b81\" class=\"sec\">stringのforeach補足<\/h3><p id=\"ch10b-b82\">文字列もforeachできます。<\/p><h3 id=\"ch10b-b83\" class=\"sec\">【図解：文字列の分解】<\/h3><pre id=\"ch10b-b84\" data-lang=\"plain text\"><code>\"SLIME\"\n\n  ↓ foreach\n\n'S'\n'L'\n'I'\n'M'\n'E'<\/code><\/pre><pre id=\"ch10b-b85\" data-lang=\"plain text\"><code>foreach (char c in text)\n{\n    // 1文字ずつ処理\n}<\/code><\/pre><blockquote id=\"ch10b-b86\"><code class=\"ic\">foreach (char c in text)<\/code> のように 1 文字ずつ取り出せます。<\/blockquote><p id=\"ch10b-b87\">仕組みは難しいので、今は『そういうもの』と思ってOKです。<\/p><hr id=\"ch10b-b88\"><h3 id=\"ch10b-b89\" class=\"sec\">振り返りクイズ<\/h3><p id=\"ch10b-b90\"><strong>Q1.<\/strong> インターフェースを一言で表すと？<\/p><ul id=\"ch10b-b91\"><li>A. 倉庫<\/li><li>B. <strong>契約書<\/strong> ←正解<\/li><li>C. 配列<\/li><li>D. 変数<\/li><\/ul><hr id=\"ch10b-b92\"><p id=\"ch10b-b93\"><strong>Q2.<\/strong> 次のうち、<code class=\"ic\">Interact()<\/code> を呼べるのはどれ？<\/p><ul id=\"ch10b-b94\"><li>A. <strong>IInteractableを実装した宝箱<\/strong> ←正解<\/li><li>B. 普通の木箱<\/li><\/ul><hr id=\"ch10b-b95\"><p id=\"ch10b-b96\"><strong>Q3.<\/strong> 新しく「本棚」を追加しました。<\/p><p id=\"ch10b-b97\"><code class=\"ic\">IInteractable<\/code> を実装していれば、InteractZone側のコードは？<\/p><ul id=\"ch10b-b98\"><li>A. 書き換える<\/li><li>B. <strong>書き換えない<\/strong> ←正解<\/li><\/ul><p id=\"ch10b-b99\">これが<strong>インターフェース最大の強み<\/strong>です。<\/p><hr id=\"ch10b-b100\"><h3 id=\"ch10b-b101\" class=\"sec\">Chapter 11への伏線<\/h3><p id=\"ch10b-b102\">ここまでで、プレイヤーは<\/p><ul id=\"ch10b-b103\"><li>調べる<\/li><li>拾う<\/li><li>戦う<\/li><li>話す<\/li><\/ul><p id=\"ch10b-b104\">ができるようになりました。<\/p><p id=\"ch10b-b105\">しかしゲームが大きくなると、別の問題が現れます。<\/p><pre id=\"ch10b-b106\" data-lang=\"plain text\"><code>どこかで変更したら\n\nまったく関係ない場所まで壊れた<\/code><\/pre><p id=\"ch10b-b107\">という、開発者を震え上がらせる厄介なバグです。<\/p><blockquote id=\"ch10b-b108\">次章では、ゲームが大規模になったときに現れる「見えないつながり」と戦う方法を学びます。<\/blockquote>"}, {"id": "ch11a", "num": "11A", "name": "導入〜イベント登録・解除", "title": "Chapter 11 Part A 導入〜イベント登録・解除", "html": "<hr id=\"ch11a-b0\"><h3 id=\"ch11a-b1\" class=\"sec\">導入ストーリー<\/h3><blockquote id=\"ch11a-b2\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><p id=\"ch11a-b3\">みなさんはこれまで、<\/p><ul id=\"ch11a-b4\"><li>Ch8 継承<\/li><li>Ch9 ポリモーフィズム<\/li><li>Ch10 インターフェース<\/li><\/ul><p id=\"ch11a-b5\">を使ってゲームを作ってきました。<\/p><p id=\"ch11a-b6\">かなり大きなゲームが作れるようになりましたね。<\/p><p id=\"ch11a-b7\">今回の舞台は、ダンジョン最深部。<\/p><p id=\"ch11a-b8\">巨大なボス部屋の前です。<\/p><p id=\"ch11a-b9\">そこにはひとつのボタンがあります。<\/p><pre id=\"ch11a-b10\" data-lang=\"plain text\"><code>┌─────────────┐\n│ 運命の赤ボタン │\n└─────────────┘<\/code><\/pre><p id=\"ch11a-b11\">押したら絶対に何か起きそうです。<\/p><p id=\"ch11a-b12\">実際に押してみましょう。<\/p><p id=\"ch11a-b13\">すると……<\/p><ul id=\"ch11a-b14\"><li>💥 ダイナマイト爆発<\/li><li>🐉 ドラゴン覚醒<\/li><li>📷 カメラ振動<\/li><li>🎵 ボスBGM開始<\/li><\/ul><p id=\"ch11a-b15\">一瞬で世界が変わりました。<\/p><p id=\"ch11a-b16\">でも今日はボス戦ではありません。<\/p><p id=\"ch11a-b17\">もっと恐ろしい敵と戦います。<\/p><p id=\"ch11a-b18\">その敵の名前は……<\/p><h3 id=\"ch11a-b19\" class=\"sec\">依存性の爆発<\/h3><p id=\"ch11a-b20\">です。<\/p><hr id=\"ch11a-b21\"><h3 id=\"ch11a-b22\" class=\"sec\">まずは今までの方法でやってみる（依存地獄）<\/h3><p id=\"ch11a-b23\">まずはイベントを使わずに作ってみましょう。<\/p><p id=\"ch11a-b24\">今まで学んだ知識だけで実装できます。<\/p><pre id=\"ch11a-b25\" data-lang=\"plain text\"><code>public class Switch : MonoBehaviour\n{\n    // 爆発担当\n    public Dynamite dynamite;\n\n    // ドラゴン担当\n    public Dragon dragon;\n\n    // カメラ担当\n    public CameraShaker cameraShaker;\n\n    // BGM担当\n    public SoundManager soundManager;\n\n    public void Press()\n    {\n        dynamite.Explode();\n        dragon.WakeUp();\n        cameraShaker.Shake();\n        soundManager.PlayBossBgm();\n    }\n}<\/code><\/pre><p id=\"ch11a-b26\">ちゃんと動きます。<\/p><p id=\"ch11a-b27\">問題なさそうですね。<\/p><p id=\"ch11a-b28\">しかし数日後。<\/p><p id=\"ch11a-b29\">ゲーム企画会議でこう言われました。<\/p><ul id=\"ch11a-b30\"><li>警報ランプも光らせたい<\/li><li>扉も開きたい<\/li><li>ボスHPバーも表示したい<\/li><li>画面演出も追加したい<\/li><\/ul><p id=\"ch11a-b31\">するとSwitchは……<\/p><pre id=\"ch11a-b32\" data-lang=\"plain text\"><code>public Alarm alarm;\npublic DoorController door;\npublic BossUI bossUI;\npublic LightController lightController;<\/code><\/pre><p id=\"ch11a-b33\">どんどん太っていきます。<\/p><h3 id=\"ch11a-b34\" class=\"sec\">【図解：依存性の爆発】<\/h3><pre id=\"ch11a-b35\" data-lang=\"plain text\"><code>                Dynamite\n                    ↑\nDragon ← Switch → CameraShaker\n                    ↓\n              SoundManager\n                    ↓\n                   Alarm\n                    ↓\n              DoorController\n                    ↓\n                  BossUI\n                    ↓\n             LightController<\/code><\/pre><p id=\"ch11a-b36\">ボタンなのに、世界中のことを知っています。<\/p><p id=\"ch11a-b37\">これは苦しい設計です。<\/p><p id=\"ch11a-b38\">本来ボタンが知るべきことは、たったひとつです。<\/p><blockquote id=\"ch11a-b39\"><strong>「押された」<\/strong><\/blockquote><p id=\"ch11a-b40\">それだけです。<\/p><hr id=\"ch11a-b41\"><h3 id=\"ch11a-b42\" class=\"sec\">Actionで放送局を作る<\/h3><p id=\"ch11a-b43\">ここで新しい考え方を学びます。<\/p><h3 id=\"ch11a-b44\" class=\"sec\">ボタンは命令しません。放送だけします。<\/h3><p id=\"ch11a-b45\">テレビ局を想像してください。<\/p><p id=\"ch11a-b46\">テレビ局は「今からニュースです！」と放送するだけです。<\/p><p id=\"ch11a-b47\">誰が見ているかは知りません。<\/p><p id=\"ch11a-b48\">勝手に視聴者が反応します。<\/p><p id=\"ch11a-b49\">イベントも同じです。<\/p><p id=\"ch11a-b50\">まずは次の1行を書きます。<\/p><pre id=\"ch11a-b51\" data-lang=\"plain text\"><code>using System;<\/code><\/pre><p id=\"ch11a-b52\">そしてSwitchの中に、この変数を追加します。<\/p><pre id=\"ch11a-b53\" data-lang=\"plain text\"><code>public Action OnSwitchPressed;<\/code><\/pre><p id=\"ch11a-b54\"><code class=\"ic\">Action<\/code> は、C#が用意してくれた<strong>中身が空っぽの放送局<\/strong>です。<\/p><blockquote id=\"ch11a-b55\">📝 <strong>Actionの正体<\/strong>：<code class=\"ic\">Action<\/code> は「メソッドを入れられる変数」を作る仕組みで、C#の文法用語では<strong>デリゲート<\/strong>と呼ばれます。今までの変数は「データ」を入れてきましたが、デリゲートは「処理そのもの」を入れられます。面接などで「イベントの仕組みは？」と聞かれたら「デリゲート（Action）を使う」と答えられれば十分です。<\/blockquote><h3 id=\"ch11a-b56\" class=\"sec\">【図解：空の放送局】<\/h3><pre id=\"ch11a-b57\" data-lang=\"plain text\"><code>┌──────────────────┐\n│ OnSwitchPressed  │\n└──────────────────┘\n   まだ誰も登録していない<\/code><\/pre><p id=\"ch11a-b58\">今は何も起きません。<\/p><p id=\"ch11a-b59\">ただの空箱です。<\/p><p id=\"ch11a-b60\">でも次の瞬間、この放送局が大活躍します。<\/p><hr id=\"ch11a-b61\"><h3 id=\"ch11a-b62\" class=\"sec\">+= でリスナー登録する<\/h3><p id=\"ch11a-b63\">まずはダイナマイトを登録しましょう。<\/p><pre id=\"ch11a-b64\" data-lang=\"plain text\"><code>public class Dynamite : MonoBehaviour\n{\n    public Switch switchObject;\n\n    void Start()\n    {\n        // 爆発処理を放送局へ登録\n        switchObject.OnSwitchPressed += Explode;\n    }\n\n    void Explode()\n    {\n        Debug.Log(\"爆発！\");\n    }\n}<\/code><\/pre><p id=\"ch11a-b65\">ここで登場した <code class=\"ic\">+=<\/code> は足し算ではありません。<\/p><p id=\"ch11a-b66\">今回は<strong>「放送を聴く登録」<\/strong>という意味です。<\/p><h3 id=\"ch11a-b67\" class=\"sec\">【図解：放送登録】<\/h3><pre id=\"ch11a-b68\" data-lang=\"plain text\"><code>OnSwitchPressed\n      │\n      ├── Explode\n      ├── WakeUp\n      ├── Shake\n      └── PlayBossBgm<\/code><\/pre><p id=\"ch11a-b69\">するとSwitchは、誰が聴いているか知りません。<\/p><p id=\"ch11a-b70\">それでも放送できます。<\/p><pre id=\"ch11a-b71\" data-lang=\"plain text\"><code>public void Press()\n{\n    // 登録者全員へ放送\n    OnSwitchPressed?.Invoke();\n}<\/code><\/pre><p id=\"ch11a-b72\">これだけです。<\/p><p id=\"ch11a-b73\">ボタンを押すと、登録していた全員が反応します。<\/p><pre id=\"ch11a-b74\" data-lang=\"plain text\"><code>Press()\n ↓\nOnSwitchPressed\n ↓\n💥 爆発\n🐉 覚醒\n📷 揺れる\n🎵 BGM開始<\/code><\/pre><p id=\"ch11a-b75\">Switchは何も知りません。<\/p><p id=\"ch11a-b76\">でも全員が動きます。<\/p><h3 id=\"ch11a-b77\" class=\"sec\">これがイベントシステムの最初の感動です。<\/h3><p id=\"ch11a-b78\"><strong>コラム：<\/strong><strong><code class=\"ic\">?.<\/code><\/strong><strong> は「いるなら呼ぶ」<\/strong><\/p><p id=\"ch11a-b79\"><code class=\"ic\">OnSwitchPressed?.Invoke()<\/code> の <code class=\"ic\">?.<\/code> は <strong>null条件演算子<\/strong> です。<\/p><p id=\"ch11a-b80\">「<code class=\"ic\">OnSwitchPressed<\/code> に誰か登録されていれば <code class=\"ic\">Invoke()<\/code> する。誰も登録していなければ（nullならば）何もしない」という意味です。<\/p><p id=\"ch11a-b81\">これがないと、登録者ゼロの状態でボタンを押した瞬間に <code class=\"ic\">NullReferenceException<\/code> でゲームが止まります。<\/p><blockquote id=\"ch11a-b82\">⚠️ ただし <code class=\"ic\">public Action<\/code> にはまだ危険が残っています。外部のクラスから <code class=\"ic\">switchObject.OnSwitchPressed = null;<\/code> で登録を全消ししたり、勝手に <code class=\"ic\">Invoke()<\/code> できてしまうのです。この事件の顕末と対策（<code class=\"ic\">event<\/code> キーワード）は <strong>Part B<\/strong> で！<\/blockquote><hr id=\"ch11a-b83\"><p id=\"ch11a-b84\"><strong><code class=\"ic\">-=<\/code><\/strong><strong> が必要になる理由<\/strong><\/p><p id=\"ch11a-b85\">登録したら、解除も必要です。<\/p><p id=\"ch11a-b86\">例えばドラゴンが倒されたあと。<\/p><p id=\"ch11a-b87\">もう放送を受け取る必要はありません。<\/p><p id=\"ch11a-b88\">そんなときに使うのが <code class=\"ic\">-=<\/code> です。<\/p><pre id=\"ch11a-b89\" data-lang=\"plain text\"><code>switchObject.OnSwitchPressed -= WakeUp;<\/code><\/pre><p id=\"ch11a-b90\">意味は単純です。<\/p><p id=\"ch11a-b91\">「もう放送を聴かなくていいです」という退会手続きです。<\/p><p id=\"ch11a-b92\">実務では次の書き方をよく使います。<\/p><pre id=\"ch11a-b93\" data-lang=\"plain text\"><code>void OnEnable()\n{\n    // 有効になったら登録\n    switchObject.OnSwitchPressed += WakeUp;\n}\n\nvoid OnDisable()\n{\n    // 無効になったら解除\n    switchObject.OnSwitchPressed -= WakeUp;\n}<\/code><\/pre><h3 id=\"ch11a-b94\" class=\"sec\">【図1：イベント購読と解除の流れ】<\/h3><pre id=\"ch11a-b95\" data-lang=\"plain text\"><code>オブジェクト出現\n      │\n      ▼\n OnEnable()\n      │\n      ▼\n += 登録\n      │\n      ▼\n イベント受信\n      │\n      ▼\n OnDisable()\n      │\n      ▼\n -= 解除\n      │\n      ▼\n もう呼ばれない<\/code><\/pre><p id=\"ch11a-b96\">イベントは「呼んでほしい人のリスト」です。<\/p><p id=\"ch11a-b97\"><code class=\"ic\">OnDisable<\/code> で <code class=\"ic\">-=<\/code> しておくと、<\/p><p id=\"ch11a-b98\">「もう呼ばなくていいよ」と伝えることができます。<\/p><p id=\"ch11a-b99\">今回のゲームでは必須ではありませんが、<\/p><p id=\"ch11a-b100\">実務ではよく使われる安全パターンです。<\/p><blockquote id=\"ch11a-b101\">⚠️ <strong>Inspector設定忘れに注意<\/strong>：<code class=\"ic\">public Switch switchObject;<\/code> はInspectorでのドラッグ＆ドロップが必要です。忘れると <code class=\"ic\">OnEnable()<\/code> の時点で <code class=\"ic\">NullReferenceException<\/code> になります（Chapter 8.5で見た「最も多いnullの正体」の典型例です）。<\/blockquote><hr id=\"ch11a-b102\"><h3 id=\"ch11a-b103\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch11a-b104\"><strong>Q1.<\/strong> イベントへの登録に使う演算子は？<\/p><p id=\"ch11a-b105\">A. <code class=\"ic\">+=<\/code>　B. <code class=\"ic\">-=<\/code>　C. <code class=\"ic\">==<\/code><\/p><p id=\"ch11a-b106\"><strong>Q2.<\/strong> <code class=\"ic\">OnDisable()<\/code> で <code class=\"ic\">-=<\/code> するのはなぜ？<\/p><p id=\"ch11a-b107\">A. メモリを増やすため　B. 消えたオブジェクトが呼ばれ続けるのを防ぐため　C. 実行速度のため<\/p><p id=\"ch11a-b108\"><strong>Q3.<\/strong> Switchは登録者（ダイナマイトやドラゴン）のことを知っている？<\/p><p id=\"ch11a-b109\">A. 全員知っている　B. 知らない（それがイベントの強み）　C. 半分だけ知っている<\/p><p id=\"ch11a-b110\"><strong>解答<\/strong>　Q1 → A　Q2 → B　Q3 → B<\/p><hr id=\"ch11a-b111\"><h3 id=\"ch11a-b112\" class=\"sec\">Part B へつづく<\/h3><p id=\"ch11a-b113\">次はいよいよ、イベント最大の事故が発生します。<\/p><p id=\"ch11a-b114\"><strong>ハッキング事件<\/strong>です。<\/p>"}, {"id": "ch11b", "num": "11B", "name": "ハッキング事件〜eventキーワード〜ミニゲーム完成", "title": "Chapter 11 Part B ハッキング事件〜eventキーワード〜ミニゲーム完成", "html": "<hr id=\"ch11b-b0\"><h3 id=\"ch11b-b1\" class=\"sec\">ハッキング事件発生<\/h3><blockquote id=\"ch11b-b2\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><p id=\"ch11b-b3\">イベントシステムは便利です。<\/p><p id=\"ch11b-b4\">ですが、便利なものには危険もあります。<\/p><p id=\"ch11b-b5\">ある日、研究所のゴブリンがこんなコードを書きました。<\/p><pre id=\"ch11b-b6\" data-lang=\"plain text\"><code>public class GoblinHacker : MonoBehaviour\n{\n    public DynamiteBad dynamite;\n\n    void Update()\n    {\n        if (Input.GetKeyDown(KeyCode.G))\n        {\n            // 勝手に爆発させる\n            dynamite.Explode();\n        }\n    }\n}<\/code><\/pre><p id=\"ch11b-b7\">そして <code class=\"ic\">DynamiteBad<\/code> はこうなっています。<\/p><pre id=\"ch11b-b8\" data-lang=\"plain text\"><code>public class DynamiteBad : MonoBehaviour\n{\n    public void Explode()\n    {\n        Debug.Log(\"爆発！\");\n    }\n}<\/code><\/pre><p id=\"ch11b-b9\">ゲームを実行します。Gキーを押します。すると……<\/p><p id=\"ch11b-b10\">💥 爆発！<\/p><p id=\"ch11b-b11\">爆発しました。しかし、<\/p><ul id=\"ch11b-b12\"><li>🐉 ドラゴン覚醒<\/li><li>📷 カメラ振動<\/li><li>🎵 BGM変更<\/li><\/ul><p id=\"ch11b-b13\">は起きません。<\/p><p id=\"ch11b-b14\">なぜでしょう？<\/p><p id=\"ch11b-b15\">それは、<strong>ゴブリンが「爆発だけ」を直接呼び出した<\/strong>からです。<\/p><p id=\"ch11b-b16\">本来は、<\/p><pre id=\"ch11b-b17\" data-lang=\"plain text\"><code>ボタンが押された\n↓\n放送\n↓\n全員が反応<\/code><\/pre><p id=\"ch11b-b18\">でなければいけません。ところが今は、<\/p><pre id=\"ch11b-b19\" data-lang=\"plain text\"><code>ゴブリン\n↓\n爆発だけ実行<\/code><\/pre><p id=\"ch11b-b20\">できてしまいます。これは危険です。<\/p><hr id=\"ch11b-b21\"><h3 id=\"ch11b-b22\" class=\"sec\">event キーワードで鍵を付ける<\/h3><p id=\"ch11b-b23\">ここで登場するのが <code class=\"ic\">event<\/code> です。<\/p><p id=\"ch11b-b24\">まず Switch を修正します。<\/p><pre id=\"ch11b-b25\" data-lang=\"plain text\"><code>using System;\n\npublic class Switch : MonoBehaviour\n{\n    // 世界に1つの放送局\n    public static event Action OnSwitchPressed;\n\n    public void Press()\n    {\n        // ボタンだけが放送できる\n        OnSwitchPressed?.Invoke();\n    }\n}<\/code><\/pre><p id=\"ch11b-b26\">ポイントはここです。<\/p><pre id=\"ch11b-b27\" data-lang=\"plain text\"><code>public static event Action OnSwitchPressed;<\/code><\/pre><p id=\"ch11b-b28\"><code class=\"ic\">event<\/code> が付くと、外部スクリプトは<\/p><pre id=\"ch11b-b29\" data-lang=\"plain text\"><code>OnSwitchPressed.Invoke();<\/code><\/pre><p id=\"ch11b-b30\">できなくなります。<code class=\"ic\">OnSwitchPressed = null;<\/code> のような登録の全消しもできません。外部に許されるのは <code class=\"ic\">+=<\/code> と <code class=\"ic\">-=<\/code> だけ。つまり、<strong>放送ボタンに鍵が付きます<\/strong>。<\/p><blockquote id=\"ch11b-b31\">📝 <strong>eventの正体<\/strong>：<code class=\"ic\">event<\/code> は新しい型ではなく、デリゲート（Action）に付ける<strong>安全ロック<\/strong>です。「発火と全消しは持ち主だけ、外部は登録・解除のみ」というルールをコンパイラに強制させます。<\/blockquote><p id=\"ch11b-b32\"><strong>コラム：<\/strong><strong><code class=\"ic\">static<\/code><\/strong><strong> とは？<\/strong><\/p><p id=\"ch11b-b33\"><code class=\"ic\">OnSwitchPressed<\/code> に付いた <code class=\"ic\">static<\/code> は、「インスタンスごと」ではなく「<strong>クラスにただ1つ<\/strong>」という意味です。<\/p><p id=\"ch11b-b34\">だから登録側は <code class=\"ic\">switchObject.OnSwitchPressed<\/code> ではなく <code class=\"ic\">Switch.OnSwitchPressed<\/code> と、<strong>クラス名から直接<\/strong>アクセスできます。<\/p><p id=\"ch11b-b35\">「世界に1つの放送局」を表現するのにピッタリの書き方です（ただし多用は禁物。整理術は Chapter 12 で学びます）。<\/p><blockquote id=\"ch11b-b36\">⚠️ <strong>staticイベントの3つの注意点<\/strong><\/blockquote><ol id=\"ch11b-b37\"><li>登録はシーンをまたいでも<strong>消えずに残り続ける<\/strong>（シーン再読み込みで二重登録の原因に）<\/li><li>解除し忘れると、<strong>破棄済みオブジェクトのメソッドが呼ばれてエラー<\/strong>になる<\/li><li>「誰が聴いているか」がコード全体に散らばり、追いにくくなる<\/li><\/ol><p id=\"ch11b-b38\">だからこそ、<code class=\"ic\">OnEnable<\/code> で <code class=\"ic\">+=<\/code>・<code class=\"ic\">OnDisable<\/code> で <code class=\"ic\">-=<\/code> を<strong>必ずワンセット<\/strong>にする習慣が重要です。<\/p><p id=\"ch11b-b39\">さらに Dynamite も修正します。<\/p><pre id=\"ch11b-b40\" data-lang=\"plain text\"><code>using UnityEngine;\n\npublic class DynamiteGood : MonoBehaviour\n{\n    void OnEnable()\n    {\n        // 放送を聴く登録\n        Switch.OnSwitchPressed += Explode;\n    }\n\n    void OnDisable()\n    {\n        // 放送を聴く解除\n        Switch.OnSwitchPressed -= Explode;\n    }\n\n    // ✅ private にした！\n    private void Explode()\n    {\n        Debug.Log(\"爆発！\");\n    }\n}<\/code><\/pre><p id=\"ch11b-b41\">注目してください。<code class=\"ic\">private void Explode()<\/code> です。<\/p><p id=\"ch11b-b42\">もう外部から <code class=\"ic\">dynamite.Explode();<\/code> できません。<\/p><p id=\"ch11b-b43\">ゴブリンが同じコードを書くと……<strong>コンパイルエラー<\/strong>になります。<\/p><p id=\"ch11b-b44\">つまり、<strong>ゴブリン侵入失敗<\/strong>です。<\/p><blockquote id=\"ch11b-b45\">💡 <strong>教材メモ（Copilot推奨・案B採用）<\/strong><\/blockquote><p id=\"ch11b-b46\">本物のコンパイルエラーを出すとUnityがPlay不可になります。<\/p><p id=\"ch11b-b47\">実際には以下のようにコメントで「もし呼べたら」を示すだけで十分です。<\/p><pre id=\"ch11b-b48\" data-lang=\"plain text\"><code>// もし Explode() が public だったら……\n// dynamite.Explode();  ← これができてしまう（危険！）\n\n// private にすることで、外からは呼べなくなる\n// Debug.LogError(\"危険！外部から勝手に書き換えられてしまう！\");<\/code><\/pre><p id=\"ch11b-b49\">「privateにするとなぜ安全なのか」は、このコメントを読むだけで理解できます。<\/p><p id=\"ch11b-b50\">これでイベントシステムは安全になりました。<\/p><hr id=\"ch11b-b51\"><h3 id=\"ch11b-b52\" class=\"sec\">Ch2 の距離チェックを思い出そう<\/h3><p id=\"ch11b-b53\">Chapter 2 では、敵とプレイヤーの当たり判定に <code class=\"ic\">Vector2.Distance()<\/code> を使いました。覚えていますか？（Chapter 8 のスライム追尾でも同じ「距離」の考え方が登場しましたね）<\/p><p id=\"ch11b-b54\">今回も同じ考え方を使います。<\/p><p id=\"ch11b-b55\">Unity には <code class=\"ic\">Physics.OverlapSphere()<\/code> という便利な機能がありますが、今回は使いません。<\/p><p id=\"ch11b-b56\">なぜなら、<strong>今まで学んだ知識だけで作れる<\/strong>からです。<\/p><h3 id=\"ch11b-b57\" class=\"sec\">リストを収集する<\/h3><p id=\"ch11b-b58\">まず調査対象を集めます。<\/p><pre id=\"ch11b-b59\" data-lang=\"plain text\"><code>List&lt;MonoBehaviour&gt; interactables = new List&lt;MonoBehaviour&gt;();\n\nvoid Start()\n{\n    MonoBehaviour[] allObjects = FindObjectsOfType&lt;MonoBehaviour&gt;();\n    foreach (MonoBehaviour obj in allObjects)\n    {\n        // Ch9で学んだ is で「契約書（IInteractable）を持つ相手」だけを集める\n        if (obj is IInteractable)\n        {\n            interactables.Add(obj);\n        }\n    }\n}<\/code><\/pre><p id=\"ch11b-b60\">リストは <code class=\"ic\">Start()<\/code> で1回だけ収集します。<\/p><p id=\"ch11b-b61\">途中で消えたオブジェクトは <code class=\"ic\">if (obj == null) continue;<\/code> で自動的にスキップされるため、安全です。<\/p><blockquote id=\"ch11b-b62\">⚠️ <code class=\"ic\">FindObjectsOfType<\/code> はシーン全体を探す<strong>重い処理<\/strong>です。必ず <code class=\"ic\">Start()<\/code> などで1回だけ呼び、<code class=\"ic\">Update()<\/code> の中では使わないこと。なお新しいUnity（2023.1以降）では <code class=\"ic\">FindObjectsByType&lt;MonoBehaviour&gt;(FindObjectsSortMode.None)<\/code> と書くのが推奨です（古い書き方でも当面は動きます）。<\/blockquote><h3 id=\"ch11b-b63\" class=\"sec\">距離チェック関数<\/h3><pre id=\"ch11b-b64\" data-lang=\"plain text\"><code>bool IsNearAnyObject(Vector3 playerPos, float range)\n{\n    foreach (var obj in interactables)\n    {\n        if (obj == null) continue;\n\n        float dist = Vector3.Distance(playerPos, obj.transform.position);\n\n        if (dist &lt; range)\n        {\n            return true;\n        }\n    }\n    return false;\n}<\/code><\/pre><p id=\"ch11b-b65\">やっていることは Chapter 2 の当たり判定や Chapter 8 のスライム追跡と同じです。<\/p><pre id=\"ch11b-b66\" data-lang=\"plain text\"><code>距離を測る\n↓\n近い？\n↓\nYES なら反応<\/code><\/pre><hr id=\"ch11b-b67\"><h3 id=\"ch11b-b68\" class=\"sec\">【注意コラム】Rigidbody を使う場合<\/h3><p id=\"ch11b-b69\">今回の <code class=\"ic\">transform.position<\/code> を使った「はじき演出」は、<strong>Rigidbody を使わない前提<\/strong>で動作します。<\/p><p id=\"ch11b-b70\">Rigidbody を使う場合は、Inspector で <strong>Is Kinematic = true<\/strong> に設定してください。<\/p><p id=\"ch11b-b71\">物理演算と直接移動がぶつかることがあります。<\/p><hr id=\"ch11b-b72\"><h3 id=\"ch11b-b73\" class=\"sec\">図2：はじき演出の Transform 操作<\/h3><pre id=\"ch11b-b74\" data-lang=\"plain text\"><code>   木箱\n    □\n\n    ↑\n    │\n\n  Player\n\n    ↓\nはじかれる<\/code><\/pre><pre id=\"ch11b-b75\" data-lang=\"plain text\"><code>Vector3 back = (playerPos - cratePos).normalized;\ntransform.position += back * 0.5f;<\/code><\/pre><p id=\"ch11b-b76\">近づきすぎたら、少しだけ後ろへ下がります。<\/p><hr id=\"ch11b-b77\"><h3 id=\"ch11b-b78\" class=\"sec\">図3：距離チェックのイメージ<\/h3><pre id=\"ch11b-b79\" data-lang=\"plain text\"><code>          NPC\n           ●\n\n    ┌───────────┐\n    │           │\n    │     P     │\n    │           │\n    └───────────┘\n\n宝箱 ●\n\n                      スライム ●\n\n                  岩 ▲<\/code><\/pre><div id=\"ch11b-b80\" class=\"tblwrap\"><table><tr><th><strong>オブジェクト<\/strong><\/th><th><strong>判定<\/strong><\/th><\/tr><tr><td>NPC<\/td><td>✅ 検知<\/td><\/tr><tr><td>宝箱<\/td><td>✅ 検知<\/td><\/tr><tr><td>スライム<\/td><td>✅ 検知<\/td><\/tr><tr><td>岩（IInteractable なし）<\/td><td>❌ 無反応<\/td><\/tr><\/table><\/div><hr id=\"ch11b-b81\"><h3 id=\"ch11b-b82\" class=\"sec\">ミニゲーム完成コード<\/h3><h3 id=\"ch11b-b83\" class=\"sec\">Switch.cs<\/h3><pre id=\"ch11b-b84\" data-lang=\"plain text\"><code>using System;\nusing UnityEngine;\n\npublic class Switch : MonoBehaviour\n{\n    // 赤ボタン放送局\n    public static event Action OnSwitchPressed;\n\n    public void Press()\n    {\n        // 全員へ放送\n        OnSwitchPressed?.Invoke();\n    }\n}<\/code><\/pre><h3 id=\"ch11b-b85\" class=\"sec\">Dynamite.cs<\/h3><pre id=\"ch11b-b86\" data-lang=\"plain text\"><code>using UnityEngine;\n\npublic class Dynamite : MonoBehaviour\n{\n    void OnEnable()  { Switch.OnSwitchPressed += Explode; }\n    void OnDisable() { Switch.OnSwitchPressed -= Explode; }\n\n    private void Explode()\n    {\n        Debug.Log(\"💥 爆発！\");\n    }\n}<\/code><\/pre><h3 id=\"ch11b-b87\" class=\"sec\">Dragon.cs<\/h3><pre id=\"ch11b-b88\" data-lang=\"plain text\"><code>using UnityEngine;\n\npublic class Dragon : MonoBehaviour\n{\n    void OnEnable()  { Switch.OnSwitchPressed += WakeUp; }\n    void OnDisable() { Switch.OnSwitchPressed -= WakeUp; }\n\n    private void WakeUp()\n    {\n        Debug.Log(\"🐉 目覚めた！\");\n    }\n}<\/code><\/pre><h3 id=\"ch11b-b89\" class=\"sec\">CameraShaker.cs<\/h3><pre id=\"ch11b-b90\" data-lang=\"plain text\"><code>using UnityEngine;\n\npublic class CameraShaker : MonoBehaviour\n{\n    void OnEnable()  { Switch.OnSwitchPressed += Shake; }\n    void OnDisable() { Switch.OnSwitchPressed -= Shake; }\n\n    private void Shake()\n    {\n        Debug.Log(\"📷 カメラが揺れた！\");\n    }\n}<\/code><\/pre><h3 id=\"ch11b-b91\" class=\"sec\">SoundManager.cs<\/h3><pre id=\"ch11b-b92\" data-lang=\"plain text\"><code>using UnityEngine;\n\npublic class SoundManager : MonoBehaviour\n{\n    void OnEnable()  { Switch.OnSwitchPressed += PlayBossBgm; }\n    void OnDisable() { Switch.OnSwitchPressed -= PlayBossBgm; }\n\n    private void PlayBossBgm()\n    {\n        Debug.Log(\"🎵 ボスBGM開始！\");\n    }\n}<\/code><\/pre><hr id=\"ch11b-b93\"><h3 id=\"ch11b-b94\" class=\"sec\">まとめ<\/h3><p id=\"ch11b-b95\">今日学んだことは、単なる文法ではありません。<\/p><h3 id=\"ch11b-b96\" class=\"sec\">イベントシステムとは、誰が反応するか知らなくても放送できる仕組みです。<\/h3><p id=\"ch11b-b97\">Switch はドラゴンも、ダイナマイトも、カメラも、BGM も知りません。<\/p><p id=\"ch11b-b98\">それでも全員が動きます。<\/p><p id=\"ch11b-b99\">これが<\/p><pre id=\"ch11b-b100\" data-lang=\"plain text\"><code>依存性の爆発\n↓\nイベントによる解決<\/code><\/pre><p id=\"ch11b-b101\">です。<\/p><hr id=\"ch11b-b102\"><h3 id=\"ch11b-b103\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch11b-b104\"><strong>Q1.<\/strong> <code class=\"ic\">event<\/code> を付けると外部スクリプトからできなくなるのは？<\/p><p id=\"ch11b-b105\">A. <code class=\"ic\">+=<\/code> による登録　B. <code class=\"ic\">-=<\/code> による解除　C. <code class=\"ic\">Invoke()<\/code> による直接発火<\/p><p id=\"ch11b-b106\"><strong>Q2.<\/strong> <code class=\"ic\">Explode()<\/code> を <code class=\"ic\">private<\/code> にする目的は？<\/p><p id=\"ch11b-b107\">A. 高速化　B. 外部からの直接呼び出しを防ぐ　C. メモリ節約<\/p><p id=\"ch11b-b108\"><strong>Q3.<\/strong> イベント設計で Switch が知っている必要があるのは？<\/p><p id=\"ch11b-b109\">A. 全登録者の中身　B. 「押された」という事実だけ　C. 各機能の実装<\/p><p id=\"ch11b-b110\"><strong>解答<\/strong>　Q1 → C　Q2 → B　Q3 → B<\/p><hr id=\"ch11b-b111\"><h3 id=\"ch11b-b112\" class=\"sec\">次章への予告<\/h3><p id=\"ch11b-b113\">イベントのおかげで、オブジェクト同士の結びつきは大幅に減りました。<\/p><p id=\"ch11b-b114\">しかし次は、さらに大きなゲームで発生する問題に挑戦します。<\/p><p id=\"ch11b-b115\"><strong>Chapter 12<\/strong> では、<\/p><p id=\"ch11b-b116\">「複数のイベントが絡み合ったときに起こる追跡困難なバグ」と、<\/p><p id=\"ch11b-b117\">それを整理するための仕組み――<strong>GameManagerと状態管理<\/strong>を学びます。<\/p>"}, {"id": "ch12", "num": "12", "name": "ゲームの心臓：GameManagerと状態管理", "title": "Chapter 12 ゲームの心臓：GameManagerと状態管理", "html": "<blockquote id=\"ch12-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 新規追加章（v1.1・Ch11末尾の予告を回収）<\/blockquote><hr id=\"ch12-b1\"><div id=\"ch12-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>ボス部屋の奥で<\/strong>：赤ボタンの事件は解決しました。しかしゲームが大きくなった今、新たな怪現象が――「ゲームオーバーなのに敵が動き続ける」「タイトル画面なのにBGMが2重に鳴る」……<\/p><\/div><\/div><h3 id=\"ch12-b3\" class=\"sec\">この章で学ぶこと<\/h3><p id=\"ch12-b4\">Chapter 11の予告どおり、<strong>複数のイベントが絡み合ったときに起こる追跡困難なバグ<\/strong>と戦います。<\/p><p id=\"ch12-b5\">原因はたいてい同じです。<\/p><blockquote id=\"ch12-b6\">「今ゲームがどんな状態なのか」を、誰も一元管理していない<\/blockquote><p id=\"ch12-b7\">そこで登場するのが <strong>GameManager<\/strong> と <strong>状態管理<\/strong> です。<\/p><hr id=\"ch12-b8\"><h3 id=\"ch12-b9\" class=\"sec\">enumでゲームの状態を定義する<\/h3><p id=\"ch12-b10\">Chapter 6.5で学んだenumの出番です。<\/p><pre id=\"ch12-b11\" data-lang=\"plain text\"><code>public enum GameState\n{\n    Title,     // タイトル画面\n    Playing,   // プレイ中\n    GameOver,  // ゲームオーバー\n    Clear      // クリア（Chapter 13の卒業制作で使用）\n}<\/code><\/pre><p id=\"ch12-b12\">ゲーム全体は、常にこの<strong>どれか1つ<\/strong>の状態にあります。<\/p><pre id=\"ch12-b13\" data-lang=\"plain text\"><code>Title ──(スタート)──→ Playing ──(HP0)──→ GameOver\n  ↑                       │                    │\n  │                       └──(出口到達)──→ Clear\n  └───────────(リトライ)────────────────┘<\/code><\/pre><hr id=\"ch12-b14\"><h3 id=\"ch12-b15\" class=\"sec\">GameManager ―― 状態の一元管理人<\/h3><pre id=\"ch12-b16\" data-lang=\"plain text\"><code>using System;\nusing UnityEngine;\n\npublic class GameManager : MonoBehaviour\n{\n    // 世界に1つだけのGameManager（シングルトン）\n    public static GameManager Instance { get; private set; }\n\n    public GameState State { get; private set; } = GameState.Title;\n\n    // 状態が変わったことを放送するイベント（Ch11の技術！）\n    public static event Action&lt;GameState&gt; OnStateChanged;\n\n    void Awake()\n    {\n        // すでに存在していたら自分を消す（1つだけを保証）\n        if (Instance != null) { Destroy(gameObject); return; }\n        Instance = this;\n    }\n\n    public void ChangeState(GameState newState)\n    {\n        // 同じ状態への二重遷移を防ぐ（BGM二重再生などの予防）\n        if (State == newState) { return; }\n\n        State = newState;\n        OnStateChanged?.Invoke(newState);  // 全員に放送\n    }\n}<\/code><\/pre><blockquote id=\"ch12-b17\">💡 <code class=\"ic\">Action&lt;GameState&gt;<\/code> のように <code class=\"ic\">&lt;&gt;<\/code> を付けると、放送と一緒に<strong>データ（今の状態）<\/strong>も届けられます。<br>⚠️ <code class=\"ic\">OnStateChanged<\/code> は <strong>staticイベント<\/strong>です。Chapter 11 Part Bで学んだとおり、受信側は <code class=\"ic\">OnEnable<\/code> で <code class=\"ic\">+=<\/code>・<code class=\"ic\">OnDisable<\/code> で <code class=\"ic\">-=<\/code> を必ずワンセットにしましょう。<\/blockquote><h3 id=\"ch12-b18\" class=\"sec\">シングルトンの光と影<\/h3><div id=\"ch12-b19\" class=\"tblwrap\"><table><tr><th><strong>メリット<\/strong><\/th><th><strong>デメリット<\/strong><\/th><\/tr><tr><td>どこからでも <code class=\"ic\">GameManager.Instance<\/code> でアクセスできる<\/td><td>どこからでも触れる＝依存が見えにくくなる<\/td><\/tr><tr><td>「世界に1つ」をコードで保証できる<\/td><td>多用すると「なんでも屋クラス」に肥大化しがち<\/td><\/tr><tr><td>状態の一元管理に最適<\/td><td>テストや再利用がしにくくなる<\/td><\/tr><\/table><\/div><p id=\"ch12-b20\">「ゲーム全体の状態」のように<strong>本当に世界に1つであるべきものだけ<\/strong>に使うのが鉄則です。<\/p><blockquote id=\"ch12-b21\">📝 シーンをまたいでGameManagerを生かし続けたい場合は、<code class=\"ic\">Awake()<\/code> で <code class=\"ic\">DontDestroyOnLoad(gameObject);<\/code> を呼びます。卒業制作（1シーン構成）では不要です。<\/blockquote><hr id=\"ch12-b22\"><h3 id=\"ch12-b23\" class=\"sec\">switchで状態ごとの処理を書く<\/h3><p id=\"ch12-b24\">各オブジェクトは「自分の状態別の動き」をswitchで整理できます。<\/p><pre id=\"ch12-b25\" data-lang=\"plain text\"><code>void Update()\n{\n    switch (GameManager.Instance.State)\n    {\n        case GameState.Playing:\n            MoveEnemy();       // プレイ中だけ動く\n            break;\n\n        case GameState.GameOver:\n            // 何もしない（もう動かない）\n            break;\n    }\n}<\/code><\/pre><p id=\"ch12-b26\">「ゲームオーバーなのに敵が動く」バグは、これで根絶できます。<\/p><hr id=\"ch12-b27\"><h3 id=\"ch12-b28\" class=\"sec\">イベント×状態管理の合わせ技<\/h3><pre id=\"ch12-b29\" data-lang=\"plain text\"><code>public class BgmPlayer : MonoBehaviour\n{\n    void OnEnable()  { GameManager.OnStateChanged += HandleStateChanged; }\n    void OnDisable() { GameManager.OnStateChanged -= HandleStateChanged; }\n\n    void HandleStateChanged(GameState state)\n    {\n        if (state == GameState.GameOver)\n        {\n            Debug.Log(\"🎵 ゲームオーバーBGMへ切り替え\");\n        }\n    }\n}<\/code><\/pre><p id=\"ch12-b30\">GameManagerはBGMのことを知りません。それでも全員が正しく反応します。Chapter 11で学んだ「放送局」の考え方が、ここで真価を発揮します。<\/p><hr id=\"ch12-b31\"><h3 id=\"ch12-b32\" class=\"sec\">改造セッション 🔧<\/h3><ol id=\"ch12-b33\"><li><code class=\"ic\">GameState<\/code> に <code class=\"ic\">Paused<\/code>（一時停止）を追加し、Escキーで Playing ↔ Paused を切り替えてみよう<\/li><li>状態が変わるたびに <code class=\"ic\">Debug.Log<\/code> で遷移を記録してみよう（バグ追跡の基本！）<\/li><li>GameOver中にRキーで Title に戻る「リトライ機能」を作ってみよう<\/li><\/ol><hr id=\"ch12-b34\"><h3 id=\"ch12-b35\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch12-b36\"><strong>Q1.<\/strong> 「ゲームオーバーなのに敵が動く」バグの根本原因は？<\/p><p id=\"ch12-b37\">A. Unityのバグ　B. ゲームの状態を一元管理していない　C. メモリ不足<\/p><p id=\"ch12-b38\"><strong>Q2.<\/strong> シングルトン（<code class=\"ic\">Instance<\/code>）の目的は？<\/p><p id=\"ch12-b39\">A. 実行速度アップ　B. GameManagerを世界に1つだけにする　C. 見た目を良くする<\/p><p id=\"ch12-b40\"><strong>Q3.<\/strong> 状態ごとの分岐に適した構文は？<\/p><p id=\"ch12-b41\">A. while　B. switch　C. try-catch<\/p><p id=\"ch12-b42\"><strong>解答<\/strong>　Q1 → B　Q2 → B　Q3 → B<\/p><hr id=\"ch12-b43\"><h3 id=\"ch12-b44\" class=\"sec\">次章へのフック<\/h3><p id=\"ch12-b45\">文法の武器はすべて揃いました。最終章（<strong>Chapter 13<\/strong>）では、これまでの技術を<strong>総動員<\/strong>して1本のゲームを完成させます。卒業制作の始まりです。<\/p>"}, {"id": "ch13", "num": "13", "name": "卒業制作：ダンジョン脱出――全技術総動員＋Unity実践", "title": "Chapter 13 卒業制作：ダンジョン脱出――全技術総動員＋Unity実践", "html": "<blockquote id=\"ch13-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 新規追加章（v1.1・最終章）<\/blockquote><hr id=\"ch13-b1\"><div id=\"ch13-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>卒業試験<\/strong>：教官は告げました。「ダンジョンから脱出せよ。使っていいのは、お前がこの訓練所で学んだすべてだ」<\/p><\/div><\/div><h3 id=\"ch13-b3\" class=\"sec\">作るもの：ミニゲーム「ダンジョン脱出」<\/h3><pre id=\"ch13-b4\" data-lang=\"plain text\"><code>┌──────────────────────┐\n│ 🟡P   🟢スライム×N       │\n│                      │\n│ 📦宝箱  🙂NPC  🔴ボタン  │\n│                🚪出口 │\n└──────────────────────┘<\/code><\/pre><h3 id=\"ch13-b5\" class=\"sec\">仕様（どの章の技術を使うかも書いてあります）<\/h3><ul id=\"ch13-b6\"><li class='todoitem'><span class=\"todo \"><\/span>プレイヤーを矢印キーで移動（Ch1：変数・入力）<\/li><li class='todoitem'><span class=\"todo \"><\/span>スライムが追いかけてくる。接触でHP減少（Ch2：if・距離判定）<\/li><li class='todoitem'><span class=\"todo \"><\/span>スライムは <code class=\"ic\">List&lt;Slime&gt;<\/code> で管理し、時間経過で増える（Ch6：List）<\/li><li class='todoitem'><span class=\"todo \"><\/span>スライムは3種類。同じ <code class=\"ic\">Move()<\/code> で違う動き（Ch8〜9：継承・ポリモーフィズム）<\/li><li class='todoitem'><span class=\"todo \"><\/span>宝箱・NPCはEキーで調べられる（Ch10：インターフェース）<\/li><li class='todoitem'><span class=\"todo \"><\/span>赤ボタンを押すと出口が開き、演出が一斉に発動（Ch11：イベント）<\/li><li class='todoitem'><span class=\"todo \"><\/span>Title / Playing / GameOver / Clear をGameManagerで管理（Ch12：状態管理。<code class=\"ic\">Clear<\/code> はCh12のenumに定義済み）<\/li><li class='todoitem'><span class=\"todo \"><\/span>HPやスコアはクラス＋プロパティで設計（Ch7〜7.5：クラス・コンストラクタ）<\/li><\/ul><hr id=\"ch13-b7\"><h3 id=\"ch13-b8\" class=\"sec\">まずは設計図 ―― ファイル一覧と実装順<\/h3><p id=\"ch13-b9\">いきなり書き始めず、全体の部品を把握してから作りましょう。<\/p><div id=\"ch13-b10\" class=\"tblwrap\"><table><tr><th><strong>ファイル<\/strong><\/th><th><strong>種類<\/strong><\/th><th><strong>役割<\/strong><\/th><th><strong>使う章<\/strong><\/th><\/tr><tr><td><code class=\"ic\">GameManager.cs<\/code><\/td><td>MonoBehaviour<\/td><td>状態管理・シングルトン<\/td><td>Ch12<\/td><\/tr><tr><td><code class=\"ic\">PlayerController.cs<\/code><\/td><td>MonoBehaviour<\/td><td>移動・HP管理<\/td><td>Ch1〜2、7.5<\/td><\/tr><tr><td><code class=\"ic\">Slime.cs<\/code>（＋子クラス）<\/td><td>純粋C#クラス<\/td><td>敵のロジック（3種の動き）<\/td><td>Ch8〜9<\/td><\/tr><tr><td><code class=\"ic\">SlimeSpawner.cs<\/code><\/td><td>MonoBehaviour<\/td><td>Prefab生成・List管理・コルーチン<\/td><td>Ch6・13<\/td><\/tr><tr><td><code class=\"ic\">IInteractable.cs<\/code><\/td><td>インターフェース<\/td><td>「調べられる」契約書<\/td><td>Ch10<\/td><\/tr><tr><td><code class=\"ic\">TreasureBox.cs<\/code> / <code class=\"ic\">Npc.cs<\/code><\/td><td>MonoBehaviour<\/td><td>Eキーで調べられる対象<\/td><td>Ch10<\/td><\/tr><tr><td><code class=\"ic\">ExitSwitch.cs<\/code><\/td><td>MonoBehaviour<\/td><td>赤ボタン。staticイベントで放送<\/td><td>Ch11<\/td><\/tr><tr><td><code class=\"ic\">ExitDoor.cs<\/code><\/td><td>MonoBehaviour<\/td><td>放送を受けて開く。到達でClearへ<\/td><td>Ch11〜12<\/td><\/tr><\/table><\/div><h3 id=\"ch13-b11\" class=\"sec\">おすすめ実装順<\/h3><ol id=\"ch13-b12\"><li><code class=\"ic\">PlayerController<\/code>（まず移動だけ）<\/li><li><code class=\"ic\">Slime<\/code>＋<code class=\"ic\">SlimeSpawner<\/code>（1種類・手動配置から）<\/li><li><code class=\"ic\">IInteractable<\/code>＋宝箱・NPC<\/li><li><code class=\"ic\">ExitSwitch<\/code>＋<code class=\"ic\">ExitDoor<\/code>（イベント接続）<\/li><li><code class=\"ic\">GameManager<\/code>（状態で全体を制御）<\/li><li>仕上げ（スライム3種化・スコア・演出）<\/li><\/ol><hr id=\"ch13-b13\"><h3 id=\"ch13-b14\" class=\"sec\">Unity実践①：Prefab ―― キャラクターの「金型」<\/h3><p id=\"ch13-b15\">スライムを増やすたびに手作業でオブジェクトを作るのは大変です。<\/p><p id=\"ch13-b16\"><strong>Prefab（プレハブ）<\/strong>はオブジェクトの「金型」。HierarchyのオブジェクトをProjectウィンドウへドラッグすると作れます。<\/p><hr id=\"ch13-b17\"><h3 id=\"ch13-b18\" class=\"sec\">Unity実践②：Instantiate / Destroy ―― 生成と破壊<\/h3><pre id=\"ch13-b19\" data-lang=\"plain text\"><code>public GameObject slimePrefab;  // InspectorでPrefabをセット\n\nvoid SpawnSlime()\n{\n    // 金型から実体を生成（クラスのnewと同じ発想！）\n    GameObject slime = Instantiate(slimePrefab, new Vector3(0, 0, 0), Quaternion.identity);\n}\n\nvoid KillSlime(GameObject slime)\n{\n    Destroy(slime);  // 破壊\n}<\/code><\/pre><blockquote id=\"ch13-b20\"><code class=\"ic\">new Weapon()<\/code> がクラスのインスタンス生成なら、<code class=\"ic\">Instantiate()<\/code> はゲームオブジェクトのインスタンス生成です。Chapter 7の知識がそのまま活きます。<\/blockquote><hr id=\"ch13-b21\"><h3 id=\"ch13-b22\" class=\"sec\">Unity実践③：Time.deltaTimeの復習<\/h3><p id=\"ch13-b23\">移動には必ず <code class=\"ic\">Time.deltaTime<\/code> を掛けましょう（Ch8のコラム参照）。<\/p><pre id=\"ch13-b24\" data-lang=\"plain text\"><code>x += speed * Time.deltaTime;  // どのPCでも同じ速さ<\/code><\/pre><hr id=\"ch13-b25\"><h3 id=\"ch13-b26\" class=\"sec\">Unity実践④：コルーチン ―― 「少し待ってから」を作る<\/h3><p id=\"ch13-b27\">「3秒後にスライムを追加」のような時間差処理は<strong>コルーチン<\/strong>で書けます。<\/p><pre id=\"ch13-b28\" data-lang=\"plain text\"><code>using System.Collections;\n\nIEnumerator SpawnLoop()\n{\n    // Ch3コラムのwhileが実戦投入！（Playingの間だけ回る）\n    while (GameManager.Instance.State == GameState.Playing)\n    {\n        yield return new WaitForSeconds(3f);  // 3秒待つ\n        SpawnSlime();\n    }\n}\n\nvoid Start()\n{\n    StartCoroutine(SpawnLoop());\n}<\/code><\/pre><p id=\"ch13-b29\"><code class=\"ic\">yield return<\/code> は「ここで一時停止して、時間が来たら続きから再開」という意味です。細かい仕組みは今は分からなくてOK。「時間差はコルーチン」と覚えましょう。<\/p><blockquote id=\"ch13-b30\">⚠️ コルーチンのループを <code class=\"ic\">while (true)<\/code> で書くと、ゲームオーバー後もスライムが湧き続けます。<strong>ループには必ず「止まる条件」を<\/strong>。ここではCh12のGameManagerと連携し、Playing中だけ動くようにしています。<\/blockquote><hr id=\"ch13-b31\"><h3 id=\"ch13-b32\" class=\"sec\">進め方のおすすめ<\/h3><ol id=\"ch13-b33\"><li>まずCh1〜2のコードを流用してプレイヤーとスライム1体を動かす<\/li><li>スライムをPrefab化し、コルーチンで自動スポーン<\/li><li>宝箱・ボタン・出口を追加し、イベントで演出をつなぐ<\/li><li>最後にGameManagerで状態を整理する<\/li><\/ol><blockquote id=\"ch13-b34\">❗ 一気に作らないこと。<strong>1機能作るたびにPlayして確認<\/strong>が鉄則です。<\/blockquote><hr id=\"ch13-b35\"><h3 id=\"ch13-b36\" class=\"sec\">発展課題（卒業後の冒険）<\/h3><ul id=\"ch13-b37\"><li>スコアランキングを <code class=\"ic\">List<\/code>＋ソートで実装<\/li><li>アイテム図鑑（Ch6.5のDictionary）でドロップアイテム管理<\/li><li>新しい敵を「管理コードを1文字も変えずに」追加できるか試す（できたらポリモーフィズム免許皆伝！）<\/li><\/ul><hr id=\"ch13-b38\"><h3 id=\"ch13-b39\" class=\"sec\">卒業おめでとう 🎉<\/h3><p id=\"ch13-b40\">ここまでで、C#の基本文法（変数・分岐・ループ・配列・List・メソッド・クラス）とオブジェクト指向（継承・ポリモーフィズム・インターフェース・イベント・状態管理）が一通り手に入りました。<\/p><p id=\"ch13-b41\">次に読むべきは、Unity公式チュートリアルや、物理エンジン（Rigidbody）・UI（Canvas）の各論です。<strong>あなたはもう「読める」はずです。<\/strong><\/p>"}], "refs": [{"id": "ref01", "title": "第1章：型・変数・定数", "html": "<blockquote id=\"ref01-b0\">📚 対応教科書章：Ch1（変数・型）/ Ch7（クラス）/ Ch8.5（参照型・null）<\/blockquote><hr id=\"ref01-b1\"><h3 id=\"ref01-b2\">1-1　変数の宣言と初期化<\/h3><p id=\"ref01-b3\">変数は「<strong>型 変数名 = 初期値;<\/strong>」の形で宣言します。<\/p><pre id=\"ref01-b4\" data-lang=\"plain text\"><code>int    hp     = 100;       // 整数\nfloat  speed  = 5.5f;      // 小数（末尾 f 必須）\ndouble pi     = 3.14159;   // 高精度小数（Unity では float が主流）\nbool   isAlive = true;     // 真偽値\nstring name   = \"勇者\";    // 文字列\nchar   grade  = 'A';       // 1文字<\/code><\/pre><blockquote id=\"ref01-b5\">⚠️ <code class=\"ic\">float<\/code> リテラルには必ず <code class=\"ic\">f<\/code> を付ける。付けないと <code class=\"ic\">double<\/code> として解釈されコンパイルエラーになる。<\/blockquote><hr id=\"ref01-b6\"><h3 id=\"ref01-b7\">1-2　値型と参照型<\/h3><div id=\"ref01-b8\" class=\"tblwrap\"><table><tr><th><strong>分類<\/strong><\/th><th><strong>代表的な型<\/strong><\/th><th><strong>コピーの挙動<\/strong><\/th><th><strong>メモリ<\/strong><\/th><\/tr><tr><td>値型<\/td><td><code class=\"ic\">int<\/code> <code class=\"ic\">float<\/code> <code class=\"ic\">bool<\/code> <code class=\"ic\">char<\/code> <code class=\"ic\">struct<\/code> <code class=\"ic\">enum<\/code><\/td><td>値そのものがコピーされる<\/td><td>スタック<\/td><\/tr><tr><td>参照型<\/td><td><code class=\"ic\">string<\/code> <code class=\"ic\">class<\/code> <code class=\"ic\">配列<\/code> <code class=\"ic\">interface<\/code><\/td><td>参照（アドレス）がコピーされる<\/td><td>ヒープ<\/td><\/tr><\/table><\/div><pre id=\"ref01-b9\" data-lang=\"plain text\"><code>// 値型の例\nint a = 10;\nint b = a;   // b は a の「コピー」\nb = 99;      // a は 10 のまま\n\n// 参照型の例\nint[] arr1 = { 1, 2, 3 };\nint[] arr2 = arr1;   // arr2 は arr1 と「同じ配列を指す」\narr2[0] = 99;        // arr1[0] も 99 になる！<\/code><\/pre><blockquote id=\"ref01-b10\">💡 <code class=\"ic\">string<\/code> は参照型だが、変更時には新しいオブジェクトが生成される（不変性）。そのため値型と似た挙動に見える。<\/blockquote><hr id=\"ref01-b11\"><h3 id=\"ref01-b12\">1-3　型推論 <code class=\"ic\">var<\/code><\/h3><p id=\"ref01-b13\">右辺の型が明確な場合、<code class=\"ic\">var<\/code> で型を省略できます。<\/p><pre id=\"ref01-b14\" data-lang=\"plain text\"><code>var count = 0;          // int として推論\nvar name  = \"勇者\";     // string として推論\nvar items = new List&lt;string&gt;();  // List&lt;string&gt; として推論<\/code><\/pre><blockquote id=\"ref01-b15\">⚠️ <code class=\"ic\">var<\/code> はローカル変数のみ。フィールドや引数には使えない。型が自明なときだけ使い、読みにくくなる場合は避ける。<\/blockquote><hr id=\"ref01-b16\"><h3 id=\"ref01-b17\">1-4　定数 <code class=\"ic\">const<\/code> と <code class=\"ic\">readonly<\/code><\/h3><pre id=\"ref01-b18\" data-lang=\"plain text\"><code>// const：コンパイル時定数。メソッド内・クラス内どちらでも使える\nconst float GRAVITY = 9.8f;\nconst int MAX_HP    = 100;\n\n// readonly：実行時定数。クラスのフィールドにのみ使える\n// コンストラクタで1度だけ代入可能\npublic class Config\n{\n    public readonly int maxLevel;\n    public Config(int level) { maxLevel = level; }\n}<\/code><\/pre><div id=\"ref01-b19\" class=\"tblwrap\"><table><tr><th><strong>キーワード<\/strong><\/th><th><strong>値の確定タイミング<\/strong><\/th><th><strong>使える場所<\/strong><\/th><th><strong>static 付与<\/strong><\/th><\/tr><tr><td><code class=\"ic\">const<\/code><\/td><td>コンパイル時<\/td><td>クラス・メソッド内<\/td><td>暗黙的に static<\/td><\/tr><tr><td><code class=\"ic\">readonly<\/code><\/td><td>実行時（コンストラクタまで）<\/td><td>クラスのフィールドのみ<\/td><td>任意<\/td><\/tr><\/table><\/div><hr id=\"ref01-b20\"><h3 id=\"ref01-b21\">1-5　数値型の範囲と変換<\/h3><div id=\"ref01-b22\" class=\"tblwrap\"><table><tr><th><strong>型<\/strong><\/th><th><strong>ビット<\/strong><\/th><th><strong>範囲（概算）<\/strong><\/th><th><strong>主な用途<\/strong><\/th><\/tr><tr><td><code class=\"ic\">byte<\/code><\/td><td>8<\/td><td>0 〜 255<\/td><td>色値・フラグ<\/td><\/tr><tr><td><code class=\"ic\">short<\/code><\/td><td>16<\/td><td>-32,768 〜 32,767<\/td><td>小さな整数<\/td><\/tr><tr><td><code class=\"ic\">int<\/code><\/td><td>32<\/td><td>約 ±21 億<\/td><td>整数の基本<\/td><\/tr><tr><td><code class=\"ic\">long<\/code><\/td><td>64<\/td><td>約 ±920 京<\/td><td>巨大な数<\/td><\/tr><tr><td><code class=\"ic\">float<\/code><\/td><td>32<\/td><td>約 ±3.4×10³⁸（精度7桁）<\/td><td>Unity での標準小数<\/td><\/tr><tr><td><code class=\"ic\">double<\/code><\/td><td>64<\/td><td>約 ±1.8×10³⁰⁸（精度15桁）<\/td><td>高精度計算<\/td><\/tr><\/table><\/div><pre id=\"ref01-b23\" data-lang=\"plain text\"><code>// 暗黙的変換（小さい型 → 大きい型は自動）\nint  i = 42;\nlong l = i;      // OK：int → long は自動\n\n// 明示的キャスト（大きい型 → 小さい型は切り捨て）\ndouble d = 3.99;\nint    n = (int)d;   // n = 3（小数部切り捨て）\n\n// 文字列変換\nstring s  = 42.ToString();     // 数値 → 文字列\nint    x  = int.Parse(\"42\");   // 文字列 → 数値（失敗すると例外）\nbool   ok = int.TryParse(\"abc\", out int result);  // 安全な変換<\/code><\/pre><hr id=\"ref01-b24\"><h3 id=\"ref01-b25\">1-6　null と nullable 型<\/h3><pre id=\"ref01-b26\" data-lang=\"plain text\"><code>// 参照型はデフォルトで null を持てる\nstring s = null;   // OK\n\n// 値型は通常 null を持てないが、? を付けると nullable になる\nint? score = null;   // null を代入できる int\n\n// null かどうかの確認\nif (score.HasValue)\n    Debug.Log(score.Value);   // 実際の値を取り出す\n\n// GetValueOrDefault で null 時のデフォルト値\nint actual = score.GetValueOrDefault(0);  // null なら 0<\/code><\/pre><hr id=\"ref01-b27\"><h3 id=\"ref01-b28\">まとめ：型の選び方<\/h3><div id=\"ref01-b29\" class=\"tblwrap\"><table><tr><th>状況<\/th><th>推奨<\/th><\/tr><tr><td>整数カウンタ・インデックス<\/td><td><code class=\"ic\">int<\/code><\/td><\/tr><tr><td>Unity の移動・回転・サイズ<\/td><td><code class=\"ic\">float<\/code><\/td><\/tr><tr><td>真偽フラグ<\/td><td><code class=\"ic\">bool<\/code><\/td><\/tr><tr><td>名前・テキスト<\/td><td><code class=\"ic\">string<\/code><\/td><\/tr><tr><td>固定の選択肢<\/td><td><code class=\"ic\">enum<\/code>（第10章）<\/td><\/tr><tr><td>まとまりのあるデータ<\/td><td><code class=\"ic\">class<\/code> または <code class=\"ic\">struct<\/code>（第5章）<\/td><\/tr><\/table><\/div>"}, {"id": "ref02", "title": "第2章：演算子と式", "html": "<blockquote id=\"ref02-b0\">📚 対応教科書章：Ch1（算術・比較）/ Ch2（論理）/ Ch8.5（null 関連）/ Ch9（型判定）<\/blockquote><hr id=\"ref02-b1\"><h3 id=\"ref02-b2\">2-1　算術演算子<\/h3><pre id=\"ref02-b3\" data-lang=\"plain text\"><code>int a = 10, b = 3;\nDebug.Log(a + b);   // 13\nDebug.Log(a - b);   // 7\nDebug.Log(a * b);   // 30\nDebug.Log(a / b);   // 3  ← 整数÷整数は小数部切り捨て！\nDebug.Log(a % b);   // 1  ← 余り\n\n// 小数の割り算\nfloat c = 10f / 3f;   // 3.333...<\/code><\/pre><blockquote id=\"ref02-b4\">⚠️ <code class=\"ic\">10 / 3<\/code> は <code class=\"ic\">3<\/code>（整数除算）。<code class=\"ic\">3.33<\/code> にしたい場合は <code class=\"ic\">10f / 3f<\/code> か <code class=\"ic\">(float)10 / 3<\/code> とする。<\/blockquote><hr id=\"ref02-b5\"><h3 id=\"ref02-b6\">2-2　代入演算子<\/h3><pre id=\"ref02-b7\" data-lang=\"plain text\"><code>int x = 5;\nx += 3;   // x = x + 3 → 8\nx -= 2;   // x = x - 2 → 6\nx *= 4;   // x = x * 4 → 24\nx /= 6;   // x = x / 6 → 4\nx %= 3;   // x = x % 3 → 1\n\nx++;      // x = x + 1（後置インクリメント）\n++x;      // x = x + 1（前置インクリメント）\n// ※ 単独で使う場合は同じ。式の中での違いは後述<\/code><\/pre><h4 id=\"ref02-b8\">前置と後置の違い<\/h4><pre id=\"ref02-b9\" data-lang=\"plain text\"><code>int n = 5;\nDebug.Log(n++);   // 5 を出力してから n が 6 になる\nDebug.Log(++n);   // n が 7 になってから 7 を出力<\/code><\/pre><hr id=\"ref02-b10\"><h3 id=\"ref02-b11\">2-3　比較演算子<\/h3><pre id=\"ref02-b12\" data-lang=\"plain text\"><code>int hp = 50;\nDebug.Log(hp == 50);   // true  （等しい）\nDebug.Log(hp != 50);   // false （等しくない）\nDebug.Log(hp &gt;  30);   // true\nDebug.Log(hp &gt;= 50);   // true\nDebug.Log(hp &lt;  100);  // true\nDebug.Log(hp &lt;= 49);   // false<\/code><\/pre><blockquote id=\"ref02-b13\">⚠️ <code class=\"ic\">=<\/code>（代入）と <code class=\"ic\">==<\/code>（比較）は別物。<code class=\"ic\">if (x = 5)<\/code> はコンパイルエラー（bool 以外は条件に使えない）。<\/blockquote><hr id=\"ref02-b14\"><h3 id=\"ref02-b15\">2-4　論理演算子<\/h3><pre id=\"ref02-b16\" data-lang=\"plain text\"><code>bool hasKey  = true;\nbool doorOpen = false;\n\n// &amp;&amp; （AND）：両方 true のとき true\nif (hasKey &amp;&amp; !doorOpen)\n    Debug.Log(\"入れる\");\n\n// || （OR）：どちらか true のとき true\nif (hasKey || doorOpen)\n    Debug.Log(\"何らかの条件が満たされている\");\n\n// ! （NOT）：true/false を反転\nif (!doorOpen)\n    Debug.Log(\"ドアはまだ閉まっている\");<\/code><\/pre><h4 id=\"ref02-b17\">短絡評価（ショートサーキット）<\/h4><pre id=\"ref02-b18\" data-lang=\"plain text\"><code>// &amp;&amp; は左が false なら右を評価しない\n// || は左が true  なら右を評価しない\nif (obj != null &amp;&amp; obj.IsActive)   // obj が null でも右を評価しないので安全\n    Debug.Log(obj.name);<\/code><\/pre><hr id=\"ref02-b19\"><h3 id=\"ref02-b20\">2-5　null 関連演算子<\/h3><pre id=\"ref02-b21\" data-lang=\"plain text\"><code>string s = null;\n\n// ?. （null 条件演算子）：null なら式全体が null になる（例外を出さない）\nint? len = s?.Length;   // s が null なら len = null\n\n// ?? （null 合体演算子）：左が null なら右を返す\nstring name = s ?? \"名無し\";   // s が null なら \"名無し\"\n\n// ??= （null 合体代入）：左が null のときだけ代入\ns ??= \"デフォルト\";   // s が null なら \"デフォルト\" を代入\n\n// 組み合わせ\nint length = s?.Length ?? 0;   // null なら 0<\/code><\/pre><hr id=\"ref02-b22\"><h3 id=\"ref02-b23\">2-6　三項演算子<\/h3><pre id=\"ref02-b24\" data-lang=\"plain text\"><code>// 構文： 条件 ? trueの値 : falseの値\nint hp = 30;\nstring status = hp &gt; 0 ? \"生存\" : \"戦闘不能\";\n\n// if 文の短縮版として使う（複雑にしない）\nfloat multiplier = isBoss ? 2.0f : 1.0f;\nDebug.Log(\"ダメージ倍率: \" + multiplier);<\/code><\/pre><hr id=\"ref02-b25\"><h3 id=\"ref02-b26\">2-7　型判定と型変換<\/h3><pre id=\"ref02-b27\" data-lang=\"plain text\"><code>Enemy enemy = new SlimeKing();\n\n// is：型チェック（true/false を返す）\nif (enemy is SlimeKing)\n    Debug.Log(\"スライムキングだ！\");\n\n// is + 変数パターン（C# 7.0〜）：チェックと同時にキャスト\nif (enemy is SlimeKing king)\n    Debug.Log(king.CrownColor);  // king として直接使える\n\n// as：失敗しても null を返す（例外を出さない）\nSlimeKing king2 = enemy as SlimeKing;\nif (king2 != null)\n    Debug.Log(king2.CrownColor);\n\n// (型)：強制キャスト。失敗すると InvalidCastException\nSlimeKing king3 = (SlimeKing)enemy;  // enemy が SlimeKing でないと例外<\/code><\/pre><div id=\"ref02-b28\" class=\"tblwrap\"><table><tr><th><strong>方法<\/strong><\/th><th><strong>失敗時の挙動<\/strong><\/th><th><strong>主な用途<\/strong><\/th><\/tr><tr><td><code class=\"ic\">is<\/code><\/td><td>false を返す<\/td><td>型チェックのみ<\/td><\/tr><tr><td><code class=\"ic\">is T var<\/code><\/td><td>false を返す<\/td><td>チェック＋即使用<\/td><\/tr><tr><td><code class=\"ic\">as<\/code><\/td><td>null を返す<\/td><td>安全なキャスト（参照型のみ）<\/td><\/tr><tr><td><code class=\"ic\">(T)<\/code><\/td><td>例外を投げる<\/td><td>確実に型が分かる場合<\/td><\/tr><\/table><\/div><hr id=\"ref02-b29\"><h3 id=\"ref02-b30\">2-8　演算子の優先順位（主要）<\/h3><div id=\"ref02-b31\" class=\"tblwrap\"><table><tr><th>優先度（高→低）<\/th><th>演算子<\/th><\/tr><tr><td>高<\/td><td><code class=\"ic\">()<\/code> <code class=\"ic\">++<\/code>(後置) <code class=\"ic\">--<\/code>(後置) <code class=\"ic\">?.<\/code><\/td><\/tr><tr><td>↓<\/td><td><code class=\"ic\">!<\/code> <code class=\"ic\">++<\/code>(前置) <code class=\"ic\">--<\/code>(前置) <code class=\"ic\">(T)<\/code><\/td><\/tr><tr><td>↓<\/td><td><code class=\"ic\">*<\/code> <code class=\"ic\">/<\/code> <code class=\"ic\">%<\/code><\/td><\/tr><tr><td>↓<\/td><td><code class=\"ic\">+<\/code> <code class=\"ic\">-<\/code><\/td><\/tr><tr><td>↓<\/td><td><code class=\"ic\">&lt;<\/code> <code class=\"ic\">&gt;<\/code> <code class=\"ic\">&lt;=<\/code> <code class=\"ic\">&gt;=<\/code> <code class=\"ic\">is<\/code> <code class=\"ic\">as<\/code><\/td><\/tr><tr><td>↓<\/td><td><code class=\"ic\">==<\/code> <code class=\"ic\">!=<\/code><\/td><\/tr><tr><td>↓<\/td><td><code class=\"ic\">&amp;&amp;<\/code><\/td><\/tr><tr><td>↓<\/td><td>`\\<\/td><\/tr><tr><td>↓<\/td><td><code class=\"ic\">??<\/code><\/td><\/tr><tr><td>↓<\/td><td><code class=\"ic\">?:<\/code><\/td><\/tr><tr><td>低<\/td><td><code class=\"ic\">=<\/code> <code class=\"ic\">+=<\/code> <code class=\"ic\">-=<\/code> <code class=\"ic\">*=<\/code> <code class=\"ic\">/=<\/code> <code class=\"ic\">%=<\/code> <code class=\"ic\">??=<\/code><\/td><\/tr><\/table><\/div><blockquote id=\"ref02-b32\">💡 迷ったら <code class=\"ic\">()<\/code> で明示する。コードの意図が伝わりやすくなる。<\/blockquote>"}, {"id": "ref03", "title": "第3章：制御構文", "html": "<blockquote id=\"ref03-b0\">📚 対応教科書章：Ch2（if / else）/ Ch3（for）/ Ch6.5（switch）/ Ch13（while / コルーチン）<\/blockquote><hr id=\"ref03-b1\"><h3 id=\"ref03-b2\">3-1　if / else if / else<\/h3><pre id=\"ref03-b3\" data-lang=\"plain text\"><code>int hp = 45;\n\nif (hp &lt;= 0)\n{\n    Debug.Log(\"戦闘不能\");\n}\nelse if (hp &lt;= 30)\n{\n    Debug.Log(\"危険：HP が残り少ない\");\n}\nelse\n{\n    Debug.Log(\"正常\");\n}<\/code><\/pre><h4 id=\"ref03-b4\">ガード節（早期リターン）<\/h4><p id=\"ref03-b5\">「正常系」を深くネストさせないイディオムです。<\/p><pre id=\"ref03-b6\" data-lang=\"plain text\"><code>void TakeDamage(int amount)\n{\n    if (amount &lt;= 0) return;          // 異常値を弾く\n    if (!isAlive)    return;          // 死亡済みなら何もしない\n\n    hp -= amount;                     // ← 正常系はここ。ネストが浅い\n    if (hp &lt;= 0) Die();\n}<\/code><\/pre><hr id=\"ref03-b7\"><h3 id=\"ref03-b8\">3-2　switch 文<\/h3><pre id=\"ref03-b9\" data-lang=\"plain text\"><code>enum GameState { Title, Playing, GameOver, Clear }\nGameState state = GameState.Playing;\n\nswitch (state)\n{\n    case GameState.Title:\n        ShowTitle();\n        break;\n    case GameState.Playing:\n        UpdateGame();\n        break;\n    case GameState.GameOver:\n    case GameState.Clear:              // 複数 case を1ブロックに\n        ShowResult();\n        break;\n    default:\n        Debug.LogWarning(\"未定義の状態\");\n        break;\n}<\/code><\/pre><blockquote id=\"ref03-b10\">⚠️ <code class=\"ic\">break<\/code> を忘れるとコンパイルエラー（C# では fall-through は禁止）。<\/blockquote><h4 id=\"ref03-b11\">switch 式（C# 8.0〜 / Unity 2021 以降）<\/h4><pre id=\"ref03-b12\" data-lang=\"plain text\"><code>// switch 文の値返し版。より簡潔\nstring label = state switch\n{\n    GameState.Title   =&gt; \"タイトル\",\n    GameState.Playing =&gt; \"プレイ中\",\n    GameState.GameOver =&gt; \"ゲームオーバー\",\n    GameState.Clear   =&gt; \"クリア\",\n    _                 =&gt; \"不明\",    // default に相当\n};<\/code><\/pre><hr id=\"ref03-b13\"><h3 id=\"ref03-b14\">3-3　for 文<\/h3><pre id=\"ref03-b15\" data-lang=\"plain text\"><code>// 構文：for (初期化; 条件; 更新)\nfor (int i = 0; i &lt; 5; i++)\n{\n    Debug.Log(\"i = \" + i);   // 0, 1, 2, 3, 4\n}\n\n// 逆順\nfor (int i = 4; i &gt;= 0; i--)\n    Debug.Log(i);   // 4, 3, 2, 1, 0\n\n// 2ずつ進む\nfor (int i = 0; i &lt; 10; i += 2)\n    Debug.Log(i);   // 0, 2, 4, 6, 8<\/code><\/pre><h4 id=\"ref03-b16\">多重ループと break<\/h4><pre id=\"ref03-b17\" data-lang=\"plain text\"><code>for (int y = 0; y &lt; 3; y++)\n{\n    for (int x = 0; x &lt; 3; x++)\n    {\n        if (x == 1 &amp;&amp; y == 1)\n            break;           // 内側のループのみ抜ける\n        Debug.Log($\"({x},{y})\");\n    }\n}<\/code><\/pre><hr id=\"ref03-b18\"><h3 id=\"ref03-b19\">3-4　foreach 文<\/h3><pre id=\"ref03-b20\" data-lang=\"plain text\"><code>var items = new List&lt;string&gt; { \"剣\", \"盾\", \"薬草\" };\n\nforeach (string item in items)\n{\n    Debug.Log(item);\n}\n\n// 配列にも使える\nint[] scores = { 80, 95, 70 };\nforeach (int s in scores)\n    Debug.Log(s);<\/code><\/pre><blockquote id=\"ref03-b21\">⚠️ <strong>foreach 中は List の Add/Remove 禁止<\/strong>。<code class=\"ic\">InvalidOperationException<\/code> が発生する。<br>変更が必要なら「削除予定リスト」を別途作り、foreach の後に処理する。<\/blockquote><pre id=\"ref03-b22\" data-lang=\"plain text\"><code>// 安全なパターン\nvar toRemove = new List&lt;Enemy&gt;();\nforeach (var e in enemies)\n    if (e.IsDead) toRemove.Add(e);\n\nforeach (var e in toRemove)\n    enemies.Remove(e);<\/code><\/pre><hr id=\"ref03-b23\"><h3 id=\"ref03-b24\">3-5　while / do-while<\/h3><pre id=\"ref03-b25\" data-lang=\"plain text\"><code>// while：条件が true の間繰り返す\nint count = 0;\nwhile (count &lt; 5)\n{\n    Debug.Log(count);\n    count++;\n}\n\n// do-while：必ず1回は実行してから条件チェック\ndo\n{\n    Debug.Log(\"最低1回は実行される\");\n    count++;\n} while (count &lt; 3);<\/code><\/pre><blockquote id=\"ref03-b26\">⚠️ <code class=\"ic\">while (true)<\/code> の無限ループは<strong>必ず脱出条件を持たせる<\/strong>。Unity のコルーチンで <code class=\"ic\">while(true)<\/code> を使う場合は <code class=\"ic\">yield return<\/code> を入れないとフリーズする。<\/blockquote><hr id=\"ref03-b27\"><h3 id=\"ref03-b28\">3-6　break / continue / return<\/h3><pre id=\"ref03-b29\" data-lang=\"plain text\"><code>for (int i = 0; i &lt; 10; i++)\n{\n    if (i == 3) continue;   // 3 をスキップして次のループへ\n    if (i == 7) break;      // 7 でループを終了\n    Debug.Log(i);           // 0,1,2,4,5,6\n}\n\n// return：メソッドを即終了（値の返却と早期脱出の2役）\nvoid Attack(Enemy target)\n{\n    if (target == null) return;   // 早期脱出\n    target.TakeDamage(10);\n}\n\nint GetScore()\n{\n    return 100;   // 値を返しつつメソッド終了\n}<\/code><\/pre><hr id=\"ref03-b30\"><h3 id=\"ref03-b31\">3-7　文字列補間と書式<\/h3><pre id=\"ref03-b32\" data-lang=\"plain text\"><code>string name = \"勇者\";\nint hp = 75;\n\n// $ \"...\" で変数を埋め込める\nDebug.Log($\"{name} の HP: {hp}\");\n\n// 書式指定\nfloat ratio = 0.876f;\nDebug.Log($\"進捗: {ratio:P0}\");    // P0 = パーセント小数なし → 88%\nDebug.Log($\"HP: {hp:D3}\");         // D3 = 3桁ゼロ埋め → 075\nDebug.Log($\"値: {ratio:F2}\");      // F2 = 小数2桁 → 0.88<\/code><\/pre>"}, {"id": "ref04", "title": "第4章：メソッド", "html": "<blockquote id=\"ref04-b0\">📚 対応教科書章：Ch5（メソッド基礎）/ Ch6.5（オーバーロード）/ Ch13（ローカル関数）<\/blockquote><hr id=\"ref04-b1\"><h3 id=\"ref04-b2\">4-1　メソッドの定義<\/h3><pre id=\"ref04-b3\" data-lang=\"plain text\"><code>// 構文：アクセス修飾子 戻り値型 メソッド名(引数リスト) { 本体 }\npublic int Add(int a, int b)\n{\n    return a + b;\n}\n\n// 戻り値なし\npublic void PrintHp()\n{\n    Debug.Log(hp);\n}\n\n// 式形式（単一式のとき =&gt; で書ける）\npublic int Multiply(int a, int b) =&gt; a * b;\npublic void Log(string msg) =&gt; Debug.Log(msg);<\/code><\/pre><hr id=\"ref04-b4\"><h3 id=\"ref04-b5\">4-2　引数の種類<\/h3><h4 id=\"ref04-b6\">通常引数（値渡し）<\/h4><pre id=\"ref04-b7\" data-lang=\"plain text\"><code>void Double(int x)\n{\n    x *= 2;     // ← メソッド内のコピー。呼び出し元は変わらない\n}<\/code><\/pre><h4 id=\"ref04-b8\">ref（参照渡し）<\/h4><pre id=\"ref04-b9\" data-lang=\"plain text\"><code>void Double(ref int x)\n{\n    x *= 2;     // ← 呼び出し元の変数を直接変更\n}\n\n// 呼び出し側にも ref が必要\nint n = 5;\nDouble(ref n);   // n は 10 になる<\/code><\/pre><h4 id=\"ref04-b10\">out（出力引数）<\/h4><pre id=\"ref04-b11\" data-lang=\"plain text\"><code>// メソッド内で必ず代入しなければならない\nbool TryGetLevel(string name, out int level)\n{\n    if (name == \"勇者\") { level = 10; return true; }\n    level = 0;           // 代入必須\n    return false;\n}\n\n// 呼び出し\nif (TryGetLevel(\"勇者\", out int lv))\n    Debug.Log(lv);   // 10<\/code><\/pre><h4 id=\"ref04-b12\">in（読み取り専用参照）<\/h4><pre id=\"ref04-b13\" data-lang=\"plain text\"><code>// 大きな struct を参照渡しにして効率化（変更は禁止）\nvoid PrintVector(in Vector3 v)\n{\n    Debug.Log(v.magnitude);\n    // v.x = 1;  ← コンパイルエラー\n}<\/code><\/pre><hr id=\"ref04-b14\"><h3 id=\"ref04-b15\">4-3　デフォルト引数と名前付き引数<\/h3><pre id=\"ref04-b16\" data-lang=\"plain text\"><code>// デフォルト引数：呼び出し時に省略できる\nvoid Attack(int damage, bool isCritical = false, float delay = 0f)\n{\n    Debug.Log($\"ダメージ:{damage} クリティカル:{isCritical}\");\n}\n\n// 呼び出し例\nAttack(10);                          // isCritical=false, delay=0\nAttack(20, true);                    // delay=0\nAttack(15, delay: 0.5f);             // 名前付き引数で順番を変えられる\nAttack(damage: 30, isCritical: true);<\/code><\/pre><blockquote id=\"ref04-b17\">💡 デフォルト引数はメソッド末尾側に配置する必要がある。<\/blockquote><hr id=\"ref04-b18\"><h3 id=\"ref04-b19\">4-4　オーバーロード<\/h3><p id=\"ref04-b20\">同じ名前で<strong>引数の型・個数が異なる<\/strong>メソッドを複数定義できます。<\/p><pre id=\"ref04-b21\" data-lang=\"plain text\"><code>void Log(string msg) =&gt; Debug.Log(msg);\nvoid Log(int    val) =&gt; Debug.Log(val.ToString());\nvoid Log(string label, int val) =&gt; Debug.Log($\"{label}: {val}\");\n\n// コンパイラが引数から自動選択\nLog(\"hello\");       // 1番目\nLog(42);            // 2番目\nLog(\"HP\", 100);     // 3番目<\/code><\/pre><blockquote id=\"ref04-b22\">⚠️ 戻り値の型だけが違うオーバーロードは不可。引数で区別する。<\/blockquote><hr id=\"ref04-b23\"><h3 id=\"ref04-b24\">4-5　params（可変長引数）<\/h3><pre id=\"ref04-b25\" data-lang=\"plain text\"><code>int Sum(params int[] values)\n{\n    int total = 0;\n    foreach (int v in values) total += v;\n    return total;\n}\n\nDebug.Log(Sum(1, 2, 3));         // 6\nDebug.Log(Sum(10, 20, 30, 40));  // 100<\/code><\/pre><hr id=\"ref04-b26\"><h3 id=\"ref04-b27\">4-6　ローカル関数<\/h3><p id=\"ref04-b28\">メソッドの中にだけ存在する関数です。外から呼べないロジックの隠蔽に使います。<\/p><pre id=\"ref04-b29\" data-lang=\"plain text\"><code>void SpawnEnemies()\n{\n    int count = CalcCount();   // ローカル関数を呼ぶ\n    for (int i = 0; i &lt; count; i++)\n        Instantiate(enemyPrefab);\n\n    // ローカル関数の定義（SpawnEnemies の中にある）\n    int CalcCount()\n    {\n        return Mathf.FloorToInt(stage * 1.5f);\n    }\n}<\/code><\/pre><hr id=\"ref04-b30\"><h3 id=\"ref04-b31\">4-7　式形式メンバー（Expression-bodied）<\/h3><pre id=\"ref04-b32\" data-lang=\"plain text\"><code>public class PlayerStatus\n{\n    private int _hp = 100;\n\n    // プロパティの get のみ\n    public int Hp =&gt; _hp;\n\n    // メソッド\n    public bool IsAlive() =&gt; _hp &gt; 0;\n\n    // void メソッド\n    public void Reset() =&gt; _hp = 100;\n}<\/code><\/pre><hr id=\"ref04-b33\"><h3 id=\"ref04-b34\">まとめ：引数の選び方<\/h3><div id=\"ref04-b35\" class=\"tblwrap\"><table><tr><th><strong>方法<\/strong><\/th><th><strong>使いどころ<\/strong><\/th><th><strong>呼び出し元への影響<\/strong><\/th><\/tr><tr><td>通常引数<\/td><td>ほぼ全ての場面（基本）<\/td><td>なし<\/td><\/tr><tr><td><code class=\"ic\">ref<\/code><\/td><td>呼び出し元の値を書き換えたい<\/td><td>変更される<\/td><\/tr><tr><td><code class=\"ic\">out<\/code><\/td><td>メソッドから複数値を返したい<\/td><td>新しい値が設定される<\/td><\/tr><tr><td><code class=\"ic\">in<\/code><\/td><td>大きな struct を効率よく渡したい<\/td><td>なし（読み取り専用）<\/td><\/tr><tr><td><code class=\"ic\">params<\/code><\/td><td>引数の個数が可変<\/td><td>なし<\/td><\/tr><\/table><\/div>"}, {"id": "ref05", "title": "第5章：クラスとカプセル化", "html": "<blockquote id=\"ref05-b0\">📚 対応教科書章：Ch7（クラス基礎）/ Ch7.5（コンストラクタ・プロパティ）/ Ch11〜12（static）<\/blockquote><hr id=\"ref05-b1\"><h3 id=\"ref05-b2\">5-1　クラスの基本構造<\/h3><pre id=\"ref05-b3\" data-lang=\"plain text\"><code>public class Weapon\n{\n    // ── フィールド（データ） ──\n    public  string name;              // 外から読み書きできる\n    private int    _baseDamage;       // クラス内部だけ\n    protected float _durability;      // 自分と子クラスまで\n\n    // ── コンストラクタ ──\n    public Weapon(string name, int damage)\n    {\n        this.name  = name;           // this で同名のフィールドを区別\n        _baseDamage = damage;\n        _durability = 100f;\n    }\n\n    // ── プロパティ ──\n    public int Damage\n    {\n        get =&gt; _baseDamage;\n        private set =&gt; _baseDamage = Mathf.Max(0, value);\n    }\n\n    // ── メソッド ──\n    public void Use() =&gt; _durability -= 5f;\n    public bool IsBroken() =&gt; _durability &lt;= 0;\n}<\/code><\/pre><hr id=\"ref05-b4\"><h3 id=\"ref05-b5\">5-2　アクセス修飾子<\/h3><div id=\"ref05-b6\" class=\"tblwrap\"><table><tr><th><strong>修飾子<\/strong><\/th><th><strong>アクセス可能な範囲<\/strong><\/th><th><strong>Inspectorへの表示<\/strong><\/th><\/tr><tr><td><code class=\"ic\">public<\/code><\/td><td>どこからでも<\/td><td>✅ 表示される<\/td><\/tr><tr><td><code class=\"ic\">private<\/code><\/td><td>同じクラス内のみ<\/td><td>❌ 非表示<\/td><\/tr><tr><td><code class=\"ic\">protected<\/code><\/td><td>同クラス＋継承したクラス<\/td><td>❌ 非表示<\/td><\/tr><tr><td><code class=\"ic\">internal<\/code><\/td><td>同アセンブリ内<\/td><td>❌ 非表示<\/td><\/tr><tr><td><code class=\"ic\">[SerializeField]<\/code><\/td><td>private のまま Inspector に出す<\/td><td>✅ 表示される<\/td><\/tr><\/table><\/div><pre id=\"ref05-b7\" data-lang=\"plain text\"><code>[SerializeField] private float _speed = 5f;  // Inspector から設定可・外部コードからは保護<\/code><\/pre><hr id=\"ref05-b8\"><h3 id=\"ref05-b9\">5-3　コンストラクタ<\/h3><pre id=\"ref05-b10\" data-lang=\"plain text\"><code>public class Enemy\n{\n    public string Name { get; private set; }\n    public int    Hp   { get; private set; }\n\n    // 引数ありコンストラクタ\n    public Enemy(string name, int hp)\n    {\n        Name = name;\n        Hp   = hp;\n    }\n\n    // コンストラクタのチェーン（: this(...) で別コンストラクタを呼ぶ）\n    public Enemy(string name) : this(name, 100) { }   // hp=100 のデフォルト\n}\n\n// 使い方\nvar slime = new Enemy(\"スライム\", 50);\nvar boss  = new Enemy(\"ボス\");       // hp は 100<\/code><\/pre><hr id=\"ref05-b11\"><h3 id=\"ref05-b12\">5-4　プロパティ詳解<\/h3><pre id=\"ref05-b13\" data-lang=\"plain text\"><code>public class PlayerStatus\n{\n    private int _hp;\n\n    // 完全プロパティ（get/set に処理を書ける）\n    public int Hp\n    {\n        get =&gt; _hp;\n        set =&gt; _hp = Mathf.Clamp(value, 0, MaxHp);  // 範囲制限付き\n    }\n\n    // 自動プロパティ（フィールドを自動生成）\n    public int MaxHp { get; set; } = 100;\n\n    // 読み取り専用プロパティ\n    public bool IsAlive =&gt; _hp &gt; 0;\n\n    // init（オブジェクト初期化子でのみ設定可）\n    public string CharName { get; init; }\n}\n\n// オブジェクト初期化子\nvar p = new PlayerStatus { CharName = \"勇者\", MaxHp = 150 };<\/code><\/pre><hr id=\"ref05-b14\"><h3 id=\"ref05-b15\">5-5　静的メンバー（static）<\/h3><p id=\"ref05-b16\"><code class=\"ic\">static<\/code> を付けたフィールド・メソッドはインスタンスではなく<strong>クラスに属します<\/strong>。<\/p><pre id=\"ref05-b17\" data-lang=\"plain text\"><code>public class GameStats\n{\n    public static int TotalKills = 0;        // 全インスタンス共通\n    public static void Reset() =&gt; TotalKills = 0;\n}\n\n// インスタンスなしで呼べる\nGameStats.TotalKills++;\nGameStats.Reset();<\/code><\/pre><h4 id=\"ref05-b18\">static クラス<\/h4><pre id=\"ref05-b19\" data-lang=\"plain text\"><code>// インスタンス化できないクラス。ユーティリティ関数置き場として使う\npublic static class MathHelper\n{\n    public static float Lerp01(float t) =&gt; Mathf.Clamp01(t);\n    public static int   RandRange(int min, int max) =&gt; Random.Range(min, max);\n}<\/code><\/pre><hr id=\"ref05-b20\"><h3 id=\"ref05-b21\">5-6　struct（構造体）<\/h3><p id=\"ref05-b22\"><code class=\"ic\">class<\/code> と似ているが<strong>値型<\/strong>です。小さなデータのまとまりに使います。<\/p><pre id=\"ref05-b23\" data-lang=\"plain text\"><code>public struct Point\n{\n    public int X;\n    public int Y;\n\n    public Point(int x, int y) { X = x; Y = y; }\n    public float Distance() =&gt; Mathf.Sqrt(X * X + Y * Y);\n}\n\nPoint p1 = new Point(3, 4);\nPoint p2 = p1;   // 値型なのでコピー\np2.X = 99;       // p1.X は 3 のまま<\/code><\/pre><div id=\"ref05-b24\" class=\"tblwrap\"><table><tr><th><strong>比較<\/strong><\/th><th><strong>class<\/strong><\/th><th><strong>struct<\/strong><\/th><\/tr><tr><td>型分類<\/td><td>参照型<\/td><td>値型<\/td><\/tr><tr><td>継承<\/td><td>可能<\/td><td>不可（interface 実装のみ可）<\/td><\/tr><tr><td>null 代入<\/td><td>可能<\/td><td>不可（nullable にすれば可）<\/td><\/tr><tr><td>向いている用途<\/td><td>ゲームオブジェクト・大きなデータ<\/td><td>座標・色・小さなデータ<\/td><\/tr><\/table><\/div><hr id=\"ref05-b25\"><h3 id=\"ref05-b26\">5-7　オブジェクト初期化子とパターン<\/h3><pre id=\"ref05-b27\" data-lang=\"plain text\"><code>// オブジェクト初期化子：new 後に { } でプロパティを設定\nvar item = new Item { Name = \"薬草\", Price = 50, Type = ItemType.Potion };\n\n// コレクション初期化子\nvar bag = new List&lt;string&gt; { \"剣\", \"盾\", \"薬草\" };\n\n// with 式（record / struct で使用可。既存を元にコピーして一部変更）\n// record の例\nrecord EnemyData(string Name, int Hp);\nvar original = new EnemyData(\"スライム\", 50);\nvar variant  = original with { Hp = 80 };  // Name はそのまま<\/code><\/pre>"}, {"id": "ref06", "title": "第6章：コレクション", "html": "<blockquote id=\"ref06-b0\">📚 対応教科書章：Ch3（配列）/ Ch4（Array.Resize）/ Ch6（List）/ Ch6.5（Dictionary）/ Ch9（foreach 安全パターン）<\/blockquote><hr id=\"ref06-b1\"><h3 id=\"ref06-b2\">6-1　配列（Array）<\/h3><pre id=\"ref06-b3\" data-lang=\"plain text\"><code>// 宣言と初期化\nint[] scores = new int[5];                    // 要素 0 で初期化\nstring[] names = { \"スライム\", \"ゴブリン\", \"ドラゴン\" };  // リテラル初期化\n\n// アクセス（インデックスは 0 始まり）\nDebug.Log(names[0]);    // \"スライム\"\nnames[2] = \"ワーム\";\n\n// 長さ\nDebug.Log(names.Length);\n\n// 多次元配列\nint[,] grid = new int[3, 4];   // 3行4列\ngrid[1, 2] = 99;\n\n// ジャグ配列（各行の長さが異なる）\nint[][] jagged = new int[3][];\njagged[0] = new int[] { 1, 2 };\njagged[1] = new int[] { 3, 4, 5 };<\/code><\/pre><h4 id=\"ref06-b4\">便利な Array メソッド<\/h4><pre id=\"ref06-b5\" data-lang=\"plain text\"><code>int[] data = { 5, 2, 8, 1, 9 };\nArray.Sort(data);               // 昇順ソート → 1,2,5,8,9\nArray.Reverse(data);            // 逆順 → 9,8,5,2,1\nint idx = Array.IndexOf(data, 5);  // 5 があるインデックスを返す\nArray.Resize(ref data, 8);      // サイズ変更（追加分は 0 で初期化）<\/code><\/pre><hr id=\"ref06-b6\"><h3 id=\"ref06-b7\">6-2　List&lt;T&gt;<\/h3><pre id=\"ref06-b8\" data-lang=\"plain text\"><code>using System.Collections.Generic;\n\nvar items = new List&lt;string&gt;();\n\n// 追加\nitems.Add(\"剣\");\nitems.Add(\"盾\");\nitems.AddRange(new[] { \"薬草\", \"毒消し\" });  // まとめて追加\n\n// 挿入・削除\nitems.Insert(1, \"弓\");         // インデックス 1 に挿入\nitems.Remove(\"盾\");            // 値で削除（最初の一致）\nitems.RemoveAt(0);             // インデックスで削除\nitems.RemoveAll(x =&gt; x.Length &gt; 2);  // 条件で一括削除\n\n// 検索\nbool has  = items.Contains(\"剣\");\nint  idx  = items.IndexOf(\"剣\");\nstring found = items.Find(x =&gt; x.StartsWith(\"薬\"));\nList&lt;string&gt; all = items.FindAll(x =&gt; x.Length == 2);\n\n// ソート\nitems.Sort();                          // 昇順\nitems.Sort((a, b) =&gt; b.Length - a.Length);  // カスタム（長さ降順）\n\n// 変換・確認\nint count = items.Count;\nitems.Clear();\nbool empty = items.Count == 0;\n\n// 配列との相互変換\nstring[] arr = items.ToArray();\nList&lt;string&gt; list2 = new List&lt;string&gt;(arr);<\/code><\/pre><hr id=\"ref06-b9\"><h3 id=\"ref06-b10\">6-3　Dictionary&lt;TKey, TValue&gt;<\/h3><pre id=\"ref06-b11\" data-lang=\"plain text\"><code>var prices = new Dictionary&lt;string, int&gt;();\n\n// 追加\nprices[\"薬草\"] = 30;           // インデクサー（上書きもできる）\nprices.Add(\"毒消し\", 50);      // Add（キー重複で例外）\n\n// 安全な取得\nif (prices.TryGetValue(\"薬草\", out int price))\n    Debug.Log(price);           // 30\n\n// 存在確認\nbool has = prices.ContainsKey(\"盾\");\n\n// 削除\nprices.Remove(\"薬草\");\n\n// 全要素ループ\nforeach (var kvp in prices)\n    Debug.Log($\"{kvp.Key}: {kvp.Value}\");\n\n// キー一覧・値一覧\nforeach (string key in prices.Keys)   Debug.Log(key);\nforeach (int   val in prices.Values)  Debug.Log(val);<\/code><\/pre><hr id=\"ref06-b12\"><h3 id=\"ref06-b13\">6-4　Queue&lt;T&gt; と Stack&lt;T&gt;<\/h3><pre id=\"ref06-b14\" data-lang=\"plain text\"><code>// Queue：FIFO（先入れ先出し）\nvar queue = new Queue&lt;string&gt;();\nqueue.Enqueue(\"A\");   // 追加\nqueue.Enqueue(\"B\");\nstring first = queue.Dequeue();    // 先頭を取り出す → \"A\"\nstring peek  = queue.Peek();       // 取り出さずに先頭を見る → \"B\"\n\n// Stack：LIFO（後入れ先出し）\nvar stack = new Stack&lt;int&gt;();\nstack.Push(1);\nstack.Push(2);\nstack.Push(3);\nint top = stack.Pop();     // 3 を取り出す\nint see = stack.Peek();    // 2 を見るだけ<\/code><\/pre><hr id=\"ref06-b15\"><h3 id=\"ref06-b16\">6-5　LINQ 入門<\/h3><p id=\"ref06-b17\">LINQ（Language Integrated Query）は<strong>コレクションをクエリのように操作<\/strong>するしくみです。<\/p><pre id=\"ref06-b18\" data-lang=\"plain text\"><code>using System.Linq;\n\nvar scores = new List&lt;int&gt; { 80, 55, 90, 72, 95, 40 };\n\n// Where：条件でフィルタ\nvar passing = scores.Where(s =&gt; s &gt;= 60);   // 80,90,72,95\n\n// Select：変換（map 相当）\nvar doubled = scores.Select(s =&gt; s * 2);    // 160,110,...\n\n// OrderBy / OrderByDescending\nvar sorted = scores.OrderBy(s =&gt; s);        // 40,55,72,...\n\n// First / FirstOrDefault\nint top    = scores.Max();\nint bottom = scores.Min();\ndouble avg = scores.Average();\nint sum    = scores.Sum();\n\n// Count\nint failCount = scores.Count(s =&gt; s &lt; 60);  // 2\n\n// Any / All\nbool anyPerfect = scores.Any(s =&gt; s == 100);\nbool allPass    = scores.All(s =&gt; s &gt;= 60);\n\n// ToList / ToArray で具体化\nList&lt;int&gt; result = scores.Where(s =&gt; s &gt;= 70).OrderByDescending(s =&gt; s).ToList();<\/code><\/pre><blockquote id=\"ref06-b19\">💡 LINQ はメソッドチェーンで繋げられる。ただし <code class=\"ic\">IEnumerable&lt;T&gt;<\/code> を返すので、インデックスアクセスや <code class=\"ic\">Count<\/code> プロパティが使いたい場合は <code class=\"ic\">.ToList()<\/code> で変換する。<\/blockquote><hr id=\"ref06-b20\"><h3 id=\"ref06-b21\">まとめ：コレクション選び方<\/h3><div id=\"ref06-b22\" class=\"tblwrap\"><table><tr><th><strong>コレクション<\/strong><\/th><th><strong>向いている場面<\/strong><\/th><th><strong>特徴<\/strong><\/th><\/tr><tr><td>配列 <code class=\"ic\">T[]<\/code><\/td><td>サイズ固定のデータ<\/td><td>高速・省メモリ<\/td><\/tr><tr><td><code class=\"ic\">List&lt;T&gt;<\/code><\/td><td>要素数が変わる一覧<\/td><td>最も汎用的<\/td><\/tr><tr><td><code class=\"ic\">Dictionary&lt;K,V&gt;<\/code><\/td><td>キーから値を引きたい<\/td><td>検索 O(1)<\/td><\/tr><tr><td><code class=\"ic\">Queue&lt;T&gt;<\/code><\/td><td>順番待ち処理<\/td><td>FIFO<\/td><\/tr><tr><td><code class=\"ic\">Stack&lt;T&gt;<\/code><\/td><td>元に戻す・履歴<\/td><td>LIFO<\/td><\/tr><\/table><\/div>"}, {"id": "ref07", "title": "第7章：継承・ポリモーフィズム・インターフェース", "html": "<blockquote id=\"ref07-b0\">📚 対応教科書章：Ch8（継承・ポリモーフィズム）/ Ch9（型判定・キャスト）/ Ch10（インターフェース）<\/blockquote><hr id=\"ref07-b1\"><h3 id=\"ref07-b2\">7-1　継承の基本<\/h3><pre id=\"ref07-b3\" data-lang=\"plain text\"><code>// 親クラス（基底クラス）\npublic class Character\n{\n    public string Name { get; protected set; }\n    protected int _hp;\n\n    public Character(string name, int hp)\n    {\n        Name = name;\n        _hp  = hp;\n    }\n\n    public virtual void OnUpdate()\n    {\n        // 子クラスで上書きできる\n    }\n\n    public virtual string GetInfo() =&gt; $\"{Name} HP:{_hp}\";\n}\n\n// 子クラス（派生クラス）\npublic class Player : Character\n{\n    public int Level { get; private set; }\n\n    // : base(...) で親コンストラクタを呼ぶ（必須の場合が多い）\n    public Player(string name) : base(name, 100)\n    {\n        Level = 1;\n    }\n\n    public override void OnUpdate()\n    {\n        // 親の OnUpdate を呼ぶ場合\n        base.OnUpdate();\n        HandleInput();\n    }\n\n    public override string GetInfo() =&gt; base.GetInfo() + $\" Lv:{Level}\";\n\n    private void HandleInput() { /* ... */ }\n}<\/code><\/pre><blockquote id=\"ref07-b4\">⚠️ C# の継承は<strong>1つのクラスのみ<\/strong>（多重継承不可）。インターフェースは複数実装できる。<\/blockquote><hr id=\"ref07-b5\"><h3 id=\"ref07-b6\">7-2　virtual / override / sealed<\/h3><pre id=\"ref07-b7\" data-lang=\"plain text\"><code>// virtual：子クラスで上書き「できる」メソッドに付ける\npublic virtual void Attack() { /* 基本攻撃 */ }\n\n// override：親の virtual を上書きする\npublic override void Attack() { /* 独自攻撃 */ }\n\n// sealed override：これ以上の上書きを禁止\npublic sealed override void Attack() { /* これが最終形 */ }\n\n// new：親のメソッドを隠す（ポリモーフィズムは働かない！）\npublic new void Attack() { /* 別物として定義 */ }\n// ↑ 「隠蔽」は混乱の元。基本的に override を使うこと。<\/code><\/pre><h4 id=\"ref07-b8\">ポリモーフィズムの仕組み<\/h4><pre id=\"ref07-b9\" data-lang=\"plain text\"><code>// 親クラス型の変数で子クラスを扱える\nList&lt;Character&gt; party = new List&lt;Character&gt;\n{\n    new Player(\"勇者\"),\n    new Enemy(\"スライム\"),\n    new Boss(\"魔王\")\n};\n\nforeach (Character c in party)\n    c.OnUpdate();   // それぞれの子クラスの OnUpdate が呼ばれる ← ポリモーフィズム<\/code><\/pre><hr id=\"ref07-b10\"><h3 id=\"ref07-b11\">7-3　abstract クラス<\/h3><pre id=\"ref07-b12\" data-lang=\"plain text\"><code>// abstract：インスタンス化できない。abstract メソッドは子が必ず実装\npublic abstract class Enemy\n{\n    public int Hp { get; protected set; }\n\n    // abstract メソッド：実装なし。子クラスで必ず override\n    public abstract void Attack();\n\n    // 通常メソッドも持てる\n    public void TakeDamage(int amount) =&gt; Hp -= amount;\n}\n\npublic class Slime : Enemy\n{\n    public override void Attack() =&gt; Debug.Log(\"体当たり！\");\n}\n\n// new Enemy();  ← コンパイルエラー（abstract はインスタンス化不可）<\/code><\/pre><div id=\"ref07-b13\" class=\"tblwrap\"><table><tr><th><strong>比較<\/strong><\/th><th><strong>abstract クラス<\/strong><\/th><th><strong>インターフェース<\/strong><\/th><\/tr><tr><td>インスタンス化<\/td><td>不可<\/td><td>不可<\/td><\/tr><tr><td>実装の提供<\/td><td>可能（一部 abstract でもよい）<\/td><td>可能（default 実装 / C#8〜）<\/td><\/tr><tr><td>フィールド<\/td><td>持てる<\/td><td>持てない<\/td><\/tr><tr><td>継承数<\/td><td>1つのみ<\/td><td>複数実装可<\/td><\/tr><tr><td>向いている用途<\/td><td>共通の状態＋一部強制<\/td><td>能力の契約（〜できる）<\/td><\/tr><\/table><\/div><hr id=\"ref07-b14\"><h3 id=\"ref07-b15\">7-4　インターフェース<\/h3><pre id=\"ref07-b16\" data-lang=\"plain text\"><code>// インターフェース：「できる」を表す契約\npublic interface IInteractable\n{\n    void Interact();                     // 実装必須\n    string GetPrompt() =&gt; \"Eキーで調べる\"; // default 実装（C#8〜）\n}\n\npublic interface IDamageable\n{\n    void TakeDamage(int amount);\n    bool IsDead { get; }\n}\n\n// 複数のインターフェースを同時に実装できる\npublic class TreasureBox : MonoBehaviour, IInteractable, IDamageable\n{\n    public bool IsDead { get; private set; }\n\n    public void Interact()           // public 必須！\n    {\n        Debug.Log(\"宝箱を開けた！\");\n    }\n\n    public void TakeDamage(int amount)\n    {\n        Debug.Log($\"宝箱が {amount} ダメージを受けた\");\n    }\n}<\/code><\/pre><h4 id=\"ref07-b17\">インターフェース型で扱う<\/h4><pre id=\"ref07-b18\" data-lang=\"plain text\"><code>// インターフェース型の変数で、実装クラスを区別せず扱える\nList&lt;IInteractable&gt; interactables = new();\ninteractables.Add(new TreasureBox());\ninteractables.Add(new Npc());\n\nforeach (IInteractable obj in interactables)\n    obj.Interact();   // 各クラスの実装が呼ばれる<\/code><\/pre><hr id=\"ref07-b19\"><h3 id=\"ref07-b20\">7-5　型判定と安全なキャスト（実践）<\/h3><pre id=\"ref07-b21\" data-lang=\"plain text\"><code>Character c = GetCharacter();  // 返ってくる型は実行時まで不明\n\n// パターン1: is でチェック → キャスト\nif (c is Player p)\n    Debug.Log($\"プレイヤー Lv:{p.Level}\");\n\n// パターン2: GetComponent（Unity）\nIInteractable interactable = obj.GetComponent&lt;IInteractable&gt;();\nif (interactable != null)\n    interactable.Interact();\n\n// パターン3: switch 型マッチング\nswitch (c)\n{\n    case Boss boss:\n        Debug.Log($\"ボス！HP:{boss.MaxHp}\");\n        break;\n    case Player player:\n        Debug.Log($\"プレイヤー:{player.Name}\");\n        break;\n    default:\n        Debug.Log(\"不明なキャラクター\");\n        break;\n}<\/code><\/pre>"}, {"id": "ref08", "title": "第8章：例外処理", "html": "<blockquote id=\"ref08-b0\">📚 対応教科書章：Ch4.5（try-catch 基礎）/ Ch6.5（KeyNotFoundException）/ Ch8.5（NullReferenceException）<\/blockquote><hr id=\"ref08-b1\"><h3 id=\"ref08-b2\">8-1　例外とは<\/h3><p id=\"ref08-b3\"><strong>例外（Exception）<\/strong> は、実行時に発生した「想定外の事態」を表すオブジェクトです。<\/p><p id=\"ref08-b4\">処理できない場合、プログラムは停止します。<\/p><pre id=\"ref08-b5\" data-lang=\"plain text\"><code>// 例外が発生するコードの例\nstring[] names = { \"A\", \"B\" };\nDebug.Log(names[5]);   // IndexOutOfRangeException → ゲームが止まる<\/code><\/pre><hr id=\"ref08-b6\"><h3 id=\"ref08-b7\">8-2　try-catch-finally<\/h3><pre id=\"ref08-b8\" data-lang=\"plain text\"><code>try\n{\n    // 例外が起きるかもしれない処理\n    int value = int.Parse(inputText);   // \"abc\" が来たら例外\n    DoSomething(value);\n}\ncatch (FormatException e)\n{\n    // int.Parse に失敗した場合\n    Debug.LogError($\"数値変換エラー: {e.Message}\");\n}\ncatch (OverflowException e)\n{\n    // int の範囲を超えた場合\n    Debug.LogError($\"オーバーフロー: {e.Message}\");\n}\ncatch (Exception e)\n{\n    // その他全ての例外（最後に書く）\n    Debug.LogError($\"予期せぬエラー: {e.Message}\");\n}\nfinally\n{\n    // 例外が起きても起きなくても必ず実行される\n    // ファイルを閉じる・リソース解放など\n    CleanUp();\n}<\/code><\/pre><blockquote id=\"ref08-b9\">⚠️ <code class=\"ic\">catch<\/code> ブロックを<strong>空にしない<\/strong>（例外を握りつぶすのは最もよくないパターン）。<br>少なくとも <code class=\"ic\">Debug.LogError<\/code> や <code class=\"ic\">Debug.LogWarning<\/code> で記録する。<\/blockquote><hr id=\"ref08-b10\"><h3 id=\"ref08-b11\">8-3　主要な例外クラス<\/h3><div id=\"ref08-b12\" class=\"tblwrap\"><table><tr><th><strong>クラス名<\/strong><\/th><th><strong>発生条件<\/strong><\/th><th><strong>よくある原因<\/strong><\/th><\/tr><tr><td><code class=\"ic\">NullReferenceException<\/code><\/td><td>null の参照でメンバーにアクセス<\/td><td>Inspector 設定忘れ・<code class=\"ic\">new<\/code> し忘れ<\/td><\/tr><tr><td><code class=\"ic\">IndexOutOfRangeException<\/code><\/td><td>配列の範囲外インデックス<\/td><td>Length を超えたアクセス<\/td><\/tr><tr><td><code class=\"ic\">ArgumentException<\/code><\/td><td>引数が不正<\/td><td>null や空文字を想定外の場所に渡した<\/td><\/tr><tr><td><code class=\"ic\">ArgumentNullException<\/code><\/td><td>引数が null<\/td><td>null チェックを忘れた<\/td><\/tr><tr><td><code class=\"ic\">InvalidOperationException<\/code><\/td><td>操作が無効な状態で行われた<\/td><td>foreach 中の List 変更<\/td><\/tr><tr><td><code class=\"ic\">FormatException<\/code><\/td><td>文字列→数値変換の失敗<\/td><td><code class=\"ic
