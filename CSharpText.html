\">int.Parse<\/code> に非数値文字列<\/td><\/tr><tr><td><code class=\"ic\">OverflowException<\/code><\/td><td>数値の範囲超過<\/td><td><code class=\"ic\">checked<\/code> ブロック内の演算<\/td><\/tr><tr><td><code class=\"ic\">KeyNotFoundException<\/code><\/td><td>Dictionary に存在しないキー<\/td><td><code class=\"ic\">dict[key]<\/code> でキーが未登録<\/td><\/tr><tr><td><code class=\"ic\">DivideByZeroException<\/code><\/td><td>整数の 0 除算<\/td><td><code class=\"ic\">a / 0<\/code><\/td><\/tr><\/table><\/div><hr id=\"ref08-b13\"><h3 id=\"ref08-b14\">8-4　例外オブジェクトのプロパティ<\/h3><pre id=\"ref08-b15\" data-lang=\"plain text\"><code>try\n{\n    int.Parse(\"abc\");\n}\ncatch (Exception e)\n{\n    Debug.Log(e.Message);         // エラーの概要メッセージ\n    Debug.Log(e.StackTrace);      // どこで発生したかのスタックトレース\n    Debug.Log(e.GetType().Name);  // 例外クラス名（\"FormatException\" など）\n\n    // 元の例外（ラップされた例外）\n    if (e.InnerException != null)\n        Debug.Log(e.InnerException.Message);\n}<\/code><\/pre><hr id=\"ref08-b16\"><h3 id=\"ref08-b17\">8-5　throw：例外を投げる<\/h3><pre id=\"ref08-b18\" data-lang=\"plain text\"><code>// 引数のバリデーションに使う\npublic void SetHp(int value)\n{\n    if (value &lt; 0)\n        throw new ArgumentException($\"HP に負の値は指定できません: {value}\");\n    _hp = value;\n}\n\n// catch の中で再スロー（スタックトレースを保持）\ntry { RiskyOperation(); }\ncatch (Exception e)\n{\n    Debug.LogError(\"RiskyOperation 失敗\");\n    throw;   // throw e; ではなく throw; でスタックトレースを保持\n}<\/code><\/pre><hr id=\"ref08-b19\"><h3 id=\"ref08-b20\">8-6　カスタム例外クラス<\/h3><pre id=\"ref08-b21\" data-lang=\"plain text\"><code>// Exception を継承して独自の例外を作れる\npublic class GameRuleException : Exception\n{\n    public GameRuleException(string message) : base(message) { }\n    public GameRuleException(string message, Exception inner) : base(message, inner) { }\n}\n\n// 使い方\npublic void StartGame(int playerCount)\n{\n    if (playerCount &lt; 1 || playerCount &gt; 4)\n        throw new GameRuleException($\"プレイヤー数は1〜4人です: {playerCount}\");\n}\n\ntry { StartGame(5); }\ncatch (GameRuleException e) { Debug.LogError(e.Message); }<\/code><\/pre><hr id=\"ref08-b22\"><h3 id=\"ref08-b23\">8-7　例外 vs. if：使い分けの指針<\/h3><div id=\"ref08-b24\" class=\"tblwrap\"><table><tr><th><strong>状況<\/strong><\/th><th><strong>推奨<\/strong><\/th><th><strong>理由<\/strong><\/th><\/tr><tr><td>null の可能性がある（予測可能）<\/td><td><code class=\"ic\">if (x != null)<\/code> / <code class=\"ic\">?.<\/code><\/td><td>if の方が速く意図が明確<\/td><\/tr><tr><td>外部入力の変換（失敗しうる）<\/td><td><code class=\"ic\">TryParse<\/code> / <code class=\"ic\">TryGetValue<\/code><\/td><td>例外はコストが高い<\/td><\/tr><tr><td>プログラムのバグ（あってはならない状態）<\/td><td><code class=\"ic\">throw<\/code><\/td><td>早期に発見してデバッグ<\/td><\/tr><tr><td>外部 API・ファイル IO（制御できない失敗）<\/td><td><code class=\"ic\">try-catch<\/code><\/td><td>防御的プログラミング<\/td><\/tr><\/table><\/div><blockquote id=\"ref08-b25\">💡 「正常フロー」に例外を使わない。例外は本当に例外的な事態のために残しておく。<\/blockquote>"}, {"id": "ref09", "title": "第9章：デリゲート・イベント・ラムダ", "html": "<blockquote id=\"ref09-b0\">📚 対応教科書章：Ch11A（Action / event）/ Ch11B（static event）<\/blockquote><hr id=\"ref09-b1\"><h3 id=\"ref09-b2\">9-1　デリゲートとは<\/h3><p id=\"ref09-b3\"><strong>デリゲート<\/strong> は「メソッドを入れられる変数の型」です。<\/p><p id=\"ref09-b4\">メソッドを他のメソッドに渡したり、後から呼び出したりできます。<\/p><pre id=\"ref09-b5\" data-lang=\"plain text\"><code>// delegate キーワードで型を定義\npublic delegate void OnDamaged(int amount);\n\n// 変数として使う\nOnDamaged handler = (int amount) =&gt; Debug.Log($\"{amount} ダメージ！\");\nhandler(30);   // 呼び出す → \"30 ダメージ！\"<\/code><\/pre><hr id=\"ref09-b6\"><h3 id=\"ref09-b7\">9-2　Action と Func<\/h3><p id=\"ref09-b8\">毎回 <code class=\"ic\">delegate<\/code> 型を定義しなくても、標準の型が使えます。<\/p><pre id=\"ref09-b9\" data-lang=\"plain text\"><code>// Action：戻り値なし\nAction          greet  = () =&gt; Debug.Log(\"こんにちは\");\nAction&lt;int&gt;     damage = (n) =&gt; Debug.Log($\"{n} ダメージ\");\nAction&lt;int,int&gt; move   = (x, y) =&gt; Debug.Log($\"移動: ({x},{y})\");\n\ngreet();          // こんにちは\ndamage(50);       // 50 ダメージ\nmove(3, -1);\n\n// Func：戻り値あり（最後の型引数が戻り値）\nFunc&lt;int, int, int&gt; add  = (a, b) =&gt; a + b;\nFunc&lt;int, bool&gt;     isPositive = n =&gt; n &gt; 0;\n\nDebug.Log(add(3, 4));          // 7\nDebug.Log(isPositive(-1));     // false<\/code><\/pre><div id=\"ref09-b10\" class=\"tblwrap\"><table><tr><th><strong>型<\/strong><\/th><th><strong>戻り値<\/strong><\/th><th><strong>型引数の意味<\/strong><\/th><\/tr><tr><td><code class=\"ic\">Action<\/code><\/td><td>なし<\/td><td>引数の型（0〜16個）<\/td><\/tr><tr><td><code class=\"ic\">Action&lt;T&gt;<\/code><\/td><td>なし<\/td><td>引数の型<\/td><\/tr><tr><td><code class=\"ic\">Func&lt;TResult&gt;<\/code><\/td><td>TResult<\/td><td>最後が戻り値の型<\/td><\/tr><tr><td><code class=\"ic\">Func&lt;T, TResult&gt;<\/code><\/td><td>TResult<\/td><td>T=引数型, TResult=戻り値型<\/td><\/tr><\/table><\/div><hr id=\"ref09-b11\"><h3 id=\"ref09-b12\">9-3　マルチキャストデリゲート<\/h3><pre id=\"ref09-b13\" data-lang=\"plain text\"><code>// += で複数のメソッドを登録（マルチキャスト）\nAction onDie = () =&gt; Debug.Log(\"アニメーション再生\");\nonDie += () =&gt; Debug.Log(\"スコア加算\");\nonDie += () =&gt; Debug.Log(\"ドロップアイテム生成\");\n\nonDie();  // 3つ全て順番に呼ばれる\n\n// -= で削除\nonDie -= () =&gt; Debug.Log(\"スコア加算\");  // ← ラムダは削除できない！\n// 削除したいメソッドは変数に入れておく必要がある<\/code><\/pre><pre id=\"ref09-b14\" data-lang=\"plain text\"><code>// 正しい削除方法\nAction scoreAction = () =&gt; Debug.Log(\"スコア加算\");\nonDie += scoreAction;\nonDie -= scoreAction;   // これで削除できる<\/code><\/pre><hr id=\"ref09-b15\"><h3 id=\"ref09-b16\">9-4　event キーワード<\/h3><p id=\"ref09-b17\"><code class=\"ic\">event<\/code> はデリゲートを<strong>安全にする修飾子<\/strong>です。<\/p><pre id=\"ref09-b18\" data-lang=\"plain text\"><code>public class ExitSwitch : MonoBehaviour\n{\n    // event を付けると:\n    //   外部からは += / -= のみ可能\n    //   = で上書き・直接 Invoke が禁止される\n    public static event Action OnActivated;\n\n    void OnTriggerEnter(Collider other)\n    {\n        OnActivated?.Invoke();   // クラス内からのみ Invoke できる\n    }\n}\n\npublic class ExitDoor : MonoBehaviour\n{\n    void OnEnable()  =&gt; ExitSwitch.OnActivated += Open;   // 登録\n    void OnDisable() =&gt; ExitSwitch.OnActivated -= Open;   // 解除（必須！）\n\n    void Open() =&gt; Debug.Log(\"扉が開いた！\");\n}<\/code><\/pre><h4 id=\"ref09-b19\">static event の注意点<\/h4><pre id=\"ref09-b20\" data-lang=\"plain text\"><code>// ⚠️ static event はシーンをまたいで残り続ける\n//    OnDisable または OnDestroy で -= を忘れると\n//    破棄済みオブジェクトへの参照が残りエラーの原因になる\n\nvoid OnDisable() =&gt; ExitSwitch.OnActivated -= Open;   // 必ずペアで書く<\/code><\/pre><hr id=\"ref09-b21\"><h3 id=\"ref09-b22\">9-5　ラムダ式<\/h3><pre id=\"ref09-b23\" data-lang=\"plain text\"><code>// 通常のメソッド定義\nint Square(int x) { return x * x; }\n\n// ラムダ式（1）：引数と本体\n(int x) =&gt; { return x * x; }\n\n// ラムダ式（2）：型推論と式形式（最もよく使う）\nx =&gt; x * x\n\n// 引数なし\n() =&gt; Debug.Log(\"hello\")\n\n// 複数引数\n(a, b) =&gt; a + b\n\n// 複数行\n(a, b) =&gt;\n{\n    int sum = a + b;\n    return sum * 2;\n}<\/code><\/pre><h4 id=\"ref09-b24\">ラムダのキャプチャ<\/h4><pre id=\"ref09-b25\" data-lang=\"plain text\"><code>// ラムダは外側のスコープの変数を「キャプチャ」できる\nint multiplier = 3;\nFunc&lt;int, int&gt; triple = x =&gt; x * multiplier;   // multiplier をキャプチャ\n\nDebug.Log(triple(5));   // 15\n\nmultiplier = 10;        // キャプチャは参照なので変更が反映される\nDebug.Log(triple(5));   // 50<\/code><\/pre><hr id=\"ref09-b26\"><h3 id=\"ref09-b27\">9-6　デリゲートの実践パターン<\/h3><h4 id=\"ref09-b28\">コールバック（処理を後から渡す）<\/h4><pre id=\"ref09-b29\" data-lang=\"plain text\"><code>void FadeIn(float duration, Action onComplete)\n{\n    // duration 秒後に onComplete を呼ぶ\n    StartCoroutine(FadeCoroutine(duration, onComplete));\n}\n\n// 呼び出し側がコールバックを決める\nFadeIn(1.0f, () =&gt; Debug.Log(\"フェード完了！\"));\nFadeIn(0.5f, StartGame);   // メソッドを渡してもよい<\/code><\/pre><h4 id=\"ref09-b30\">条件を渡す（Predicate / Func&lt;T, bool&gt;）<\/h4><pre id=\"ref09-b31\" data-lang=\"plain text\"><code>// 汎用フィルタ関数\nList&lt;Enemy&gt; Filter(List&lt;Enemy&gt; enemies, Func&lt;Enemy, bool&gt; condition)\n{\n    return enemies.Where(condition).ToList();\n}\n\n// 使い方\nvar deadEnemies  = Filter(enemies, e =&gt; !e.IsAlive);\nvar nearEnemies  = Filter(enemies, e =&gt; e.Distance &lt; 5f);\nvar bossEnemies  = Filter(enemies, e =&gt; e is Boss);<\/code><\/pre>"}, {"id": "ref10", "title": "第10章：staticと設計パターン", "html": "<blockquote id=\"ref10-b0\">📚 対応教科書章：Ch11（static フィールド・event）/ Ch12（シングルトン・enum）/ Ch8.5（null 安全）<\/blockquote><hr id=\"ref10-b1\"><h3 id=\"ref10-b2\">10-1　static の整理<\/h3><pre id=\"ref10-b3\" data-lang=\"plain text\"><code>public class GameStats\n{\n    // static フィールド：全インスタンスで共有される1つの変数\n    public static int TotalScore = 0;\n    public static int EnemyKillCount = 0;\n\n    // static メソッド：インスタンスなしで呼べる\n    public static void Reset()\n    {\n        TotalScore    = 0;\n        EnemyKillCount = 0;\n    }\n\n    // static コンストラクタ：クラス初回利用時に1度だけ呼ばれる\n    static GameStats()\n    {\n        Debug.Log(\"GameStats 初期化\");\n    }\n}\n\n// 呼び方\nGameStats.TotalScore += 100;\nGameStats.Reset();<\/code><\/pre><hr id=\"ref10-b4\"><h3 id=\"ref10-b5\">10-2　シングルトンパターン<\/h3><p id=\"ref10-b6\">「アプリ内に1つしか存在しないオブジェクト」を保証する設計パターンです。<\/p><pre id=\"ref10-b7\" data-lang=\"plain text\"><code>public class GameManager : MonoBehaviour\n{\n    // 唯一のインスタンスを保持する static 変数\n    public static GameManager Instance { get; private set; }\n\n    public GameState State { get; private set; } = GameState.Title;\n    public static event Action&lt;GameState&gt; OnStateChanged;\n\n    void Awake()\n    {\n        // 2つ目のインスタンスが生成されたら破棄\n        if (Instance != null)\n        {\n            Destroy(gameObject);\n            return;\n        }\n        Instance = this;\n        // シーンをまたいで生き続ける場合\n        // DontDestroyOnLoad(gameObject);\n    }\n\n    public void ChangeState(GameState newState)\n    {\n        if (State == newState) return;   // 同じ状態への二重遷移を防ぐ\n        State = newState;\n        OnStateChanged?.Invoke(newState);\n    }\n}\n\n// どこからでもアクセス\nGameManager.Instance.ChangeState(GameState.Playing);<\/code><\/pre><h4 id=\"ref10-b8\">シングルトンの光と影<\/h4><div id=\"ref10-b9\" class=\"tblwrap\"><table><tr><th><strong>メリット<\/strong><\/th><th><strong>デメリット・注意点<\/strong><\/th><\/tr><tr><td>どこからでもアクセスできる<\/td><td>依存関係が見えにくくなる<\/td><\/tr><tr><td>グローバルな状態を管理しやすい<\/td><td>テストが難しくなる<\/td><\/tr><tr><td>シーンをまたいだ状態共有が楽<\/td><td><code class=\"ic\">DontDestroyOnLoad<\/code> を多用すると複雑化<\/td><\/tr><tr><td>Unity での実装が簡潔<\/td><td>複数シングルトンが依存し合うと管理困難<\/td><\/tr><\/table><\/div><hr id=\"ref10-b10\"><h3 id=\"ref10-b11\">10-3　enum の活用<\/h3><pre id=\"ref10-b12\" data-lang=\"plain text\"><code>// 基本的な enum\npublic enum GameState\n{\n    Title,\n    Playing,\n    GameOver,\n    Clear\n}\n\n// 基になる型を指定（デフォルトは int）\npublic enum Direction : byte\n{\n    North = 0,\n    East  = 1,\n    South = 2,\n    West  = 3\n}\n\n// Flags 属性でビット演算に使う\n[System.Flags]\npublic enum StatusEffect\n{\n    None    = 0,\n    Poison  = 1 &lt;&lt; 0,  // 1\n    Burn    = 1 &lt;&lt; 1,  // 2\n    Freeze  = 1 &lt;&lt; 2,  // 4\n    Stun    = 1 &lt;&lt; 3   // 8\n}\n\n// Flags の使い方\nStatusEffect effects = StatusEffect.Poison | StatusEffect.Burn;\nbool isPoisoned = (effects &amp; StatusEffect.Poison) != 0;\neffects |= StatusEffect.Stun;   // Stun を追加\neffects &amp;= ~StatusEffect.Burn;  // Burn を除去<\/code><\/pre><h4 id=\"ref10-b13\">enum の便利メソッド<\/h4><pre id=\"ref10-b14\" data-lang=\"plain text\"><code>GameState state = GameState.Playing;\n\n// 文字列変換\nstring name = state.ToString();              // \"Playing\"\nstring name2 = nameof(GameState.Playing);    // コンパイル時に文字列化\n\n// 文字列から変換\nGameState parsed = Enum.Parse&lt;GameState&gt;(\"GameOver\");\nbool ok = Enum.TryParse(\"Clear\", out GameState result);\n\n// 全値の取得\nforeach (GameState s in Enum.GetValues(typeof(GameState)))\n    Debug.Log(s);<\/code><\/pre><hr id=\"ref10-b15\"><h3 id=\"ref10-b16\">10-4　null 安全設計<\/h3><h4 id=\"ref10-b17\">null チェックのパターン集<\/h4><pre id=\"ref10-b18\" data-lang=\"plain text\"><code>// ① if による明示的チェック（最も基本）\nif (target != null)\n    target.TakeDamage(10);\n\n// ② null 条件演算子（1行で安全に呼べる）\ntarget?.TakeDamage(10);\nstring name = player?.Name ?? \"不明\";\n\n// ③ null 合体代入（null なら初期化）\n_instance ??= FindObjectOfType&lt;GameManager&gt;();\n\n// ④ ArgumentNullException で事前に弾く\nvoid SetTarget(Enemy t)\n{\n    _target = t ?? throw new ArgumentNullException(nameof(t));\n}\n\n// ⑤ Unity の null チェック（Destroy 後の偽 null）\n// Unity の Destroyed オブジェクトは == null だが is null ではない\nif (obj != null) { }    // Unity の == null を使う（Destroyed も捕捉）\nif (obj is null) { }    // C# の参照が null のみ（Destroyed は捕捉しない）<\/code><\/pre><hr id=\"ref10-b19\"><h3 id=\"ref10-b20\">10-5　その他の設計パターン（入門）<\/h3><h4 id=\"ref10-b21\">オブザーバーパターン（event で実現）<\/h4><pre id=\"ref10-b22\" data-lang=\"plain text\"><code>// 「状態が変わったとき関係者全員に通知」するパターン\n// Ch11〜12 で学んだ event の仕組みそのもの\npublic static event Action&lt;int&gt; OnScoreChanged;\nOnScoreChanged?.Invoke(newScore);<\/code><\/pre><h4 id=\"ref10-b23\">ファクトリーパターン（生成を1か所に集める）<\/h4><pre id=\"ref10-b24\" data-lang=\"plain text\"><code>public static class EnemyFactory\n{\n    public static Enemy Create(string type) =&gt; type switch\n    {\n        \"Slime\"  =&gt; new Slime(),\n        \"Goblin\" =&gt; new Goblin(),\n        _        =&gt; throw new ArgumentException($\"未知の敵タイプ: {type}\")\n    };\n}\n\nEnemy e = EnemyFactory.Create(\"Slime\");<\/code><\/pre><h4 id=\"ref10-b25\">コマンドパターン（処理を Action で管理）<\/h4><pre id=\"ref10-b26\" data-lang=\"plain text\"><code>// やった操作を記録・取り消しできる\nvar history = new Stack&lt;Action&gt;();\n\nvoid Do(Action action, Action undo)\n{\n    action();\n    history.Push(undo);\n}\n\nvoid Undo()\n{\n    if (history.Count &gt; 0)\n        history.Pop()();\n}<\/code><\/pre><hr id=\"ref10-b27\"><h3 id=\"ref10-b28\">まとめ：設計の指針<\/h3><ol id=\"ref10-b29\"><li><strong>できるだけ <\/strong><strong><code class=\"ic\">private<\/code><\/strong> にして外部への露出を最小限にする<\/li><li><strong>変更される可能性<\/strong> があるものと <strong>変更されないもの<\/strong> を分離する<\/li><li><strong>依存関係は一方向<\/strong>に（A が B を知っているなら、B は A を知らないように）<\/li><li><strong>インターフェースに依存<\/strong> する（具体的なクラスではなく「できること」に依存）<\/li><li><strong>null を渡さない・受け取らない<\/strong> 設計にする（null を前提とした分岐を減らす）<\/li><\/ol>"}, {"id": "cheat", "title": "付録：C#文法チートシート＆エラー辞典", "html": "<blockquote id=\"cheat-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 新規追加（v1.2）<\/blockquote><hr id=\"cheat-b1\"><div id=\"cheat-b2\" class=\"callout\"><span class=\"co-ic\">📚<\/span><div class=\"co-body\"><p>本編で学んだC#文法を<strong>1ページで見返せる<\/strong>付録です。迷ったらここに戻ってきましょう。各項目に「詳しく学んだ章」を付けてあります。<\/p><\/div><\/div><h3 id=\"cheat-b3\" class=\"sec\">1. C#スクリプトの基本構造（Ch0、5、7）<\/h3><pre id=\"cheat-b4\" data-lang=\"plain text\"><code>using UnityEngine;                    // ① using：使う機能の宣言（ファイル先頭）\nusing System.Collections.Generic;     //    ListやDictionaryにはこれが必要\n\npublic class PlayerController : MonoBehaviour   // ② クラス（ファイル名と同じ名前！）\n{\n    public float speed = 5f;          // ③ フィールド（クラス直下の変数）\n\n    void Start()                      // ④ メソッド（クラスの中・他メソッドの外）\n    {\n        int hp = 100;                 // ⑤ ローカル変数（このメソッド内だけ有効）\n    }\n}<\/code><\/pre><hr id=\"cheat-b5\"><h3 id=\"cheat-b6\" class=\"sec\">2. 型の一覧（Ch1、8.5）<\/h3><div id=\"cheat-b7\" class=\"tblwrap\"><table><tr><th><strong>型<\/strong><\/th><th><strong>入るもの<\/strong><\/th><th><strong>例<\/strong><\/th><th><strong>分類<\/strong><\/th><\/tr><tr><td><code class=\"ic\">int<\/code><\/td><td>整数<\/td><td><code class=\"ic\">int hp = 100;<\/code><\/td><td>値型<\/td><\/tr><tr><td><code class=\"ic\">float<\/code><\/td><td>小数（末尾にf）<\/td><td><code class=\"ic\">float speed = 5.5f;<\/code><\/td><td>値型<\/td><\/tr><tr><td><code class=\"ic\">bool<\/code><\/td><td>true / false<\/td><td><code class=\"ic\">bool isAlive = true;<\/code><\/td><td>値型<\/td><\/tr><tr><td><code class=\"ic\">string<\/code><\/td><td>文字列<\/td><td><code class=\"ic\">string name = \"勇者\";<\/code><\/td><td>参照型<\/td><\/tr><tr><td><code class=\"ic\">enum<\/code><\/td><td>決まった選択肢<\/td><td><code class=\"ic\">GameState.Playing<\/code><\/td><td>値型<\/td><\/tr><tr><td>クラス（自作型）<\/td><td>データ＋処理のまとまり<\/td><td><code class=\"ic\">Weapon sword = new Weapon();<\/code><\/td><td>参照型<\/td><\/tr><tr><td><code class=\"ic\">struct<\/code>（Vector3など）<\/td><td>小さなデータのまとまり<\/td><td><code class=\"ic\">new Vector3(0, 0, 0)<\/code><\/td><td>値型<\/td><\/tr><\/table><\/div><blockquote id=\"cheat-b8\">💡 <strong>値型<\/strong>：コピーすると別物になる。<strong>参照型<\/strong>：コピーしても同じ実体を指す（Ch8.5）。<\/blockquote><hr id=\"cheat-b9\"><h3 id=\"cheat-b10\" class=\"sec\">3. 演算子一覧（Ch1、2、8.5、11）<\/h3><div id=\"cheat-b11\" class=\"tblwrap\"><table><tr><th><strong>分類<\/strong><\/th><th><strong>演算子<\/strong><\/th><th><strong>意味<\/strong><\/th><\/tr><tr><td>算術<\/td><td><code class=\"ic\">  • - * / %<\/code><\/td><td>四則演算と余り<\/td><\/tr><tr><td>代入<\/td><td><code class=\"ic\">= += -= *= /= ++ --<\/code><\/td><td><code class=\"ic\">x += 3<\/code> は <code class=\"ic\">x = x + 3<\/code> の省略形<\/td><\/tr><tr><td>比較<\/td><td><code class=\"ic\">== != &lt; &gt; &lt;= &gt;=<\/code><\/td><td>結果は bool（<code class=\"ic\">=<\/code> 1個は代入なので注意！）<\/td><\/tr><tr><td>論理<\/td><td><code class=\"ic\">&amp;&amp; || !<\/code><\/td><td>かつ／または／ではない<\/td><\/tr><tr><td>三項<\/td><td><code class=\"ic\">条件 ? A : B<\/code><\/td><td>ifの1行版（Ch8）<\/td><\/tr><tr><td>null条件<\/td><td><code class=\"ic\">?.<\/code><\/td><td>nullでなければ実行（Ch8.5、11）<\/td><\/tr><tr><td>キャスト<\/td><td><code class=\"ic\">(int)3.5f<\/code><\/td><td>強制型変換（Ch1、9）<\/td><\/tr><tr><td>型判定<\/td><td><code class=\"ic\">is<\/code><\/td><td>「この型ですか？」（Ch9）<\/td><\/tr><tr><td>イベント登録<\/td><td><code class=\"ic\">+= -=<\/code>（Actionに対して）<\/td><td>放送の登録／解除（Ch11）<\/td><\/tr><\/table><\/div><hr id=\"cheat-b12\"><h3 id=\"cheat-b13\" class=\"sec\">4. 制御構文の使い分け（Ch2、3、6.5）<\/h3><div id=\"cheat-b14\" class=\"tblwrap\"><table><tr><th><strong>構文<\/strong><\/th><th><strong>使う場面<\/strong><\/th><th><strong>例<\/strong><\/th><\/tr><tr><td><code class=\"ic\">if / else if / else<\/code><\/td><td>条件で分岐する<\/td><td>HPが0以下ならゲームオーバー<\/td><\/tr><tr><td><code class=\"ic\">switch / case<\/code><\/td><td>決まった選択肢で分岐（enumと相性抲群）<\/td><td>ゲーム状態ごとの処理<\/td><\/tr><tr><td><code class=\"ic\">for<\/code><\/td><td>回数や番号（インデックス）が必要な繰り返し<\/td><td>コイン5枚を番号付きで配置<\/td><\/tr><tr><td><code class=\"ic\">foreach<\/code><\/td><td>全部に同じ処理（途中でAdd/Remove禁止！）<\/td><td>全スライムを動かす<\/td><\/tr><tr><td><code class=\"ic\">while<\/code><\/td><td>条件を満たす間繰り返す（止まる条件必須！）<\/td><td>コルーチンのスポーンループ<\/td><\/tr><tr><td><code class=\"ic\">return<\/code><\/td><td>値を返す＋メソッドを即終了（Ch5）<\/td><td><code class=\"ic\">if (isGameOver) { return; }<\/code><\/td><\/tr><tr><td><code class=\"ic\">break<\/code> / <code class=\"ic\">continue<\/code><\/td><td>ループを抜ける／次の周回へ飛ばす<\/td><td>switchのcase末尾はbreak必須<\/td><\/tr><\/table><\/div><hr id=\"cheat-b15\"><h3 id=\"cheat-b16\" class=\"sec\">5. データの入れ物比較（Ch3、6、6.5）<\/h3><div id=\"cheat-b17\" class=\"tblwrap\"><table><tr><th><strong>道具<\/strong><\/th><th><strong>大きさ<\/strong><\/th><th><strong>要素数<\/strong><\/th><th><strong>得意技<\/strong><\/th><th><strong>必要なusing<\/strong><\/th><\/tr><tr><td>配列 <code class=\"ic\">int[]<\/code><\/td><td>固定<\/td><td><code class=\"ic\">.Length<\/code><\/td><td>個数が決まったデータ<\/td><td>なし<\/td><\/tr><tr><td><code class=\"ic\">List&lt;T&gt;<\/code><\/td><td>可変<\/td><td><code class=\"ic\">.Count<\/code><\/td><td>増えたり減ったりする一覧<\/td><td><code class=\"ic\">System.Collections.Generic<\/code><\/td><\/tr><tr><td><code class=\"ic\">Dictionary&lt;K,V&gt;<\/code><\/td><td>可変<\/td><td><code class=\"ic\">.Count<\/code><\/td><td>「名前→データ」の検索<\/td><td><code class=\"ic\">System.Collections.Generic<\/code><\/td><\/tr><\/table><\/div><hr id=\"cheat-b18\"><h3 id=\"cheat-b19\" class=\"sec\">6. アクセス修飾子とクラス関連キーワード（Ch7〜11）<\/h3><div id=\"cheat-b20\" class=\"tblwrap\"><table><tr><th><strong>キーワード<\/strong><\/th><th><strong>意味<\/strong><\/th><th><strong>章<\/strong><\/th><\/tr><tr><td><code class=\"ic\">public<\/code><\/td><td>どこからでも使える（Inspectorにも表示）<\/td><td>Ch7<\/td><\/tr><tr><td><code class=\"ic\">private<\/code><\/td><td>クラス内限定（省略時の既定値）<\/td><td>Ch7.5<\/td><\/tr><tr><td><code class=\"ic\">protected<\/code><\/td><td>自分と子クラスまで<\/td><td>Ch8<\/td><\/tr><tr><td><code class=\"ic\">class<\/code> / <code class=\"ic\">new<\/code><\/td><td>設計図／実体の生成<\/td><td>Ch7<\/td><\/tr><tr><td>コンストラクタ<\/td><td>newの瞬間に呼ばれる。クラス名と同名・戻り値なし<\/td><td>Ch7.5<\/td><\/tr><tr><td>プロパティ <code class=\"ic\">{ get; set; }<\/code><\/td><td>読み書きにルールを付ける窓口（<code class=\"ic\">private set<\/code> で書き込み制限）<\/td><td>Ch7.5<\/td><\/tr><tr><td><code class=\"ic\">: 親クラス<\/code><\/td><td>継承（共通部分を引き継ぐ。継承は1つだけ）<\/td><td>Ch8<\/td><\/tr><tr><td><code class=\"ic\">virtual<\/code> / <code class=\"ic\">override<\/code><\/td><td>上書き許可／上書き宣言（ポリモーフィズムの鍵）<\/td><td>Ch8〜9<\/td><\/tr><tr><td><code class=\"ic\">this<\/code> / <code class=\"ic\">base<\/code><\/td><td>自分自身／親クラス<\/td><td>Ch7.5、9<\/td><\/tr><tr><td><code class=\"ic\">interface<\/code><\/td><td>機能の契約書（複数実装OK、実装メソッドはpublic）<\/td><td>Ch10<\/td><\/tr><tr><td><code class=\"ic\">static<\/code><\/td><td>インスタンスではなくクラスに1つ<\/td><td>Ch11〜12<\/td><\/tr><tr><td><code class=\"ic\">Action<\/code> / <code class=\"ic\">event<\/code><\/td><td>デリゲート（処理を入れる変数）／その安全ロック<\/td><td>Ch11<\/td><\/tr><\/table><\/div><hr id=\"cheat-b21\"><h3 id=\"cheat-b22\" class=\"sec\">7. MonoBehaviourライフサイクル（Ch0、8、11）<\/h3><pre id=\"cheat-b23\" data-lang=\"plain text\"><code>オブジェクト生成\n   │\n   ▼\n Awake()      ← 生成直後に1回（シングルトンの初期化など）\n   │\n   ▼\n OnEnable()   ← 有効化のたび（イベント登録 += はここ）\n   │\n   ▼\n Start()      ← 最初のフレームの前に1回（初期化の定位置）\n   │\n   ▼\n Update()     ← 毎フレーム（移動には Time.deltaTime を掛ける！）\n   │\n   ▼\n OnDisable()  ← 無効化のたび（イベント解除 -= はここ）\n   │\n   ▼\n OnDestroy()  ← 破棄時に1回<\/code><\/pre><hr id=\"cheat-b24\"><h3 id=\"cheat-b25\" class=\"sec\">8. よくあるエラー辞典 🐛<\/h3><div id=\"cheat-b26\" class=\"tblwrap\"><table><tr><th><strong>エラー／症状<\/strong><\/th><th><strong>意味<\/strong><\/th><th><strong>まず疑うこと<\/strong><\/th><th><strong>章<\/strong><\/th><\/tr><tr><td><code class=\"ic\">NullReferenceException<\/code><\/td><td>何も指していない変数の中身を使った<\/td><td>Inspectorの設定忘れ／<code class=\"ic\">new<\/code> し忘れ<\/td><td>Ch8.5<\/td><\/tr><tr><td><code class=\"ic\">IndexOutOfRangeException<\/code><\/td><td>配列の範囲外を触った<\/td><td>添字は0始まり。最後は <code class=\"ic\">Length - 1<\/code><\/td><td>Ch3、4.5<\/td><\/tr><tr><td><code class=\"ic\">KeyNotFoundException<\/code><\/td><td>Dictionaryにないキーを引いた<\/td><td><code class=\"ic\">ContainsKey<\/code> / <code class=\"ic\">TryGetValue<\/code> で事前確認<\/td><td>Ch6.5<\/td><\/tr><tr><td><code class=\"ic\">InvalidOperationException<\/code>（foreach中）<\/td><td>foreach中にListをAdd/Removeした<\/td><td>予約リストパターンを使う<\/td><td>Ch9<\/td><\/tr><tr><td><code class=\"ic\">; expected<\/code> などのコンパイルエラー<\/td><td>文法ミス<\/td><td>セミコロン忘れ・括弧の対応・全角スペース混入<\/td><td>Ch0<\/td><\/tr><tr><td>スクリプトがアタッチできない<\/td><td>ファイル名とクラス名の不一致<\/td><td>両者を完全一致させる<\/td><td>Ch0<\/td><\/tr><tr><td><code class=\"ic\">List&lt;string&gt;<\/code> が見つからない<\/td><td>using不足<\/td><td><code class=\"ic\">using System.Collections.Generic;<\/code> を先頭に<\/td><td>Ch6<\/td><\/tr><tr><td><code class=\"ic\">OnTriggerEnter<\/code> が呼ばれない<\/td><td>Triggerの3条件不足<\/td><td>Is Trigger✓／相手のCollider／Rigidbody<\/td><td>Ch10B<\/td><\/tr><tr><td>キャラが見えない／動かない<\/td><td>座標やカメラの範囲外<\/td><td>X: -8〜+8、Y: -4.5〜+4.5、Z: 0 を確認<\/td><td>Ch1<\/td><\/tr><tr><td>ゲームオーバー後も敵が動く<\/td><td>状態管理の欠如<\/td><td>GameManagerのStateで制御<\/td><td>Ch12<\/td><\/tr><\/table><\/div><hr id=\"cheat-b27\"><h3 id=\"cheat-b28\" class=\"sec\">迷ったときの合言葉<\/h3><ol id=\"cheat-b29\"><li>エラー文は<strong>上から読む<\/strong>。ファイル名と行番号が書いてある<\/li><li>迷ったら <code class=\"ic\">Debug.Log<\/code> で<strong>中身を見る<\/strong><\/li><li>1機能作るたびに<strong>Playで確認<\/strong><\/li><li>コピペが2回続いたら<strong>メソッド化・クラス化<\/strong>を考える<\/li><\/ol>"}]};

<script>
/* ==========================================================
   コードの魔導書 — C# サブセットインタプリタ (Phase 2)
   part1: 字句解析 + 構文解析
