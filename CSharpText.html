<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コードの魔導書 — Unity C# ゲーム開発講座</title>
<style>
/* ==========================================================
   コードの魔導書 — 冒険者の手引き デザインシステム (Phase 1)
   配色: インク濃紺 / 生成りの紙 / 真鍮
   ========================================================== */
:root{
  --paper:#f2ecdd; --paper2:#e9e1cc; --surface:#faf6ea;
  --ink:#242e3c; --ink2:#5b6370; --line:#d6ccb2; --line2:#c4b892;
  --brass:#8f7328; --brass2:#b3934a; --brass-soft:rgba(143,115,40,.10);
  --code-bg:#242b38; --code-tx:#e8e1cb; --code-line:#39424f;
  --c-kw:#d9a95e; --c-str:#a8c98d; --c-num:#dd8f7c; --c-com:#7d8798; --c-ty:#8fc0d8;
  --danger:#a34434; --shadow:0 1px 2px rgba(36,46,60,.08),0 6px 18px rgba(36,46,60,.07);
}
[data-theme="dark"]{
  --paper:#13161c; --paper2:#181c24; --surface:#1b202a;
  --ink:#e2dbc6; --ink2:#98a0ac; --line:#2b3240; --line2:#3a4252;
  --brass:#c2a35b; --brass2:#d8bd7d; --brass-soft:rgba(194,163,91,.12);
  --code-bg:#10141b; --code-tx:#ddd6bf; --code-line:#262e3c;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  height:100%; overflow:hidden;
  font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP","Noto Serif CJK JP",Georgia,serif;
  background:var(--paper); color:var(--ink); font-size:16px;
  background-image:radial-gradient(rgba(60,50,20,.028) 1px,transparent 1px);
  background-size:5px 5px;
}
[data-theme="dark"] body,[data-theme="dark"]{background-image:radial-gradient(rgba(255,255,255,.014) 1px,transparent 1px);background-size:5px 5px}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
::selection{background:var(--brass-soft)}
a{color:var(--brass);text-decoration-color:var(--line2)}
:focus-visible{outline:2px solid var(--brass2);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ---------- 上部バー ---------- */
.topbar{
  height:54px;display:flex;align-items:center;gap:20px;padding:0 18px;
  border-bottom:1px solid var(--line);background:var(--paper);
  position:relative;z-index:40;
}
.brand{display:flex;align-items:baseline;gap:10px;white-space:nowrap}
.brand .mark{color:var(--brass);transform:translateY(2px)}
.brand b{font-size:17px;letter-spacing:.06em;font-weight:600}
.brand .sub{font-size:11.5px;color:var(--ink2);letter-spacing:.14em}
.modes{display:flex;gap:2px;margin-left:8px}
.modes button{
  padding:7px 14px 6px;font-size:13.5px;letter-spacing:.12em;color:var(--ink2);
  border-bottom:2px solid transparent;
}
.modes button:hover:not(:disabled){color:var(--ink)}
.modes button.on{color:var(--ink);border-bottom-color:var(--brass)}
.modes button:disabled{cursor:not-allowed;opacity:.45}
.modes button:disabled i{font-style:normal;font-size:10px;color:var(--brass);margin-left:4px;letter-spacing:0}
.top-tools{margin-left:auto;display:flex;align-items:center;gap:8px}
.searchbtn{
  display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink2);
  border:1px solid var(--line);padding:6px 12px;border-radius:3px;background:var(--surface);
  min-height:32px;
}
.searchbtn:hover{border-color:var(--line2);color:var(--ink)}
.searchbtn kbd{font-family:Menlo,Consolas,monospace;font-size:10.5px;border:1px solid var(--line);border-radius:2px;padding:1px 5px;background:var(--paper)}
.iconbtn{width:34px;height:34px;display:grid;place-items:center;border:1px solid transparent;border-radius:3px;color:var(--ink2)}
.iconbtn:hover{color:var(--ink);border-color:var(--line)}
.menubtn{display:none}

/* ---------- レイアウト ---------- */
.layout{display:flex;height:calc(100% - 54px)}
.sidebar{
  width:272px;flex:none;border-right:1px solid var(--line);overflow-y:auto;
  padding:18px 0 40px;background:var(--paper);
}
.side-label{font-size:10.5px;letter-spacing:.22em;color:var(--brass);padding:10px 20px 6px;font-weight:600}
.bookmark-chip{
  margin:2px 14px 10px;display:block;width:calc(100% - 28px);text-align:left;
  border:1px solid var(--line2);border-radius:3px;padding:9px 12px;background:var(--surface);
}
.bookmark-chip:hover{border-color:var(--brass2)}
.bookmark-chip .bm-t{font-size:10.5px;color:var(--brass);letter-spacing:.16em}
.bookmark-chip .bm-n{font-size:13px;margin-top:2px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chlist{list-style:none}
.chlist button{
  width:100%;text-align:left;display:flex;gap:10px;align-items:baseline;
  padding:7px 14px 7px 20px;font-size:13.5px;line-height:1.5;border-left:2px solid transparent;
}
.chlist button:hover{background:var(--brass-soft)}
.chlist li.cur button{border-left-color:var(--brass);background:var(--brass-soft)}
.chlist .num{font-family:Menlo,Consolas,monospace;font-size:11px;color:var(--brass);flex:none;width:30px;letter-spacing:.02em}
.chlist .nm{flex:1;color:var(--ink)}
.chlist .rd{flex:none;font-size:11px;color:var(--brass);opacity:0;transform:translateY(1px)}
.chlist li.read .rd{opacity:1}
.side-sep{border:none;border-top:1px solid var(--line);margin:14px 20px}
.gyaku li button{display:block;width:100%;text-align:left;padding:6px 20px;font-size:12.5px;color:var(--ink2);line-height:1.5}
.gyaku li button:hover{color:var(--ink);background:var(--brass-soft)}
.gyaku li button b{color:var(--brass);font-weight:600;margin-right:6px;font-size:11px}

/* ---------- 本文リーダー ---------- */
.main{flex:1;overflow-y:auto;scroll-behavior:smooth}
.doc{max-width:740px;margin:0 auto;padding:44px 40px 90px}

.tobira{margin:14px 0 40px;padding-bottom:26px;border-bottom:1px double var(--line2);position:relative}
.tobira::after{content:"";position:absolute;left:0;bottom:-4px;width:100%;border-bottom:1px solid var(--line2)}
.tobira .chapno{font-size:12px;letter-spacing:.34em;color:var(--brass);font-weight:600}
.tobira h1{font-size:29px;font-weight:600;line-height:1.5;margin-top:10px;letter-spacing:.02em}
.tobira .orn{margin-top:14px;color:var(--brass2);font-size:13px;letter-spacing:.5em}

.doc p{line-height:2.0;margin:0 0 1.05em;letter-spacing:.015em}
.doc h2,.doc h3,.doc h4{font-weight:600;line-height:1.6;margin:2.4em 0 .9em;letter-spacing:.03em}
.doc h2{font-size:22px;padding-bottom:.4em;border-bottom:1px solid var(--line)}
.doc h3{font-size:18.5px}
.doc h3.sec::before,.doc h2::before{content:"◆";color:var(--brass2);font-size:.62em;margin-right:.7em;vertical-align:.18em}
.doc h4{font-size:16.5px;color:var(--ink)}
.doc hr{border:none;text-align:center;margin:2.2em 0;position:relative;height:1.6em;line-height:1.6em;overflow:visible}
.doc hr::before{content:"";position:absolute;top:.8em;left:0;right:0;border-top:1px solid var(--line)}
.doc hr::after{content:"❖";position:relative;background:var(--paper);padding:0 1em;color:var(--brass2);font-size:11px}
.doc ul,.doc ol{margin:0 0 1.2em;padding-left:1.6em}
.doc li{line-height:1.95;margin:.25em 0}
.doc ul li::marker{color:var(--brass)}
.doc ol li::marker{color:var(--brass);font-family:Menlo,Consolas,monospace;font-size:.85em}
.doc blockquote{
  margin:1.4em 0;padding:.65em 1.3em .6em;border-left:2px solid var(--brass2);
  color:var(--ink);line-height:2.0;background:linear-gradient(to right,var(--brass-soft),transparent 70%);
}
.doc .callout{
  display:flex;gap:14px;margin:1.6em 0;padding:16px 18px 12px;
  background:var(--paper2);border:1px solid var(--line);border-left:3px solid var(--brass);border-radius:2px;
}
.doc .callout .co-ic{flex:none;font-size:17px;line-height:1.9}
.doc .callout .co-body{flex:1;min-width:0}
.doc .callout p{margin-bottom:.5em}
.doc .callout p:last-child{margin-bottom:.2em}

.doc code.ic{
  font-family:"JetBrains Mono",Menlo,Consolas,"Noto Sans Mono CJK JP",monospace;font-size:.86em;
  background:var(--brass-soft);border:1px solid var(--line);border-radius:2px;padding:.08em .38em;
  cursor:pointer;transition:border-color .12s;white-space:nowrap;
}
.doc code.ic:hover{border-color:var(--brass2)}

.doc pre{
  position:relative;margin:1.5em 0;background:var(--code-bg);color:var(--code-tx);
  border-radius:3px;border:1px solid var(--code-line);
  font-family:"JetBrains Mono",Menlo,Consolas,"Noto Sans Mono CJK JP",monospace;
  font-size:13.5px;line-height:1.75;overflow-x:auto;
}
.doc pre code{display:block;padding:16px 18px;white-space:pre}
.doc pre .copybtn{
  position:absolute;top:8px;right:8px;font-size:11px;letter-spacing:.1em;
  color:var(--code-tx);opacity:0;border:1px solid var(--code-line);border-radius:2px;
  padding:3px 9px;background:var(--code-bg);transition:opacity .15s;
}
.doc pre:hover .copybtn{opacity:.85}
.doc pre .copybtn:hover{opacity:1;border-color:var(--c-kw)}
.c-kw{color:var(--c-kw)} .c-str{color:var(--c-str)} .c-num{color:var(--c-num)}
.c-com{color:var(--c-com)} .c-ty{color:var(--c-ty)}
span.c-kw{cursor:pointer;border-bottom:1px dotted transparent}
span.c-kw:hover{border-bottom-color:var(--c-kw)}

.tblwrap{overflow-x:auto;margin:1.5em 0}
.doc table{border-collapse:collapse;width:100%;font-size:14px;line-height:1.8}
.doc th,.doc td{border:1px solid var(--line);padding:8px 13px;text-align:left;vertical-align:top}
.doc th{background:var(--paper2);font-weight:600;font-size:13px;letter-spacing:.04em}
.doc td code.ic{white-space:normal}

.todo{display:inline-block;width:.85em;height:.85em;border:1px solid var(--line2);border-radius:2px;margin-right:.55em;vertical-align:-.06em}
.todo.done{background:var(--brass);border-color:var(--brass)}

.flash{animation:flashbg 1.8s ease-out}
@keyframes flashbg{0%{box-shadow:0 0 0 3px var(--brass2),0 0 0 8px var(--brass-soft)}100%{box-shadow:0 0 0 3px transparent,0 0 0 8px transparent}}

/* 章末 */
.chfoot{margin-top:70px;border-top:1px solid var(--line);padding-top:26px}
.readbtn{
  display:flex;align-items:center;gap:10px;border:1px solid var(--line2);border-radius:3px;
  padding:12px 18px;font-size:14px;width:100%;background:var(--surface);min-height:44px;
}
.readbtn:hover{border-color:var(--brass2)}
.readbtn .stamp{width:20px;height:20px;flex:none;border:1px solid var(--line2);border-radius:50%;display:grid;place-items:center;font-size:11px;color:transparent}
.readbtn.on .stamp{border-color:var(--brass);color:var(--brass)}
.readbtn.on{border-color:var(--brass2);background:var(--brass-soft)}
.pagenav{display:flex;gap:12px;margin-top:16px}
.pagenav a{
  flex:1;border:1px solid var(--line);border-radius:3px;padding:12px 16px;min-height:44px;
  text-decoration:none;color:var(--ink);background:var(--surface);cursor:pointer;
}
.pagenav a:hover{border-color:var(--brass2)}
.pagenav .dir{font-size:10.5px;color:var(--brass);letter-spacing:.2em}
.pagenav .ttl{font-size:13.5px;margin-top:3px;display:block;line-height:1.5}
.pagenav a.next{text-align:right}
.pagenav a.ghost{visibility:hidden}

/* ---------- 魔導書パネル ---------- */
.gpanel{
  position:fixed;top:54px;right:0;bottom:0;width:430px;max-width:100vw;z-index:50;
  background:var(--surface);border-left:1px solid var(--line2);box-shadow:var(--shadow);
  transform:translateX(102%);transition:transform .22s ease;display:flex;flex-direction:column;
}
.gpanel.open{transform:none}
.gpanel .gp-head{
  flex:none;display:flex;align-items:center;gap:10px;padding:13px 16px;
  border-bottom:2px solid var(--brass2);
}
.gpanel .gp-head .gp-ic{color:var(--brass)}
.gpanel .gp-head .gp-title{font-size:14.5px;font-weight:600;flex:1;line-height:1.4}
.gpanel .gp-open{font-size:11.5px;color:var(--brass);border:1px solid var(--line2);border-radius:2px;padding:5px 9px;white-space:nowrap}
.gpanel .gp-open:hover{border-color:var(--brass2)}
.gpanel .gp-body{flex:1;overflow-y:auto;padding:20px 22px 60px;font-size:14.5px}
.gpanel .doc{padding:0;max-width:none}
.gpanel .doc p{line-height:1.9}
.gpanel .doc pre{font-size:12.5px}

/* ---------- 検索パレット ---------- */
.palette-veil{position:fixed;inset:0;background:rgba(20,18,10,.35);z-index:80;display:none}
.palette-veil.open{display:block}
.palette{
  position:fixed;top:11vh;left:50%;transform:translateX(-50%);width:min(660px,92vw);z-index:81;
  background:var(--surface);border:1px solid var(--line2);border-radius:4px;box-shadow:var(--shadow);
  display:none;flex-direction:column;overflow:hidden;
}
.palette.open{display:flex}
.palette input{
  font-family:inherit;font-size:16px;padding:15px 18px;border:none;outline:none;
  background:transparent;color:var(--ink);border-bottom:1px solid var(--line);
}
.palette input::placeholder{color:var(--ink2)}
.palette .presults{max-height:54vh;overflow-y:auto}
.palette .pr{
  display:block;width:100%;text-align:left;padding:10px 18px;border-left:2px solid transparent;
}
.palette .pr .where{font-size:11px;color:var(--brass);letter-spacing:.08em}
.palette .pr .snip{font-size:13.5px;line-height:1.7;margin-top:2px;color:var(--ink);display:block;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.palette .pr mark{background:var(--brass-soft);color:var(--brass);font-weight:600}
.palette .pr.sel,.palette .pr:hover{background:var(--brass-soft);border-left-color:var(--brass)}
.palette .pempty{padding:22px 18px;color:var(--ink2);font-size:13.5px}
.palette .phint{font-size:11px;color:var(--ink2);padding:8px 18px;border-top:1px solid var(--line);display:flex;gap:16px}
.palette .phint kbd{font-family:Menlo,Consolas,monospace;font-size:10px;border:1px solid var(--line);border-radius:2px;padding:0 4px}

/* ---------- レスポンシブ ---------- */
@media (max-width:960px){
  .menubtn{display:grid}
  .sidebar{position:fixed;top:54px;left:0;bottom:0;z-index:60;transform:translateX(-102%);transition:transform .2s;box-shadow:var(--shadow)}
  .sidebar.open{transform:none}
  .doc{padding:30px 20px 80px}
  .topbar{gap:8px;padding:0 10px}
  .brand{gap:7px}
  .brand b{font-size:15px}
  .brand .sub{display:none}
  .searchbtn .stxt,.searchbtn kbd{display:none}
  .searchbtn{padding:6px 9px}
  .gpanel{width:100vw}
  .modes{margin-left:0}
  .modes button{padding:7px 8px 6px;letter-spacing:.02em;font-size:12.5px;white-space:nowrap}
  .modes button:disabled{display:none}
}

/* ==================== Phase 2：演習の間・訓練所 ==================== */
.modes{overflow-x:auto;scrollbar-width:none}
.modes::-webkit-scrollbar{display:none}

/* サイドバー */
.ex-group{font-size:11px;letter-spacing:.14em;color:var(--ink2);padding:14px 20px 5px;font-weight:600}
.exlist{list-style:none;margin:0;padding:0 10px}
.exlist li button{
  display:flex;align-items:center;gap:9px;width:100%;text-align:left;
  padding:7px 10px;border-radius:3px;color:var(--ink2);font-size:13px;line-height:1.45;
}
.exlist li button:hover{background:var(--brass-soft);color:var(--ink)}
.exlist li.cur button{background:var(--brass-soft);color:var(--ink);box-shadow:inset 2px 0 0 var(--brass)}
.exlist li .exmark{flex:none;width:1.2em;color:var(--brass);font-size:12px}
.exlist li.done .exmark{color:#5f8f5a}
.exlist li.done .exnm{text-decoration:none}
.dojo-tips{font-size:11.5px;line-height:2;color:var(--ink2);padding:4px 20px 20px;font-family:Menlo,Consolas,monospace}

/* お題カード */
.ex-prompt{
  background:var(--paper2);border:1px solid var(--line);border-left:3px solid var(--brass);
  border-radius:2px;padding:14px 18px;margin:0 0 18px;font-size:14.5px;line-height:1.9;
}
.ex-prompt b{display:block;font-size:11px;letter-spacing:.18em;color:var(--brass);margin-bottom:4px}
.ex-prompt p{margin:.2em 0}
.dojo-goal{color:var(--brass);font-weight:600}

/* エディタ */
.ed-wrap{
  position:relative;height:340px;min-height:140px;resize:vertical;overflow:hidden;
  background:var(--code-bg);border:1px solid var(--line2);border-radius:3px;margin:0 0 12px;
}
.ed-hl,.ed-ta{
  position:absolute;inset:0;margin:0;border:0;padding:14px 16px;
  font:13px/1.75 Menlo,Consolas,"Courier New",monospace;white-space:pre;overflow:auto;
  tab-size:4;background:transparent;
}
.ed-hl{color:#ccd5e3;pointer-events:none}
.ed-hl code{display:block;min-width:max-content}
.ed-ta{color:transparent;caret-color:#e0c377;outline:none;resize:none}
.ed-ta::selection{background:rgba(194,163,91,.30)}

/* 操作列 */
.ex-bar{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px}
.exbtn{
  font-size:13px;padding:8px 16px;border:1px solid var(--line2);border-radius:3px;
  background:var(--surface);color:var(--ink);letter-spacing:.04em;
}
.exbtn:hover{border-color:var(--brass)}
.exbtn.primary{border-color:var(--brass);color:var(--brass);font-weight:600}
.exbtn.primary:hover{background:var(--brass-soft)}
.exbtn.judge{font-weight:600}
.exbtn.ghost{color:var(--ink2)}

/* ヒント・判定 */
.ex-hint{
  background:var(--paper2);border:1px dashed var(--line2);border-radius:2px;
  padding:9px 14px;margin:0 0 8px;font-size:13.5px;line-height:1.8;color:var(--ink2);
}
.ex-hint b{color:var(--brass);margin-right:.6em;font-size:11.5px;letter-spacing:.1em}
.ex-verdict{margin:4px 0 14px}
.ex-stamp{
  display:inline-grid;place-items:center;width:86px;height:86px;border:3px double var(--brass);
  border-radius:50%;color:var(--brass);font-size:24px;font-weight:700;letter-spacing:.1em;
  transform:rotate(-11deg);margin:6px 14px 6px 2px;vertical-align:middle;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
}
.ex-pass-msg{display:inline-block;font-size:14px;color:var(--ink);vertical-align:middle}
.ex-fail{font-size:13.5px;line-height:1.8;color:var(--ink)}
.ex-diff{border-collapse:collapse;margin-top:8px;font-family:Menlo,Consolas,monospace;font-size:12.5px}
.ex-diff th,.ex-diff td{border:1px solid var(--line);padding:5px 12px;text-align:left}
.ex-diff th{font-size:11px;letter-spacing:.1em;color:var(--ink2);background:var(--paper2)}
.ex-diff tr.diff td{background:rgba(160,90,82,.12)}

/* コンソール */
.con-label{font-size:10.5px;letter-spacing:.22em;color:var(--ink2);margin:2px 0 5px}
.con{
  background:var(--code-bg);border:1px solid var(--line2);border-radius:3px;
  min-height:64px;max-height:240px;overflow:auto;padding:10px 14px;
  font:12.5px/1.8 Menlo,Consolas,monospace;
}
.con-empty{color:#6b7688;font-style:italic}
.con-line{white-space:pre-wrap;word-break:break-all}
.con-line.log{color:#ccd5e3}
.con-line.warn{color:#d9b354}
.con-line.err{color:#e08f84}

/* 訓練所 */
.dojo-canvas-wrap{margin:0 0 14px;text-align:center}
.dojo-canvas{
  width:100%;max-width:720px;aspect-ratio:3/2;border:1px solid var(--line2);border-radius:3px;
  background:#171c26;box-shadow:var(--shadow);outline:none;
}
@media (max-width:960px){
  .ed-wrap{height:280px}
  .ex-stamp{width:70px;height:70px;font-size:19px}
}

</style>
</head>
<body>
<header class="topbar">

<script>
var DATA = {"chapters": [{"id": "ch00", "num": "0", "name": "Unityという舞台を用意しよう", "title": "Chapter 0 Unityという舞台を用意しよう", "html": "<blockquote id=\"ch00-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者） | <strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><hr id=\"ch00-b1\"><div id=\"ch00-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>プロローグ<\/strong>：あなたはこれから「冒険者訓練所」に入学し、ゲーム開発という冒険に出ます。まず必要なのは剣でも魔法でもなく、修行の「舞台」です。<\/p><\/div><\/div><h3 id=\"ch00-b3\" class=\"sec\">この章でできるようになること<\/h3><p id=\"ch00-b4\">この章のゴールはとてもシンプルです。<\/p><p id=\"ch00-b5\">Unityで新しい3Dプロジェクトを作り、画面に出したCubeに空のスクリプトを貼り付けて、エディタで開くこと。<\/p><ul id=\"ch00-b6\"><li>まだゲームは作りません。<\/li><li>まだコードもほとんど書きません。<\/li><li>まずはゲーム開発のための「舞台」を作りましょう。<\/li><\/ul><div id=\"ch00-b7\" class=\"callout\"><span class=\"co-ic\">📖<\/span><div class=\"co-body\"><p><strong>本書の位置づけ<\/strong>：この章はC#文法の章ではなく、<strong>準備章（環境構築編）<\/strong>です。C#の文法学習はChapter 1から始まります。本書は「Unityでゲームを作りながら、一冊でC#の基礎文法を学ぶ」設計になっています。<\/p><\/div><\/div><hr id=\"ch00-b8\"><h3 id=\"ch00-b9\" class=\"sec\">0-1 Unity Hubをインストールしよう<\/h3><p id=\"ch00-b10\">ゲームを作るためには、まずUnityをインストールする必要があります。<\/p><p id=\"ch00-b11\">Unity本体は <strong>Unity Hub<\/strong> という管理ソフトから導入します。<\/p><p id=\"ch00-b12\">以下のURLからUnity Hubをダウンロードしてください。<\/p><pre id=\"ch00-b13\" data-lang=\"plain text\"><code>https://unity.com/download<\/code><\/pre><p id=\"ch00-b14\">［図0-1：Unity Hubのダウンロード画面］<\/p><p id=\"ch00-b15\">インストールが終わったらUnity Hubを起動しましょう。<\/p><blockquote id=\"ch00-b16\">❗ バージョンについて Unityはバージョンが頻繁に更新されます。 この教材では <strong>LTS（長期サポート）版<\/strong> を選んでください。 LTSは「長期間安定して使える」バージョンで、初心者に最適です。<\/blockquote><hr id=\"ch00-b17\"><h3 id=\"ch00-b18\" class=\"sec\">0-2 新しいプロジェクトを作ろう<\/h3><p id=\"ch00-b19\">Unity Hubを起動したら、「<strong>New Project<\/strong>」をクリックします。<\/p><p id=\"ch00-b20\">［図0-2：New Projectボタン］<\/p><p id=\"ch00-b21\">テンプレートは<\/p><pre id=\"ch00-b22\" data-lang=\"plain text\"><code>3D Core<\/code><\/pre><p id=\"ch00-b23\">を選択してください。<\/p><p id=\"ch00-b24\">［図0-3：プロジェクト作成画面］<\/p><p id=\"ch00-b25\">プロジェクト名は <code class=\"ic\">MyFirstGame<\/code> など好きな名前で構いません。<\/p><p id=\"ch00-b26\"><strong>Create Project<\/strong> を押すと、しばらくしてUnityが起動します。<\/p><hr id=\"ch00-b27\"><h3 id=\"ch00-b28\" class=\"sec\">0-3 Unityの画面を探検しよう<\/h3><p id=\"ch00-b29\">Unityを起動すると、たくさんのウィンドウがあります。<\/p><p id=\"ch00-b30\">全部覚える必要はありません。まずは<strong>3つだけ<\/strong>覚えましょう。<\/p><hr id=\"ch00-b31\"><h3 id=\"ch00-b32\" class=\"sec\">ヒエラルキー（Hierarchy）――「名簿」<\/h3><p id=\"ch00-b33\">ヒエラルキーは「ゲームに登場するものの名簿」です。<\/p><p id=\"ch00-b34\">［図0-4：Hierarchyの位置］<\/p><pre id=\"ch00-b35\" data-lang=\"plain text\"><code>例：\n  Main Camera\n  Directional Light\n  Player\n  Enemy<\/code><\/pre><p id=\"ch00-b36\">学校の出席簿のようなものです。<\/p><hr id=\"ch00-b37\"><h3 id=\"ch00-b38\" class=\"sec\">シーン（Scene）――「舞台」<\/h3><p id=\"ch00-b39\">シーンは「ゲームの舞台」です。<\/p><p id=\"ch00-b40\">［図0-5：Sceneの位置］<\/p><p id=\"ch00-b41\">ここでキャラクターを配置したり、ステージを作ったりします。<\/p><hr id=\"ch00-b42\"><h3 id=\"ch00-b43\" class=\"sec\">インスペクター（Inspector）――「ステータス画面」<\/h3><p id=\"ch00-b44\">インスペクターは「選んだもののステータス」です。<\/p><p id=\"ch00-b45\">［図0-6：Inspectorの位置］<\/p><p id=\"ch00-b46\">ゲームのキャラクターを選ぶと、「位置」「回転」「大きさ」などが表示されます。RPGのステータス画面に近いイメージです。<\/p><hr id=\"ch00-b47\"><h3 id=\"ch00-b48\" class=\"sec\">0-4 Cubeを召喚しよう<\/h3><p id=\"ch00-b49\">ゲームにはまず主人公が必要です。今回は主人公の代わりとして<strong>Cube<\/strong>を使います。<\/p><p id=\"ch00-b50\">上のメニューからこの順に選びます。<\/p><pre id=\"ch00-b51\" data-lang=\"plain text\"><code>GameObject → 3D Object → Cube<\/code><\/pre><p id=\"ch00-b52\">［図0-7：Cube作成手順］<\/p><p id=\"ch00-b53\">するとシーンに白い立方体が現れます。<\/p><hr id=\"ch00-b54\"><h3 id=\"ch00-b55\" class=\"sec\">0-5 Playボタンを押してみよう<\/h3><p id=\"ch00-b56\">画面上部にある再生ボタンを押します。<\/p><pre id=\"ch00-b57\" data-lang=\"plain text\"><code>▶<\/code><\/pre><p id=\"ch00-b58\">［図0-8：Playボタン］<\/p><p id=\"ch00-b59\">どうなりましたか？<\/p><h3 id=\"ch00-b60\" class=\"sec\">答え：何も起きません。<\/h3><p id=\"ch00-b61\">実はこれが正常です。Cubeはただ置いただけなので、まだ何の命令も持っていません。<\/p><blockquote id=\"ch00-b62\">「見た目」だけではゲームキャラクターは動かないのです。<\/blockquote><hr id=\"ch00-b63\"><h3 id=\"ch00-b64\" class=\"sec\">0-6 スクリプトを作ろう<\/h3><p id=\"ch00-b65\">次はCubeに命令を与えます。<\/p><p id=\"ch00-b66\">Projectウィンドウで右クリックし、次の順に選びます。<\/p><pre id=\"ch00-b67\" data-lang=\"plain text\"><code>Create → C# Script<\/code><\/pre><p id=\"ch00-b68\">［図0-9：スクリプト作成］<\/p><p id=\"ch00-b69\">名前は必ず以下に変更してください。<\/p><pre id=\"ch00-b70\" data-lang=\"plain text\"><code>PlayerController<\/code><\/pre><p id=\"ch00-b71\">［図0-10：PlayerController作成］<\/p><blockquote id=\"ch00-b72\">❗ 名前の大文字・小文字は間違えないように。 C#では大文字・小文字が区別されます。<br>⚠️ <strong>ファイル名とクラス名は必ず一致させる<\/strong>：Unityでは、スクリプトのファイル名（<code class=\"ic\">PlayerController.cs<\/code>）と、その中に書かれるクラス名（<code class=\"ic\">public class PlayerController<\/code>）が一致していないと、オブジェクトにアタッチできません。あとからファイル名だけを変更すると不一致が起きるので、名前を変えるときは<strong>両方<\/strong>変更しましょう。<\/blockquote><hr id=\"ch00-b73\"><h3 id=\"ch00-b74\" class=\"sec\">0-7 スクリプトをCubeに貼り付けよう<\/h3><p id=\"ch00-b75\">これがChapter 0で<strong>一番大事な体験<\/strong>です。<\/p><p id=\"ch00-b76\">作った <code class=\"ic\">PlayerController<\/code> を、<strong>HierarchyのCubeへドラッグ＆ドロップ<\/strong>します。<\/p><p id=\"ch00-b77\">［図0-11：ドラッグ＆ドロップ］<\/p><p id=\"ch00-b78\">するとInspectorに<\/p><pre id=\"ch00-b79\" data-lang=\"plain text\"><code>Player Controller (Script)<\/code><\/pre><p id=\"ch00-b80\">が追加されます。<\/p><p id=\"ch00-b81\">［図0-12：アタッチ成功］<\/p><h3 id=\"ch00-b82\" class=\"sec\">成功です。<\/h3><hr id=\"ch00-b83\"><h3 id=\"ch00-b84\" class=\"sec\">0-8 スクリプトを開いてみよう<\/h3><p id=\"ch00-b85\"><code class=\"ic\">PlayerController<\/code> をダブルクリックしてください。<\/p><p id=\"ch00-b86\">Visual StudioやVS Codeなどエディタが起動し、次のようなコードが表示されます。<\/p><pre id=\"ch00-b87\" data-lang=\"plain text\"><code>using UnityEngine;\n\npublic class PlayerController : MonoBehaviour\n{\n    void Start()\n    {\n\n    }\n\n    void Update()\n    {\n\n    }\n}<\/code><\/pre><p id=\"ch00-b88\">意味はまだ分からなくて大丈夫です。<\/p><p id=\"ch00-b89\">今日は「<strong>Unityとコードがつながった<\/strong>」ことが重要です。<\/p><hr id=\"ch00-b90\"><h3 id=\"ch00-b91\" class=\"sec\">0-9 エディタの設定を確認しよう<\/h3><p id=\"ch00-b92\">スクリプトをダブルクリックしても何も起きない場合や、コードに色が付かない場合は、エディタの設定を確認します。<\/p><pre id=\"ch00-b93\" data-lang=\"plain text\"><code>Edit → Preferences → External Tools → External Script Editor<\/code><\/pre><p id=\"ch00-b94\">ここで <strong>Visual Studio<\/strong>（Windows推奨）、<strong>Visual Studio Code<\/strong>、<strong>Rider<\/strong> など、使用するエディタを選択してください。<\/p><blockquote id=\"ch00-b95\">💡 <strong>コンパイル確認のクセをつけよう<\/strong>：コードを保存してUnityに戻ると、右下に小さなローディング表示が出ます。これは「コンパイル（翻訳）中」の合図。終わったあと<strong>Consoleウィンドウに赤いエラーが出ていないか<\/strong>を確認する習慣をつけましょう。<\/blockquote><hr id=\"ch00-b96\"><h3 id=\"ch00-b97\" class=\"sec\">章末コラム① スクリプトは単体では死んでいる<\/h3><p id=\"ch00-b98\"><code class=\"ic\">PlayerController.cs<\/code> を作っただけでは、Cubeは動きません。<\/p><h3 id=\"ch00-b99\" class=\"sec\">なぜでしょうか？<\/h3><p id=\"ch00-b100\">C#のスクリプトは、Unityのオブジェクトに「<strong>貼り付けられて（アタッチされて）<\/strong>」初めて、そのオブジェクトの「脳みそ」として命が吹き込まれます。<\/p><pre id=\"ch00-b101\" data-lang=\"plain text\"><code>PlayerController.csだけでは → だれにも使われていない（死んでいる）\n    ↓\nCubeにアタッチする → Cubeの脳みそとして初めて命が宿る<\/code><\/pre><p id=\"ch00-b102\">ゲーム開発では「作る」ではなく「<strong>貼り付ける<\/strong>」までがセットです。<\/p><p id=\"ch00-b103\">Chapter 1では、このスクリプトに初めて命令を書いていきます。<\/p><hr id=\"ch00-b104\"><h3 id=\"ch00-b105\" class=\"sec\">章末コラム② Transformは全キャラの住民票<\/h3><p id=\"ch00-b106\">Cubeを選び、Inspectorを見てみましょう。<\/p><p id=\"ch00-b107\">［図0-13：Transformコンポーネント］<\/p><p id=\"ch00-b108\"><strong>Position<\/strong>（位置）、<strong>Rotation<\/strong>（回転）、<strong>Scale<\/strong>（大きさ）が表示されています。<\/p><p id=\"ch00-b109\">このTransformは「ゲーム内の位置情報を管理する住民票」です。すべてのゲームオブジェクトに必ず存在します。<\/p><p id=\"ch00-b110\">Chapter 1ではこの <code class=\"ic\">transform.position<\/code> をコードから操作してキャラクターを動かします。<\/p><blockquote id=\"ch00-b111\">📐 <strong>ワールド座標について<\/strong>：Positionの数値は「ピクセル」ではなく<strong>ワールド座標<\/strong>という単位です。画面の中央が <code class=\"ic\">(0, 0, 0)<\/code>、初期カメラに映る範囲はおよそ <strong>X：-8〜+8、Y：-4.5〜+4.5<\/strong> です。本書ではこの範囲を使ってゲームを作ります（Zは0のまま使います）。<\/blockquote><hr id=\"ch00-b112\"><h3 id=\"ch00-b113\" class=\"sec\">章末コラム③ StartとUpdateの時間の流れ<\/h3><p id=\"ch00-b114\">エディタで見た初期コードには <code class=\"ic\">void Start()<\/code> と <code class=\"ic\">void Update()<\/code> があります。<\/p><p id=\"ch00-b115\">この2つはとても重要です。<\/p><p id=\"ch00-b116\">［図0-14：時間の流れ図］<\/p><pre id=\"ch00-b117\" data-lang=\"plain text\"><code>ゲーム開始\n    ↓\nStart()\n    ↓（1回だけ）\n--------------------------------\nUpdate()\nUpdate()\nUpdate()\nUpdate()\nUpdate()\n...\n--------------------------------<\/code><\/pre><ul id=\"ch00-b118\"><li><strong>Start<\/strong>――最初に1回だけ実行する場所<\/li><li><strong>Update<\/strong>――ゲームが動いている間、一秒間に何十回もずっと繰り返される場所<\/li><\/ul><p id=\"ch00-b119\">Chapter 1ではこのUpdateを使ってプレイヤーを動かします。<\/p><hr id=\"ch00-b120\"><h3 id=\"ch00-b121\" class=\"sec\">Chapter 1へ<\/h3><p id=\"ch00-b122\">舞台は完成しました。<\/p><p id=\"ch00-b123\">次はいよいよ、キーボードでCubeを動かしてみましょう。<\/p><h3 id=\"ch00-b124\" class=\"sec\">ゲーム開発がここから本格的に始まります。<\/h3>"}, {"id": "ch01", "num": "1", "name": "プレイヤーを動かそう", "title": "Chapter 1 プレイヤーを動かそう", "html": "<blockquote id=\"ch01-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><hr id=\"ch01-b1\"><div id=\"ch01-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>訓練所より<\/strong>：入学初日。教官はあなたに言いました。「まずは自分の足で歩けるようになれ。話はそれからだ」<\/p><\/div><\/div><h3 id=\"ch01-b3\" class=\"sec\">この章で作るもの<\/h3><p id=\"ch01-b4\">この章では「<strong>迷路ナビゲーター<\/strong>」を作ります。<\/p><p id=\"ch01-b5\">Chapter 0で置いた<strong>Cube（プレイヤー）<\/strong>を矢印キーで動かし、ゴール地点まで移動させるゲームです。<\/p><pre id=\"ch01-b6\" data-lang=\"plain text\"><code>┌─────────────────┐\n│                 ☆│\n│                  │\n│      ○           │\n│                  │\n└─────────────────┘\n    ↑↓←→キーで移動<\/code><\/pre><p id=\"ch01-b7\">この章のゴールは、<\/p><blockquote id=\"ch01-b8\">「キーボード入力によって画面上のキャラクターを動かせる」<\/blockquote><p id=\"ch01-b9\">ようになることです。ゲーム制作の第一歩です。<\/p><hr id=\"ch01-b10\"><h3 id=\"ch01-b11\" class=\"sec\">なぜ変数が必要なのか<\/h3><p id=\"ch01-b12\">ゲームでは、<\/p><ul id=\"ch01-b13\"><li>プレイヤーの位置<\/li><li>スコア<\/li><li>HP<\/li><li>残り時間<\/li><\/ul><p id=\"ch01-b14\">など、たくさんの情報を覚えておく必要があります。そのために使うのが<strong>変数<\/strong>です。<\/p><p id=\"ch01-b15\">例えば、<\/p><pre id=\"ch01-b16\" data-lang=\"plain text\"><code>float playerX = 3f;<\/code><\/pre><p id=\"ch01-b17\">は<\/p><pre id=\"ch01-b18\" data-lang=\"plain text\"><code>playerX\n  ↓\n[ 3 ]<\/code><\/pre><p id=\"ch01-b19\">という状態です。コンピュータに「playerXという名前で3を覚えておいてね」とお願いしているイメージです。<\/p><hr id=\"ch01-b20\"><h3 id=\"ch01-b21\" class=\"sec\">型とは何か<\/h3><p id=\"ch01-b22\">変数には「どんな種類のデータを入れるのか」を指定します。これを<strong>型<\/strong>と呼びます。<\/p><div id=\"ch01-b23\" class=\"tblwrap\"><table><tr><th><strong>型<\/strong><\/th><th><strong>内容<\/strong><\/th><th><strong>例<\/strong><\/th><\/tr><tr><td><code class=\"ic\">int<\/code><\/td><td>整数<\/td><td><code class=\"ic\">10<\/code><\/td><\/tr><tr><td><code class=\"ic\">float<\/code><\/td><td>小数<\/td><td><code class=\"ic\">3.5f<\/code><\/td><\/tr><tr><td><code class=\"ic\">string<\/code><\/td><td>文字列<\/td><td><code class=\"ic\">\"Hello\"<\/code><\/td><\/tr><tr><td><code class=\"ic\">bool<\/code><\/td><td>真偽値<\/td><td><code class=\"ic\">true / false<\/code><\/td><\/tr><\/table><\/div><blockquote id=\"ch01-b24\"><strong>初心者が最初に使う型は <\/strong><strong><code class=\"ic\">int<\/code><\/strong><strong>・<\/strong><strong><code class=\"ic\">float<\/code><\/strong><strong>・<\/strong><strong><code class=\"ic\">bool<\/code><\/strong><strong> の3つを覚えればOKです。<\/strong><\/blockquote><p id=\"ch01-b25\">今回使うのは <code class=\"ic\">float<\/code> です。プレイヤーの位置は小数になることがあるためです。<\/p><pre id=\"ch01-b26\" data-lang=\"plain text\"><code>float playerX = 0f;\nfloat playerY = 0f;<\/code><\/pre><p id=\"ch01-b27\">これでX座標とY座標を保存できます。<code class=\"ic\">0<\/code> は画面の中央です。<\/p><blockquote id=\"ch01-b28\">📐 <strong>Unityのワールド座標（重要）<\/strong>：Unityの座標は「ピクセル」ではなく<strong>ワールド座標<\/strong>です。画面中央が <code class=\"ic\">(0, 0)<\/code>、初期カメラに映る範囲はおよそ <strong>X：-8〜+8、Y：-4.5〜+4.5<\/strong>。<code class=\"ic\">100<\/code> のような大きな値を入れると、カメラのはるか彼方へ飛んでいってしまいます。<\/blockquote><hr id=\"ch01-b29\"><h3 id=\"ch01-b30\" class=\"sec\">int と float の違い<\/h3><p id=\"ch01-b31\">この2つは特に混乱しやすいのでじっくり確認します。<\/p><h3 id=\"ch01-b32\" class=\"sec\">int（整数型）<\/h3><pre id=\"ch01-b33\" data-lang=\"plain text\"><code>int hp = 100;<\/code><\/pre><pre id=\"ch01-b34\" data-lang=\"plain text\"><code>保存できる値：100, 50, 0, -10\n保存できない値：3.14  ← エラーになる！<\/code><\/pre><h3 id=\"ch01-b35\" class=\"sec\">float（小数型）<\/h3><pre id=\"ch01-b36\" data-lang=\"plain text\"><code>float speed = 3.5f;  // ← 末尾に「f」が必要！<\/code><\/pre><pre id=\"ch01-b37\" data-lang=\"plain text\"><code>保存できる値：3.5, 0.25, 12.75\n「f」を忘れると：double型と判断されてエラーになる<\/code><\/pre><p id=\"ch01-b38\"><strong>なぜ <\/strong><strong><code class=\"ic\">f<\/code><\/strong><strong> が必要なのか<\/strong><\/p><p id=\"ch01-b39\">C#では <code class=\"ic\">3.5<\/code> と書くだけだと「double型」と判断されます。<code class=\"ic\">float<\/code>型だと明示するために末尾に <code class=\"ic\">f<\/code> をつけます。<\/p><pre id=\"ch01-b40\" data-lang=\"plain text\"><code>float speed = 3.5;   // ❌ エラー\nfloat speed = 3.5f;  // ✅ OK<\/code><\/pre><h3 id=\"ch01-b41\" class=\"sec\">型変換の注意<\/h3><pre id=\"ch01-b42\" data-lang=\"plain text\"><code>int hp = 3.5f;       // ❌ エラー！\nint hp = (int)3.5f;  // ✅ OK → hp = 3（小数点以下は切り捨て）<\/code><\/pre><blockquote id=\"ch01-b43\">⚠️ <code class=\"ic\">3.9f<\/code> を変換しても <code class=\"ic\">3<\/code> になります。切り捨てに注意しましょう。<\/blockquote><hr id=\"ch01-b44\"><h3 id=\"ch01-b45\" class=\"sec\">プレイヤーを動かすプログラム<\/h3><p id=\"ch01-b46\">まずは完成コードを見てみましょう。<\/p><pre id=\"ch01-b47\" data-lang=\"plain text\"><code>using UnityEngine;\n\npublic class PlayerController : MonoBehaviour\n{\n    // 1秒あたりの移動量（const = あとから変更できない定数）\n    const float MOVE_SPEED = 3f;\n\n    // プレイヤーの位置（画面中央からスタート）\n    float playerX = 0f;\n    float playerY = 0f;\n\n    void Update()\n    {\n        HandleMoveInput(MOVE_SPEED);\n        ApplyPosition();\n    }\n\n    // 入力を読んで座標を更新する\n    void HandleMoveInput(float speed)\n    {\n        // このフレームで動く量（Time.deltaTimeは後述のおまじない）\n        float delta = speed * Time.deltaTime;\n\n        if (Input.GetKey(KeyCode.LeftArrow))  { playerX -= delta; }\n        if (Input.GetKey(KeyCode.RightArrow)) { playerX += delta; }\n        if (Input.GetKey(KeyCode.UpArrow))    { playerY += delta; }\n        if (Input.GetKey(KeyCode.DownArrow))  { playerY -= delta; }\n\n        // 画面端から出ない（ワールド座標の範囲）\n        playerX = Mathf.Clamp(playerX, -8f, 8f);\n        playerY = Mathf.Clamp(playerY, -4.5f, 4.5f);\n    }\n\n    // 実際の位置に反映する\n    void ApplyPosition()\n    {\n        transform.position = new Vector3(playerX, playerY, 0f);\n    }\n}<\/code><\/pre><h3 id=\"ch01-b48\" class=\"sec\">実行確認の手順<\/h3><ol id=\"ch01-b49\"><li>このコードを <code class=\"ic\">PlayerController.cs<\/code> に保存する（Chapter 0でCubeにアタッチ済み）<\/li><li>Playボタンを押す<\/li><li>矢印キーでCubeが動けば成功。画面端で止まることも確認しよう<\/li><\/ol><hr id=\"ch01-b50\"><h3 id=\"ch01-b51\" class=\"sec\">コードを順番に見てみよう<\/h3><h3 id=\"ch01-b52\" class=\"sec\">移動速度<\/h3><pre id=\"ch01-b53\" data-lang=\"plain text\"><code>const float MOVE_SPEED = 3f;<\/code><\/pre><p id=\"ch01-b54\">プレイヤーの移動速度です。「1秒あたり3（ワールド座標）」移動します。<\/p><p id=\"ch01-b55\"><code class=\"ic\">const<\/code> は「<strong>あとから変更できない定数<\/strong>」の印です。ゲーム中に変わらない値に付けておくと、うっかり書き換えてしまうバグを防げます。<\/p><h3 id=\"ch01-b56\" class=\"sec\">プレイヤーの位置<\/h3><pre id=\"ch01-b57\" data-lang=\"plain text\"><code>float playerX = 0f;\nfloat playerY = 0f;<\/code><\/pre><pre id=\"ch01-b58\" data-lang=\"plain text\"><code>playerX → 横方向（左右）の位置\nplayerY → 縦方向（上下）の位置<\/code><\/pre><h3 id=\"ch01-b59\" class=\"sec\">Update<\/h3><pre id=\"ch01-b60\" data-lang=\"plain text\"><code>void Update()\n{\n    HandleMoveInput(MOVE_SPEED);\n    ApplyPosition();\n}<\/code><\/pre><p id=\"ch01-b61\">Updateは毎フレーム呼ばれます。ゲームが動いている間、<\/p><pre id=\"ch01-b62\" data-lang=\"plain text\"><code>入力確認\n  ↓\n位置更新\n  ↓\n画面反映<\/code><\/pre><p id=\"ch01-b63\">を何度も繰り返しています。<\/p><h3 id=\"ch01-b64\" class=\"sec\">HandleMoveInput<\/h3><pre id=\"ch01-b65\" data-lang=\"plain text\"><code>if (Input.GetKey(KeyCode.LeftArrow))\n{\n    playerX -= delta;\n}<\/code><\/pre><p id=\"ch01-b66\">左矢印キーが押されていたら <code class=\"ic\">playerX = playerX - delta<\/code> を実行します。つまり左へ移動します。他の矢印キーも同じ考え方です。<\/p><p id=\"ch01-b67\"><strong>コラム：<\/strong><strong><code class=\"ic\">Time.deltaTime<\/code><\/strong><strong> というおまじない<\/strong><\/p><pre id=\"ch01-b68\" data-lang=\"plain text\"><code>float delta = speed * Time.deltaTime;<\/code><\/pre><p id=\"ch01-b69\"><code class=\"ic\">Time.deltaTime<\/code> は「前のフレームから何秒経ったか」です。速いパソコンは1秒間に何百回もUpdateを呼びますが、移動量に <code class=\"ic\">Time.deltaTime<\/code> を掛けておくと、<strong>どのパソコンでも同じ速さ<\/strong>で動きます。今は「移動には必ず掛けるおまじない」と覚えてください（仕組みはChapter 8で詳しく説明します）。<\/p><hr id=\"ch01-b70\"><h3 id=\"ch01-b71\" class=\"sec\">変数を変えただけでは画面は動かない<\/h3><p id=\"ch01-b72\">ここがとても重要です。<\/p><p id=\"ch01-b73\">例えば、<\/p><pre id=\"ch01-b74\" data-lang=\"plain text\"><code>playerX += 3;<\/code><\/pre><p id=\"ch01-b75\">を実行すると、<\/p><pre id=\"ch01-b76\" data-lang=\"plain text\"><code>playerX: 0 → 3<\/code><\/pre><p id=\"ch01-b77\">にはなります。しかし、<strong>画面上のキャラクターはまだ動きません。<\/strong><\/p><p id=\"ch01-b78\">なぜでしょうか。それは「変数の値」と「画面上の位置」が別物だからです。<\/p><hr id=\"ch01-b79\"><h3 id=\"ch01-b80\" class=\"sec\">ApplyPosition の役割<\/h3><pre id=\"ch01-b81\" data-lang=\"plain text\"><code>void ApplyPosition()\n{\n    transform.position = new Vector3(playerX, playerY, 0f);\n}<\/code><\/pre><p id=\"ch01-b82\">ここで、<code class=\"ic\">playerX<\/code> と <code class=\"ic\">playerY<\/code> の値を <code class=\"ic\">transform.position<\/code> へコピーしています。<\/p><pre id=\"ch01-b83\" data-lang=\"plain text\"><code>変数の座標\n    ↓\n画面上の座標へ反映<\/code><\/pre><p id=\"ch01-b84\">この処理があるからキャラクターが動いて見えます。<\/p><hr id=\"ch01-b85\"><h3 id=\"ch01-b86\" class=\"sec\">入力 → 更新 → 反映<\/h3><p id=\"ch01-b87\">ゲームの基本サイクルです。<\/p><pre id=\"ch01-b88\" data-lang=\"plain text\"><code>① キー入力\n   ←キーが押された\n        ↓\n② 座標更新\n   playerX -= 3\n        ↓\n③ 画面反映\n   transform.position = (playerX, playerY)\n        ↓\n   画面上のプレイヤーが移動<\/code><\/pre><blockquote id=\"ch01-b89\">今後作るほぼ全てのゲームも、この流れで動いています。<\/blockquote><hr id=\"ch01-b90\"><h3 id=\"ch01-b91\" class=\"sec\">おまじない：画面外に出ないようにする<\/h3><p id=\"ch01-b92\">完成コードの最後に、こんな2行がありました。プレイヤーが画面の外へ行かないようにする安全装置です。<\/p><pre id=\"ch01-b93\" data-lang=\"plain text\"><code>// 画面端から出ないようにする安全装置（おまじない）\nplayerX = Mathf.Clamp(playerX, -8f, 8f);\nplayerY = Mathf.Clamp(playerY, -4.5f, 4.5f);<\/code><\/pre><h3 id=\"ch01-b94\" class=\"sec\">Clampのイメージ<\/h3><pre id=\"ch01-b95\" data-lang=\"plain text\"><code>許可範囲\n-8 ─────────────────── +8\n        ↑\n    playerX → そのまま\n\n-8 ─────────────────── +8\n                             ↑\n                           +12\n                          ↓\n                        +8になる\n\n-8 ─────────────────── +8\n↑\n-10\n  ↓\n  -8になる<\/code><\/pre><p id=\"ch01-b96\">つまり「範囲からはみ出したら自動で端の値にする」おまじないです。<code class=\"ic\">-8〜+8<\/code>・<code class=\"ic\">-4.5〜+4.5<\/code> は、初期カメラに映るワールド座標のおおよその範囲です。今は意味を深く考えなくて大丈夫です（正体はChapter 2で明かします）。<\/p><hr id=\"ch01-b97\"><h3 id=\"ch01-b98\" class=\"sec\">改造セッション 🔧<\/h3><blockquote id=\"ch01-b99\">このセクションは「正解のない実験」です。数値を変えて何が起きるか確かめましょう。<\/blockquote><h3 id=\"ch01-b100\" class=\"sec\">改造セッション① Shiftキーでダッシュ<\/h3><p id=\"ch01-b101\">プレイヤーを高速移動できるようにしてみましょう。<\/p><p id=\"ch01-b102\">まず変数を追加します。<\/p><pre id=\"ch01-b103\" data-lang=\"plain text\"><code>bool isDash = false;<\/code><\/pre><p id=\"ch01-b104\">次にUpdateを書き換えます。<\/p><pre id=\"ch01-b105\" data-lang=\"plain text\"><code>void Update()\n{\n    isDash = Input.GetKey(KeyCode.LeftShift);\n\n    float speed = MOVE_SPEED;\n    if (isDash)\n    {\n        speed = MOVE_SPEED * 2f;\n    }\n\n    HandleMoveInput(speed);\n    ApplyPosition();\n}<\/code><\/pre><p id=\"ch01-b106\">Shiftを押している間だけ高速移動できます。ここでbool型を体験できます。<\/p><pre id=\"ch01-b107\" data-lang=\"plain text\"><code>true  = 押している\nfalse = 押していない<\/code><\/pre><h3 id=\"ch01-b108\" class=\"sec\">改造セッション② 速度を変えてみよう<\/h3><p id=\"ch01-b109\">次の値で試してください。どう感じるでしょうか。<\/p><pre id=\"ch01-b110\" data-lang=\"plain text\"><code>const float MOVE_SPEED = 10f;  → 速すぎる？\nconst float MOVE_SPEED = 0.5f; → 遅すぎる？<\/code><\/pre><p id=\"ch01-b111\">ゲームの面白さは数値だけで大きく変わります。<\/p><h3 id=\"ch01-b112\" class=\"sec\">改造セッション③ 部屋を狭くする<\/h3><p id=\"ch01-b113\">Clampの範囲を <code class=\"ic\">-3f〜3f<\/code>・<code class=\"ic\">-2f〜2f<\/code> に変えてみましょう。プレイヤーの動ける「部屋」が狭くなります。<\/p><h3 id=\"ch01-b114\" class=\"sec\">補助課題<\/h3><p id=\"ch01-b115\">左右だけ動くゲームにしてみましょう。<code class=\"ic\">UpArrow<\/code> と <code class=\"ic\">DownArrow<\/code> のブロックを削除してみてください。どんなゲームになりそうでしょうか。<\/p><hr id=\"ch01-b116\"><h3 id=\"ch01-b117\" class=\"sec\">発展課題（好きなものを選ぼう）<\/h3><h3 id=\"ch01-b118\" class=\"sec\">課題A プレイヤーの色を変える<\/h3><pre id=\"ch01-b119\" data-lang=\"plain text\"><code>GetComponent&lt;Renderer&gt;().material.color = Color.red;<\/code><\/pre><p id=\"ch01-b120\"><code class=\"ic\">Start()<\/code> の中に書いて、好きな色に変更してみましょう（Cubeなどの3Dオブジェクト用の書き方です）。<\/p><h3 id=\"ch01-b121\" class=\"sec\">課題B 少しずつ速くする<\/h3><p id=\"ch01-b122\"><code class=\"ic\">const<\/code> の付いた変数は変更できません（それが <code class=\"ic\">const<\/code> の役目です）。そこで、定数をやめて通常の変数に書き換えます。<\/p><pre id=\"ch01-b123\" data-lang=\"plain text\"><code>// const float MOVE_SPEED = 3f; ← これをやめて\nfloat moveSpeed = 3f;            // ← 通常の変数にする\n\n// Update()の中に追加\nmoveSpeed += 0.01f * Time.deltaTime;<\/code><\/pre><p id=\"ch01-b124\">時間が経つほどプレイヤーが速くなり、操作が難しくなります。<\/p><h3 id=\"ch01-b125\" class=\"sec\">課題C 移動量を表示する<\/h3><pre id=\"ch01-b126\" data-lang=\"plain text\"><code>Debug.Log(playerX);\nDebug.Log(playerY);<\/code><\/pre><p id=\"ch01-b127\">Consoleウィンドウに座標が表示されます。ゲーム開発者がよく使うデバッグ方法です。<\/p><hr id=\"ch01-b128\"><h3 id=\"ch01-b129\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch01-b130\"><strong>Q1.<\/strong> 次のコードは何を保存していますか？<\/p><pre id=\"ch01-b131\" data-lang=\"plain text\"><code>float playerX = 100f;<\/code><\/pre><p id=\"ch01-b132\">A. プレイヤーの色<\/p><p id=\"ch01-b133\">B. プレイヤーのX座標<\/p><p id=\"ch01-b134\">C. スコア<\/p><hr id=\"ch01-b135\"><p id=\"ch01-b136\"><strong>Q2.<\/strong> 次の処理の役割は何ですか？<\/p><pre id=\"ch01-b137\" data-lang=\"plain text\"><code>transform.position = new Vector3(playerX, playerY, 0f);<\/code><\/pre><p id=\"ch01-b138\">A. キー入力を読む<\/p><p id=\"ch01-b139\">B. 変数を作る<\/p><p id=\"ch01-b140\">C. 画面上の位置へ反映する<\/p><hr id=\"ch01-b141\"><p id=\"ch01-b142\"><strong>Q3.<\/strong> <code class=\"ic\">bool<\/code> 型に入る値は何ですか？<\/p><p id=\"ch01-b143\">A. 数字<\/p><p id=\"ch01-b144\">B. <code class=\"ic\">true<\/code> / <code class=\"ic\">false<\/code><\/p><p id=\"ch01-b145\">C. 文字列<\/p><hr id=\"ch01-b146\"><h3 id=\"ch01-b147\" class=\"sec\">解答<\/h3><p id=\"ch01-b148\">Q1 → B　Q2 → C　Q3 → B<\/p><hr id=\"ch01-b149\"><h3 id=\"ch01-b150\" class=\"sec\">エラー対応ガイド 🐛<\/h3><h3 id=\"ch01-b151\" class=\"sec\">キャラクターが動かない<\/h3><h3 id=\"ch01-b152\" class=\"sec\">確認ポイント<\/h3><ul id=\"ch01-b153\"><li class='todoitem'><span class=\"todo \"><\/span>スクリプトがゲームオブジェクトにアタッチされているか<\/li><li class='todoitem'><span class=\"todo \"><\/span><code class=\"ic\">Update()<\/code> のスペルが正しいか（<code class=\"ic\">update<\/code> はNG）<\/li><li class='todoitem'><span class=\"todo \"><\/span>Consoleにエラーが出ていないか<\/li><\/ul><hr id=\"ch01-b154\"><h3 id=\"ch01-b155\" class=\"sec\">「HandleMoveInputが存在しない」と出る<\/h3><p id=\"ch01-b156\">メソッド名のスペルミスの可能性があります。<\/p><pre id=\"ch01-b157\" data-lang=\"plain text\"><code>HandleMoveInput();       ← 呼び出し\nvoid HandleMoveInput()   ← 定義<\/code><\/pre><p id=\"ch01-b158\">この2つが完全に一致しているか確認しましょう。<\/p><hr id=\"ch01-b159\"><h3 id=\"ch01-b160\" class=\"sec\">赤いエラーが大量に出た<\/h3><p id=\"ch01-b161\">まずConsoleの<strong>一番上のエラー<\/strong>を読みましょう。後ろのエラーは連鎖していることが多いです。<\/p><hr id=\"ch01-b162\"><h3 id=\"ch01-b163\" class=\"sec\">キャラクターが見えない<\/h3><ul id=\"ch01-b164\"><li class='todoitem'><span class=\"todo \"><\/span>座標が大きすぎないか（<code class=\"ic\">playerX = 100f<\/code> などはカメラ範囲外です）<\/li><li class='todoitem'><span class=\"todo \"><\/span>カメラの範囲内にいるか（X：-8〜+8、Y：-4.5〜+4.5）<\/li><li class='todoitem'><span class=\"todo \"><\/span>Scaleが0になっていないか<\/li><li class='todoitem'><span class=\"todo \"><\/span>Z座標が0になっているか<\/li><\/ul><hr id=\"ch01-b165\"><h3 id=\"ch01-b166\" class=\"sec\">文法整理：代入演算子とスコープ 📚<\/h3><p id=\"ch01-b167\">この章で登場した「書き込み系」の記号をまとめます。<\/p><div id=\"ch01-b168\" class=\"tblwrap\"><table><tr><th><strong>演算子<\/strong><\/th><th><strong>意味<\/strong><\/th><th><strong>例<\/strong><\/th><th><strong>同じ意味<\/strong><\/th><\/tr><tr><td><code class=\"ic\">=<\/code><\/td><td>代入（右の値を左へ入れる）<\/td><td><code class=\"ic\">x = 5;<\/code><\/td><td>—<\/td><\/tr><tr><td><code class=\"ic\">+=<\/code><\/td><td>加算して代入<\/td><td><code class=\"ic\">x += 3;<\/code><\/td><td><code class=\"ic\">x = x + 3;<\/code><\/td><\/tr><tr><td><code class=\"ic\">-=<\/code><\/td><td>減算して代入<\/td><td><code class=\"ic\">x -= 3;<\/code><\/td><td><code class=\"ic\">x = x - 3;<\/code><\/td><\/tr><tr><td><code class=\"ic\">*=<\/code><\/td><td>乗算して代入<\/td><td><code class=\"ic\">x *= 2;<\/code><\/td><td><code class=\"ic\">x = x * 2;<\/code><\/td><\/tr><tr><td><code class=\"ic\">/=<\/code><\/td><td>除算して代入<\/td><td><code class=\"ic\">x /= 2;<\/code><\/td><td><code class=\"ic\">x = x / 2;<\/code><\/td><\/tr><tr><td><code class=\"ic\">++<\/code><\/td><td>1増やす<\/td><td><code class=\"ic\">x++;<\/code><\/td><td><code class=\"ic\">x = x + 1;<\/code><\/td><\/tr><tr><td><code class=\"ic\">--<\/code><\/td><td>1減らす<\/td><td><code class=\"ic\">x--;<\/code><\/td><td><code class=\"ic\">x = x - 1;<\/code><\/td><\/tr><\/table><\/div><h3 id=\"ch01-b169\" class=\"sec\">変数のスコープ（見える範囲）<\/h3><pre id=\"ch01-b170\" data-lang=\"plain text\"><code>public class PlayerController : MonoBehaviour\n{\n    float playerX = 0f;   // ← フィールド：クラス全体で使える\n\n    void HandleMoveInput(float speed)   // ← 引数：このメソッド内だけ\n    {\n        float delta = speed * Time.deltaTime;  // ← ローカル変数：このメソッド内だけ\n    }\n\n    void ApplyPosition()\n    {\n        // playerX は使える（フィールドだから）\n        // delta はここでは使えない！（HandleMoveInputの中だけ）\n    }\n}<\/code><\/pre><ul id=\"ch01-b171\"><li><strong>フィールド<\/strong>……クラスの直下に書いた変数。クラス内のどのメソッドからも使える<\/li><li><strong>ローカル変数<\/strong>……メソッドの中で作った変数。そのメソッドが終わると消える<\/li><li>波かっこ <code class=\"ic\">{ }<\/code> の外からは、中で作った変数は見えない――これが<strong>スコープ<\/strong>です<\/li><\/ul><hr id=\"ch01-b172\"><h3 id=\"ch01-b173\" class=\"sec\">この章で学んだこと<\/h3><ul id=\"ch01-b174\"><li>変数は情報を保存する箱<\/li><li><code class=\"ic\">float<\/code> は小数を扱う型<\/li><li><code class=\"ic\">if<\/code> で入力を判定できる<\/li><li>「入力 → 座標更新 → 画面反映」がゲームループの基本<\/li><li><code class=\"ic\">ApplyPosition()<\/code> で変数の値を画面へ反映できる<\/li><li><code class=\"ic\">Mathf.Clamp()<\/code> で画面外への移動を防げる<\/li><li>移動量には <code class=\"ic\">Time.deltaTime<\/code> を掛ける<\/li><li>フィールドとローカル変数では「見える範囲（スコープ）」が違う<\/li><\/ul><p id=\"ch01-b175\"><strong>次の章では：<\/strong> このプレイヤーを追いかける敵を作ります。敵がプレイヤーに近づいてきたとき「どうする？」を決める <code class=\"ic\">if文<\/code> を学びます。<\/p>"}, {"id": "ch02", "num": "2", "name": "敵を作ろう", "title": "Chapter 2 敵を作ろう", "html": "<blockquote id=\"ch02-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><hr id=\"ch02-b1\"><div id=\"ch02-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>訓練所より<\/strong>：歩けるようになったな。では次の授業だ——「逃げ方」を教える。ダンジョンでは、追ってくるものから逃げ延びる技術が命を守る。<\/p><\/div><\/div><h3 id=\"ch02-b3\" class=\"sec\">この章で作るもの<\/h3><p id=\"ch02-b4\">Chapter 1 で作った「迷路ナビゲーター」に「敵」を追加し、「<strong>逃走シューティング<\/strong>」に進化させます。<\/p><pre id=\"ch02-b5\" data-lang=\"plain text\"><code>┌─────────────────┐\n│ ● ← 敵（追いかけてくる） │\n│                 │\n│       ○          │  ← プレイヤー（逃げる）\n│                 │\n└─────────────────┘\n当たったら→ GAME OVER<\/code><\/pre><p id=\"ch02-b6\">この章のゴールは、<\/p><blockquote id=\"ch02-b7\">「もし敵がプレイヤーに近づいたら『ゲームオーバー』を表示する、という処理を実装できる」<\/blockquote><p id=\"ch02-b8\">ことです。そのために必要なのが<strong>if文<\/strong>と「判定」の考え方です。<\/p><hr id=\"ch02-b9\"><h3 id=\"ch02-b10\" class=\"sec\">Step A: まず敵を動かす— ifなしで考える<\/h3><h3 id=\"ch02-b11\" class=\"sec\">if文の前に：数式だけで敵を動かせるか？<\/h3><p id=\"ch02-b12\">まず、あえて回り道をしてみましょう。if文を一切使わずに、数式だけで敵をプレイヤーに近づける方法を考えます。<\/p><p id=\"ch02-b13\"><strong><code class=\"ic\">Mathf.Sign()<\/code><\/strong><strong> を使った方法<\/strong><\/p><p id=\"ch02-b14\"><code class=\"ic\">Mathf.Sign(x)<\/code> は、<code class=\"ic\">x<\/code> が正なら <code class=\"ic\">+1<\/code>、負なら <code class=\"ic\">-1<\/code>、<code class=\"ic\">0<\/code> なら <code class=\"ic\">0<\/code> を返す魔法のような関数です。<\/p><pre id=\"ch02-b15\" data-lang=\"plain text\"><code>const float ENEMY_SPEED = 2f;\nfloat enemyX = -6f;\nfloat enemyY = -3f;\n\nvoid Update()\n{\n    MoveEnemy();\n}\n\nvoid MoveEnemy()\n{\n    // プレイヤーとの差の「符号」だけを取り出す\n    float dx = Mathf.Sign(playerX - enemyX);\n    float dy = Mathf.Sign(playerY - enemyY);\n\n    // その方向へ一歩進む\n    enemyX += dx * ENEMY_SPEED * Time.deltaTime;\n    enemyY += dy * ENEMY_SPEED * Time.deltaTime;\n}<\/code><\/pre><p id=\"ch02-b16\">図解：<\/p><pre id=\"ch02-b17\" data-lang=\"plain text\"><code>プレイヤーが右上にいる場合\n\nplayerX - enemyX → 正の数 → Sign = +1 → 敵は右へ\n playerY - enemyY → 正の数 → Sign = +1 → 敵は上へ\n\n      [+1, +1]\n        ↗\n  ●(enemy)  ○(player)<\/code><\/pre><p id=\"ch02-b18\">これで敵は右上方向に移動します。<\/p><blockquote id=\"ch02-b19\">⚠️ <strong>Sign方式の弱点<\/strong>：この方法は分かりやすい反面、①斜め移動が縦横より約1.4倍速い　②敵がプレイヤーに追いつくと小刻みに震える、という弱点があります。完成コードでは、この弱点がないUnityの関数 <code class=\"ic\">Vector2.MoveTowards<\/code> を使います。<\/blockquote><p id=\"ch02-b20\">しかし…<\/p><hr id=\"ch02-b21\"><h3 id=\"ch02-b22\" class=\"sec\">機能不全を体験する（Step B）<\/h3><p id=\"ch02-b23\">今のコードを実行すると、敵はプレイヤーに近づいてくるでしょう。でも、 <strong>たとえ重なっても何も起きません。<\/strong><\/p><pre id=\"ch02-b24\" data-lang=\"plain text\"><code>プレイヤー ○\n    ↑ 重なっている\n敵 ●\n\n → 何も起きない！<\/code><\/pre><p id=\"ch02-b25\">これが「判定がないゲーム」の実態です。これを解決するために <strong>if文<\/strong> が必要です。<\/p><hr id=\"ch02-b26\"><h3 id=\"ch02-b27\" class=\"sec\">if文：「もし〇〇なら」をコードに書く<\/h3><h3 id=\"ch02-b28\" class=\"sec\">if文とは<\/h3><p id=\"ch02-b29\">if文は、「<strong>条件が満たされたときだけ、その中の処理を実行する<\/strong>」仕組みです。<\/p><pre id=\"ch02-b30\" data-lang=\"plain text\"><code>if (条件)\n{\n    // 条件が真のときだけ実行する処理\n}<\/code><\/pre><p id=\"ch02-b31\">図解：<\/p><pre id=\"ch02-b32\" data-lang=\"plain text\"><code>処理の流れ\n↓\n[条件を調べる] —— 偽(false) ——→ 何もしない\n    │\n  真(true)\n    │\n[処理を実行]\n    │\n↓次の指示へ<\/code><\/pre><hr id=\"ch02-b33\"><h3 id=\"ch02-b34\" class=\"sec\">比較演算子一覧<\/h3><p id=\"ch02-b35\">if文の条件には、下記の演算子を使います。<\/p><div id=\"ch02-b36\" class=\"tblwrap\"><table><tr><th><strong>演算子<\/strong><\/th><th><strong>意味<\/strong><\/th><th><strong>例<\/strong><\/th><\/tr><tr><td><code class=\"ic\">==<\/code><\/td><td>等しい<\/td><td><code class=\"ic\">hp == 0<\/code><\/td><\/tr><tr><td><code class=\"ic\">!=<\/code><\/td><td>等しくない<\/td><td><code class=\"ic\">hp != 0<\/code><\/td><\/tr><tr><td><code class=\"ic\">&gt;<\/code><\/td><td>大きい<\/td><td><code class=\"ic\">score &gt; 100<\/code><\/td><\/tr><tr><td><code class=\"ic\">&lt;<\/code><\/td><td>小さい<\/td><td><code class=\"ic\">timer &lt; 0<\/code><\/td><\/tr><tr><td><code class=\"ic\">&gt;=<\/code><\/td><td>以上<\/td><td><code class=\"ic\">hp &gt;= 1<\/code><\/td><\/tr><tr><td><code class=\"ic\">&lt;=<\/code><\/td><td>以下<\/td><td><code class=\"ic\">speed &lt;= 10f<\/code><\/td><\/tr><\/table><\/div><blockquote id=\"ch02-b37\">❗ <code class=\"ic\">=<\/code> は「代入」、<code class=\"ic\">==<\/code> は「比較」です。混同するとバグの原因になるため注意！<\/blockquote><h3 id=\"ch02-b38\" class=\"sec\">コラム：else と else if ―― 「そうでなければ」<\/h3><p id=\"ch02-b39\">if文には「条件が偽だったとき」の相棒がいます。<\/p><pre id=\"ch02-b40\" data-lang=\"plain text\"><code>if (dist &lt; 1f)\n{\n    Debug.Log(\"GAME OVER\");        // 当たった\n}\nelse if (dist &lt; 3f)\n{\n    Debug.Log(\"危ない！\");          // 当たってはいないが近い\n}\nelse\n{\n    Debug.Log(\"安全圏\");            // どちらでもない\n}<\/code><\/pre><ul id=\"ch02-b41\"><li><code class=\"ic\">else if<\/code> … 前の条件が偽のとき、<strong>別の条件<\/strong>で再チェック<\/li><li><code class=\"ic\">else<\/code> … どの条件にも当てはまらなかったときの受け皿<\/li><\/ul><p id=\"ch02-b42\">上から順に判定され、<strong>最初に真になった1つだけ<\/strong>が実行されます。<\/p><hr id=\"ch02-b43\"><h3 id=\"ch02-b44\" class=\"sec\">Step C: 距離判定でif文を導入する<\/h3><p id=\"ch02-b45\">敵とプレイヤーの距離を計算し、「十分近い」ならゲームオーバーにします。<\/p><pre id=\"ch02-b46\" data-lang=\"plain text\"><code>// 2点間の距離を計算する\nfloat dist = Vector2.Distance(\n    new Vector2(playerX, playerY),\n    new Vector2(enemyX, enemyY)\n);\n\n// 距離が1以内なら当たり（ワールド座標ではCube1個分）\nif (dist &lt; 1f)\n{\n    Debug.Log(\"GAME OVER\");\n    // ゲームオーバーの処理をここに書く\n}<\/code><\/pre><p id=\"ch02-b47\">図解：<\/p><pre id=\"ch02-b48\" data-lang=\"plain text\"><code>dist = 5.0 → 当たりなし\n\ndist = 0.8 → 当たり！ GAME OVER\n\n      1\n    ┌────┐\n    │  ○ │  ← この範囲に敵が入ったら当たり\n    └────┘<\/code><\/pre><hr id=\"ch02-b49\"><h3 id=\"ch02-b50\" class=\"sec\">Step D: Mathf.Clampの正体を明かす（伏線回収）<\/h3><p id=\"ch02-b51\">Chapter 1で何気なく使っていた <code class=\"ic\">Mathf.Clamp()<\/code> ——これ、実は <strong>if文を使って作った関数<\/strong>でした。<\/p><pre id=\"ch02-b52\" data-lang=\"plain text\"><code>// Mathf.Clamp の中身イメージ\nfloat Clamp(float value, float min, float max)\n{\n    if (value &lt; min) { return min; }  // 最小値より小さければ最小値に固定\n    if (value &gt; max) { return max; }  // 最大値より大きければ最大値に固定\n    return value;                      // 範囲内ならそのまま\n}<\/code><\/pre><p id=\"ch02-b53\">図解：<\/p><pre id=\"ch02-b54\" data-lang=\"plain text\"><code>  最小値(-8)     最大値(+8)\n    │               │\n----▼---------------▼----\n           ○→  有効範囲\n\nvalue = -10  →  -8  に固定\nvalue = 3    →  3   そのまま\nvalue = 12   →  +8  に固定<\/code><\/pre><p id=\"ch02-b55\">Ch1で「おまじない」として扱ったコードの正体が if文だったわけです。<\/p><hr id=\"ch02-b56\"><h3 id=\"ch02-b57\" class=\"sec\">完成コード<\/h3><h3 id=\"ch02-b58\" class=\"sec\">この章で作るファイル<\/h3><ul id=\"ch02-b59\"><li><code class=\"ic\">ChaseGame.cs<\/code>（新規作成）――空のGameObjectにアタッチします<\/li><\/ul><h3 id=\"ch02-b60\" class=\"sec\">Unityでの準備（Inspector設定）<\/h3><ol id=\"ch02-b61\"><li>Hierarchyで右クリック → <code class=\"ic\">Create Empty<\/code> → 名前を <code class=\"ic\">GameController<\/code> にする<\/li><li><code class=\"ic\">ChaseGame.cs<\/code> を作り、<code class=\"ic\">GameController<\/code> にドラッグしてアタッチ<\/li><li>Cubeを2つ用意する（<code class=\"ic\">Player<\/code> と <code class=\"ic\">Enemy<\/code> に改名）<\/li><li><code class=\"ic\">GameController<\/code> を選び、Inspectorの <code class=\"ic\">Player<\/code> 欄・<code class=\"ic\">Enemy<\/code> 欄に、HierarchyからそれぞれのCubeを<strong>ドラッグ＆ドロップ<\/strong>する<\/li><\/ol><pre id=\"ch02-b62\" data-lang=\"plain text\"><code>using UnityEngine;\n\npublic class ChaseGame : MonoBehaviour\n{\n    const float MOVE_SPEED  = 3f;\n    const float ENEMY_SPEED = 2f;\n    const float HIT_DIST    = 1f;\n\n    float playerX = 0f;\n    float playerY = 0f;\n    float enemyX  = -6f;\n    float enemyY  = -3f;\n    bool  isGameOver = false;\n\n    // 画面反映用：InspectorでPlayerとEnemyのオブジェクトをセットする\n    public GameObject player;\n    public GameObject enemy;\n\n    void Update()\n    {\n        if (isGameOver) { return; }  // ゲームオーバー中は何もしない\n\n        HandleMoveInput();\n        MoveEnemy();\n        CheckCollision();\n        ApplyPositions();\n    }\n\n    // プレイヤー入力\n    void HandleMoveInput()\n    {\n        float delta = MOVE_SPEED * Time.deltaTime;\n\n        if (Input.GetKey(KeyCode.LeftArrow))  { playerX -= delta; }\n        if (Input.GetKey(KeyCode.RightArrow)) { playerX += delta; }\n        if (Input.GetKey(KeyCode.UpArrow))    { playerY += delta; }\n        if (Input.GetKey(KeyCode.DownArrow))  { playerY -= delta; }\n\n        // 画面外に出ない\n        playerX = Mathf.Clamp(playerX, -8f, 8f);\n        playerY = Mathf.Clamp(playerY, -4.5f, 4.5f);\n    }\n\n    // 敵の移動（MoveTowards＝目標へ一定速度で近づく）\n    void MoveEnemy()\n    {\n        Vector2 enemyPos  = new Vector2(enemyX, enemyY);\n        Vector2 playerPos = new Vector2(playerX, playerY);\n\n        enemyPos = Vector2.MoveTowards(\n            enemyPos, playerPos, ENEMY_SPEED * Time.deltaTime);\n\n        enemyX = enemyPos.x;\n        enemyY = enemyPos.y;\n    }\n\n    // 当たり判定\n    void CheckCollision()\n    {\n        float dist = Vector2.Distance(\n            new Vector2(playerX, playerY),\n            new Vector2(enemyX, enemyY)\n        );\n\n        if (dist &lt; HIT_DIST)\n        {\n            isGameOver = true;\n            Debug.Log(\"GAME OVER\");\n        }\n    }\n\n    // 画面に反映\n    void ApplyPositions()\n    {\n        player.transform.position = new Vector3(playerX, playerY, 0f);\n        enemy.transform.position  = new Vector3(enemyX,  enemyY,  0f);\n    }\n}<\/code><\/pre><blockquote id=\"ch02-b63\">💡 <code class=\"ic\">Vector2.MoveTowards(現在地, 目的地, 進む距離)<\/code> は「目的地へ向かって一定距離だけ進んだ座標」を返してくれる関数です。Sign方式の「斜めが速い」「近距離で震える」問題を両方解決してくれます。<\/blockquote><h3 id=\"ch02-b64\" class=\"sec\">実行確認の手順<\/h3><ol id=\"ch02-b65\"><li>Playボタンを押す<\/li><li>敵（Enemy）がプレイヤーへ向かってくることを確認<\/li><li>わざと捕まって、Consoleに <code class=\"ic\">GAME OVER<\/code> が出ることを確認<\/li><\/ol><hr id=\"ch02-b66\"><h3 id=\"ch02-b67\" class=\"sec\">改造セッション<\/h3><p id=\"ch02-b68\">コードを変えるとゲームの挙動が変わります。パラメータを変更して自分だけのゲームにカスタマイズしましょう。<\/p><div id=\"ch02-b69\" class=\"tblwrap\"><table><tr><th><strong>実験<\/strong><\/th><th><strong>変更内容<\/strong><\/th><th><strong>何が起きるか<\/strong><\/th><\/tr><tr><td>1<\/td><td><code class=\"ic\">ENEMY_SPEED = 0.5f<\/code><\/td><td>スローな敵。かわしやすい<\/td><\/tr><tr><td>2<\/td><td><code class=\"ic\">ENEMY_SPEED = 5f<\/code><\/td><td>プレイヤーより速い敵。緊張感のある逃走戦<\/td><\/tr><tr><td>3<\/td><td><code class=\"ic\">HIT_DIST = 0.3f<\/code><\/td><td>狭い当たり判定。ギリギリすれすれ感<\/td><\/tr><tr><td>4<\/td><td><code class=\"ic\">HIT_DIST = 3f<\/code><\/td><td>大きな当たり判定。近づいただけでゲームオーバー<\/td><\/tr><tr><td>5<\/td><td><code class=\"ic\">ENEMY_SPEED = -2f<\/code><\/td><td>逃げる敵！反転ゲーム<\/td><\/tr><tr><td>6<\/td><td><code class=\"ic\">isGameOver<\/code> を <code class=\"ic\">Debug.Log<\/code> で確認<\/td><td>ゲームオーバーが発火するタイミングの確認<\/td><\/tr><\/table><\/div><h3 id=\"ch02-b70\" class=\"sec\">発展課題（任意）<\/h3><ul id=\"ch02-b71\"><li>A. 敵が2体になったらどうなるか考える<\/li><li>B. HPを導入し、3回当たったらゲームオーバーにする<\/li><li>C. <code class=\"ic\">if (dist &lt; HIT_DIST) else if (dist &lt; HIT_DIST * 2)<\/code> で警戒エリアを作る<\/li><\/ul><hr id=\"ch02-b72\"><h3 id=\"ch02-b73\" class=\"sec\">振り返りクイズ<\/h3><h3 id=\"ch02-b74\" class=\"sec\">Q1<\/h3><pre id=\"ch02-b75\" data-lang=\"plain text\"><code>if (hp == 0)\n{\n    Debug.Log(\"Dead\");\n}<\/code><\/pre><p id=\"ch02-b76\"><code class=\"ic\">hp<\/code> が <code class=\"ic\">3<\/code> のとき、<code class=\"ic\">Dead<\/code> は表示されますか？<\/p><h3 id=\"ch02-b77\" class=\"sec\">(A) 表示される  (B) 表示されない<\/h3><hr id=\"ch02-b78\"><h3 id=\"ch02-b79\" class=\"sec\">Q2<\/h3><p id=\"ch02-b80\">次の2つのコードの違いを説明してください。<\/p><pre id=\"ch02-b81\" data-lang=\"plain text\"><code>hp = 0;   // (a)\nhp == 0;  // (b)<\/code><\/pre><hr id=\"ch02-b82\"><h3 id=\"ch02-b83\" class=\"sec\">Q3<\/h3><p id=\"ch02-b84\"><code class=\"ic\">Mathf.Clamp(playerX, -8f, 8f)<\/code> には、おまじないコードと共通した何かが隠れています。それは何ですか？<\/p><hr id=\"ch02-b85\"><h3 id=\"ch02-b86\" class=\"sec\">エラー対応ガイド<\/h3><div id=\"ch02-b87\" class=\"tblwrap\"><table><tr><th><strong>エラーメッセージ<\/strong><\/th><th><strong>原因<\/strong><\/th><th><strong>対処法<\/strong><\/th><\/tr><tr><td><code class=\"ic\">NullReferenceException<\/code><\/td><td><code class=\"ic\">enemy<\/code> 変数にオブジェクトがセットされていない<\/td><td>Inspectorで <code class=\"ic\">enemy<\/code> 欄にオブジェクトをドラッグアンドドロップ<\/td><\/tr><tr><td>敵が全く動かない<\/td><td><code class=\"ic\">Update() <\/code>内で <code class=\"ic\">MoveEnemy() <\/code>が呼ばれていない<\/td><td><code class=\"ic\">Update() <\/code>に <code class=\"ic\">MoveEnemy();<\/code> を追加<\/td><\/tr><tr><td>重なっても判定されない<\/td><td><code class=\"ic\">CheckCollision()<\/code> が呼ばれていない<\/td><td><code class=\"ic\">Update()<\/code> 内の呼び出し順を確認<\/td><\/tr><tr><td><code class=\"ic\">= <\/code> と <code class=\"ic\">==<\/code> の混同<\/td><td><code class=\"ic\">if (hp = 0)<\/code> にしてしまった<\/td><td><code class=\"ic\">if (hp == 0)<\/code> に修正<\/td><\/tr><tr><td>画面外へ消える<\/td><td><code class=\"ic\">Mathf.Clamp<\/code> なしで際限なく移動<\/td><td><code class=\"ic\">playerX = Mathf.Clamp(playerX, -8f, 8f);<\/code> を追加<\/td><\/tr><\/table><\/div><hr id=\"ch02-b88\"><h3 id=\"ch02-b89\" class=\"sec\">次の章へのフック<\/h3><p id=\"ch02-b90\">今回は敵が「1体」でした。 次の章では、<strong>コインを画面に大量に散りばめて、すべて集めるコインコレクター<\/strong>を作ります。<\/p><blockquote id=\"ch02-b91\">「5個のコインを管理するには、変数を何個用意すればいいのか？」<\/blockquote><p id=\"ch02-b92\">その答えが「<strong>配列<\/strong>」です。<\/p>"}, {"id": "ch03", "num": "3", "name": "コインを集めよう", "title": "Chapter 3 コインを集めよう", "html": "<blockquote id=\"ch03-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂）<\/blockquote><hr id=\"ch03-b1\"><div id=\"ch03-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>訓練所より<\/strong>：報酬の時間だ。落ちているコインは拾った者のもの——ただし、「全部」拾えたらの話だがな。<\/p><\/div><\/div><h3 id=\"ch03-b3\" class=\"sec\">この章で作るもの<\/h3><p id=\"ch03-b4\">今回作るのは「コインコレクター」です。<\/p><pre id=\"ch03-b5\" data-lang=\"plain text\"><code>○ プレイヤー\n\n◇ コイン  ◇ コイン  ◇ コイン  ◇ コイン  ◇ コイン<\/code><\/pre><p id=\"ch03-b6\">プレイヤーを動かしてコインを集めます。<\/p><p id=\"ch03-b7\">Chapter 2では敵を作りました。<\/p><p id=\"ch03-b8\">今回は「たくさんある同じもの」を扱う方法を学びます。<\/p><hr id=\"ch03-b9\"><h3 id=\"ch03-b10\" class=\"sec\">Step 1 コインを1個置く<\/h3><p id=\"ch03-b11\">まずはコイン1個です。<\/p><pre id=\"ch03-b12\" data-lang=\"plain text\"><code>float coin1X = 3f;\nfloat coin1Y = 2f;<\/code><\/pre><p id=\"ch03-b13\">当たり判定を書きます。<\/p><pre id=\"ch03-b14\" data-lang=\"plain text\"><code>if (Mathf.Abs(playerX - coin1X) &lt; 0.5f &amp;&amp;\n    Mathf.Abs(playerY - coin1Y) &lt; 0.5f)\n{\n    score++;\n}<\/code><\/pre><p id=\"ch03-b15\">問題ありません。<\/p><p id=\"ch03-b16\"><strong>コラム：<\/strong><strong><code class=\"ic\">&amp;&amp;<\/code><\/strong><strong> は「かつ」<\/strong><\/p><p id=\"ch03-b17\">上のif文に初登場した <code class=\"ic\">&amp;&amp;<\/code> は「<strong>両方の条件が真のときだけ真<\/strong>」という論理演算子です。<\/p><ul id=\"ch03-b18\"><li><code class=\"ic\">A &amp;&amp; B<\/code> … AかつB（両方OKなら実行）<\/li><li><code class=\"ic\">A || B<\/code> … AまたはB（どちらかがOKなら実行）<\/li><li><code class=\"ic\">!A<\/code> … Aではない（真偽をひっくり返す）<\/li><\/ul><p id=\"ch03-b19\">今回は「X方向も近い <strong>かつ<\/strong> Y方向も近い」ときだけコイン取得、という意味になります。<\/p><hr id=\"ch03-b20\"><h3 id=\"ch03-b21\" class=\"sec\">Step 2 コインを5個置く<\/h3><p id=\"ch03-b22\">では5個にします。<\/p><pre id=\"ch03-b23\" data-lang=\"plain text\"><code>float coin1X = -6f;\nfloat coin2X = -3f;\nfloat coin3X = 0f;\nfloat coin4X = 3f;\nfloat coin5X = 6f;<\/code><\/pre><p id=\"ch03-b24\">判定も増やします。<\/p><pre id=\"ch03-b25\" data-lang=\"plain text\"><code>if (...) { score++; }\nif (...) { score++; }\nif (...) { score++; }\n// ...<\/code><\/pre><p id=\"ch03-b26\">動きます。でも少し嫌な予感がします。<\/p><hr id=\"ch03-b27\"><h3 id=\"ch03-b28\" class=\"sec\">Step 3 コインを37個にしてみよう<\/h3><blockquote id=\"ch03-b29\">🎮 ゲーム企画会議<\/blockquote><p id=\"ch03-b30\"><strong>Claude：<\/strong> コイン37個に増やしたいです。<\/p><p id=\"ch03-b31\">みなさんはどうしますか？<\/p><pre id=\"ch03-b32\" data-lang=\"plain text\"><code>coin1X, coin2X, coin3X, ... coin37X<\/code><\/pre><p id=\"ch03-b33\">当たり判定も<\/p><pre id=\"ch03-b34\" data-lang=\"plain text\"><code>if(...) if(...) if(...) ... ← 37回<\/code><\/pre><p id=\"ch03-b35\">これが <strong>コピペ地獄<\/strong> です。<\/p><p id=\"ch03-b36\">さらに恐ろしいことが起きます。<\/p><pre id=\"ch03-b37\" data-lang=\"plain text\"><code>コイン36は取れる\nコイン37だけ取れない  ← なぜ？<\/code><\/pre><p id=\"ch03-b38\">確認すると、<code class=\"ic\">coin36X<\/code> をコピーしたまま <code class=\"ic\">coin37X<\/code> へ直し忘れていました。<\/p><pre id=\"ch03-b39\" data-lang=\"plain text\"><code>36番を2回判定\n37番を0回判定<\/code><\/pre><hr id=\"ch03-b40\"><h3 id=\"ch03-b41\" class=\"sec\">配列の登場<\/h3><p id=\"ch03-b42\">同じものがたくさんある。そんなとき使うのが <strong>配列<\/strong> です。<\/p><pre id=\"ch03-b43\" data-lang=\"plain text\"><code>float[] coinX =\n{\n    -6f,\n    -3f,\n    0f,\n    3f,\n    6f\n};<\/code><\/pre><h3 id=\"ch03-b44\" class=\"sec\">図解：配列のイメージ<\/h3><pre id=\"ch03-b45\" data-lang=\"plain text\"><code>coinX\n┌───┬───┬───┬───┬───┐\n│-6 │-3 │ 0 │ 3 │ 6 │\n└───┴───┴───┴───┴───┘\n  0   1   2   3   4<\/code><\/pre><p id=\"ch03-b46\">番号（インデックス）で管理できます。<\/p><p id=\"ch03-b47\">Y座標も同じように <code class=\"ic\">float[] coinY = { ... };<\/code> と配列にします。「X用・Y用・取得済みフラグ用」のように、<strong>同じ番号どうしが1枚のコインに対応<\/strong>する形で管理します。<\/p><hr id=\"ch03-b48\"><h3 id=\"ch03-b49\" class=\"sec\">Step 4 forループで回す<\/h3><p id=\"ch03-b50\">配列と相性が良いのが <code class=\"ic\">for<\/code> です。<\/p><pre id=\"ch03-b51\" data-lang=\"plain text\"><code>for (int i = 0; i &lt; 5; i++)\n{\n    Debug.Log(coinX[i]);\n}<\/code><\/pre><h3 id=\"ch03-b52\" class=\"sec\">図解：forループのイメージ<\/h3><pre id=\"ch03-b53\" data-lang=\"plain text\"><code>i=0 → coinX[0] = -6\ni=1 → coinX[1] = -3\ni=2 → coinX[2] = 0\ni=3 → coinX[3] = 3\ni=4 → coinX[4] = 6<\/code><\/pre><p id=\"ch03-b54\">全部自動で見てくれます。<\/p><h3 id=\"ch03-b55\" class=\"sec\">forの構文を分解する<\/h3><pre id=\"ch03-b56\" data-lang=\"plain text\"><code>for (int i = 0; i &lt; 5; i++)\n      ─────────  ──────  ───\n      ①初期化    ②条件   ③更新<\/code><\/pre><ol id=\"ch03-b57\"><li><strong>①初期化<\/strong>……最初に1回だけ実行（カウンタ <code class=\"ic\">i<\/code> を作る）<\/li><li><strong>②条件<\/strong>……毎回チェックし、真なら中身を実行、偽ならループ終了<\/li><li><strong>③更新<\/strong>……中身を実行し終えるたびに実行（<code class=\"ic\">i<\/code> を1増やす）<\/li><\/ol><hr id=\"ch03-b58\"><h3 id=\"ch03-b59\" class=\"sec\">Step 5 スケール体験<\/h3><p id=\"ch03-b60\">5個でも100個でも同じコードです。<\/p><pre id=\"ch03-b61\" data-lang=\"plain text\"><code>for (int i = 0; i &lt; coinX.Length; i++)\n{\n    CheckCoin(i);\n}<\/code><\/pre><h3 id=\"ch03-b62\" class=\"sec\">図解：スケールの変化<\/h3><pre id=\"ch03-b63\" data-lang=\"plain text\"><code>5個   → □□□□□\n100個 → □□□□□ × 20行分\n\nコード量はほぼ同じ！<\/code><\/pre><hr id=\"ch03-b64\"><h3 id=\"ch03-b65\" class=\"sec\">Step 6 「取りっぱなし」を防ぐ ―― bool配列<\/h3><p id=\"ch03-b66\">実は今のままだと、大問題があります。プレイヤーがコインに重なっている間、<code class=\"ic\">score++<\/code> が<strong>毎フレーム実行され続ける<\/strong>のです（1秒重なるとスコアが数十点増えます！）。<\/p><p id=\"ch03-b67\">そこで「取得済みかどうか」を覚える<strong>bool配列<\/strong>を追加します。<\/p><pre id=\"ch03-b68\" data-lang=\"plain text\"><code>bool[] coinCollected = new bool[5];  // 全部false（未取得）で始まる<\/code><\/pre><p id=\"ch03-b69\">判定時に「未取得なら取得する」に変えます。<\/p><pre id=\"ch03-b70\" data-lang=\"plain text\"><code>if (!coinCollected[i] &amp;&amp;\n    Mathf.Abs(playerX - coinX[i]) &lt; 0.5f &amp;&amp;\n    Mathf.Abs(playerY - coinY[i]) &lt; 0.5f)\n{\n    coinCollected[i] = true;   // 取得済みにする\n    coins[i].SetActive(false); // コインを画面から消す\n    score++;\n}<\/code><\/pre><p id=\"ch03-b71\"><code class=\"ic\">!coinCollected[i]<\/code> は「まだ取得していないなら」という意味です（<code class=\"ic\">!<\/code> は真偽の反転）。<\/p><hr id=\"ch03-b72\"><h3 id=\"ch03-b73\" class=\"sec\">完成コード<\/h3><h3 id=\"ch03-b74\" class=\"sec\">この章で作るファイル<\/h3><ul id=\"ch03-b75\"><li><code class=\"ic\">CoinCollector.cs<\/code>（新規作成）――空のGameObject（<code class=\"ic\">GameController<\/code>）にアタッチ<\/li><\/ul><h3 id=\"ch03-b76\" class=\"sec\">Unityでの準備（Inspector設定）<\/h3><ol id=\"ch03-b77\"><li>Cubeでプレイヤーを1個、コイン用のオブジェクト（SphereでOK）を5個作る<\/li><li><code class=\"ic\">GameController<\/code> のInspectorで、<code class=\"ic\">Coins<\/code> 欄のサイズを5にして5個のコインをドラッグ＆ドロップで登録、<code class=\"ic\">Player<\/code> 欄にプレイヤーを登録する<\/li><\/ol><pre id=\"ch03-b78\" data-lang=\"plain text\"><code>using UnityEngine;\n\npublic class CoinCollector : MonoBehaviour\n{\n    const float MOVE_SPEED = 3f;\n\n    float playerX = 0f;\n    float playerY = -3f;\n    int score = 0;\n\n    // コインの位置（XとYをペアで管理）\n    float[] coinX = { -6f, -3f, 0f, 3f, 6f };\n    float[] coinY = {  2f,  0f, 2f, 0f, 2f };\n    bool[] coinCollected = new bool[5];\n\n    public GameObject player;\n    public GameObject[] coins;  // Inspectorで5個セットする\n\n    void Update()\n    {\n        HandleMoveInput();\n        CheckCoins();\n        ApplyPositions();\n    }\n\n    void HandleMoveInput()\n    {\n        float delta = MOVE_SPEED * Time.deltaTime;\n        if (Input.GetKey(KeyCode.LeftArrow))  { playerX -= delta; }\n        if (Input.GetKey(KeyCode.RightArrow)) { playerX += delta; }\n        if (Input.GetKey(KeyCode.UpArrow))    { playerY += delta; }\n        if (Input.GetKey(KeyCode.DownArrow))  { playerY -= delta; }\n        playerX = Mathf.Clamp(playerX, -8f, 8f);\n        playerY = Mathf.Clamp(playerY, -4.5f, 4.5f);\n    }\n\n    void CheckCoins()\n    {\n        for (int i = 0; i &lt; coinX.Length; i++)\n        {\n            if (!coinCollected[i] &amp;&amp;\n                Mathf.Abs(playerX - coinX[i]) &lt; 0.5f &amp;&amp;\n                Mathf.Abs(playerY - coinY[i]) &lt; 0.5f)\n            {\n                coinCollected[i] = true;\n                coins[i].SetActive(false);\n                score++;\n                Debug.Log(\"スコア: \" + score);\n            }\n        }\n    }\n\n    void ApplyPositions()\n    {\n        player.transform.position = new Vector3(playerX, playerY, 0f);\n        for (int i = 0; i &lt; coins.Length; i++)\n        {\n            coins[i].transform.position = new Vector3(coinX[i], coinY[i], 0f);\n        }\n    }\n}<\/code><\/pre><h3 id=\"ch03-b79\" class=\"sec\">実行確認の手順<\/h3><ol id=\"ch03-b80\"><li>Playボタンを押し、矢印キーでコインへ向かう<\/li><li>コインに触れると消えて、Consoleにスコアが表示されれば成功<\/li><li>全部で5点になったら全回収！<\/li><\/ol><hr id=\"ch03-b81\"><h3 id=\"ch03-b82\" class=\"sec\">文法整理：配列の基本 📚<\/h3><div id=\"ch03-b83\" class=\"tblwrap\"><table><tr><th><strong>書き方<\/strong><\/th><th><strong>意味<\/strong><\/th><\/tr><tr><td><code class=\"ic\">float[] a = new float[5];<\/code><\/td><td>サイズ5の配列を作る（中身は初期値）<\/td><\/tr><tr><td><code class=\"ic\">float[] a = { 1f, 2f, 3f };<\/code><\/td><td>作ると同時に中身も入れる（サイズは自動で3）<\/td><\/tr><tr><td><code class=\"ic\">a[0] = 10f;<\/code><\/td><td>0番目に代入する<\/td><\/tr><tr><td><code class=\"ic\">float x = a[2];<\/code><\/td><td>2番目を読み取る<\/td><\/tr><tr><td><code class=\"ic\">a.Length<\/code><\/td><td>要素数（サイズ）を調べる<\/td><\/tr><\/table><\/div><ul id=\"ch03-b84\"><li>インデックスは <strong>0から始まる<\/strong>。サイズ5なら有効なのは <code class=\"ic\">0〜4<\/code><\/li><li>範囲外に触ると <code class=\"ic\">IndexOutOfRangeException<\/code>（詳しくは次章！）<\/li><li><code class=\"ic\">new<\/code> で作った直後の中身は「初期値」……数値型は <code class=\"ic\">0<\/code>、<code class=\"ic\">bool<\/code> は <code class=\"ic\">false<\/code>、<code class=\"ic\">string<\/code> は <code class=\"ic\">null<\/code><\/li><\/ul><hr id=\"ch03-b85\"><h3 id=\"ch03-b86\" class=\"sec\">コラム：forの兄弟「while」<\/h3><p id=\"ch03-b87\">繰り返しにはもう1つ、<code class=\"ic\">while<\/code> という書き方があります。<\/p><pre id=\"ch03-b88\" data-lang=\"plain text\"><code>int i = 0;\nwhile (i &lt; 5)\n{\n    Debug.Log(coinX[i]);\n    i++;  // ← これを忘れると無限ループ！\n}<\/code><\/pre><ul id=\"ch03-b89\"><li><code class=\"ic\">for<\/code> … 回数が決まっている繰り返しに向く<\/li><li><code class=\"ic\">while<\/code> … 「条件が真の間ずっと」繰り返す<\/li><li><code class=\"ic\">break<\/code> … ループを途中で抜ける<\/li><li><code class=\"ic\">continue<\/code> … その回だけスキップして次へ<\/li><\/ul><p id=\"ch03-b90\">ゲームでは「HPが0になるまで戦い続ける」のような処理で <code class=\"ic\">while<\/code> の考え方が登場します。<\/p><hr id=\"ch03-b91\"><h3 id=\"ch03-b92\" class=\"sec\">ボーナスコインを追加したい<\/h3><blockquote id=\"ch03-b93\">🎮 ゲーム企画会議<\/blockquote><p id=\"ch03-b94\"><strong>Claude：<\/strong> ゲーム中にボーナスコインを追加したいです。<\/p><p id=\"ch03-b95\">実は今の配列では困ります。<\/p><h3 id=\"ch03-b96\" class=\"sec\">理由は次章で学びます。<\/h3><hr id=\"ch03-b97\"><h3 id=\"ch03-b98\" class=\"sec\">改造セッション<\/h3><ol id=\"ch03-b99\"><li>コインを10個に増やす<\/li><li>コインの配置を変える<\/li><li>コイン取得時に音を鳴らす<\/li><li>コイン取得時に色を変える<\/li><li>コイン100個チャレンジ<\/li><\/ol><hr id=\"ch03-b100\"><h3 id=\"ch03-b101\" class=\"sec\">振り返りクイズ<\/h3><p id=\"ch03-b102\"><strong>Q1.<\/strong> 配列の番号は何から始まる？<\/p><p id=\"ch03-b103\">A. 0 　B. 1 　C. 好きな数字<\/p><p id=\"ch03-b104\"><strong>Q2.<\/strong> 同じ処理を繰り返すとき使うのは？<\/p><p id=\"ch03-b105\">A. if 　B. for 　C. float<\/p><p id=\"ch03-b106\"><strong>Q3.<\/strong> コイン37個問題の原因は？<\/p><p id=\"ch03-b107\">A. Unityのバグ 　B. コピー修正忘れ 　C. 配列のバグ<\/p><hr id=\"ch03-b108\"><h3 id=\"ch03-b109\" class=\"sec\">エラー対応ガイド<\/h3><div id=\"ch03-b110\" class=\"tblwrap\"><table><tr><th><strong>エラー<\/strong><\/th><th><strong>原因<\/strong><\/th><th><strong>確認事項<\/strong><\/th><\/tr><tr><td><code class=\"ic\">IndexOutOfRangeException<\/code><\/td><td>存在しない番号を読んでいる<\/td><td>配列のサイズとiの上限を確認<\/td><\/tr><tr><td><code class=\"ic\">Length<\/code> のスペルミス<\/td><td>タイポ<\/td><td><code class=\"ic\">Length<\/code>（大文字L）を確認<\/td><\/tr><tr><td>forが終わらない（無限ループ）<\/td><td><code class=\"ic\">i++<\/code> を忘れた<\/td><td>forの3番目の式を確認<\/td><\/tr><\/table><\/div>"}, {"id": "ch04", "num": "4", "name": "訓練所：ゴブリンの襲撃ラッシュ！（配列の限界）", "title": "Chapter 4 訓練所：ゴブリンの襲撃ラッシュ！（配列の限界）", "html": "<blockquote id=\"ch04-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 校閲済み（v1.1 全体改訂・旧「Ch3→4橋渡し」「Ch4 敵ラッシュ」ページを統合）<\/blockquote><hr id=\"ch04-b1\"><div id=\"ch04-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>訓練所より<\/strong>：実戦訓練の初日。見張り台の鐘が鳴り響きます。「ゴブリンの群れが接近中だ！」<\/p><\/div><\/div><h3 id=\"ch04-b3\" class=\"sec\">この章で学ぶこと<\/h3><p id=\"ch04-b4\">次々と現れるゴブリンを相手に、あなたは防衛訓練を行います。<\/p><p id=\"ch04-b5\">しかし今回の本当の敵はゴブリンではありません。<\/p><p id=\"ch04-b6\"><strong>大量の敵データをどう管理するか。<\/strong> それがこの章のテーマです。<\/p><ul id=\"ch04-b7\"><li>配列は「箱の数が最初から決まっている」こと<\/li><li>存在しない箱に触れると <code class=\"ic\">IndexOutOfRangeException<\/code> が起きること<\/li><li>それはバグではなく<strong>仕様<\/strong>であること<\/li><\/ul><hr id=\"ch04-b8\"><h3 id=\"ch04-b9\" class=\"sec\">配列は便利。でも限界がある<\/h3><p id=\"ch04-b10\">Chapter 3で配列を使いました。とても便利でしたね。<\/p><p id=\"ch04-b11\">しかし実は、配列には大きな特徴があります。<\/p><blockquote id=\"ch04-b12\">箱の数が最初から決まっている<\/blockquote><p id=\"ch04-b13\">例えば<\/p><pre id=\"ch04-b14\" data-lang=\"plain text\"><code>float[] coinX = new float[5];<\/code><\/pre><p id=\"ch04-b15\">と書いた場合、箱は <strong>5個<\/strong> です。インデックス 0〜4 までしかありません。<\/p><hr id=\"ch04-b16\"><h3 id=\"ch04-b17\" class=\"sec\">ゴブリンが入りきらない！<\/h3><p id=\"ch04-b18\">Ch3までは配列で「たくさんの同じもの」を管理していました。<\/p><pre id=\"ch04-b19\" data-lang=\"plain text\"><code>string[] enemies = new string[3];\nenemies[0] = \"ゴブリンA\";\nenemies[1] = \"ゴブリンB\";\nenemies[2] = \"ゴブリンC\";<\/code><\/pre><p id=\"ch04-b20\">これに4体目を入れようとすると――<\/p><pre id=\"ch04-b21\" data-lang=\"plain text\"><code>enemies[3] = \"ゴブリンD\";  // ← エラー！<\/code><\/pre><pre id=\"ch04-b22\" data-lang=\"plain text\"><code>IndexOutOfRangeException: Index was outside the bounds of the array.<\/code><\/pre><p id=\"ch04-b23\">配列の定員は最初に決める必要がありますが、ゲーム中に何体の敵が出るかはわかりません。<\/p><hr id=\"ch04-b24\"><h3 id=\"ch04-b25\" class=\"sec\">わざとバグを作ってみよう<\/h3><p id=\"ch04-b26\">実際に体験します。次のコードを書いてください。<\/p><pre id=\"ch04-b27\" data-lang=\"plain text\"><code>float[] enemyX = new float[5];<\/code><\/pre><p id=\"ch04-b28\">箱は5個です。<\/p><pre id=\"ch04-b29\" data-lang=\"plain text\"><code>enemyX\n┌─┬─┬─┬─┬─┐\n│0│1│2│3│4│\n└─┴─┴─┴─┴─┘<\/code><\/pre><p id=\"ch04-b30\">ここで<\/p><pre id=\"ch04-b31\" data-lang=\"plain text\"><code>enemyX[5] = 100f;<\/code><\/pre><p id=\"ch04-b32\">を書いて実行すると……<\/p><pre id=\"ch04-b33\" data-lang=\"plain text\"><code>IndexOutOfRangeException<\/code><\/pre><p id=\"ch04-b34\">が発生します。<\/p><h3 id=\"ch04-b35\" class=\"sec\">何が起きた？<\/h3><p id=\"ch04-b36\">存在するのは 0〜4 です。でも <strong>5<\/strong> へ入れようとしました。<\/p><pre id=\"ch04-b37\" data-lang=\"plain text\"><code>存在する箱\n┌─┬─┬─┬─┬─┐\n│0│1│2│3│4│\n└─┴─┴─┴─┴─┘\n               ↑\n           5番は無い！<\/code><\/pre><hr id=\"ch04-b38\"><h3 id=\"ch04-b39\" class=\"sec\">Unityは正しい<\/h3><p id=\"ch04-b40\">初心者はよく「Unityが壊れた」と思います。<\/p><p id=\"ch04-b41\">違います。Unityは<\/p><blockquote id=\"ch04-b42\">「存在しない箱に入れようとしたよ」<\/blockquote><p id=\"ch04-b43\">と教えてくれているだけです。<\/p><p id=\"ch04-b44\">そして重要なのは、これは <strong>バグではなく仕様<\/strong> だということ。<\/p><p id=\"ch04-b45\">今の設計は「敵の数は固定」という前提で作られているのです。<\/p><blockquote id=\"ch04-b46\">📝 <strong>厳密に言うと<\/strong>：C#には <code class=\"ic\">Array.Resize<\/code> という「新しいサイズの配列を作り直して中身をコピーする」機能もあります。ただし毎回作り直すのは非効率なので、実務では「<strong>通常の配列は固定長として扱う<\/strong>」のが基本です。サイズが変わるものにはChapter 6の <code class=\"ic\">List<\/code> を使います。<\/blockquote><h3 id=\"ch04-b47\" class=\"sec\">型ごとの初期値<\/h3><p id=\"ch04-b48\"><code class=\"ic\">new<\/code> で配列を作った直後、中身には「型ごとの初期値」が入っています。<\/p><div id=\"ch04-b49\" class=\"tblwrap\"><table><tr><th><strong>型<\/strong><\/th><th><strong>初期値<\/strong><\/th><\/tr><tr><td><code class=\"ic\">int<\/code> / <code class=\"ic\">float<\/code><\/td><td><code class=\"ic\">0<\/code> / <code class=\"ic\">0.0<\/code><\/td><\/tr><tr><td><code class=\"ic\">bool<\/code><\/td><td><code class=\"ic\">false<\/code><\/td><\/tr><tr><td><code class=\"ic\">string<\/code>（参照型）<\/td><td><code class=\"ic\">null<\/code>（何も指していない）<\/td><\/tr><\/table><\/div><p id=\"ch04-b50\"><code class=\"ic\">new string[10]<\/code> は「空文字が10個」ではなく「<strong>null が10個<\/strong>」です。<code class=\"ic\">null<\/code> の正体はChapter 8.5で学びます。<\/p><hr id=\"ch04-b51\"><h3 id=\"ch04-b52\" class=\"sec\">もっと敵を増やしたい<\/h3><blockquote id=\"ch04-b53\">🎮 ゲーム企画会議<br><strong>Claude：<\/strong> 敵を100体出したいです。<\/blockquote><p id=\"ch04-b54\">今の配列では、最初から <strong>100個<\/strong> 確保しなければなりません。<\/p><p id=\"ch04-b55\">しかし本当は、<\/p><ul id=\"ch04-b56\"><li>必要になったら追加<\/li><li>不要なら削除<\/li><\/ul><p id=\"ch04-b57\">したいですよね。<\/p><hr id=\"ch04-b58\"><h3 id=\"ch04-b59\" class=\"sec\">未来の伏線<\/h3><p id=\"ch04-b60\">実はC#には <code class=\"ic\">List&lt;T&gt;<\/code> という <strong>増やせる配列<\/strong> のような仕組みがあります。<\/p><p id=\"ch04-b61\"><strong>Chapter 6<\/strong> で、この問題を解決する新しい道具を学びます。<\/p><p id=\"ch04-b62\">（その前に、Chapter 4.5でエラーから身を守る「盾」を、Chapter 5で処理に名前を付ける「メソッド」を覚えます）<\/p><hr id=\"ch04-b63\"><h3 id=\"ch04-b64\" class=\"sec\">改造セッション 🔧<\/h3><ol id=\"ch04-b65\"><li>配列のサイズを <code class=\"ic\">new string[10]<\/code> に変えて、何体目でエラーになるか確かめよう<\/li><li><code class=\"ic\">enemies.Length<\/code> を <code class=\"ic\">Debug.Log<\/code> で表示してみよう<\/li><li>forループの条件を <code class=\"ic\">i &lt;= enemies.Length<\/code> にすると何が起きる？（わざと試してエラーメッセージを読もう）<\/li><\/ol><blockquote id=\"ch04-b66\">💡 <strong>ヒント<\/strong>：<code class=\"ic\">Length<\/code> が3のとき、存在するインデックスは <code class=\"ic\">0, 1, 2<\/code> の3つ。最後の有効インデックスは「<code class=\"ic\">Length - 1<\/code> ＝ 2」です。<code class=\"ic\">i &lt;= Length<\/code> にすると、最後の周回で <code class=\"ic\">i = 3<\/code> になり、存在しない4番目の箱 <code class=\"ic\">enemies[3]<\/code> に触ってしまいます。だから条件は <code class=\"ic\">i &lt; Length<\/code> が正解なのです。<\/blockquote><hr id=\"ch04-b67\"><h3 id=\"ch04-b68\" class=\"sec\">振り返りクイズ ✅<\/h3><p id=\"ch04-b69\"><strong>Q1.<\/strong> 配列のサイズ（箱の数）は作成後に変更できる？<\/p><p id=\"ch04-b70\">A. できる　B. できない（仕様）　C. Unityなら可能<\/p><p id=\"ch04-b71\"><strong>Q2.<\/strong> サイズ3の配列で <code class=\"ic\">enemies[3]<\/code> にアクセスすると？<\/p><p id=\"ch04-b72\">A. 自動で拡張される　B. <code class=\"ic\">IndexOutOfRangeException<\/code> が発生　C. nullが返る<\/p><p id=\"ch04-b73\"><strong>Q3.<\/strong> <code class=\"ic\">IndexOutOfRangeException<\/code> が出たとき、まず疑うべきは？<\/p><p id=\"ch04-b74\">A. Unityの故障　B. 配列のサイズとインデックスの範囲　C. パソコンの再起動<\/p><p id=\"ch04-b75\"><strong>解答<\/strong>　Q1 → B　Q2 → B　Q3 → B<\/p><hr id=\"ch04-b76\"><h3 id=\"ch04-b77\" class=\"sec\">エラー対応ガイド 🐛<\/h3><div id=\"ch04-b78\" class=\"tblwrap\"><table><tr><th><strong>症状<\/strong><\/th><th><strong>原因<\/strong><\/th><th><strong>対処<\/strong><\/th><\/tr><tr><td><code class=\"ic\">IndexOutOfRangeException<\/code><\/td><td>存在しない番号にアクセス<\/td><td>配列サイズとforループの上限を確認<\/td><\/tr><tr><td>最後の1体だけ処理されない<\/td><td><code class=\"ic\">i &lt; Length<\/code> と <code class=\"ic\">i &lt;= Length<\/code> の混同<\/td><td>条件式は <code class=\"ic\">i &lt; 配列.Length<\/code> が基本<\/td><\/tr><tr><td>配列が全部null/0のまま<\/td><td>宣言しただけで値を入れていない<\/td><td><code class=\"ic\">enemies[0] = ...<\/code> で代入しているか確認<\/td><\/tr><\/table><\/div><hr id=\"ch04-b79\"><h3 id=\"ch04-b80\" class=\"sec\">章末――次の訓練へ<\/h3><p id=\"ch04-b81\">ゴブリンの襲撃を乗り切りました。教官は言います。<\/p><pre id=\"ch04-b82\" data-lang=\"plain text\"><code>「エラーで訓練を止めるな。次は“盾”の使い方だ。」<\/code><\/pre><p id=\"ch04-b83\">次章（<strong>Chapter 4.5<\/strong>）では、エラーが起きてもゲームを止めない技術――<strong>例外処理（try-catch）<\/strong>を学びます。<\/p>"}, {"id": "ch04_5", "num": "4.5", "name": "例外という盾：try-catchでエラーから身を守れ！", "title": "Chapter 4.5 例外という盾：try-catchでエラーから身を守れ！", "html": "<blockquote id=\"ch04_5-b0\"><strong>執筆<\/strong>: ChatGPT（教材執筆責任者）｜<strong>ステータス<\/strong>: 🟢 新規追加章（v1.1）<\/blockquote><hr id=\"ch04_5-b1\"><div id=\"ch04_5-b2\" class=\"callout\"><span class=\"co-ic\">🗡️<\/span><div class=\"co-body\"><p><strong>訓練所より<\/strong>：ゴブリン戦のあと、教官は盾を投げてよこしました。「攻撃をゼロにはできん。だが、受け止めることはできる」<\/p><\/div><\/div><h3 id=\"ch04_5-b3\" class=\"sec\">この章で学ぶこと<\/h3><p id=\"ch04_5-b4\">前章で <code class=\"ic\">IndexOutOfRangeException<\/code> を体験しました。エラー（例外）が起きると、ゲームは<strong>その場で止まって<\
