var CSharp = (function(){
"use strict";

/* ---------- 字句解析 ---------- */
var KW = {};
("using namespace public private protected internal static readonly const abstract virtual override sealed partial "+
 "class struct interface enum void var new this base if else switch case default for foreach while do break continue "+
 "return try catch finally throw null true false is as in out ref params delegate event get set int float double "+
 "long string bool char object typeof").split(" ").forEach(function(w){ KW[w]=1; });

function LexError(msg, line){ var e=new Error(msg); e.csLine=line; e.isCS=true; return e; }

function lex(src){
  var toks=[], i=0, n=src.length, line=1;
  function peek(o){ return src[i+(o||0)]; }
  while(i<n){
    var c=src[i];
    if(c==="\n"){ line++; i++; continue; }
    if(c===" "||c==="\t"||c==="\r"){ i++; continue; }
    if(c==="/"&&peek(1)==="/"){ while(i<n&&src[i]!=="\n") i++; continue; }
    if(c==="/"&&peek(1)==="*"){ i+=2; while(i<n&&!(src[i]==="*"&&peek(1)==="/")){ if(src[i]==="\n")line++; i++; } i+=2; continue; }
    /* 文字列補間 $"..." */
    if(c==="$"&&peek(1)==='"'){
      i+=2; var parts=[], buf="";
      while(i<n&&src[i]!=='"'){
        if(src[i]==="\\"){ buf+=unesc(src[i+1]); i+=2; continue; }
        if(src[i]==="{"&&peek(1)==="{"){ buf+="{"; i+=2; continue; }
        if(src[i]==="}"&&peek(1)==="}"){ buf+="}"; i+=2; continue; }
        if(src[i]==="{"){
          if(buf){ parts.push({s:buf}); buf=""; }
          i++; var d=1, ex="";
          while(i<n&&d>0){
            if(src[i]==="{")d++;
            else if(src[i]==="}"){ d--; if(d===0)break; }
            if(src[i]==="\n")line++;
            ex+=src[i]; i++;
          }
          i++; /* } */
          /* 書式指定 {x:F1} は式と書式に分離 */
          var fmt=null, ci=ex.lastIndexOf(":");
          if(ci>0 && /^[A-Za-z]\d*$/.test(ex.slice(ci+1).trim())){ fmt=ex.slice(ci+1).trim(); ex=ex.slice(0,ci); }
          parts.push({e:ex, fmt:fmt});
          continue;
        }
        if(src[i]==="\n") throw LexError("文字列が閉じられていません", line);
        buf+=src[i]; i++;
      }
      i++;
      if(buf) parts.push({s:buf});
      toks.push({t:"istr", v:parts, line:line});
      continue;
    }
    if(c==='"'){
      i++; var s="";
      while(i<n&&src[i]!=='"'){
        if(src[i]==="\\"){ s+=unesc(src[i+1]); i+=2; continue; }
        if(src[i]==="\n") throw LexError("文字列が閉じられていません（\" の閉じ忘れ？）", line);
        s+=src[i]; i++;
      }
      i++; toks.push({t:"str", v:s, line:line}); continue;
    }
    if(c==="'"){
      i++; var ch;
      if(src[i]==="\\"){ ch=unesc(src[i+1]); i+=2; } else { ch=src[i]; i++; }
      if(src[i]!=="'") throw LexError("文字リテラルが閉じられていません（' は1文字用、文字列は \"）", line);
      i++; toks.push({t:"chr", v:ch, line:line}); continue;
    }
    if(/[0-9]/.test(c) || (c==="."&&/[0-9]/.test(peek(1)))){
      var st=i, isF=false, isD=false;
      while(i<n&&/[0-9_]/.test(src[i])) i++;
      if(src[i]==="."&&/[0-9]/.test(peek(1))){ isD=true; i++; while(i<n&&/[0-9_]/.test(src[i])) i++; }
      var num=parseFloat(src.slice(st,i).replace(/_/g,""));
      if(src[i]==="f"||src[i]==="F"){ isF=true; isD=false; i++; }
      else if(src[i]==="d"||src[i]==="D"){ isD=true; i++; }
      toks.push({t:"num", v:num, nt:isF?"f":(isD?"d":"i"), line:line});
      continue;
    }
    if(/[A-Za-z_]/.test(c)){
      var st2=i;
      while(i<n&&/[A-Za-z0-9_]/.test(src[i])) i++;
      var w=src.slice(st2,i);
      toks.push({t: KW[w]?"kw":"id", v:w, line:line});
      continue;
    }
    /* 記号 */
    var three=src.substr(i,3), two=src.substr(i,2);
    if(three==="<<="||three===">>="){ toks.push({t:"p",v:three,line:line}); i+=3; continue; }
    if(["==","!=","<=",">=","&&","||","+=","-=","*=","/=","%=","++","--","=>","?.","??"].indexOf(two)>=0){
      toks.push({t:"p",v:two,line:line}); i+=2; continue;
    }
    if("+-*/%=<>!&|^~?:;,.(){}[]".indexOf(c)>=0){ toks.push({t:"p",v:c,line:line}); i++; continue; }
    throw LexError("使えない文字です: "+JSON.stringify(c), line);
  }
  toks.push({t:"eof", v:"", line:line});
  return toks;
}
function unesc(c){ return c==="n"?"\n":c==="t"?"\t":c==="r"?"\r":c==="0"?"\0":c; }

/* ---------- 構文解析 ---------- */
function Parser(toks, srcName){
  this.toks=toks; this.pos=0; this.srcName=srcName||"code";
}
Parser.prototype = {
  peek:function(o){ return this.toks[this.pos+(o||0)]; },
  next:function(){ return this.toks[this.pos++]; },
  at:function(t,v){ var k=this.peek(); return k.t===t&&(v==null||k.v===v); },
  atv:function(v){ var k=this.peek(); return (k.t==="p"||k.t==="kw")&&k.v===v; },
  eat:function(v){ if(this.atv(v)){ this.pos++; return true; } return false; },
  expect:function(v,what){
    if(this.eat(v)) return;
    var k=this.peek();
    throw this.err((what||("'"+v+"'"))+" が必要ですが、'"+(k.v||k.t)+"' が見つかりました", k.line);
  },
  err:function(msg, line){ var e=new Error(msg); e.csLine=line!=null?line:this.peek().line; e.isCS=true; return e; },
  save:function(){ return this.pos; },
  restore:function(p){ this.pos=p; },

  /* ---- 型 ---- */
  typeAhead:function(){
    /* 現在位置が型に見えるなら {name,args,arr} を返して消費。だめなら null（位置復元） */
    var p=this.save();
    var k=this.peek();
    var prim={"int":1,"float":1,"double":1,"long":1,"string":1,"bool":1,"char":1,"void":1,"var":1,"object":1};
    var name;
    if(k.t==="kw"&&prim[k.v]){ name=k.v; this.pos++; }
    else if(k.t==="id"){ name=k.v; this.pos++; }
    else return null;
    var args=null;
    if(this.atv("<")){
      var p2=this.save(); this.pos++;
      args=[];
      for(;;){
        var a=this.typeAhead();
        if(!a){ this.restore(p2); args=null; break; }
        args.push(a);
        if(this.eat(",")) continue;
        if(this.eat(">")) break;
        this.restore(p2); args=null; break;
      }
    }
    var arr=0;
    while(this.atv("[")){
      if(this.peek(1).t==="p"&&this.peek(1).v==="]"){ this.pos+=2; arr++; }
      else break;
    }
    return {name:name, args:args, arr:arr};
  },

  /* ---- プログラム ---- */
  parseProgram:function(){
    var prog={k:"prog", classes:[], enums:[], interfaces:[], stmts:[], methods:[]};
    while(!this.at("eof")){
      if(this.atv("using")){ while(!this.eat(";")&&!this.at("eof")) this.pos++; continue; }
      var d=this.parseTopDecl(prog);
      if(d) continue;
      prog.stmts.push(this.parseStmt());
    }
    return prog;
  },
  parseTopDecl:function(prog){
    var mods=this.parseMods();
    if(this.atv("class")||this.atv("struct")){ prog.classes.push(this.parseClass(mods)); return true; }
    if(this.atv("interface")){ prog.interfaces.push(this.parseInterface()); return true; }
    if(this.atv("enum")){ prog.enums.push(this.parseEnum()); return true; }
    /* トップレベルメソッド: Type name ( ... ) { } */
    var p=this.save();
    var ty=this.typeAhead();
    if(ty&&this.at("id")&&this.peek(1).t==="p"&&this.peek(1).v==="("){
      var name=this.next().v;
      var m=this.parseMethodRest(ty,name,mods);
      prog.methods.push(m);
      return true;
    }
    this.restore(p);
    if(mods.length) throw this.err("修飾子の後にクラス・メソッドなどの宣言が必要です");
    return false;
  },
  parseMods:function(){
    var mods=[];
    var M={"public":1,"private":1,"protected":1,"internal":1,"static":1,"readonly":1,"const":1,"abstract":1,"virtual":1,"override":1,"sealed":1,"event":1,"partial":1};
    while(this.peek().t==="kw"&&M[this.peek().v]){
      /* const int x は変数宣言の可能性もあるので先読みで判断しないで積む */
      mods.push(this.next().v);
    }
    return mods;
  },
  parseClass:function(mods){
    this.next(); /* class */
    var name=this.next().v;
    var bases=[];
    if(this.eat(":")){
      do{ bases.push(this.typeAhead().name); }while(this.eat(","));
    }
    this.expect("{");
    var cls={k:"class", name:name, bases:bases, fields:[], methods:[], ctors:[], props:[], mods:mods, line:this.peek().line};
    while(!this.eat("}")){
      if(this.at("eof")) throw this.err("クラス "+name+" の '}' がありません");
      this.parseMember(cls);
    }
    return cls;
  },
  parseInterface:function(){
    this.next();
    var name=this.next().v;
    this.expect("{");
    var sigs=[];
    while(!this.eat("}")){
      var ty=this.typeAhead();
      var mn=this.next().v;
      this.expect("(");
      var ps=this.parseParams();
      /* シグネチャのみ */
      if(this.atv("{")){ this.skipBlock(); } else this.expect(";");
      sigs.push({name:mn, params:ps, type:ty});
    }
    return {k:"interface", name:name, sigs:sigs};
  },
  parseEnum:function(){
    this.next();
    var name=this.next().v;
    this.expect("{");
    var members=[], val=0;
    while(!this.eat("}")){
      var mn=this.next().v;
      if(this.eat("=")){ var t=this.next(); val=(t.v==="-")?-this.next().v:t.v; }
      members.push({name:mn, v:val});
      val++;
      this.eat(",");
    }
    this.eat(";");
    return {k:"enum", name:name, members:members};
  },
  skipBlock:function(){
    this.expect("{");
    var d=1;
    while(d>0&&!this.at("eof")){
      if(this.atv("{"))d++;
      else if(this.atv("}"))d--;
      this.pos++;
    }
  },
  parseMember:function(cls){
    var mods=this.parseMods();
    /* コンストラクタ */
    if(this.at("id",cls.name)&&this.peek(1).t==="p"&&this.peek(1).v==="("){
      this.next();
      this.expect("(");
      var ps=this.parseParams();
      var baseArgs=null;
      if(this.eat(":")){
        var bw=this.next().v; /* base / this */
        this.expect("(");
        baseArgs={kind:bw, args:this.parseArgs()};
      }
      var body=this.parseBlock();
      cls.ctors.push({params:ps, body:body, baseCall:baseArgs, mods:mods});
      return;
    }
    var ty=this.typeAhead();
    if(!ty) throw this.err("メンバーの型が読めません（'"+this.peek().v+"'）");
    var name=this.next().v;
    /* メソッド */
    if(this.atv("(")){
      var m=this.parseMethodRest(ty,name,mods);
      cls.methods.push(m);
      return;
    }
    /* プロパティ */
    if(this.atv("{")){
      this.next();
      var prop={name:name, type:ty, mods:mods, get:null, set:null, auto:true};
      while(!this.eat("}")){
        var accMods=this.parseMods();
        var acc=this.next().v; /* get / set */
        if(this.eat(";")){ prop[acc]={auto:true, mods:accMods}; }
        else { prop[acc]={body:this.parseBlock(), mods:accMods}; prop.auto=false; }
      }
      var init=null;
      if(this.eat("=")){ init=this.parseExpr(); this.expect(";"); }
      prop.init=init;
      cls.props.push(prop);
      return;
    }
    /* 式本体プロパティ Type Name => expr; */
    if(this.atv("=>")){
      this.next();
      var ex=this.parseExpr(); this.expect(";");
      cls.props.push({name:name, type:ty, mods:mods, get:{body:{k:"block", stmts:[{k:"return", val:ex}]}}, set:null, auto:false});
      return;
    }
    /* フィールド（カンマ区切り対応） */
    for(;;){
      var init2=null;
      if(this.eat("=")) init2=this.parseExpr();
      cls.fields.push({name:name, type:ty, init:init2, mods:mods});
      if(this.eat(",")){ name=this.next().v; continue; }
      this.expect(";");
      break;
    }
  },
  parseMethodRest:function(ty,name,mods){
    this.expect("(");
    var ps=this.parseParams();
    if(this.eat(";")) return {name:name, params:ps, body:null, type:ty, mods:mods};
    var body;
    if(this.atv("=>")){
      this.next();
      var ex=this.parseExpr(); this.expect(";");
      body={k:"block", stmts:[{k:"return", val:ex}]};
    } else body=this.parseBlock();
    return {name:name, params:ps, body:body, type:ty, mods:mods};
  },
  parseParams:function(){
    var ps=[];
    if(this.eat(")")) return ps;
    do{
      var mods=[];
      while(this.atv("ref")||this.atv("out")||this.atv("params")||this.atv("in")) mods.push(this.next().v);
      var ty=this.typeAhead();
      var nm=this.next().v;
      var def=null;
      if(this.eat("=")) def=this.parseExpr();
      ps.push({name:nm, type:ty, mods:mods, def:def});
    }while(this.eat(","));
    this.expect(")");
    return ps;
  },
  parseArgs:function(){
    var as=[];
    if(this.eat(")")) return as;
    do{
      var mod=null;
      if(this.atv("ref")||this.atv("out")){ mod=this.next().v; }
      as.push({mod:mod, e:this.parseExpr()});
    }while(this.eat(","));
    this.expect(")");
    return as;
  },
  parseBlock:function(){
    this.expect("{");
    var stmts=[];
    while(!this.eat("}")){
      if(this.at("eof")) throw this.err("'}' が足りません（ブロックの閉じ忘れ）");
      stmts.push(this.parseStmt());
    }
    return {k:"block", stmts:stmts};
  },

  /* ---- 文 ---- */
  parseStmt:function(){
    var k=this.peek(), line=k.line;
    if(this.atv("{")) return this.parseBlock();
    if(this.eat(";")) return {k:"empty"};
    if(this.atv("if")){
      this.next(); this.expect("(");
      var c=this.parseExpr(); this.expect(")");
      var t=this.parseStmt();
      var e=null;
      if(this.eat("else")) e=this.parseStmt();
      return {k:"if", cond:c, then:t, els:e, line:line};
    }
    if(this.atv("while")){
      this.next(); this.expect("(");
      var c2=this.parseExpr(); this.expect(")");
      return {k:"while", cond:c2, body:this.parseStmt(), line:line};
    }
    if(this.atv("do")){
      this.next();
      var b=this.parseStmt();
      this.expect("while"); this.expect("(");
      var c3=this.parseExpr(); this.expect(")"); this.expect(";");
      return {k:"dowhile", cond:c3, body:b, line:line};
    }
    if(this.atv("for")){
      this.next(); this.expect("(");
      var init=null;
      if(!this.atv(";")) init=this.parseVarOrExprStmt(true);
      else this.next();
      var cond=null;
      if(!this.atv(";")) cond=this.parseExpr();
      this.expect(";");
      var step=null;
      if(!this.atv(")")) step=this.parseExpr();
      this.expect(")");
      return {k:"for", init:init, cond:cond, step:step, body:this.parseStmt(), line:line};
    }
    if(this.atv("foreach")){
      this.next(); this.expect("(");
      var ty=this.typeAhead();
      var vn=this.next().v;
      this.expect("in");
      var seq=this.parseExpr();
      this.expect(")");
      return {k:"foreach", varName:vn, seq:seq, body:this.parseStmt(), line:line};
    }
    if(this.atv("switch")){
      this.next(); this.expect("(");
      var d=this.parseExpr(); this.expect(")"); this.expect("{");
      var cases=[], cur=null;
      while(!this.eat("}")){
        if(this.eat("case")){
          var cv=this.parseExpr(); this.expect(":");
          cur={vals:[cv], stmts:[], isDefault:false};
          while(this.eat("case")){ cur.vals.push(this.parseExpr()); this.expect(":"); }
          if(this.eat("default")){ this.expect(":"); cur.isDefault=true; }
          cases.push(cur);
        } else if(this.eat("default")){
          this.expect(":");
          cur={vals:[], stmts:[], isDefault:true};
          cases.push(cur);
        } else {
          if(!cur) throw this.err("switchの中は case か default から始めます");
          cur.stmts.push(this.parseStmt());
        }
      }
      return {k:"switch", disc:d, cases:cases, line:line};
    }
    if(this.atv("break")){ this.next(); this.expect(";"); return {k:"break", line:line}; }
    if(this.atv("continue")){ this.next(); this.expect(";"); return {k:"continue", line:line}; }
    if(this.atv("return")){
      this.next();
      var v=null;
      if(!this.atv(";")) v=this.parseExpr();
      this.expect(";");
      return {k:"return", val:v, line:line};
    }
    if(this.atv("throw")){
      this.next();
      var v2=this.parseExpr(); this.expect(";");
      return {k:"throw", val:v2, line:line};
    }
    if(this.atv("try")){
      this.next();
      var tb=this.parseBlock();
      var catches=[], fin=null;
      while(this.atv("catch")){
        this.next();
        var exTy=null, exName=null;
        if(this.eat("(")){
          exTy=this.typeAhead().name;
          if(this.at("id")) exName=this.next().v;
          this.expect(")");
        }
        catches.push({type:exTy, name:exName, body:this.parseBlock()});
      }
      if(this.eat("finally")) fin=this.parseBlock();
      if(!catches.length&&!fin) throw this.err("try には catch か finally が必要です");
      return {k:"try", body:tb, catches:catches, fin:fin, line:line};
    }
    return this.parseVarOrExprStmt(false);
  },
  parseVarOrExprStmt:function(inFor){
    var line=this.peek().line;
    var mods=[];
    while(this.atv("const")||this.atv("readonly")||this.atv("static")) mods.push(this.next().v);
    var p=this.save();
    var ty=this.typeAhead();
    if(ty&&ty.name!=="var"&&!mods.length){
      /* Type name = ... の形か検証（id の直後が = ; , なら宣言） */
      if(!(this.at("id")&&this.peek(1).t==="p"&&["=",";",","].indexOf(this.peek(1).v)>=0)){
        this.restore(p); ty=null;
      }
    }
    if(ty===null&&mods.length){ ty=this.typeAhead(); }
    if(ty){
      var decls=[];
      do{
        var nm=this.next().v;
        var init=null;
        if(this.eat("=")){
          if(ty.arr>0&&this.atv("{")){
            this.next();
            var items=[];
            if(!this.atv("}")){ do{ items.push(this.parseExpr()); }while(this.eat(",")); }
            this.expect("}");
            init={k:"newarr", type:{name:ty.name, args:ty.args, arr:0}, size:null, init:items};
          } else init=this.parseExpr();
        }
        decls.push({name:nm, init:init});
      }while(this.eat(","));
      this.expect(";");
      return {k:"vardecl", type:ty, decls:decls, mods:mods, line:line};
    }
    var e=this.parseExpr();
    this.expect(";");
    return {k:"exprstmt", e:e, line:line};
  },

  /* ---- 式 ---- */
  parseExpr:function(){ return this.parseAssign(); },
  parseAssign:function(){
    var lhs=this.parseTernary();
    var k=this.peek();
    if(k.t==="p"&&["=","+=","-=","*=","/=","%="].indexOf(k.v)>=0){
      this.next();
      var rhs=this.parseAssign();
      return {k:"assign", op:k.v, target:lhs, val:rhs, line:k.line};
    }
    return lhs;
  },
  parseTernary:function(){
    var c=this.parseNullCo();
    if(this.atv("?")&&!(this.peek().v==="?.")){
      this.next();
      var t=this.parseAssign();
      this.expect(":");
      var e=this.parseAssign();
      return {k:"ternary", cond:c, then:t, els:e};
    }
    return c;
  },
  parseNullCo:function(){
    var l=this.parseOr();
    while(this.atv("??")){ this.next(); var r=this.parseOr(); l={k:"nullco", l:l, r:r}; }
    return l;
  },
  parseOr:function(){
    var l=this.parseAnd();
    while(this.atv("||")){ this.next(); var r=this.parseAnd(); l={k:"or", l:l, r:r}; }
    return l;
  },
  parseAnd:function(){
    var l=this.parseEq();
    while(this.atv("&&")){ this.next(); var r=this.parseEq(); l={k:"and", l:l, r:r}; }
    return l;
  },
  parseEq:function(){
    var l=this.parseRel();
    for(;;){
      if(this.atv("==")){ this.next(); l={k:"bin", op:"==", l:l, r:this.parseRel()}; }
      else if(this.atv("!=")){ this.next(); l={k:"bin", op:"!=", l:l, r:this.parseRel()}; }
      else return l;
    }
  },
  parseRel:function(){
    var l=this.parseAdd();
    for(;;){
      var k=this.peek();
      if(k.t==="p"&&["<",">","<=",">="].indexOf(k.v)>=0){
        this.next(); l={k:"bin", op:k.v, l:l, r:this.parseAdd(), line:k.line};
      } else if(this.atv("is")){
        this.next();
        var ty=this.typeAhead();
        var bindName=null;
        if(this.at("id")) bindName=this.next().v;
        l={k:"is", e:l, type:ty.name, bind:bindName};
      } else if(this.atv("as")){
        this.next();
        var ty2=this.typeAhead();
        l={k:"as", e:l, type:ty2.name};
      } else return l;
    }
  },
  parseAdd:function(){
    var l=this.parseMul();
    for(;;){
      var k=this.peek();
      if(k.t==="p"&&(k.v==="+"||k.v==="-")){ this.next(); l={k:"bin", op:k.v, l:l, r:this.parseMul(), line:k.line}; }
      else return l;
    }
  },
  parseMul:function(){
    var l=this.parseUnary();
    for(;;){
      var k=this.peek();
      if(k.t==="p"&&(k.v==="*"||k.v==="/"||k.v==="%")){ this.next(); l={k:"bin", op:k.v, l:l, r:this.parseUnary(), line:k.line}; }
      else return l;
    }
  },
  parseUnary:function(){
    var k=this.peek();
    if(k.t==="p"&&(k.v==="!"||k.v==="-"||k.v==="+")){
      this.next();
      return {k:"unary", op:k.v, e:this.parseUnary(), line:k.line};
    }
    if(k.t==="p"&&(k.v==="++"||k.v==="--")){
      this.next();
      return {k:"prefix", op:k.v, e:this.parseUnary(), line:k.line};
    }
    /* キャスト (int)x など */
    if(k.t==="p"&&k.v==="("){
      var p=this.save();
      this.next();
      var castTy={"int":1,"float":1,"double":1,"long":1,"string":1,"bool":1,"char":1};
      var ty=this.typeAhead();
      if(ty&&this.eat(")")){
        var nk=this.peek();
        var startsExpr = nk.t==="id"||nk.t==="num"||nk.t==="str"||nk.t==="istr"||nk.t==="chr"||
          (nk.t==="kw"&&["this","base","new","true","false","null"].indexOf(nk.v)>=0)||
          (nk.t==="p"&&nk.v==="(");
        if(startsExpr&&(castTy[ty.name]||/^[A-Z]/.test(ty.name))){
          return {k:"cast", type:ty, e:this.parseUnary(), line:k.line};
        }
      }
      this.restore(p);
    }
    return this.parsePostfix();
  },
  parsePostfix:function(){
    var e=this.parsePrimary();
    for(;;){
      var k=this.peek();
      if(k.t==="p"&&k.v==="."){
        this.next();
        var name=this.next().v;
        /* ジェネリックメソッド呼び出し obj.M<T>(...) */
        var gargs=this.tryGenericArgs();
        if(this.atv("(")){
          this.next();
          e={k:"mcall", obj:e, name:name, args:this.parseArgs(), gargs:gargs, line:k.line};
        } else e={k:"member", obj:e, name:name, line:k.line};
      }
      else if(k.t==="p"&&k.v==="?."){
        this.next();
        var name2=this.next().v;
        if(this.atv("(")){
          this.next();
          e={k:"mcall", obj:e, name:name2, args:this.parseArgs(), opt:true, line:k.line};
        } else e={k:"member", obj:e, name:name2, opt:true, line:k.line};
      }
      else if(k.t==="p"&&k.v==="["){
        this.next();
        var idx=this.parseExpr();
        this.expect("]");
        e={k:"index", obj:e, idx:idx, line:k.line};
      }
      else if(k.t==="p"&&k.v==="("){
        this.next();
        e={k:"call", fn:e, args:this.parseArgs(), line:k.line};
      }
      else if(k.t==="p"&&(k.v==="++"||k.v==="--")){
        this.next();
        e={k:"postfix", op:k.v, e:e, line:k.line};
      }
      else return e;
    }
  },
  tryGenericArgs:function(){
    if(!this.atv("<")) return null;
    var p=this.save();
    this.next();
    var args=[];
    for(;;){
      var t=this.typeAhead();
      if(!t){ this.restore(p); return null; }
      args.push(t);
      if(this.eat(",")) continue;
      if(this.eat(">")){
        if(this.atv("(")) return args;
        this.restore(p); return null;
      }
      this.restore(p); return null;
    }
  },
  parseLambdaMaybe:function(){
    /* ( の位置で呼ぶ: (a,b)=>... / ()=>... */
    var p=this.save();
    if(!this.eat("(")) return null;
    var names=[];
    if(!this.atv(")")){
      for(;;){
        var ty=this.typeAhead(); /* 型付きも許容 */
        if(this.at("id")){ names.push(this.next().v); }
        else if(ty&&!this.at("id")&&(this.atv(",")||this.atv(")"))){ names.push(ty.name); }
        else { this.restore(p); return null; }
        if(this.eat(",")) continue;
        break;
      }
    }
    if(!this.eat(")")){ this.restore(p); return null; }
    if(!this.atv("=>")){ this.restore(p); return null; }
    this.next();
    var body=this.atv("{") ? this.parseBlock() : {k:"block", stmts:[{k:"return", val:this.parseExpr()}]};
    return {k:"lambda", params:names, body:body};
  },
  parsePrimary:function(){
    var k=this.peek();
    if(k.t==="num"){ this.next(); return {k:"num", v:k.v, nt:k.nt}; }
    if(k.t==="str"){ this.next(); return {k:"str", v:k.v}; }
    if(k.t==="chr"){ this.next(); return {k:"chr", v:k.v}; }
    if(k.t==="istr"){
      this.next();
      var parts=k.v.map(function(p){
        if(p.s!=null) return {s:p.s};
        var sub=new Parser(lex(p.e), "補間式");
        return {e:sub.parseExpr(), fmt:p.fmt};
      });
      return {k:"istr", parts:parts};
    }
    if(k.t==="kw"){
      if(k.v==="true"){ this.next(); return {k:"bool", v:true}; }
      if(k.v==="false"){ this.next(); return {k:"bool", v:false}; }
      if(k.v==="null"){ this.next(); return {k:"null"}; }
      if(k.v==="this"){ this.next(); return {k:"this", line:k.line}; }
      if(k.v==="base"){ this.next(); return {k:"base", line:k.line}; }
      if(k.v==="new") return this.parseNew();
      /* 型名が式中に現れる（int.Parse など） */
      if(["int","float","double","string","bool","char","long","object"].indexOf(k.v)>=0){
        this.next(); return {k:"id", name:k.v, line:k.line};
      }
    }
    if(k.t==="p"&&k.v==="("){
      var lam=this.parseLambdaMaybe();
      if(lam) return lam;
      this.next();
      var e=this.parseExpr();
      this.expect(")");
      return e;
    }
    if(k.t==="id"){
      /* x => ... のラムダ */
      if(this.peek(1).t==="p"&&this.peek(1).v==="=>"){
        this.next(); this.next();
        var body=this.atv("{") ? this.parseBlock() : {k:"block", stmts:[{k:"return", val:this.parseExpr()}]};
        return {k:"lambda", params:[k.v], body:body};
      }
      this.next();
      var gargs=this.tryGenericArgs();
      if(gargs&&this.atv("(")){
        this.next();
        return {k:"call", fn:{k:"id", name:k.v, line:k.line}, args:this.parseArgs(), gargs:gargs, line:k.line};
      }
      return {k:"id", name:k.v, line:k.line};
    }
    throw this.err("式が読めません（'"+(k.v||k.t)+"'）", k.line);
  },
  parseNew:function(){
    var line=this.peek().line;
    this.next(); /* new */
    var ty=this.typeAhead();
    if(!ty) throw this.err("new の後に型名が必要です");
    /* 配列 new int[5] / new int[]{...} / new[]{ } は非対応 */
    if(this.atv("[")){
      this.next();
      var size=null;
      if(!this.atv("]")) size=this.parseExpr();
      this.expect("]");
      var init=null;
      if(this.atv("{")){
        this.next();
        init=[];
        if(!this.atv("}")){
          do{ init.push(this.parseExpr()); }while(this.eat(","));
        }
        this.expect("}");
      }
      return {k:"newarr", type:ty, size:size, init:init, line:line};
    }
    if(ty.arr>0){
      /* new int[]{1,2} は typeAhead が [] を食べたケース */
      var init2=null;
      if(this.atv("{")){
        this.next();
        init2=[];
        if(!this.atv("}")){
          do{ init2.push(this.parseExpr()); }while(this.eat(","));
        }
        this.expect("}");
      }
      return {k:"newarr", type:{name:ty.name, args:ty.args, arr:0}, size:null, init:init2, line:line};
    }
    var args=[];
    if(this.eat("(")) args=this.parseArgs();
    /* コレクション初期化子 / オブジェクト初期化子 */
    var collInit=null, objInit=null;
    if(this.atv("{")){
      this.next();
      /* {Name = x, ...} ならオブジェクト初期化子 */
      if(this.at("id")&&this.peek(1).t==="p"&&this.peek(1).v==="="){
        objInit=[];
        do{
          if(this.atv("}"))break;
          var nm=this.next().v; this.expect("=");
          objInit.push({name:nm, e:this.parseExpr()});
        }while(this.eat(","));
        this.expect("}");
      } else {
        collInit=[];
        if(!this.atv("}")){
          do{
            if(this.atv("{")){
              /* Dictionaryの {key, value} */
              this.next();
              var kk=this.parseExpr(); this.expect(",");
              var vv=this.parseExpr(); this.expect("}");
              collInit.push({pair:[kk,vv]});
            } else collInit.push({e:this.parseExpr()});
          }while(this.eat(","));
        }
        this.expect("}");
      }
    }
    return {k:"new", type:ty, args:args, collInit:collInit, objInit:objInit, line:line};
  }
};
/* part2: 評価器 + 組み込み型 + 公開API（part1の続き、同一IIFE内） */

/* ---------- 値表現 ----------
   数値: {t:'i'|'f'|'d', v} / 文字: {t:'c', v} / 文字列: JS string / 真偽: JS bool / null: null
   オブジェクト: {t:'obj', cls, f:{}} / 配列: {t:'arr', el:[]} / List: {t:'list', el:[]}
   Dictionary: {t:'dict', keys:[], vals:[]} / Queue/Stack: {t:'queue'|'stack', el:[]}
   関数: {t:'fn', ...} {t:'nfn', f} {t:'multi', fns:[]} / enum値: {t:'enum', en, name, v}
   クラス参照: {t:'cref', cls} / ホスト: {t:'host', h} */

function isNum(v){ return v&&typeof v==="object"&&(v.t==="i"||v.t==="f"||v.t==="d"); }
function mkI(n){ return {t:"i", v:Math.trunc(n)}; }
function mkF(n){ return {t:"f", v:n}; }
function mkD(n){ return {t:"d", v:n}; }
function mkNum(t,n){ return t==="i"?mkI(n):{t:t,v:n}; }

function RunError(msg, line){ var e=new Error(msg); e.csLine=line; e.isCS=true; return e; }
var BreakSig={sig:"break"}, ContinueSig={sig:"continue"};
function ReturnSig(v){ this.sig="return"; this.v=v; }
function CSThrow(excObj){ this.sig="throw"; this.exc=excObj; }

/* ---------- 例外階層 ---------- */
var EXC_TREE={
  "Exception":null,
  "SystemException":"Exception",
  "DivideByZeroException":"SystemException",
  "IndexOutOfRangeException":"SystemException",
  "NullReferenceException":"SystemException",
  "ArgumentException":"SystemException",
  "ArgumentOutOfRangeException":"ArgumentException",
  "InvalidOperationException":"SystemException",
  "FormatException":"SystemException",
  "KeyNotFoundException":"SystemException",
  "InvalidCastException":"SystemException",
  "OverflowException":"SystemException"
};

/* ---------- スコープ ---------- */
function Scope(parent){ this.vars=Object.create(null); this.parent=parent; }
Scope.prototype.get=function(name){
  var s=this;
  while(s){ if(name in s.vars) return s.vars[name]; s=s.parent; }
  return undefined;
};
Scope.prototype.has=function(name){
  var s=this;
  while(s){ if(name in s.vars) return true; s=s.parent; }
  return false;
};
Scope.prototype.set=function(name,v){
  var s=this;
  while(s){ if(name in s.vars){ s.vars[name]=v; return true; } s=s.parent; }
  return false;
};
Scope.prototype.declare=function(name,v){ this.vars[name]=v; };

/* ---------- インタプリタ本体 ---------- */
function Interp(opts){
  opts=opts||{};
  this.out=opts.output||function(){};
  this.global=new Scope(null);
  this.classes=Object.create(null);
  this.enums=Object.create(null);
  this.interfaces=Object.create(null);
  this.steps=0;
  this.maxSteps=opts.maxSteps||4000000;
  this.host=opts.host||null;   /* {resolveId(name), classes:{Name:{isHostBase, construct...}}} */
}
Interp.prototype.step=function(line){
  if(++this.steps>this.maxSteps)
    throw RunError("実行ステップ数が上限を超えました。無限ループ（whileの条件が変化しないなど）を確認してください。", line);
};

/* ---- 文字列化 ---- */
function fmtNum(v){
  if(Number.isInteger(v.v)) return String(v.v);
  var s=String(v.v);
  if(s.indexOf("e")>=0||s.indexOf("E")>=0) return s;
  /* C#風に丸め（floatは7桁程度） */
  if(v.t==="f"){ var r=parseFloat(v.v.toPrecision(7)); return String(r); }
  var r2=parseFloat(v.v.toPrecision(15));
  return String(r2);
}
Interp.prototype.toStr=function(v){
  if(v===null||v===undefined) return "";
  if(typeof v==="string") return v;
  if(typeof v==="boolean") return v?"True":"False";
  if(isNum(v)) return fmtNum(v);
  switch(v.t){
    case "c": return v.v;
    case "enum": return v.name;
    case "obj":
      var ts=this.findMethod(v.cls,"ToString");
      if(ts) return this.toStr(this.callFn(this.bind(ts.m,v,ts.cls),[]));
      return v.cls.name;
    case "list": return "List(要素数="+v.el.length+")";
    case "arr": return v.elName+"["+v.el.length+"]";
    case "dict": return "Dictionary(要素数="+v.keys.length+")";
    case "queue": return "Queue(要素数="+v.el.length+")";
    case "stack": return "Stack(要素数="+v.el.length+")";
    case "kvp": return "["+this.toStr(v.k)+", "+this.toStr(v.val)+"]";
    case "fn": case "nfn": case "multi": return "(デリゲート)";
    case "cref": return v.cls.name;
    case "host": return v.h.csName||"(Unityオブジェクト)";
  }
  return String(v);
};
Interp.prototype.fmtWith=function(v,fmt){
  if(fmt&&isNum(v)){
    var m=/^([Ff])(\d*)$/.exec(fmt);
    if(m){ var d=m[2]===""?2:parseInt(m[2],10); return v.v.toFixed(d); }
    var m2=/^([Dd])(\d*)$/.exec(fmt);
    if(m2){ var s=String(Math.trunc(Math.abs(v.v))); var w=m2[2]===""?1:parseInt(m2[2],10);
      while(s.length<w)s="0"+s; return (v.v<0?"-":"")+s; }
    var m3=/^[Pp](\d*)$/.exec(fmt);
    if(m3){ var d3=m3[1]===""?2:parseInt(m3[1],10); return (v.v*100).toFixed(d3)+"%"; }
  }
  return this.toStr(v);
};

/* ---- 真偽値 ---- */
function truthy(v,line){
  if(typeof v==="boolean") return v;
  throw RunError("ここには bool（true/false）が必要です。C#では数値をそのまま条件にできません（例: if (hp > 0)）。", line);
}

/* ---- 例外生成 ---- */
Interp.prototype.mkExc=function(typeName, msg){
  var cls=this.classes[typeName];
  if(cls) {
    var o=this.instantiate(cls,[msg]);
    return o;
  }
  return {t:"obj", cls:{name:typeName, builtinExc:true}, f:{_msg:msg}};
};
Interp.prototype.throwExc=function(typeName,msg,line){
  var e=new CSThrow(this.mkExc(typeName,msg));
  e.line=line;
  throw e;
};
function excTypeName(exc){ return exc&&exc.cls?exc.cls.name:"Exception"; }
Interp.prototype.excMatches=function(exc, catchType){
  if(!catchType||catchType==="Exception") return true;
  var name=excTypeName(exc);
  /* ユーザー定義クラスの継承をたどる */
  var cls=exc.cls;
  while(cls){
    if(cls.name===catchType) return true;
    var bn=cls.builtinExc?EXC_TREE[cls.name]:(cls.bases&&cls.bases[0]);
    if(cls.builtinExc){ name=bn; break; }
    cls=bn?(this.classes[bn]||{name:bn, builtinExc:true}):null;
  }
  /* 組み込み階層 */
  while(name){
    if(name===catchType) return true;
    name=EXC_TREE[name];
  }
  return false;
};

/* ---- クラス登録 ---- */
Interp.prototype.loadProgram=function(prog){
  var self=this;
  prog.enums.forEach(function(e){
    var en={name:e.name, members:{}, order:[]};
    e.members.forEach(function(m){
      en.members[m.name]={t:"enum", en:en, name:m.name, v:m.v};
      en.order.push(m.name);
    });
    self.enums[e.name]=en;
  });
  prog.interfaces.forEach(function(f){ self.interfaces[f.name]=f; });
  prog.classes.forEach(function(c){
    c.statics={}; c.staticsInit=false;
    self.classes[c.name]=c;
  });
  prog.methods.forEach(function(m){
    self.global.declare(m.name, {t:"fn", decl:m, env:self.global, thisObj:null});
  });
  this.prog=prog;
};
Interp.prototype.baseClassOf=function(cls){
  if(!cls.bases) return null;
  for(var i=0;i<cls.bases.length;i++){
    var b=cls.bases[i];
    if(this.classes[b]) return this.classes[b];
    if(EXC_TREE[b]!==undefined) return {name:b, builtinExc:true, fields:[], methods:[], props:[], ctors:[], bases:[EXC_TREE[b]].filter(Boolean)};
    if(this.host&&this.host.bases&&this.host.bases[b]) return null; /* MonoBehaviourなど */
  }
  return null;
};
Interp.prototype.classImplements=function(cls, ifName){
  var c=cls;
  while(c){
    if(c.bases&&c.bases.indexOf(ifName)>=0) return true;
    c=this.baseClassOf(c);
  }
  return false;
};
Interp.prototype.isSubclassOf=function(cls, name){
  var c=cls;
  while(c){
    if(c.name===name) return true;
    c=this.baseClassOf(c);
  }
  return false;
};
Interp.prototype.findMethod=function(cls, name){
  var c=cls;
  while(c){
    if(c.methods){
      for(var i=0;i<c.methods.length;i++)
        if(c.methods[i].name===name) return {m:c.methods[i], cls:c};
    }
    c=this.baseClassOf(c);
  }
  return null;
};
Interp.prototype.findProp=function(cls, name){
  var c=cls;
  while(c){
    if(c.props){
      for(var i=0;i<c.props.length;i++)
        if(c.props[i].name===name) return {p:c.props[i], cls:c};
    }
    c=this.baseClassOf(c);
  }
  return null;
};
Interp.prototype.ensureStatics=function(cls){
  if(cls.staticsInit||!cls.fields) return;
  cls.staticsInit=true;
  var self=this;
  cls.fields.forEach(function(f){
    if(f.mods.indexOf("static")>=0||f.mods.indexOf("const")>=0){
      cls.statics[f.name]=f.init?self.evalExpr(f.init,new Scope(self.global),null):defVal(f.type);
    }
  });
  cls.props.forEach(function(p){
    if(p.mods.indexOf("static")>=0){
      cls.statics[p.name]=p.init?self.evalExpr(p.init,new Scope(self.global),null):defVal(p.type);
    }
  });
};
function defVal(ty){
  if(!ty) return null;
  if(ty.arr>0) return null;
  switch(ty.name){
    case "int": case "long": return mkI(0);
    case "float": return mkF(0);
    case "double": return mkD(0);
    case "bool": return false;
    case "char": return {t:"c", v:"\0"};
    default: return null;
  }
}

/* ---- インスタンス生成 ---- */
Interp.prototype.instantiate=function(cls, argVals, hostLink){
  if(cls.mods&&cls.mods.indexOf("abstract")>=0)
    throw RunError("抽象クラス "+cls.name+" は new できません（子クラスを new してください）");
  var obj={t:"obj", cls:cls, f:{}};
  if(hostLink) obj.hostLink=hostLink;
  this.initFields(obj, cls);
  this.runCtor(obj, cls, argVals);
  return obj;
};
Interp.prototype.initFields=function(obj, cls){
  var chain=[];
  var c=cls;
  while(c){ chain.unshift(c); c=this.baseClassOf(c); }
  var self=this;
  chain.forEach(function(cc){
    if(cc.builtinExc){ if(!("_msg" in obj.f)) obj.f._msg=""; return; }
    (cc.fields||[]).forEach(function(f){
      if(f.mods.indexOf("static")>=0||f.mods.indexOf("const")>=0) return;
      obj.f[f.name]=f.init?self.evalExpr(f.init,new Scope(self.global),obj):defVal(f.type);
    });
    (cc.props||[]).forEach(function(p){
      if(p.mods.indexOf("static")>=0) return;
      if(p.auto!==false){
        obj.f["__prop_"+p.name]=p.init?self.evalExpr(p.init,new Scope(self.global),obj):defVal(p.type);
      }
    });
  });
};
Interp.prototype.runCtor=function(obj, cls, argVals){
  /* 基底クラスが組み込み例外なら _msg に格納 */
  if(cls.builtinExc){ obj.f._msg=argVals[0]!==undefined?argVals[0]:""; return; }
  var ctor=this.pickOverload(cls.ctors||[], argVals.length);
  if(!ctor){
    if(argVals.length===0){
      /* 暗黙のコンストラクタ: 基底も引数なしで */
      var bc=this.baseClassOf(cls);
      if(bc) this.runCtor(obj, bc, []);
      return;
    }
    throw RunError(cls.name+" に引数 "+argVals.length+" 個のコンストラクタがありません");
  }
  var env=new Scope(this.global);
  this.bindParams(env, ctor.params, argVals);
  var bc2=this.baseClassOf(cls);
  if(ctor.baseCall&&ctor.baseCall.kind==="base"){
    var bargs=this.evalArgs(ctor.baseCall.args, env, obj);
    if(bc2) this.runCtor(obj, bc2, bargs);
    else if(this.isExcClass(cls)) obj.f._msg=bargs[0]!==undefined?bargs[0]:"";
  } else if(ctor.baseCall&&ctor.baseCall.kind==="this"){
    var targs=this.evalArgs(ctor.baseCall.args, env, obj);
    this.runCtor(obj, cls, targs);
  } else if(bc2){
    this.runCtor(obj, bc2, []);
  } else if(this.isExcClass(cls)){
    obj.f._msg="";
  }
  try{ this.execBlock(ctor.body, env, obj); }
  catch(e){ if(e instanceof ReturnSig) return; throw e; }
};
Interp.prototype.isExcClass=function(cls){
  var c=cls;
  while(c){
    if(EXC_TREE[c.name]!==undefined||c.name==="Exception") return true;
    if(c.bases){
      for(var i=0;i<c.bases.length;i++) if(EXC_TREE[c.bases[i]]!==undefined) return true;
    }
    c=this.baseClassOf(c);
  }
  return false;
};
Interp.prototype.pickOverload=function(list, n){
  var exact=null, varArgs=null;
  for(var i=0;i<list.length;i++){
    var ps=list[i].params;
    var required=ps.filter(function(p){ return !p.def&&p.mods.indexOf("params")<0; }).length;
    if(ps.length===n||(n>=required&&n<=ps.length)) exact=exact||list[i];
    if(ps.length&&ps[ps.length-1].mods.indexOf("params")>=0&&n>=ps.length-1) varArgs=varArgs||list[i];
  }
  return exact||varArgs;
};
Interp.prototype.bindParams=function(env, params, argVals){
  for(var i=0;i<params.length;i++){
    var p=params[i];
    if(p.mods.indexOf("params")>=0){
      var rest={t:"arr", el:argVals.slice(i), elName:p.type?p.type.name:"object"};
      env.declare(p.name, rest);
      return;
    }
    var v=argVals[i];
    if(v===undefined) v=p.def?this.evalExpr(p.def, env, null):defVal(p.type);
    env.declare(p.name, v);
  }
};
Interp.prototype.bind=function(m, obj, cls){ return {t:"fn", decl:m, env:this.global, thisObj:obj, ownerCls:cls||null}; };

/* ---- 関数呼び出し ---- */
Interp.prototype.callFn=function(fnVal, argVals, line){
  this.step(line);
  if(fnVal===null||fnVal===undefined)
    throw new CSThrow(this.mkExc("NullReferenceException","null のデリゲート/メソッドを呼び出そうとしました"));
  if(fnVal.t==="nfn") return fnVal.f(argVals, this, line);
  if(fnVal.t==="multi"){
    var r=null;
    for(var i=0;i<fnVal.fns.length;i++) r=this.callFn(fnVal.fns[i], argVals, line);
    return r;
  }
  if(fnVal.t==="lambda"){
    var env=new Scope(fnVal.env);
    for(var j=0;j<fnVal.params.length;j++) env.declare(fnVal.params[j], argVals[j]);
    try{ this.execBlock(fnVal.body, env, fnVal.thisObj); }
    catch(e){ if(e instanceof ReturnSig) return e.v; throw e; }
    return null;
  }
  if(fnVal.t==="fn"){
    var decl=fnVal.decl;
    var env2=new Scope(this.global);
    this.bindParams(env2, decl.params, argVals);
    /* out/ref は呼び出し側で処理済み（参照ボックス） */
    for(var x=0;x<decl.params.length;x++){
      var pp=decl.params[x];
      if((pp.mods.indexOf("out")>=0||pp.mods.indexOf("ref")>=0)&&argVals[x]&&argVals[x].t==="refbox"){
        env2.vars[pp.name]=argVals[x].get();
        env2["__ref_"+pp.name]=argVals[x];
      }
    }
    if(!decl.body) throw RunError("abstract メソッド '"+decl.name+"' は子クラスで override して実装してください", line);
    if(!this.clsStack) this.clsStack=[];
    this.clsStack.push(fnVal.ownerCls||null);
    var ret=null;
    try{
      try{ this.execBlock(decl.body, env2, fnVal.thisObj); }
      catch(e){
        if(e instanceof ReturnSig) ret=e.v;
        else throw e;
      }
    } finally { this.clsStack.pop(); }
    /* ref/out 書き戻し */
    for(var y=0;y<decl.params.length;y++){
      var py=decl.params[y];
      var rb=env2["__ref_"+py.name];
      if(rb) rb.set(env2.vars[py.name]);
    }
    return ret;
  }
  throw RunError("呼び出せない値です（メソッド名の書き間違い？）", line);
};

/* ---- 文の実行 ---- */
Interp.prototype.execBlock=function(block, env, thisObj){
  var sc=new Scope(env);
  for(var i=0;i<block.stmts.length;i++) this.execStmt(block.stmts[i], sc, thisObj);
};
Interp.prototype.execStmt=function(st, env, thisObj){
  var self=this;
  this.step(st.line);
  switch(st.k){
    case "block": this.execBlock(st, env, thisObj); return;
    case "empty": return;
    case "vardecl":
      st.decls.forEach(function(d){
        var v=d.init?self.evalExpr(d.init, env, thisObj):defVal(st.type);
        if(st.type&&st.type.name!=="var") v=coerceDecl(v, st.type);
        env.declare(d.name, v);
      });
      return;
    case "exprstmt": this.evalExpr(st.e, env, thisObj); return;
    case "if":
      if(truthy(this.evalExpr(st.cond, env, thisObj), st.line)) this.execStmt(st.then, new Scope(env), thisObj);
      else if(st.els) this.execStmt(st.els, new Scope(env), thisObj);
      return;
    case "while":
      while(truthy(this.evalExpr(st.cond, env, thisObj), st.line)){
        this.step(st.line);
        try{ this.execStmt(st.body, new Scope(env), thisObj); }
        catch(e){ if(e===BreakSig)break; if(e===ContinueSig)continue; throw e; }
      }
      return;
    case "dowhile":
      do{
        this.step(st.line);
        try{ this.execStmt(st.body, new Scope(env), thisObj); }
        catch(e){ if(e===BreakSig)break; if(e===ContinueSig)continue; throw e; }
      }while(truthy(this.evalExpr(st.cond, env, thisObj), st.line));
      return;
    case "for":{
      var sc=new Scope(env);
      if(st.init) this.execStmt(st.init, sc, thisObj);
      for(;;){
        this.step(st.line);
        if(st.cond&&!truthy(this.evalExpr(st.cond, sc, thisObj), st.line)) break;
        try{ this.execStmt(st.body, new Scope(sc), thisObj); }
        catch(e){ if(e===BreakSig)break; if(e===ContinueSig){ if(st.step)this.evalExpr(st.step, sc, thisObj); continue; } throw e; }
        if(st.step) this.evalExpr(st.step, sc, thisObj);
      }
      return;
    }
    case "foreach":{
      var seq=this.evalExpr(st.seq, env, thisObj);
      var items=this.iterate(seq, st.line);
      for(var i=0;i<items.length;i++){
        this.step(st.line);
        var sc2=new Scope(env);
        sc2.declare(st.varName, items[i]);
        try{ this.execStmt(st.body, sc2, thisObj); }
        catch(e){ if(e===BreakSig)break; if(e===ContinueSig)continue; throw e; }
      }
      return;
    }
    case "switch":{
      var d=this.evalExpr(st.disc, env, thisObj);
      var chosen=null, defCase=null;
      for(var ci=0;ci<st.cases.length;ci++){
        var cs=st.cases[ci];
        if(cs.isDefault&&!cs.vals.length){ defCase=cs; if(chosen)break; }
        for(var vi=0;vi<cs.vals.length;vi++){
          var cv=this.evalExpr(cs.vals[vi], env, thisObj);
          if(csEquals(d,cv)){ chosen=cs; break; }
        }
        if(cs.isDefault) defCase=cs;
        if(chosen) break;
      }
      var run=chosen||defCase;
      if(run){
        var sc3=new Scope(env);
        try{ for(var si=0;si<run.stmts.length;si++) this.execStmt(run.stmts[si], sc3, thisObj); }
        catch(e){ if(e!==BreakSig) throw e; }
      }
      return;
    }
    case "break": throw BreakSig;
    case "continue": throw ContinueSig;
    case "return": throw new ReturnSig(st.val?this.evalExpr(st.val, env, thisObj):null);
    case "throw":{
      var ex=this.evalExpr(st.val, env, thisObj);
      var t=new CSThrow(ex); t.line=st.line;
      throw t;
    }
    case "try":{
      try{
        this.execBlock(st.body, env, thisObj);
      }catch(e){
        if(e instanceof CSThrow){
          for(var k2=0;k2<st.catches.length;k2++){
            var c=st.catches[k2];
            if(this.excMatches(e.exc, c.type)){
              var sc4=new Scope(env);
              if(c.name) sc4.declare(c.name, e.exc);
              try{ this.execBlock(c.body, sc4, thisObj); }
              finally{ if(st.fin) this.execBlock(st.fin, env, thisObj); }
              return;
            }
          }
        }
        if(st.fin) this.execBlock(st.fin, env, thisObj);
        throw e;
      }
      if(st.fin) this.execBlock(st.fin, env, thisObj);
      return;
    }
    default: throw RunError("未対応の文: "+st.k, st.line);
  }
};
function csEquals(a,b){
  if(a===null||b===null) return a===b;
  if(isNum(a)&&isNum(b)) return a.v===b.v;
  if(typeof a==="string"&&typeof b==="string") return a===b;
  if(typeof a==="boolean"&&typeof b==="boolean") return a===b;
  if(a.t==="c"&&b.t==="c") return a.v===b.v;
  if(a.t==="enum"&&b.t==="enum") return a.en===b.en&&a.v===b.v;
  if(a.t==="c"&&typeof b==="string") return a.v===b;
  if(typeof a==="string"&&b.t==="c") return a===b.v;
  return a===b;
}
Interp.prototype.iterate=function(seq,line){
  if(seq===null) throw new CSThrow(this.mkExc("NullReferenceException","null に対して foreach しようとしました"));
  if(typeof seq==="string") return seq.split("").map(function(c){ return {t:"c", v:c}; });
  switch(seq.t){
    case "list": case "arr": case "queue": case "stack": return seq.el.slice();
    case "dict":{
      var out=[];
      for(var i=0;i<seq.keys.length;i++) out.push({t:"kvp", k:seq.keys[i], val:seq.vals[i]});
      return out;
    }
  }
  throw RunError("foreach できない値です", line);
};
function coerceDecl(v, ty){
  if(v===null) return v;
  if(isNum(v)){
    if(ty.name==="int"||ty.name==="long"){
      if(v.t!=="i") return v.__err=1, v; /* 型議論は簡略化: そのまま */
      return v;
    }
    if(ty.name==="float") return {t:"f", v:v.v};
    if(ty.name==="double") return {t:"d", v:v.v};
  }
  return v;
}
/* part3: 式の評価 + 組み込みメンバー + 公開API（同一IIFE内） */

Interp.prototype.evalArgs=function(args, env, thisObj){
  var self=this, out=[];
  args.forEach(function(a){
    if(a.mod==="out"||a.mod==="ref"){
      /* 参照ボックス: 変数・フィールドへの書き戻しを可能に */
      out.push(self.makeRefBox(a.e, env, thisObj));
    } else out.push(self.evalExpr(a.e, env, thisObj));
  });
  return out;
};
Interp.prototype.makeRefBox=function(target, env, thisObj){
  var self=this;
  if(target.k==="id"){
    var name=target.name;
    if(!env.has(name)) env.declare(name, null);
    return {t:"refbox", get:function(){ return env.get(name); }, set:function(v){ env.set(name, v); }};
  }
  if(target.k==="member"){
    var obj=this.evalExpr(target.obj, env, thisObj);
    return {t:"refbox",
      get:function(){ return self.getMember(obj, target.name, target.line); },
      set:function(v){ self.setMember(obj, target.name, v, target.line); }};
  }
  throw RunError("out/ref には変数を渡してください", target.line);
};

Interp.prototype.evalExpr=function(e, env, thisObj){
  var self=this;
  switch(e.k){
    case "num": return mkNum(e.nt, e.v);
    case "str": return e.v;
    case "chr": return {t:"c", v:e.v};
    case "bool": return e.v;
    case "null": return null;
    case "istr":{
      var s="";
      e.parts.forEach(function(p){
        if(p.s!=null) s+=p.s;
        else s+=self.fmtWith(self.evalExpr(p.e, env, thisObj), p.fmt);
      });
      return s;
    }
    case "this":
      if(!thisObj) throw RunError("this はインスタンスメソッドの中でだけ使えます", e.line);
      return thisObj;
    case "base":
      return {t:"baseref", obj:thisObj};
    case "id":{
      var name=e.name;
      if(env.has(name)) return env.get(name);
      if(thisObj&&thisObj.t==="obj"){
        var r=this.tryGetInstanceMember(thisObj, name);
        if(r!==undefined) return r;
      }
      /* 自クラスの static */
      if(thisObj&&thisObj.t==="obj"){
        var sc=this.findStaticHolder(thisObj.cls, name);
        if(sc){ this.ensureStatics(sc); return sc.statics[name]; }
      }
      var curCls=this.clsStack&&this.clsStack.length?this.clsStack[this.clsStack.length-1]:null;
      if(curCls){
        var sh0=this.findStaticHolder(curCls, name);
        if(sh0){ this.ensureStatics(sh0); return sh0.statics[name]; }
        var mm0=this.findMethod(curCls, name);
        if(mm0) return this.bind(mm0.m, null, mm0.cls);
      }
      if(this.classes[name]){ this.ensureStatics(this.classes[name]); return {t:"cref", cls:this.classes[name]}; }
      if(this.enums[name]) return {t:"enref", en:this.enums[name]};
      var bi=BUILTIN_IDS[name];
      if(bi) return bi(this);
      if(this.host){
        var hv=this.host.resolveId(name, this);
        if(hv!==undefined) return hv;
      }
      throw RunError("'"+name+"' が見つかりません（変数の宣言忘れ・スペルミス？）", e.line);
    }
    case "lambda":
      return {t:"lambda", params:e.params, body:e.body, env:env, thisObj:thisObj};
    case "assign": return this.evalAssign(e, env, thisObj);
    case "ternary":
      return truthy(this.evalExpr(e.cond, env, thisObj)) ? this.evalExpr(e.then, env, thisObj) : this.evalExpr(e.els, env, thisObj);
    case "nullco":{
      var l=this.evalExpr(e.l, env, thisObj);
      return l===null||l===undefined ? this.evalExpr(e.r, env, thisObj) : l;
    }
    case "or": return truthy(this.evalExpr(e.l, env, thisObj)) ? true : truthy(this.evalExpr(e.r, env, thisObj));
    case "and": return truthy(this.evalExpr(e.l, env, thisObj)) ? truthy(this.evalExpr(e.r, env, thisObj)) : false;
    case "bin": return this.binOp(e.op, this.evalExpr(e.l, env, thisObj), this.evalExpr(e.r, env, thisObj), e.line);
    case "unary":{
      var v=this.evalExpr(e.e, env, thisObj);
      if(e.op==="!") return !truthy(v, e.line);
      if(e.op==="-"){ if(!isNum(v)) throw RunError("- は数値にしか使えません", e.line); return mkNum(v.t, -v.v); }
      return v;
    }
    case "prefix": case "postfix":{
      var old=this.evalLValue(e.e, env, thisObj, e.line);
      var cur=old.get();
      if(!isNum(cur)) throw RunError("++/-- は数値にしか使えません", e.line);
      var nv=mkNum(cur.t, e.op==="++"?cur.v+1:cur.v-1);
      old.set(nv);
      return e.k==="prefix"?nv:cur;
    }
    case "cast":{
      var cv=this.evalExpr(e.e, env, thisObj);
      return this.castTo(cv, e.type, e.line);
    }
    case "is":{
      var iv=this.evalExpr(e.e, env, thisObj);
      var ok=this.typeMatches(iv, e.type);
      if(ok&&e.bind) env.declare(e.bind, iv);
      return ok;
    }
    case "as":{
      var av=this.evalExpr(e.e, env, thisObj);
      return this.typeMatches(av, e.type)?av:null;
    }
    case "member":{
      var obj=this.evalExpr(e.obj, env, thisObj);
      if(e.opt&&(obj===null||obj===undefined)) return null;
      return this.getMember(obj, e.name, e.line);
    }
    case "index":{
      var o=this.evalExpr(e.obj, env, thisObj);
      var ix=this.evalExpr(e.idx, env, thisObj);
      return this.getIndex(o, ix, e.line);
    }
    case "call":{
      var fv=this.evalExpr(e.fn, env, thisObj);
      var args=this.evalArgs(e.args, env, thisObj);
      return this.callFn(fv, args, e.line);
    }
    case "mcall":{
      var obj2=this.evalExpr(e.obj, env, thisObj);
      if(e.opt&&(obj2===null||obj2===undefined)) return null;
      var args2=this.evalArgs(e.args, env, thisObj);
      return this.callMember(obj2, e.name, args2, e.line, e.gargs);
    }
    case "new":{
      var vals=this.evalArgs(e.args, env, thisObj);
      return this.evalNew(e, vals, env, thisObj);
    }
    case "newarr":{
      var el=[];
      if(e.init){
        el=e.init.map(function(x){ return self.evalExpr(x, env, thisObj); });
      } else if(e.size){
        var sz=this.evalExpr(e.size, env, thisObj);
        var d=defVal(e.type);
        for(var i=0;i<sz.v;i++) el.push(d);
      }
      return {t:"arr", el:el, elName:e.type.name};
    }
    default: throw RunError("未対応の式: "+e.k, e.line);
  }
};
Interp.prototype.findStaticHolder=function(cls, name){
  var c=cls;
  while(c){
    if(c.statics&&(name in c.statics)) return c;
    if(c.fields&&c.fields.some(function(f){ return f.name===name&&(f.mods.indexOf("static")>=0||f.mods.indexOf("const")>=0); })) return c;
    c=this.baseClassOf(c);
  }
  return null;
};
Interp.prototype.tryGetInstanceMember=function(obj, name){
  if(name in obj.f) return obj.f[name];
  var pr=this.findProp(obj.cls, name);
  if(pr){
    if(pr.p.auto!==false) return obj.f["__prop_"+name];
    if(pr.p.get) return this.runAccessor(pr.p.get, obj, null);
  }
  var m=this.findMethod(obj.cls, name);
  if(m) return this.bind(m.m, obj, m.cls);
  if(obj.hostLink){
    var hv=obj.hostLink.get&&obj.hostLink.get(name);
    if(hv!==undefined) return hv;
  }
  return undefined;
};
Interp.prototype.runAccessor=function(acc, obj, setVal){
  var env=new Scope(this.global);
  if(setVal!==null) env.declare("value", setVal);
  try{ this.execBlock(acc.body, env, obj); }
  catch(e){ if(e instanceof ReturnSig) return e.v; throw e; }
  return null;
};

/* ---- 代入 ---- */
Interp.prototype.evalLValue=function(t, env, thisObj, line){
  var self=this;
  if(t.k==="id"){
    var name=t.name;
    if(env.has(name)){
      return {get:function(){ return env.get(name); }, set:function(v){ env.set(name, v); }};
    }
    if(thisObj&&thisObj.t==="obj"){
      if(name in thisObj.f||this.findProp(thisObj.cls, name)){
        return {get:function(){ return self.getMember(thisObj, name, line); },
                set:function(v){ self.setMember(thisObj, name, v, line); }};
      }
      var sh=this.findStaticHolder(thisObj.cls, name);
      if(sh){ this.ensureStatics(sh);
        return {get:function(){ return sh.statics[name]; }, set:function(v){ sh.statics[name]=v; }};
      }
    }
    var curCls2=this.clsStack&&this.clsStack.length?this.clsStack[this.clsStack.length-1]:null;
    if(curCls2){
      var sh1=this.findStaticHolder(curCls2, name);
      if(sh1){ this.ensureStatics(sh1);
        return {get:function(){ return sh1.statics[name]; }, set:function(v){ sh1.statics[name]=v; }};
      }
    }
    if(this.host){
      var hb=this.host.lvalue&&this.host.lvalue(name);
      if(hb) return hb;
    }
    /* 未宣言→新規宣言はしない（C#らしくエラー） */
    throw RunError("'"+name+"' は宣言されていません。型を付けて宣言してください（例: int "+name+" = 0;）", line);
  }
  if(t.k==="member"){
    var obj=this.evalExpr(t.obj, env, thisObj);
    return {get:function(){ return self.getMember(obj, t.name, line); },
            set:function(v){ self.setMember(obj, t.name, v, line); }};
  }
  if(t.k==="index"){
    var o=this.evalExpr(t.obj, env, thisObj);
    var ix=this.evalExpr(t.idx, env, thisObj);
    return {get:function(){ return self.getIndex(o, ix, line); },
            set:function(v){ self.setIndex(o, ix, v, line); }};
  }
  throw RunError("ここには代入できません", line);
};
Interp.prototype.evalAssign=function(e, env, thisObj){
  var lv=this.evalLValue(e.target, env, thisObj, e.line);
  var rhs=this.evalExpr(e.val, env, thisObj);
  if(e.op==="="){
    lv.set(rhs);
    return rhs;
  }
  var cur=lv.get();
  var op=e.op[0];
  var nv;
  /* デリゲートの += / -= */
  if(op==="+"&&(cur===null||cur===undefined||cur.t==="fn"||cur.t==="nfn"||cur.t==="lambda"||cur.t==="multi")&&rhs&&(rhs.t==="fn"||rhs.t==="nfn"||rhs.t==="lambda"||rhs.t==="multi")){
    if(cur===null||cur===undefined) nv=rhs;
    else{
      var fns=cur.t==="multi"?cur.fns.slice():[cur];
      fns.push(rhs);
      nv={t:"multi", fns:fns};
    }
    lv.set(nv); return nv;
  }
  if(op==="-"&&cur&&(cur.t==="fn"||cur.t==="multi"||cur.t==="lambda")&&rhs&&(rhs.t==="fn"||rhs.t==="lambda")){
    var list=cur.t==="multi"?cur.fns.slice():[cur];
    for(var i=list.length-1;i>=0;i--){
      if(sameFn(list[i], rhs)){ list.splice(i,1); break; }
    }
    nv=list.length===0?null:(list.length===1?list[0]:{t:"multi", fns:list});
    lv.set(nv); return nv;
  }
  nv=this.binOp(op, cur, rhs, e.line);
  /* int変数への += は型を維持 */
  if(isNum(cur)&&isNum(nv)&&cur.t==="i"&&nv.t!=="i"&&Number.isInteger(nv.v)) nv=mkI(nv.v);
  lv.set(nv);
  return nv;
};
function sameFn(a,b){
  if(a===b) return true;
  if(a&&b&&a.t==="fn"&&b.t==="fn") return a.decl===b.decl&&a.thisObj===b.thisObj;
  return false;
}

/* ---- 二項演算 ---- */
Interp.prototype.binOp=function(op, a, b, line){
  if(a&&a.t==="host"&&a.h.binOp){ var hr0=a.h.binOp(op,a,b,this); if(hr0!==undefined) return hr0; }
  if(b&&b.t==="host"&&b.h.binOp){ var hr1=b.h.binOp(op,a,b,this); if(hr1!==undefined) return hr1; }
  if(op==="+"){
    if(typeof a==="string"||typeof b==="string") return this.toStr(a)+this.toStr(b);
    if(a&&a.t==="c"&&b&&b.t==="c") return a.v+b.v;
    if(a&&a.t==="c"&&isNum(b)) return mkI(a.v.charCodeAt(0)+b.v);
  }
  if(op==="==") return csEquals(a,b);
  if(op==="!=") return !csEquals(a,b);
  if(isNum(a)&&isNum(b)){
    var rt=(a.t==="i"&&b.t==="i")?"i":((a.t==="d"||b.t==="d")?"d":"f");
    switch(op){
      case "+": return mkNum(rt, a.v+b.v);
      case "-": return mkNum(rt, a.v-b.v);
      case "*": return mkNum(rt, a.v*b.v);
      case "/":
        if(rt==="i"){
          if(b.v===0) this.throwExc("DivideByZeroException","0 で割ろうとしました（int 同士の割り算）", line);
          return mkI(Math.trunc(a.v/b.v));
        }
        return mkNum(rt, a.v/b.v);
      case "%":
        if(rt==="i"&&b.v===0) this.throwExc("DivideByZeroException","0 で剰余を取ろうとしました", line);
        return mkNum(rt, a.v%b.v);
      case "<": return a.v<b.v;
      case ">": return a.v>b.v;
      case "<=": return a.v<=b.v;
      case ">=": return a.v>=b.v;
    }
  }
  if(typeof a==="string"&&typeof b==="string"){
    switch(op){
      case "<": return a<b; case ">": return a>b;
      case "<=": return a<=b; case ">=": return a>=b;
    }
  }
  if(a&&b&&a.t==="enum"&&b.t==="enum"){
    switch(op){
      case "<": return a.v<b.v; case ">": return a.v>b.v;
      case "<=": return a.v<=b.v; case ">=": return a.v>=b.v;
    }
  }
  if((a===null||b===null)&&(op==="+"))
    return this.toStr(a)+this.toStr(b);
  throw RunError("'"+op+"' を "+this.typeName(a)+" と "+this.typeName(b)+" には使えません", line);
};
Interp.prototype.typeName=function(v){
  if(v===null||v===undefined) return "null";
  if(typeof v==="string") return "string";
  if(typeof v==="boolean") return "bool";
  if(isNum(v)) return v.t==="i"?"int":(v.t==="f"?"float":"double");
  switch(v.t){
    case "c": return "char";
    case "obj": return v.cls.name;
    case "list": return "List";
    case "arr": return v.elName+"[]";
    case "dict": return "Dictionary";
    case "enum": return v.en.name;
    case "fn": case "nfn": case "lambda": case "multi": return "delegate";
    case "host": return v.h.csName||"UnityObject";
  }
  return "object";
};
Interp.prototype.castTo=function(v, ty, line){
  if(ty.name==="int"||ty.name==="long"){
    if(isNum(v)) return mkI(v.v);
    if(v&&v.t==="enum") return mkI(v.v);
    if(v&&v.t==="c") return mkI(v.v.charCodeAt(0));
  }
  if(ty.name==="float"&&isNum(v)) return mkF(v.v);
  if(ty.name==="double"&&isNum(v)) return mkD(v.v);
  if(ty.name==="char"&&isNum(v)) return {t:"c", v:String.fromCharCode(v.v)};
  if(ty.name==="string") return this.toStr(v);
  /* クラスキャスト */
  if(v===null) return null;
  if(v&&v.t==="obj"){
    if(this.typeMatches(v, ty.name)) return v;
    throw new CSThrow(this.mkExc("InvalidCastException", v.cls.name+" を "+ty.name+" にキャストできません"));
  }
  /* enumへのキャスト */
  if(this.enums[ty.name]&&isNum(v)){
    var en=this.enums[ty.name];
    for(var i=0;i<en.order.length;i++){
      var m=en.members[en.order[i]];
      if(m.v===v.v) return m;
    }
    return {t:"enum", en:en, name:String(v.v), v:v.v};
  }
  return v;
};
Interp.prototype.typeMatches=function(v, typeName){
  if(v===null) return false;
  switch(typeName){
    case "int": return isNum(v)&&v.t==="i";
    case "float": return isNum(v)&&v.t==="f";
    case "double": return isNum(v)&&v.t==="d";
    case "string": return typeof v==="string";
    case "bool": return typeof v==="boolean";
    case "object": return true;
  }
  if(v.t==="obj"){
    if(this.isSubclassOf(v.cls, typeName)) return true;
    if(this.interfaces[typeName]&&this.classImplements(v.cls, typeName)) return true;
    return false;
  }
  return false;
};

/* ---- new ---- */
Interp.prototype.evalNew=function(e, argVals, env, thisObj){
  var name=e.type.name;
  var self=this;
  var obj;
  if(name==="List"){ obj={t:"list", el:[]}; }
  else if(name==="Dictionary"){ obj={t:"dict", keys:[], vals:[]}; }
  else if(name==="Queue"){ obj={t:"queue", el:[]}; }
  else if(name==="Stack"){ obj={t:"stack", el:[]}; }
  else if(EXC_TREE[name]!==undefined||name==="Exception"){
    obj={t:"obj", cls:{name:name, builtinExc:true}, f:{_msg:argVals[0]!==undefined?argVals[0]:""}};
  }
  else if(this.classes[name]) obj=this.instantiate(this.classes[name], argVals);
  else if(this.host&&this.host.construct){
    var hv=this.host.construct(name, argVals, this);
    if(hv!==undefined) obj=hv;
  }
  if(obj===undefined) throw RunError("クラス '"+name+"' が見つかりません", e.line);
  /* 初期化子 */
  if(e.collInit){
    e.collInit.forEach(function(ci){
      if(ci.pair){
        var k=self.evalExpr(ci.pair[0], env, thisObj);
        var v=self.evalExpr(ci.pair[1], env, thisObj);
        self.callMember(obj, "Add", [k,v], e.line);
      } else self.callMember(obj, "Add", [self.evalExpr(ci.e, env, thisObj)], e.line);
    });
  }
  if(e.objInit){
    e.objInit.forEach(function(oi){
      self.setMember(obj, oi.name, self.evalExpr(oi.e, env, thisObj), e.line);
    });
  }
  return obj;
};

/* ---- メンバー取得/設定 ---- */
Interp.prototype.getMember=function(obj, name, line){
  if(obj===null||obj===undefined)
    throw new CSThrow(this.mkExc("NullReferenceException","null のメンバー '"+name+"' を参照しました。矢印（参照）がどこも指していない状態です。"));
  /* 文字列 */
  if(typeof obj==="string"){
    if(name==="Length") return mkI(obj.length);
    var sm=STRING_METHODS[name];
    if(sm) return {t:"nfn", f:function(args, it){ return sm(obj, args, it); }};
  }
  if(isNum(obj)||typeof obj==="boolean"||(obj&&obj.t==="c")){
    if(name==="ToString"){ var self1=this; return {t:"nfn", f:function(args){ return args.length?self1.fmtWith(obj,args[0]):self1.toStr(obj); }}; }
  }
  if(typeof obj!=="object") throw RunError(this.typeName(obj)+" にメンバー '"+name+"' はありません", line);
  var self=this;
  switch(obj.t){
    case "list":
      if(name==="Count") return mkI(obj.el.length);
      var lm=LIST_METHODS[name];
      if(lm) return {t:"nfn", f:function(args, it, ln){ return lm(obj, args, it, ln); }};
      break;
    case "arr":
      if(name==="Length") return mkI(obj.el.length);
      break;
    case "dict":
      if(name==="Count") return mkI(obj.keys.length);
      if(name==="Keys") return {t:"list", el:obj.keys.slice()};
      if(name==="Values") return {t:"list", el:obj.vals.slice()};
      var dm=DICT_METHODS[name];
      if(dm) return {t:"nfn", f:function(args, it, ln){ return dm(obj, args, it, ln); }};
      break;
    case "queue":
      if(name==="Count") return mkI(obj.el.length);
      var qm=QUEUE_METHODS[name];
      if(qm) return {t:"nfn", f:function(args, it, ln){ return qm(obj, args, it, ln); }};
      break;
    case "stack":
      if(name==="Count") return mkI(obj.el.length);
      var km=STACK_METHODS[name];
      if(km) return {t:"nfn", f:function(args, it, ln){ return km(obj, args, it, ln); }};
      break;
    case "kvp":
      if(name==="Key") return obj.k;
      if(name==="Value") return obj.val;
      break;
    case "enum":
      if(name==="ToString") return {t:"nfn", f:function(){ return obj.name; }};
      break;
    case "enref":{
      var m=obj.en.members[name];
      if(m) return m;
      throw RunError(obj.en.name+" に "+name+" という値はありません", line);
    }
    case "cref":{
      this.ensureStatics(obj.cls);
      if(name in obj.cls.statics) return obj.cls.statics[name];
      var sm2=this.findMethod(obj.cls, name);
      if(sm2&&sm2.m.mods.indexOf("static")>=0) return this.bind(sm2.m, null, obj.cls);
      var sp=this.findProp(obj.cls, name);
      if(sp&&sp.p.mods.indexOf("static")>=0){
        if(sp.p.auto!==false) return obj.cls.statics["__prop_"+name];
        if(sp.p.get) return this.runAccessor(sp.p.get, null, null);
      }
      throw RunError(obj.cls.name+" に static メンバー '"+name+"' はありません", line);
    }
    case "baseref":{
      var bcls=this.baseClassOf(obj.obj.cls);
      var bm=bcls?this.findMethod(bcls, name):null;
      if(bm) return this.bind(bm.m, obj.obj, bcls);
      if(name==="Message"&&this.isExcClass(obj.obj.cls)) return obj.obj.f._msg;
      throw RunError("base に '"+name+"' はありません", line);
    }
    case "obj":{
      if(name==="Message"&&this.isExcClass(obj.cls)) return obj.f._msg!==undefined?obj.f._msg:"";
      if(name==="GetType") return {t:"nfn", f:function(){ return obj.cls.name; }};
      if(name==="ToString"){

        if(tsm) return this.bind(tsm.m, obj, tsm.cls);
        return {t:"nfn", f:function(){ return obj.cls.name; }};
      }
      var r=this.tryGetInstanceMember(obj, name);
      if(r!==undefined) return r;
      /* staticも拾う */
      var sh=this.findStaticHolder(obj.cls, name);
      if(sh){ this.ensureStatics(sh); return sh.statics[name]; }
      throw RunError(obj.cls.name+" に '"+name+"' というメンバーはありません", line);
    }
    case "host":{

      if(hv!==undefined) return hv;
      throw RunError((obj.h.csName||"Unityオブジェクト")+" に '"+name+"' はありません", line);
    }
    case "fn": case "nfn": case "multi": case "lambda":

Interp.prototype.setMember=function(obj, name, v, line){
  if(obj===null||obj===undefined)
    throw new CSThrow(this.mkExc("NullReferenceException","null のメンバー '"+name+"' に代入しようとしました"));
  if(obj.t==="obj"){
    var pr=this.findProp(obj.cls, name);
    if(pr){
      if(pr.p.auto!==false){
        /* private set の簡易チェックは省略（学習用に寛容） */
        obj.f["__prop_"+name]=v; return;
      }
      if(pr.p.set){ this.runAccessor(pr.p.set, obj, v); return; }
      throw RunError("プロパティ "+name+" に set がありません（読み取り専用）", line);
    }
    if(name in obj.f){ obj.f[name]=v; return; }
    var sh=this.findStaticHolder(obj.cls, name);
    if(sh){ this.ensureStatics(sh); sh.statics[name]=v; return; }
    if(obj.hostLink&&obj.hostLink.set&&obj.hostLink.set(name, v)!==undefined) return;
    obj.f[name]=v; /* 柔軟に許容（学習用） */
    return;
  }
  if(obj.t==="cref"){ this.ensureStatics(obj.cls); obj.cls.statics[name]=v; return; }
  if(obj.t==="host"){
    if(obj.h.set&&obj.h.set(name, v, this)!==undefined) return;
    throw RunError((obj.h.csName||"Unityオブジェクト")+" の '"+name+"' には代入できません", line);
  }
  throw RunError(this.typeName(obj)+" のメンバーには代入できません", line);
};
Interp.prototype.getIndex=function(o, ix, line){
  if(o===null) throw new CSThrow(this.mkExc("NullReferenceException","null に添字アクセスしました"));
  if(typeof o==="string"){
    var i0=ix.v;
    if(i0<0||i0>=o.length) throw new CSThrow(this.mkExc("IndexOutOfRangeException","文字列の範囲外です（index="+i0+", 長さ="+o.length+"）"));
    return {t:"c", v:o[i0]};
  }
  if(o.t==="arr"||o.t==="list"){
    var i=ix.v;
    if(i<0||i>=o.el.length)
      throw new CSThrow(this.mkExc(o.t==="arr"?"IndexOutOfRangeException":"ArgumentOutOfRangeException",
        (o.t==="arr"?"配列":"List")+"の範囲外です（index="+i+", 要素数="+o.el.length+"）。添字は 0 〜 "+(o.el.length-1)+" が有効です。"));
    return o.el[i];
  }
  if(o.t==="dict"){
    for(var k=0;k<o.keys.length;k++) if(csEquals(o.keys[k], ix)) return o.vals[k];
    throw new CSThrow(this.mkExc("KeyNotFoundException","キー '"+this.toStr(ix)+"' は Dictionary にありません"));
  }
  throw RunError(this.typeName(o)+" に [添字] は使えません", line);
};
Interp.prototype.setIndex=function(o, ix, v, line){
  if(o===null) throw new CSThrow(this.mkExc("NullReferenceException","null に添字代入しました"));
  if(o.t==="arr"||o.t==="list"){
    var i=ix.v;
    if(i<0||i>=o.el.length)
      throw new CSThrow(this.mkExc(o.t==="arr"?"IndexOutOfRangeException":"ArgumentOutOfRangeException",
        (o.t==="arr"?"配列":"List")+"の範囲外に代入しました（index="+i+", 要素数="+o.el.length+"）"));
    o.el[i]=v; return;
  }
  if(o.t==="dict"){
    for(var k=0;k<o.keys.length;k++) if(csEquals(o.keys[k], ix)){ o.vals[k]=v; return; }
    o.keys.push(ix); o.vals.push(v); return;
  }
  throw RunError(this.typeName(o)+" に添字代入はできません", line);

Interp.prototype.callMember=function(obj, name, args, line, gargs){
  var fn=this.getMember(obj, name, line);
  if(fn===null||fn===undefined)
    throw new CSThrow(this.mkExc("NullReferenceException","'"+name+"' は null です（デリゲート未登録？）"));
  /* オーバーロード選択（同名複数） */
  if(fn.t==="fn"&&obj&&obj.t==="obj"){
    var cands=[], c=obj.cls;
    while(c){
      (c.methods||[]).forEach(function(m){ if(m.name===name) cands.push(m); });

    if(cands.length>1){
      var pick=this.pickOverload(cands, args.length);
      if(pick) fn=this.bind(pick, obj, obj.cls);
    }
  }
  if(fn.t==="host") throw RunError("'"+name+"' はメソッドではありません", line);
  if(gargs&&fn.t==="nfn") return fn.f(args, this, line, gargs);

/* ---------- 公開API ---------- */
function runSource(src, opts){
  opts=opts||{};
  var outputs=[];
  var outFn=opts.output||function(o){ outputs.push(o); };
  var wrapped=function(o){ outputs.push(o); outFn(o); };
  var it=new Interp({output:function(o){ outputs.push(o); if(opts.output)opts.output(o); }, host:opts.host, maxSteps:opts.maxSteps});
  try{
    var toks=lex(src);
    var p=new Parser(toks);
    var prog=p.parseProgram();
    it.loadProgram(prog);
    for(var i=0;i<prog.stmts.length;i++) it.execStmt(prog.stmts[i], it.global, null);
    /* トップレベルに Main があれば実行済み文の後に呼ぶ（本文なしの場合） */
    if(prog.stmts.length===0){
      var main=it.global.get("Main");
      if(main) it.callFn(main, []);
      else if(prog.classes.length){
        /* クラス内 static Main も探す */
        for(var c=0;c<prog.classes.length;c++){
          var mm=prog.classes[c].methods.filter(function(m){ return m.name==="Main"&&m.mods.indexOf("static")>=0; });
          if(mm.length){ it.callFn(it.bind(mm[0], null), []); break; }
        }
      }
    }
    return {ok:true, outputs:outputs, interp:it};
  }catch(err){
    return {ok:false, outputs:outputs, error:describeError(err, it), interp:it};
  }
}
function describeError(err, it){
  if(err instanceof CSThrow){
    var name=excTypeName(err.exc);
    var msg=err.exc&&err.exc.f?err.exc.f._msg:"";
    return {type:name, message:msg||"", line:err.line||null, unhandled:true,
      text:name+(msg?": "+msg:"")+"（どこにも catch されませんでした）"};
  }
  if(err&&err.isCS){
    return {type:"CompileError", message:err.message, line:err.csLine||null,
      text:(err.csLine?"行 "+err.csLine+": ":"")+err.message};
  }
  return {type:"InternalError", message:String(err&&err.message||err), line:null,
    text:"内部エラー: "+String(err&&err.message||err)};
}

/* クラスをコンパイルしてインスタンス化（訓練所用: MonoBehaviour風） */
function compileBehaviour(src, opts){

  var prog=p.parseProgram();
  it.loadProgram(prog);
  /* トップレベル文も許容（初期化コード） */
  for(var i=0;i<prog.stmts.length;i++) it.execStmt(prog.stmts[i], it.global, null);
  /* MonoBehaviour 継承クラスを探す（なければ最初のクラス） */
  var cls=null;
  for(var c=0;c<prog.classes.length;c++){
    if(prog.classes[c].bases.indexOf("MonoBehaviour")>=0){ cls=prog.classes[c]; break; }
  }
  if(!cls&&prog.classes.length) cls=prog.classes[0];
  var behaviour=null;
  if(cls){
    var obj={t:"obj", cls:cls, f:{}};
    if(opts.hostLink) obj.hostLink=opts.hostLink;
    it.initFields(obj, cls);
    it.runCtor(obj, cls, []);
    behaviour={
      obj:obj,
      has:function(name){ return !!it.findMethod(cls, name); },
      invoke:function(name, args){
        var m=it.findMethod(cls, name);
        if(!m) return null;
        return it.callFn(it.bind(m.m, obj), args||[]);
      }
    };
  }
  return {interp:it, behaviour:behaviour, hasTopLevel:prog.stmts.length>0};
}

/* ---------- Vector3 ---------- */
function mkVec(x,y,z){
  var h={ csName:"Vector3", vec:true, vx:x||0, vy:y||0, vz:z||0,
    get:function(name){
      if(name==="x") return mkF(h.vx);
      if(name==="y") return mkF(h.vy);
      if(name==="z") return mkF(h.vz);
      if(name==="magnitude") return mkF(Math.sqrt(h.vx*h.vx+h.vy*h.vy+h.vz*h.vz));
      if(name==="normalized"){
        var m=Math.sqrt(h.vx*h.vx+h.vy*h.vy+h.vz*h.vz)||1;
        return mkVec(h.vx/m, h.vy/m, h.vz/m);
      }
      if(name==="ToString") return {t:"nfn", f:function(){ return "("+fmt(h.vx)+", "+fmt(h.vy)+", "+fmt(h.vz)+")"; }};
      return undefined;
    },
    set:function(name,v){
      if(!isNum(v)) return undefined;
      if(name==="x"){ h.vx=v.v; return true; }
      if(name==="y"){ h.vy=v.v; return true; }
      if(name==="z"){ h.vz=v.v; return true; }
      return undefined;
    },
    binOp:function(op,a,b){
      var av=a&&a.t==="host"&&a.h.vec?a.h:null;
      var bv=b&&b.t==="host"&&b.h.vec?b.h:null;
      if(op==="+"&&av&&bv) return mkVec(av.vx+bv.vx, av.vy+bv.vy, av.vz+bv.vz);
      if(op==="-"&&av&&bv) return mkVec(av.vx-bv.vx, av.vy-bv.vy, av.vz-bv.vz);
      if(op==="*"&&av&&isNum(b)) return mkVec(av.vx*b.v, av.vy*b.v, av.vz*b.v);
      if(op==="*"&&bv&&isNum(a)) return mkVec(bv.vx*a.v, bv.vy*a.v, bv.vz*a.v);
      if(op==="/"&&av&&isNum(b)) return mkVec(av.vx/b.v, av.vy/b.v, av.vz/b.v);
      return undefined;
    }
  };

}
function fmt(n){ return (Math.round(n*100)/100).toString(); }
function vecStatics(){

/* ---------- GameObject ラッパー ---------- */
function transformHost(o){

    get:function(name){

function goWrap(o){

/* ---------- キー入力 ---------- */
function keyName(ev){
