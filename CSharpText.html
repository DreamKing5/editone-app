/* ---------- 描画 ---------- */
function render(ctx, cv, w){
  var W=cv.width, Hh=cv.height, cx=W/2, cy=Hh/2;
  /* 背景: 夜の訓練場 */
  ctx.fillStyle="#171c26";
  ctx.fillRect(0,0,W,Hh);
  /* 石畳グリッド */
  ctx.strokeStyle="rgba(194,163,91,.07)";
  ctx.lineWidth=1;
  for(var gx=cx%SCALE; gx<W; gx+=SCALE){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,Hh); ctx.stroke(); }
  for(var gy=cy%SCALE; gy<Hh; gy+=SCALE){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
  /* 境界の壁 */
  ctx.strokeStyle="rgba(194,163,91,.45)";
  ctx.lineWidth=3;
  ctx.strokeRect(cx-BOUNDS.x*SCALE-14, cy-BOUNDS.y*SCALE-14, BOUNDS.x*2*SCALE+28, BOUNDS.y*2*SCALE+28);

  function px(o){ return {x:cx+o.x*SCALE, y:cy-o.y*SCALE}; }
  w.objects.forEach(function(o){
    if(!o.alive) return;
    var p=px(o);
    ctx.save();
    ctx.translate(p.x, p.y);
    switch(o.shape){
      case "player":{
        ctx.fillStyle="rgba(0,0,0,.35)";
        ctx.beginPath(); ctx.ellipse(0, 16, 13, 4, 0, 0, Math.PI*2); ctx.fill();
        /* マント */
        ctx.fillStyle="#3d5a80";
        ctx.beginPath(); ctx.moveTo(-11, 14); ctx.quadraticCurveTo(0, -20, 11, 14); ctx.closePath(); ctx.fill();
        /* 顔 */
        ctx.fillStyle="#e8d9b0";
        ctx.beginPath(); ctx.arc(0, -8, 7, 0, Math.PI*2); ctx.fill();
        /* 帽子 */
        ctx.fillStyle="#c2a35b";
        ctx.beginPath(); ctx.moveTo(-9, -12); ctx.lineTo(9, -12); ctx.lineTo(0, -26); ctx.closePath(); ctx.fill();
        break;
      }
      case "coin":{
        var t=(w.time*4+o.x)%(Math.PI*2);
        var squish=Math.abs(Math.cos(t))*0.6+0.4;
        ctx.fillStyle="#d9b354";
        ctx.beginPath(); ctx.ellipse(0, 0, 11*squish, 11, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle="#8f7328"; ctx.lineWidth=2;
        ctx.beginPath(); ctx.ellipse(0, 0, 11*squish, 11, 0, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle="#8f7328";
        ctx.font="bold 11px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
        if(squish>0.7) ctx.fillText("G", 0, 1);
        break;
      }
      case "goblin":{
        ctx.fillStyle="rgba(0,0,0,.35)";
        ctx.beginPath(); ctx.ellipse(0, 15, 12, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle="#5c7a49";
        ctx.beginPath(); ctx.arc(0, 0, 13, 0, Math.PI*2); ctx.fill();
        /* 耳 */
        ctx.beginPath(); ctx.moveTo(-11,-6); ctx.lineTo(-20,-14); ctx.lineTo(-8,-11); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(11,-6); ctx.lineTo(20,-14); ctx.lineTo(8,-11); ctx.closePath(); ctx.fill();
        /* 目 */
        ctx.fillStyle="#f2e8c9";
        ctx.beginPath(); ctx.arc(-5,-2,3,0,Math.PI*2); ctx.arc(5,-2,3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#20261c";
        ctx.beginPath(); ctx.arc(-5,-2,1.4,0,Math.PI*2); ctx.arc(5,-2,1.4,0,Math.PI*2); ctx.fill();
        /* 口 */
        ctx.strokeStyle="#20261c"; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(-4,6); ctx.lineTo(-1,8); ctx.lineTo(2,6); ctx.lineTo(5,8); ctx.stroke();
        break;
      }
      case "fountain":{
        ctx.strokeStyle="#5b7f96"; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(0,0, o.w*SCALE/2, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle="rgba(91,127,150,.3)";
        ctx.beginPath(); ctx.arc(0,0, o.w*SCALE/2-4, 0, Math.PI*2); ctx.fill();
        var b=Math.sin(w.time*3)*3;
        ctx.fillStyle="#7fa7bd";
        ctx.beginPath(); ctx.arc(0,-4+b, 4, 0, Math.PI*2); ctx.fill();
        break;
      }
      case "sign":{
        ctx.fillStyle="#6b5427";
        ctx.fillRect(-2, -4, 4, 20);
        ctx.fillStyle="#8a6f3c";
        ctx.fillRect(-16, -14, 32, 14);
        ctx.strokeStyle="#4a3a1a"; ctx.lineWidth=1.5;
        ctx.strokeRect(-16, -14, 32, 14);
        break;
      }
      default:{
        ctx.fillStyle=o.color||"#888";
        ctx.fillRect(-o.w*SCALE/2, -o.h*SCALE/2, o.w*SCALE, o.h*SCALE);
      }
    }
    ctx.restore();
  });

  /* HUD */
  ctx.textAlign="left"; ctx.textBaseline="top";
  ctx.font='13px "Hiragino Mincho ProN","Yu Mincho",serif';
  ctx.fillStyle="rgba(232,217,176,.9)";
  ctx.fillText("目標: "+w.goalText, 16, 12);
  var hy=32;
  (w.hud||[]).forEach(function(t){ ctx.fillText(t, 16, hy); hy+=18; });
  ctx.textAlign="right";
  ctx.fillText(w.time.toFixed(1)+" 秒", W-16, 12);

  /* バナー */
  if(w.banner){
    ctx.fillStyle="rgba(19,22,28,.72)";
    ctx.fillRect(0, Hh/2-52, W, 104);
    ctx.strokeStyle=w.state==="clear"?"#c2a35b":"#a05a52";
    ctx.lineWidth=2;
    ctx.strokeRect(10, Hh/2-42, W-20, 84);
    ctx.fillStyle=w.state==="clear"?"#e0c377":"#d99a90";
    ctx.font='bold 30px "Hiragino Mincho ProN","Yu Mincho",serif';
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(w.banner, W/2, Hh/2-6);
    ctx.font='13px "Hiragino Mincho ProN",serif';
    ctx.fillStyle="rgba(232,217,176,.8)";
    ctx.fillText("「実行」でもう一度挑戦できる", W/2, Hh/2+28);
  }
}

/* ---------- 実行セッション ---------- */
function start(opts){
  var scene=null;
  for(var i=0;i<SCENES.length;i++) if(SCENES[i].id===opts.sceneId) scene=SCENES[i];
  if(!scene) scene=SCENES[0];
  var canvas=opts.canvas, ctx=canvas.getContext("2d");
  var onLog=opts.onLog||function(){};
  var world=makeWorld();
  world.goalText=scene.goal;
  scene.setup(world);
  var pl=player(world);

  var keys={};
  function kd(ev){
    var n=keyName(ev);
    if(["LeftArrow","RightArrow","UpArrow","DownArrow","Space"].indexOf(n)>=0) ev.preventDefault();
    if(!keys[n]) keysPressed[n]=true;
    keys[n]=true;
  }
  function ku(ev){ keys[keyName(ev)]=false; }
  var keysPressed={};
  window.addEventListener("keydown", kd);
  window.addEventListener("keyup", ku);

  /* ホスト定義 */
  var stopped=false;
  var host={
    resolveId:function(name, it){
      switch(name){
        case "Vector3": return vecStatics();
        case "KeyCode": return {t:"host", h:{ csName:"KeyCode", get:function(n){ return n; }, set:function(){} }};
        case "Time": return {t:"host", h:{ csName:"Time",
          get:function(n){
            if(n==="deltaTime") return mkF(world.dt);
            if(n==="time") return mkF(world.time);
            return undefined;
          }, set:function(){} }};
        case "Input": return {t:"host", h:{ csName:"Input",
          get:function(n){
            if(n==="GetKey") return {t:"nfn", f:function(a,it2){ return !!keys[it2.toStr(a[0])]; }};
            if(n==="GetKeyDown") return {t:"nfn", f:function(a,it2){ return !!keysPressed[it2.toStr(a[0])]; }};
            if(n==="GetKeyUp") return {t:"nfn", f:function(){ return false; }};
            return undefined;
          }, set:function(){} }};
        case "GameObject": return {t:"host", h:{ csName:"GameObject",
          get:function(n){
            if(n==="Find") return {t:"nfn", f:function(a,it2){
              var o=findObj(world, it2.toStr(a[0]));
              return o?goWrap(o):null;
            }};
            return undefined;
          }, set:function(){} }};
        case "Destroy": return {t:"nfn", f:function(a){
          var v=a[0];
          if(v&&v.t==="host"&&v.h.worldObj) v.h.worldObj.alive=false;
          return null;
        }};
        case "transform": return pl?transformHost(pl):null;
        case "gameObject": return pl?goWrap(pl):null;
      }
      return undefined;
    },
    construct:function(name, args){
      if(name==="Vector3"){
        return mkVec(args[0]?args[0].v:0, args[1]?args[1].v:0, args[2]?args[2].v:0);
      }
      return undefined;
    },
    bases:{ MonoBehaviour:true }
  };
  var hostLink={
    get:function(name){
      if(name==="transform") return pl?transformHost(pl):null;
      if(name==="gameObject") return pl?goWrap(pl):null;
      return undefined;
    },
    set:function(){ return undefined; }
  };

  /* コンパイル + Start() */
  var compiled;
  try{
    compiled=CSharp.compileBehaviour(opts.code, { output:onLog, host:host, hostLink:hostLink, maxSteps:600000 });
  }catch(err){
    var d=describeCompile(err);
    onLog({kind:"error", text:d});
    cleanup();
    /* 初期状態だけ描画 */
    world.dt=0; render(ctx, canvas, world);
    return {stop:function(){}, world:world, ok:false};
  }
  var bh=compiled.behaviour;
  if(!bh){
    onLog({kind:"error", text:"MonoBehaviour を継承したクラスが見つかりません。class 名 : MonoBehaviour { ... } の形で書いてね。"});
    cleanup();
    render(ctx, canvas, world);
    return {stop:function(){}, world:world, ok:false};
  }
  try{
    if(bh.has("Start")){ compiled.interp.steps=0; bh.invoke("Start"); }
  }catch(err){
    onLog({kind:"error", text:runErrText(err, compiled.interp)});
    cleanup();
    render(ctx, canvas, world);
    return {stop:function(){}, world:world, ok:false};
  }

  var last=performance.now();
  var raf=0;
  var overlaps={};
  function frame(now){
    if(stopped) return;
    var dt=Math.min(0.033, (now-last)/1000);
    last=now;
    world.dt=dt;
    if(world.state==="run"){
      world.time+=dt;
      compiled.interp.steps=0; /* フレームごとのステップ予算 */
      compiled.interp.maxSteps=250000;
      try{
        if(bh.has("Update")) bh.invoke("Update");
      }catch(err){
        onLog({kind:"error", text:runErrText(err, compiled.interp)});
        stopSession();
        return;
      }
      /* 境界クランプ */
      if(pl){
        pl.x=Math.max(-BOUNDS.x, Math.min(BOUNDS.x, pl.x));
        pl.y=Math.max(-BOUNDS.y, Math.min(BOUNDS.y, pl.y));
      }
      /* トリガー検出 3条件の代わり: 重なった瞬間に OnTriggerEnter */
      if(pl&&bh.has("OnTriggerEnter")){
        for(var i=0;i<world.objects.length;i++){
          var o=world.objects[i];
          if(!o.alive||o===pl||o.tag==="Deco") continue;
          var key=o.name;
          var ov=overlap(o, pl);
          if(ov&&!overlaps[key]){
            overlaps[key]=true;
            try{ compiled.interp.steps=0; bh.invoke("OnTriggerEnter", [goWrap(o)]); }
            catch(err){ onLog({kind:"error", text:runErrText(err, compiled.interp)}); stopSession(); return; }
          } else if(!ov) overlaps[key]=false;
        }
      }
      scene.update(world, dt);
    }
    render(ctx, canvas, world);
    keysPressed={};
    raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);

  function cleanup(){
    window.removeEventListener("keydown", kd);
    window.removeEventListener("keyup", ku);
  }
  function stopSession(){
    if(stopped) return;
    stopped=true;
    cancelAnimationFrame(raf);
    cleanup();
  }
  return {stop:stopSession, world:world, ok:true};
}
function describeCompile(err){
  if(err&&err.isCS) return (err.csLine?"行 "+err.csLine+": ":"")+err.message;
  return "コンパイルエラー: "+String(err&&err.message||err);
}
function runErrText(err, it){
  if(err&&err.sig==="throw"){
    var name=err.exc&&err.exc.cls?err.exc.cls.name:"Exception";
    var msg=err.exc&&err.exc.f?err.exc.f._msg:"";
    return name+(msg?": "+msg:"")+"（実行を停止しました）";
  }
  if(err&&err.isCS) return (err.csLine?"行 "+err.csLine+": ":"")+err.message;
  return "実行エラー: "+String(err&&err.message||err);
}

return { scenes:SCENES, start:start };
})();

<script>
/* ==========================================================
   コードの魔導書 — アプリロジック (Phase 1)
   DATA は直前の script で定義済み: {chapters:[...], refs:[...]}
   ========================================================== */
(function(){
"use strict";

/* ---------- 保存 ---------- */
var LS = "grimoire_v1_";
function save(k,v){ try{ localStorage.setItem(LS+k, JSON.stringify(v)); }catch(e){} }
function load(k,d){ try{ var v=localStorage.getItem(LS+k); return v==null?d:JSON.parse(v); }catch(e){ return d; } }

/* ---------- 状態 ---------- */
var state = {
  mode: "lecture",                       // lecture | grimoire
  doc: null,                             // 現在のドキュメントid
  read: load("read", {}),               // 読了マップ
  bookmark: load("bookmark", null)      // {doc, top}
};
var CH = DATA.chapters, REF = DATA.refs;
function chIndex(id){ for(var i=0;i<CH.length;i++) if(CH[i].id===id) return i; return -1; }
function refById(id){ for(var i=0;i<REF.length;i++) if(REF[i].id===id) return REF[i]; return null; }
function chById(id){ var i=chIndex(id); return i<0?null:CH[i]; }
function refShort(r){ return r.id==="cheat" ? "チートシート＆エラー辞典" : r.title; }

/* ---------- 検索索引（起動時にDOMから構築） ---------- */
var INDEX = [];
function buildIndex(){
  var dp = new DOMParser();
  function scan(doc, kindLabel, kind){
    var el = dp.parseFromString("<div id='r'>"+doc.html+"</div>","text/html").getElementById("r");
    for(var node=el.firstElementChild; node; node=node.nextElementSibling){
      if(!node.id) continue;
      var t = (node.textContent||"").replace(/\s+/g," ").trim();
      if(!t) continue;
      var tag = node.tagName.toLowerCase();
      INDEX.push({doc:doc.id, kind:kind, where:kindLabel, block:node.id, text:t,
                  head:(tag==="h2"||tag==="h3"||tag==="h4")?1:0});
    }
  }
  CH.forEach(function(c){ scan(c, "Chapter "+c.num+"　"+c.name, "ch"); });
  REF.forEach(function(r){ scan(r, "魔導書　"+refShort(r), "ref"); });
}

/* ---------- C#シンタックスハイライト ---------- */
var KWS = "using|namespace|public|private|protected|internal|class|struct|interface|enum|void|int|float|double|string|bool|char|var|const|readonly|static|new|if|else|switch|case|default|for|foreach|while|do|break|continue|return|try|catch|finally|throw|null|true|false|this|base|virtual|override|abstract|sealed|get|set|out|ref|in|is|as|delegate|event|params|partial|where|yield|async|await|lock|typeof|nameof";
var KWRE = new RegExp("^(?:"+KWS+")$");
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function highlight(src){
  var re = /(\/\/[^\n]*|\/\*[\s\S]*?\*\/)|("(?:[^"\\\n]|\\.)*"|'(?:[^'\\\n]|\\.)*')|(\b\d[\d_]*(?:\.\d+)?f?\b)|([A-Za-z_][A-Za-z0-9_]*)/g;
  var out="", last=0, m;
  while((m=re.exec(src))){
    out += esc(src.slice(last, m.index));
    if(m[1]) out += '<span class="c-com">'+esc(m[1])+'</span>';
    else if(m[2]) out += '<span class="c-str">'+esc(m[2])+'</span>';
    else if(m[3]) out += '<span class="c-num">'+esc(m[3])+'</span>';
    else{
      var w=m[4];
      if(KWRE.test(w)) out += '<span class="c-kw" data-kw="'+w+'">'+w+'</span>';
      else if(/^[A-Z]/.test(w)) out += '<span class="c-ty">'+w+'</span>';
      else out += esc(w);
    }
    last = re.lastIndex;
  }
  return out + esc(src.slice(last));
}
function looksLikeCode(t){ return /;|\{|\/\//.test(t); }

/* ---------- 本文後処理（ハイライト・コピー・キーワード） ---------- */
function enhance(root){
  root.querySelectorAll("pre").forEach(function(pre){
    var code = pre.querySelector("code");
    var raw = code.textContent;
    if(looksLikeCode(raw)) code.innerHTML = highlight(raw);
    var btn = el("button","copybtn","写す");
    btn.onclick=function(){
      (navigator.clipboard ? navigator.clipboard.writeText(raw) : Promise.reject()).then(function(){
        btn.textContent="写した ✓"; setTimeout(function(){btn.textContent="写す";},1400);
      }).catch(function(){
        var ta=document.createElement("textarea"); ta.value=raw; document.body.appendChild(ta);
        ta.select(); document.execCommand("copy"); ta.remove();
        btn.textContent="写した ✓"; setTimeout(function(){btn.textContent="写す";},1400);
      });
    };
    pre.appendChild(btn);
  });
  root.addEventListener("click",function(ev){
    var t = ev.target;
    if(t.matches && t.matches("span.c-kw")) lookup(t.getAttribute("data-kw"));
    else if(t.matches && t.matches("code.ic")) lookup(t.textContent.trim());
  });
}

/* ---------- 魔導書引き（キーワード参照） ---------- */
function tokenOf(s){
  var m = /[A-Za-z_][A-Za-z0-9_]*/.exec(s);
  return m ? m[0] : s.slice(0,12);
}
function findBlock(docId, q){
  var ql = q.toLowerCase(), hit=null;
  for(var i=0;i<INDEX.length;i++){
    var e = INDEX[i];
    if(e.doc!==docId) continue;
    if(e.text.toLowerCase().indexOf(ql)<0) continue;
    if(e.head) return e;
    if(!hit) hit=e;
  }
  return hit;
}
function lookup(raw){
  var tok = tokenOf(raw);
  var docId = KWMAP[tok];
  var entry = null;
  if(docId) entry = findBlock(docId, tok) || {doc:docId, block:null};
  if(!entry){
    for(var i=0;i<INDEX.length;i++){
      var e=INDEX[i];
      if(e.kind!=="ref") continue;
      if(e.text.toLowerCase().indexOf(tok.toLowerCase())<0) continue;
      if(e.head){ entry=e; break; }
      if(!entry) entry=e;
    }
  }
  if(entry) openPanel(entry.doc, entry.block);
  else openPalette(raw);
}

/* ---------- 魔導書パネル ---------- */

  openDoc(docId, e?e.block:null);

/* ---------- 検索パレット ---------- */
var palSel = 0, palHits = [];
function openPalette(prefill){
  $("#palVeil").classList.add("open"); $("#palette").classList.add("open");
  var inp = $("#palInput");
  inp.value = prefill||"";
  palQuery(inp.value);
  setTimeout(function(){ inp.focus(); inp.select(); },0);
}
function closePalette(){ $("#palVeil").classList.remove("open"); $("#palette").classList.remove("open"); }
function palQuery(q){
  var box = $("#palResults");
  q = q.trim();
  if(!q){ box.innerHTML='<div class="pempty">教科書全章と魔導書を串下し検索します — 例：foreach、ゴブリン、null</div>'; palHits=[]; return; }
  var terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  var hits = [];
  for(var i=0;i<INDEX.length;i++){
    var e = INDEX[i], tl = e.text.toLowerCase(), ok = true;
    for(var j=0;j<terms.length;j++) if(tl.indexOf(terms[j])<0){ ok=false; break; }
    if(!ok) continue;
    hits.push({e:e, score:(e.head?2:0)+(e.kind==="ref"?0:1)});
    if(hits.length>400) break;
  }
  hits.sort(function(a,b){ return b.score-a.score; });
  palHits = hits.slice(0,40);
  palSel = 0;
  if(!palHits.length){ box.innerHTML='<div class="pempty">見つかりませんでした — 別の言葉でお試しください</div>'; return; }
  box.innerHTML="";
  var t0 = terms[0];
  palHits.forEach(function(h,idx){
    var e=h.e;
    var pos = e.text.toLowerCase().indexOf(t0);
    var start = Math.max(0, pos-28);
    var frag = (start>0?"…":"") + e.text.slice(start, start+130);
    frag = frag.replace(/&/g,"&amp;").replace(/</g,"&lt;");
    terms.forEach(function(t){
      frag = frag.replace(new RegExp("("+t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig"),"<mark>$1</mark>");
    });
    var b = el("button","pr"+(idx===0?" sel":""),'<span class="where">'+e.where+'</span><span class="snip">'+frag+'</span>');
    b.onclick=function(){ go(idx); };
    box.appendChild(b);
  });
  function go(idx){
    var e = palHits[idx].e;
    closePalette(); closePanel();
    openDoc(e.doc, e.block);
  }
  palGo = go;
}
var palGo = null;
function palMove(d){
  if(!palHits.length) return;
  palSel = (palSel + d + palHits.length) % palHits.length;
  var rows = $("#palResults").children;
  for(var i=0;i<rows.length;i++) rows[i].classList.toggle("sel", i===palSel);
  rows[palSel].scrollIntoView({block:"nearest"});
}

var SUN  = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';

/* ---------- しおり保存 ---------- */

$("#main").addEventListener("scroll",function(){

  clearTimeout(bmTimer);

    state.bookmark = {doc:state.doc, top:$("#main").scrollTop};
    save("bookmark", state.bookmark);

/* ---------- キーボード ---------- */
document.addEventListener("keydown",function(ev){
  var palOpen = $("#palette").classList.contains("open");
  if((ev.ctrlKey||ev.metaKey) && (ev.key==="k"||ev.key==="K")){
    ev.preventDefault(); palOpen ? closePalette() : openPalette(""); return;
  }
  if(palOpen){
    if(ev.key==="Escape"){ closePalette(); }
    else if(ev.key==="ArrowDown"){ ev.preventDefault(); palMove(1); }
    else if(ev.key==="ArrowUp"){ ev.preventDefault(); palMove(-1); }
    else if(ev.key==="Enter"){ ev.preventDefault(); if(palGo) palGo(palSel); }
    return;
  }
  if(ev.key==="Escape"){ closePanel(); return; }
  if(ev.target && /INPUT|TEXTAREA/.test(ev.target.tagName)) return;
  if(state.mode==="lecture" && !ev.ctrlKey && !ev.metaKey && !ev.altKey){
    var i = chIndex(state.doc);
    if(ev.key==="ArrowLeft" && i>0) openDoc(CH[i-1].id);
    if(ev.key==="ArrowRight" && i>=0 && i<CH.length-1) openDoc(CH[i+1].id);
  }
});

/* ---------- コードエディタ（ハイライト重ね描画） ---------- */
function makeEditor(initial){
  var wrap=el("div","ed-wrap");
  var hl=el("pre","ed-hl");
  var code=el("code");
  hl.appendChild(code);
  var ta=document.createElement("textarea");
  ta.className="ed-ta";
  ta.spellcheck=false;
  ta.setAttribute("wrap","off");
  ta.setAttribute("autocapitalize","off");
  ta.setAttribute("autocomplete","off");
  ta.value=initial||"";
  wrap.appendChild(hl); wrap.appendChild(ta);
  function paint(){
    code.innerHTML=APP.highlight(ta.value+"\n");
    hl.scrollTop=ta.scrollTop; hl.scrollLeft=ta.scrollLeft;
  }
  ta.addEventListener("input", paint);
  ta.addEventListener("scroll", function(){ hl.scrollTop=ta.scrollTop; hl.scrollLeft=ta.scrollLeft; });
  ta.addEventListener("keydown", function(ev){
    if(ev.key==="Tab"){
      ev.preventDefault();
      var s=ta.selectionStart, e2=ta.selectionEnd;
      ta.value=ta.value.slice(0,s)+"    "+ta.value.slice(e2);
      ta.selectionStart=ta.selectionEnd=s+4;
      paint();
    }
  });
  paint();
  return {
    root:wrap,
    get:function(){ return ta.value; },
    set:function(v){ ta.value=v; paint(); },
    onChange:function(fn){ ta.addEventListener("input", fn); },
    focus:function(){ ta.focus(); }
  };
}

  EXERCISES.forEach(function(g){
    var chDoc = window.DATA && DATA.chapters ? DATA.chapters.filter(function(c){return c.id===g.ch;})[0] : null;
    sb.appendChild(el("div","ex-group", esc(chDoc?("Chapter "+chDoc.num+"　"+g.name):g.name)));
    var ul=el("ul","exlist");
    g.items.forEach(function(it){
      var li=el("li",(curEx&&curEx.id===it.id?"cur ":"")+(exDone[it.id]?"done":""));
      var b=el("button",null,'<span class="exmark">'+(it.free?"✦":(exDone[it.id]?"✓":"○"))+'</span><span class="exnm">'+esc(it.title)+'</span>');
      b.onclick=function(){ openExercise(it.id); APP.closeSidebarMobile(); };
      li.appendChild(b); ul.appendChild(li);
    });
    sb.appendChild(ul);
  });
}

function openExercise(id){
  var p=findEx(id); if(!p) return;
  curEx=p.it;
  var it=p.it, g=p.g;
  var main=$("#main");
  var doc=el("div","doc ex-doc");
  doc.appendChild(el("header","tobira",
    '<div class="chapno">演習の間 — '+esc(g.name)+'</div><h1>'+esc(it.title)+'</h1><div class="orn">✦ ✦ ✦</div>'));

  var prompt=el("div","ex-prompt",'<b>お題</b><p>'+esc(it.prompt).replace(/\n/g,"<br>")+'</p>');
  doc.appendChild(prompt);

  var ed=makeEditor(exCode[id]!=null?exCode[id]:it.starter);
  doc.appendChild(ed.root);
  ed.onChange(function(){ exCode[id]=ed.get(); APP.save("excode", exCode); });

  var bar=el("div","ex-bar");
  var runBtn=el("button","exbtn primary","▶ 実行");
  var judgeBtn=it.free?null:el("button","exbtn judge","⚖ 判定");
  var hintBtn=el("button","exbtn","◇ ヒント");
  var ansBtn=it.free?null:el("button","exbtn","巻末の答え");
  var resetBtn=el("button","exbtn ghost","書き直す");
  bar.appendChild(runBtn);
  if(judgeBtn) bar.appendChild(judgeBtn);
  bar.appendChild(hintBtn);
  if(ansBtn) bar.appendChild(ansBtn);
  bar.appendChild(resetBtn);
  doc.appendChild(bar);

  var hintBox=el("div","ex-hints");
  doc.appendChild(hintBox);
  var hintN=0;
  hintBtn.onclick=function(){
    if(hintN>=it.hints.length){ hintBtn.textContent="◇ ヒントは出尽くし"; return; }
    hintBox.appendChild(el("div","ex-hint",'<b>ヒント '+(hintN+1)+'</b> '+esc(it.hints[hintN])));
    hintN++;
    if(hintN>=it.hints.length) hintBtn.textContent="◇ ヒントは出尽くし";
  };

  var verdict=el("div","ex-verdict");
  doc.appendChild(verdict);
  var con=makeConsole();
  doc.appendChild(el("div","con-label","Console"));
  doc.appendChild(con.root);

  function run(){
    con.clear();
    var r=CSharp.run(ed.get(), {maxSteps:2000000});
    (r.outputs||[]).forEach(function(o){ con.push(o.kind, o.text); });
    if(!r.ok&&r.error) con.push("error", r.error.text||r.error.message);
    return r;
  }
  runBtn.onclick=run;

  if(judgeBtn) judgeBtn.onclick=function(){
    verdict.innerHTML="";
    var r=run();
    var got=(r.outputs||[]).map(function(o){ return o.text; });
    var ok=r.ok && JSON.stringify(got)===JSON.stringify(it.expect);
    if(ok){
      exDone[id]=1; APP.save("exdone", exDone);
      verdict.appendChild(el("div","ex-stamp","合格"));
      verdict.appendChild(el("div","ex-pass-msg","見事！期待どおりの出力だ。次のお題へ進もう。"));
      APP.renderSidebar();
    }else{
      var html='<b>まだ合格ではない。</b>';
      if(!r.ok&&r.error){ html+='<br>エラーを直してから再判定しよう。'; }
      else{
        html+='<table class="ex-diff"><tr><th>期待される出力</th><th>あなたの出力</th></tr>';
        var n=Math.max(it.expect.length, got.length);
        for(var i=0;i<n;i++){
          var e2=it.expect[i]!=null?esc(it.expect[i]):"—";
          var g2=got[i]!=null?esc(got[i]):"—";
          var same=it.expect[i]===got[i];
          html+='<tr class="'+(same?"same":"diff")+'"><td>'+e2+'</td><td>'+g2+'</td></tr>';
        }
        html+='</table>';
      }
      verdict.appendChild(el("div","ex-fail",html));
    }
  };

  if(ansBtn) ansBtn.onclick=function(){
    if(!confirm("巻末の答えを見る？今のコードは上書きされる。")) return;
    ed.set(it.solution);
    exCode[id]=it.solution; APP.save("excode", exCode);
  };
  resetBtn.onclick=function(){
    if(!confirm("最初の状態に戻す？")) return;
    ed.set(it.starter);
    delete exCode[id]; APP.save("excode", exCode);
    verdict.innerHTML=""; con.clear();
  };

  main.innerHTML=""; main.appendChild(doc); main.scrollTop=0;
  APP.renderSidebar();
}

/* ==========================================================
   訓練所
   ========================================================== */
function renderDojoSidebar(sb){
  sb.appendChild(el("div","side-label","訓練所 — 動くミニUnity"));
  var ul=el("ul","exlist dojo");
  UnityDojo.scenes.forEach(function(s){
    var li=el("li", curScene===s.id?"cur":"");
    var b=el("button",null,'<span class="exmark">'+s.icon+'</span><span class="exnm">'+esc(s.title)+'</span>');
    b.onclick=function(){ openScene(s.id); APP.closeSidebarMobile(); };
    li.appendChild(b); ul.appendChild(li);
  });
  sb.appendChild(ul);
  sb.appendChild(el("hr","side-sep"));
  sb.appendChild(el("div","ex-group","使える道具"));
  sb.appendChild(el("div","dojo-tips",
    "transform.position / Vector3<br>Time.deltaTime<br>Input.GetKey / GetKeyDown + KeyCode<br>GameObject.Find / Destroy<br>OnTriggerEnter(Collider other)<br>Debug.Log → 下のConsoleへ"));
}

function stopDojo(){
  if(dojoHandle){ dojoHandle.stop(); dojoHandle=null; }
}

function openScene(id){
  stopDojo();
  var scene=null;
  UnityDojo.scenes.forEach(function(s){ if(s.id===id) scene=s; });
  if(!scene) scene=UnityDojo.scenes[0];
  curScene=scene.id;
  var main=$("#main");
  var doc=el("div","doc dojo-doc");
  doc.appendChild(el("header","tobira",
    '<div class="chapno">訓練所 — 実戦演習</div><h1>'+scene.icon+' '+esc(scene.title)+'</h1><div class="orn">✦ ✦ ✦</div>'));
  doc.appendChild(el("div","ex-prompt",'<b>作戦</b><p>'+esc(scene.desc)+'</p><p class="dojo-goal">目標：'+esc(scene.goal)+'</p>'));

  var cwrap=el("div","dojo-canvas-wrap");
  var canvas=document.createElement("canvas");
  canvas.width=720; canvas.height=480;
  canvas.className="dojo-canvas";
  cwrap.appendChild(canvas);
  doc.appendChild(cwrap);

  var bar=el("div","ex-bar");
  var runBtn=el("button","exbtn primary","▶ 実行（コンパイルして開始）");
  var stopBtn=el("button","exbtn","■ 停止");
  var resetBtn=el("button","exbtn ghost","書き直す");
  bar.appendChild(runBtn); bar.appendChild(stopBtn); bar.appendChild(resetBtn);
  doc.appendChild(bar);

  var ed=makeEditor(dojoCode[scene.id]!=null?dojoCode[scene.id]:scene.starter);
  doc.appendChild(ed.root);
  ed.onChange(function(){ dojoCode[scene.id]=ed.get(); APP.save("dojocode", dojoCode); });

  var con=makeConsole();
  doc.appendChild(el("div","con-label","Console"));
  doc.appendChild(con.root);

  runBtn.onclick=function(){
    stopDojo();
    con.clear();
    dojoHandle=UnityDojo.start({
      sceneId:scene.id,
      code:ed.get(),
      canvas:canvas,
      onLog:function(o){ con.push(o.kind, o.text); }
    });
    canvas.focus();
  };
  stopBtn.onclick=function(){ stopDojo(); con.push("log","— 停止した —"); };
  resetBtn.onclick=function(){
    if(!confirm("最初のコードに戻す？")) return;
    stopDojo();
    ed.set(scene.starter);
    delete dojoCode[scene.id]; APP.save("dojocode", dojoCode);
  };

  main.innerHTML=""; main.appendChild(doc); main.scrollTop=0;
  APP.renderSidebar();
  /* 初期描画：動かす前に舞台だけ見せる */
  dojoHandle=UnityDojo.start({ sceneId:scene.id, code:scene.starter, canvas:canvas, onLog:function(){} });
  dojoHandle.stop=dojoHandle.stop; /* keep */
}

/* ---------- モード入口 ---------- */
function openMode(m){
  stopDojo();
  APP.state.mode=m;
  APP.state.doc=null;
  APP.syncTabs();
  if(m==="practice"){
    openExercise(curEx?curEx.id:EXERCISES[0].items[0].id);
  }else{
    openScene(curScene||UnityDojo.scenes[0].id);
  }
}
function renderSidebar(sb){
  if(APP.state.mode==="practice") renderPracticeSidebar(sb);
  else renderDojoSidebar(sb);
}

return { openMode:openMode, renderSidebar:renderSidebar, stopDojo:stopDojo };
})();

</script>
</body>
</html>
