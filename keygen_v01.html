<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EDIT ONE キー生成(運営用)</title>
<style>
:root{--bg:#0f0f14;--panel:#17171f;--panel2:#1f1f2a;--line:#2b2b38;--text:#e9e9f0;--sub:#9a9aab;--accent:#4c8dff;--ok:#2f9e44;--danger:#e5484d;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Hiragino Sans","Yu Gothic UI",system-ui,sans-serif;font-size:14px;padding:20px;display:flex;justify-content:center}
.wrap{max-width:560px;width:100%;display:flex;flex-direction:column;gap:12px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:10px}
h1{font-size:16px}
h2{font-size:14px}
.sub{color:var(--sub);font-size:12px}
button{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
.primary{background:var(--accent);border-color:var(--accent)}
input,textarea{background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:7px 9px;font-size:13px;font-family:ui-monospace,monospace}
textarea{width:100%;height:180px;resize:vertical}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
#chk{font-weight:600}
</style>
</head>
<body>
<div class="wrap">
 <h1>🔑 EDIT ONE ライセンスキー生成(運営用)</h1>
 <div class="panel">
  <h2>キーを生成</h2>
  <div class="row">
   <label class="sub">発行数</label>
   <input type="number" id="cnt" value="10" min="1" max="500" style="width:80px">
   <button class="primary" id="btnGen">生成</button>
   <button id="btnCopy">📋 コピー</button>
  </div>
  <textarea id="out" readonly placeholder="ここにキーが出ます"></textarea>
  <div class="sub">キーはランダム生成+チェックサム署名。同じキーが出る確率は事実上ゼロですが、発行済みキーは必ず控えてください。</div>
 </div>
 <div class="panel">
  <h2>キーを検算(サポート用)</h2>
  <div class="row">
   <input type="text" id="chkKey" placeholder="EDITONE-XXXX-XXXX-XXXX" style="flex:1;min-width:220px">
   <button id="btnChk">検証</button>
   <span id="chk"></span>
  </div>
  <div class="sub">購入者から「キーが通らない」と連絡が来たとき、ここに貼れば正規キーか確認できます。</div>
 </div>
</div>
<script>
"use strict";
const CS="ABCDEFGHJKMNPQRSTUVWXYZ23456789";
function sig(body){let h=2166136261;const s=body+"EDITONE_SALT_v1";for(let i=0;i<s.length;i++){h=((h^s.charCodeAt(i))*16777619)>>>0}let o="";for(let i=0;i<4;i++){o+=CS[h%31];h=Math.floor(h/31)}return o}
function randBody(){const a=new Uint32Array(8);crypto.getRandomValues(a);let o="";for(let i=0;i<8;i++)o+=CS[a[i]%31];return o}
function makeKey(){const b=randBody();return "EDITONE-"+b.slice(0,4)+"-"+b.slice(4)+"-"+sig(b)}
document.getElementById("btnGen").onclick=()=>{
 const n=Math.max(1,Math.min(500,+document.getElementById("cnt").value||1));
 const set=new Set();while(set.size<n)set.add(makeKey());
 document.getElementById("out").value=[...set].join("\n");
};
document.getElementById("btnCopy").onclick=()=>{const t=document.getElementById("out");t.select();document.execCommand("copy")};
document.getElementById("btnChk").onclick=()=>{
 const k=(document.getElementById("chkKey").value||"").trim().toUpperCase();
 const m=k.match(/^EDITONE-([A-Z2-9]{4})-([A-Z2-9]{4})-([A-Z2-9]{4})$/);
 const ok=!!m&&sig(m[1]+m[2])===m[3];
 const el=document.getElementById("chk");
 el.textContent=ok?"✅ 正規キー":"❌ 無効";el.style.color=ok?"var(--ok)":"var(--danger)";
};
</script>
</body>
</html>
